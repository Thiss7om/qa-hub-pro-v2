// ─── TC MODAL ─────────────────────────────────────────────────────────────────
function TCModal({ tc, task, project, testCases, setTestCases, defects, setDefects, currentUser, users, canEdit, showToast, addLog, onClose, navigate, openDefectModal }) {
  const isEdit = !!tc;
  const SCENARIO_TEMPLATE = 'Scenario Description\n* อธิบายรายละเอียด\n\nPrerequisite\n1. Existing Customer\n2. ข้อมูลเพิ่มก่อนทดสอบ\n3. ข้อมูลเพิ่มก่อนทดสอบ\n\nPre steps\n1. Log in URL : ใส่ URL สำหรับทดสอบ\n2. ขั้นตอนการทดสอบ\n   * Step 1\n   * Step 2\n   * Step 3\n3. ขั้นตอนการทดสอบเพิ่มเติม\n   * Step 1';
  const blank = { title:'', priority:'Medium', detection:'Positive', status:'Not Start', scenarioDescription:'', tags:'', testData:'', comment:'', assignee:'', steps:[{id:uid(),action:'',expected:'',actual:'',files:[]}], files:[] };
  const [form, setForm] = useState(isEdit ? {...blank,...tc, steps:(tc.steps&&tc.steps.length?tc.steps:[{id:uid(),action:'',expected:'',actual:'',files:[]}])} : blank);
  const [dirty, setDirty] = useState(false);
  const [showConfirm, setShowConfirm] = useState(null);
  const [activeTab, setActiveTab] = useState('info');
  const [commentError, setCommentError] = useState(false);
  const commentRef = useRef(null);

  const set = (k,v) => { setForm(p=>({...p,[k]:v})); setDirty(true); };
  const setStep = (i,k,v) => { const steps=[...form.steps]; steps[i]={...steps[i],[k]:v}; setForm(p=>({...p,steps})); setDirty(true); };
  const addStep = () => { setForm(p=>({...p,steps:[...p.steps,{id:uid(),action:'',expected:'',actual:'',files:[]}]})); setDirty(true); };
  const removeStep = (i) => { const steps=form.steps.filter((_,idx)=>idx!==i); setForm(p=>({...p,steps})); setDirty(true); };

  const handleClose = () => { if(dirty) setShowConfirm('close'); else onClose(); };

  const handleFile = (e, stepIdx) => {
    const files = Array.from(e.target.files);
    files.forEach(file => {
      const reader = new FileReader();
      reader.onload = (ev) => {
        const fileId = uid();
        const dataUrl = ev.target.result;
        // เก็บ dataURL ใน localStorage cache แยกต่างหาก
        // เพื่อไม่ให้ binary data ถูกรวมใน payload ที่ส่งไป Google Sheet (เกิน URL limit)
        cacheFileData(fileId, dataUrl);
        const fobj = { id:fileId, name:file.name, size:file.size, type:file.type, data:dataUrl };
        if (stepIdx >= 0) {
          const steps=[...form.steps];
          steps[stepIdx]={...steps[stepIdx], files:[...(steps[stepIdx].files||[]),fobj]};
          setForm(p=>({...p,steps})); setDirty(true);
        } else {
          setForm(p=>({...p,files:[...(p.files||[]),fobj]})); setDirty(true);
        }
      };
      reader.readAsDataURL(file);
    });
    e.target.value = ''; // reset input
  };

  const downloadFile = (f) => {
    // ดึงจาก field `data` (ใน session) หรือจาก localStorage cache
    const dataUrl = f.data || getCachedFileData(f.id);
    if (!dataUrl) { showToast('ไม่พบข้อมูลไฟล์ในเครื่องนี้ (cache หมดอายุ)', 'error'); return; }
    const a = document.createElement('a'); a.href = dataUrl; a.download = f.name; a.click();
  };

  const save = () => {
    if (!form.title.trim()) { showToast('กรุณาใส่ Title','error'); return; }
    if (['Pass with Comment','Cancelled','Deferred'].includes(form.status) && !form.comment.trim()) {
      setCommentError(true);
      setActiveTab('info');
      showToast(form.status+' ต้องใส่ Comment ก่อนบันทึก','error');
      setTimeout(()=>{ if(commentRef.current){ commentRef.current.scrollIntoView({behavior:'smooth',block:'center'}); commentRef.current.focus(); } },100);
      return;
    }
    setCommentError(false);
    if (isEdit) {
      const old = testCases.find(x=>x.id===tc.id);
      const changes = [];
      if(old.status!==form.status) changes.push(`Status: ${old.status} → ${form.status}`);
      if(old.priority!==form.priority) changes.push(`Priority: ${old.priority} → ${form.priority}`);
      setTestCases(p=>p.map(x=>x.id===tc.id?{...x,...form,updatedAt:now(),updatedBy:currentUser.id}:x));
      addLog('Update TC', `แก้ไข TC: ${form.title}${changes.length?' ('+changes.join(', ')+')':''}`);
      showToast('อัพเดท Test Case สำเร็จ');
    } else {
      const ntc = { id:uid(), taskId:task.id, projectId:project.id, createdBy:currentUser.id, createdAt:now(), ...form };
      setTestCases(p=>[...p,ntc]);
      addLog('Create TC', `สร้าง TC: ${form.title} ใน Task: ${task.name}`);
      showToast('สร้าง Test Case สำเร็จ');
    }
    onClose();
  };

  const tcDefects = isEdit ? defects.filter(d=>toArr(d.relatedTcIds).includes(tc?.id)||(toArr(d.relatedTcIds).length===0&&d.testCaseId===tc?.id)) : [];

  const FileList = ({ files, onAdd, onDel }) => h('div',null,
    (files||[]).map(f=>h('div',{key:f.id,className:'file-item'},
      h('span',{className:'file-icon'},f.type?.startsWith('image/') ? h('span',{className:'ms ms-sm'},'image') : h('span',{className:'ms ms-sm'},'description')),
      h('span',{className:'file-name',style:{cursor:'pointer',color:'var(--accent)'},onClick:()=>downloadFile(f)},f.name),
      h('span',{className:'file-size'},Math.round(f.size/1024)+'KB'),
      canEdit&&h('button',{className:'btn-icon',style:{marginLeft:'auto'},onClick:()=>onDel(f.id)},h('span',{className:'ms ms-sm'},'close'))
    )),
    canEdit&&h('label',{className:'file-drop',style:{marginTop:'6px',padding:'12px',cursor:'pointer'}},
      h('input',{type:'file',multiple:true,accept:'image/*,.pdf,.doc,.docx,.xls,.xlsx',onChange:onAdd}),
      '+ เพิ่มไฟล์'
    )
  );

  const _portalEl = h('div',{className:'modal-overlay',onClick:e=>{if(e.target.className==='modal-overlay')handleClose();}},
    h('div',{className:'modal modal-lg'},
      h('div',{className:'modal-header'},
        h('span',{className:'modal-title'},isEdit?`แก้ไข: ${tc.title}`:'สร้าง Test Case ใหม่'),
        h('div',{style:{display:'flex',gap:'8px',alignItems:'center'}},
          isEdit&&h('div',{style:{display:'flex',alignItems:'center',gap:'4px'}},
            h('button',{className:'btn-icon',title:'เปิดใน Tab ใหม่',style:{padding:'5px 7px',fontSize:'15px',opacity:'0.7'},onClick:()=>{window.open(shortUrl('tc',tc.id),'_blank');}},h('span',{className:'ms ms-sm'},'open_in_new')),
            h('button',{className:'btn-icon',title:'คัดลอก Link',style:{padding:'5px 7px',fontSize:'15px',opacity:'0.7'},onClick:()=>{copyText(shortUrl('tc',tc.id),showToast);}},h('span',{className:'ms ms-sm'},'content_copy'))
          ),
          h('button',{className:'modal-close',onClick:handleClose},h('span',{className:'ms ms-sm'},'close'))
        )
      ),
      h('div',{className:'tabs',style:{padding:'0 24px',margin:'0'}},
        [['info','ข้อมูลหลัก'],['steps','Test Steps'],['files','Files'],['defects','Defects'],['history','History']].map(([t,l])=>h('div',{key:t,className:`tab${activeTab===t?' active':''}`,onClick:()=>setActiveTab(t)},l))
      ),
      h('div',{className:'modal-body'},
        activeTab==='info'&&h('div',{style:{display:'flex',flexDirection:'column',height:'100%'}},
          h('div',{className:'form-group'},
            h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'6px'}},
              h('label',{className:'form-label',style:{margin:0}},'Title ',h('span',{className:'req'},'*')),
              canEdit&&h(TitleTemplateDropdown,{onInsert:tpl=>set('title',tpl)})
            ),
            h('input',{className:'form-input',value:form.title,onChange:e=>set('title',e.target.value),readOnly:!canEdit})
          ),
          h('div',{className:'form-row3'},
            h('div',{className:'form-group'},h('label',{className:'form-label'},'Project'),h('input',{className:'form-input',value:project.name,readOnly:true,style:{opacity:0.7}})),
            h('div',{className:'form-group'},h('label',{className:'form-label'},'Task'),h('input',{className:'form-input',value:task.name,readOnly:true,style:{opacity:0.7}})),
            h('div',{className:'form-group'},h('label',{className:'form-label'},'Priority'),h('select',{className:'form-select',value:form.priority,onChange:e=>set('priority',e.target.value),disabled:!canEdit},priorityOpts.map(o=>h('option',{key:o,value:o},o))))
          ),
          h('div',{className:'form-row3'},
            h('div',{className:'form-group'},h('label',{className:'form-label'},'Detection'),h('select',{className:'form-select',value:form.detection,onChange:e=>set('detection',e.target.value),disabled:!canEdit},detectionOpts.map(o=>h('option',{key:o,value:o},o)))),
            h('div',{className:'form-group'},h('label',{className:'form-label'},'Status'),h('select',{className:'form-select',value:form.status,onChange:e=>{ set('status',e.target.value); setCommentError(false); },disabled:!canEdit},statusOpts.map(o=>h('option',{key:o,value:o},o)))),
            h('div',{className:'form-group'},h('label',{className:'form-label'},'Test Data'),h('input',{className:'form-input',value:form.testData,onChange:e=>set('testData',e.target.value),readOnly:!canEdit}))
          ),
          h('div',{className:'form-row'},
            h('div',{className:'form-group'},
              h('label',{className:'form-label'},'Assignee'),
              h('select',{className:'form-select',value:form.assignee||'',onChange:e=>set('assignee',e.target.value),disabled:!canEdit},
                h('option',{value:''},'— ยังไม่ได้มอบหมาย —'),
                (users||[]).map(u=>h('option',{key:u.id,value:u.id},u.name))
              )

function DefectModal({ initialTcId, allTCs, defects, setDefects, currentUser, currentTeam, users, showToast, addLog, onClose, editDefect }) {
  const isEdit = !!editDefect;

  const [activeTab, setActiveTab] = useState('info');
  const initForm = () => {
    if (isEdit && editDefect) {
      return {
        title: editDefect.title || '',
        severity: editDefect.severity || 'Medium',
        status: editDefect.status || 'Open',
        description: editDefect.description || '',
        targetDate: editDefect.targetDate || '',
        assignee: editDefect.assignee || '',
        comment: editDefect.comment || '',
        relatedTcIds: Array.isArray(editDefect.relatedTcIds) ? editDefect.relatedTcIds : (editDefect.testCaseId ? [editDefect.testCaseId] : []),
        files: Array.isArray(editDefect.files) ? editDefect.files : []
      };
    }
    return { title:'', severity:'Medium', status:'Open', description:'', targetDate:'', assignee:'', comment:'', relatedTcIds: initialTcId ? [initialTcId] : [], files: [] };
  };
  const [form, setForm] = useState(initForm);
  const [tcSearch, setTcSearch] = useState('');
  const [commentError, setCommentError] = useState(false);
  const commentRef = useRef(null);

  // [v22] File upload handlers (same pattern as TC modal)
  const handleDefectFile = (e) => {
    const fileList = Array.from(e.target.files);
    fileList.forEach(file => {
      const reader = new FileReader();
      reader.onload = (ev) => {
        const fileId = uid();
        const dataUrl = ev.target.result;
        cacheFileData(fileId, dataUrl);
        const fobj = { id: fileId, name: file.name, size: file.size, type: file.type, data: dataUrl };
        setForm(p => ({ ...p, files: [...(p.files||[]), fobj] }));
      };
      reader.readAsDataURL(file);
    });
    e.target.value = '';
  };

  const downloadDefectFile = (f) => {
    const dataUrl = f.data || getCachedFileData(f.id);
    if (!dataUrl) { showToast('ไม่พบข้อมูลไฟล์ในเครื่องนี้ (cache หมดอายุ)', 'error'); return; }
    const a = document.createElement('a'); a.href = dataUrl; a.download = f.name; a.click();
  };

  const removeDefectFile = (fid) => {
    setForm(p => ({ ...p, files: (p.files||[]).filter(f => f.id !== fid) }));
  };

  const canEdit = true; // defect modal always editable when open

  const toggleTC = (tcId) => setForm(p=>({...p, relatedTcIds:p.relatedTcIds.includes(tcId)?p.relatedTcIds.filter(x=>x!==tcId):[...p.relatedTcIds,tcId]}));

  const save = () => {
    if (!form.title.trim()) { showToast('กรุณาใส่ชื่อ Defect','error'); return; }
    if (['Rejected'].includes(form.status) && !(form.comment||'').trim()) {
      setCommentError(true);
      showToast(form.status+' ต้องใส่ Comment ก่อนบันทึก','error');
      setActiveTab('info');
      setTimeout(()=>{ if(commentRef.current){ commentRef.current.scrollIntoView({behavior:'smooth',block:'center'}); commentRef.current.focus(); } },100);
      return;
    }
    setCommentError(false);
    if (isEdit) {
      const targetId = editId.current;
      setDefects(p=>p.map(x=>x.id===targetId?{...x,...form,updatedAt:now(),updatedBy:currentUser.id}:x));
      addLog('Update Defect','แก้ไข Defect: '+form.title);
      showToast('อัปเดต Defect สำเร็จ');
    } else {
      const nd = { id:uid(), teamId:currentTeam?.id||null, testCaseId:form.relatedTcIds[0]||null, relatedTcIds:form.relatedTcIds, createdBy:currentUser.id, createdAt:now(), defectId:'DEF-'+uid().slice(0,5).toUpperCase(), files: form.files||[], ...form };
      setDefects(p=>[...p,nd]);
      addLog('Create Defect','สร้าง Defect: '+form.title);
      showToast('สร้าง Defect สำเร็จ');
    }
    onClose();
  };

    ? h(React.Fragment,null,
        h('button',{className:'btn-icon',title:'เปิดใน Tab ใหม่',style:{padding:'5px 7px',fontSize:'15px',opacity:'0.7',color:'var(--purple)'},
          onClick:()=>window.open(shortUrl('def',editDefect.id),'_blank')},h('span',{className:'ms ms-sm'},'open_in_new')),
        h('button',{className:'btn-icon',title:'คัดลอก Link',style:{padding:'5px 7px',fontSize:'15px',opacity:'0.7'},
          onClick:()=>copyText(shortUrl('def',editDefect.id),showToast)},h('span',{className:'ms ms-sm'},'content_copy'))

          ? h(React.Fragment,null,
              h('span',{className:'ms ms-xs',style:{marginRight:'4px',color:'var(--amber)'}},'attach_file'),
              t.label
            )
          : t.label
      ))

      activeTab==='info'&&h(React.Fragment,null,
        h('div',{className:'form-row'},
          h('div',{className:'form-group'},h('label',{className:'form-label'},'Defect Title ',h('span',{className:'req'},'*')),h('input',{className:'form-input',value:form.title,onChange:e=>setForm(p=>({...p,title:e.target.value})),placeholder:'ชื่อ Defect...'})),

          h('label',{className:'form-label',style:commentError?{color:'var(--red)'}:{}},'Comment ',h('span',{className:'req'},'*'),
            commentError&&h('span',{style:{fontSize:'11px',color:'var(--red)',marginLeft:'8px',fontWeight:'400'}},h('span',{className:'ms ms-xs',style:{marginRight:'3px'}},'warning'),' กรุณาใส่ Comment ก่อนบันทึก')
          ),
          h('textarea',{ref:commentRef,className:'form-textarea',value:form.comment||'',
            onChange:e=>{ setForm(p=>({...p,comment:e.target.value})); if(e.target.value.trim()) setCommentError(false); },

              h('input',{type:'checkbox',readOnly:true,checked:form.relatedTcIds.includes(tc.id),style:{pointerEvents:'none'}}),
              h('div',null,
                h('div',{style:{fontSize:'13px',fontWeight:'500',color:form.relatedTcIds.includes(tc.id)?'var(--accent)':'var(--text)'}},tc.title),
                h('div',{style:{fontSize:'11px',color:'var(--text3)'}},'Priority: '+tc.priority+' • Status: '+tc.status)
              )
            ))
        )
      )
    ),
    h('div',{className:'modal-footer'},
      h('button',{className:'btn',onClick:onClose},'ยกเลิก'),

}

// ─── DEFECTS IN TC ────────────────────────────────────────────────────────────
function DefectsInTC({ tc, defects, setDefects, testCases, currentUser, canEdit, canDelete, showToast, addLog, openDefectModal }) {
  const tcDefects = tc ? defects.filter(d=>toArr(d.relatedTcIds).includes(tc.id)||(toArr(d.relatedTcIds).length===0&&d.testCaseId===tc.id)) : [];
  const del = (d) => { setDefects(p=>p.filter(x=>x.id!==d.id)); showToast('ลบ Defect สำเร็จ'); };
  if (!tc) return h('p',{style:{color:'var(--text3)',fontSize:'13px'}},'บันทึก TC ก่อน จึงจะเพิ่ม Defect ได้');
  return h('div',null,
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}},
      h('div',{className:'section-title',style:{margin:0}},'Defects ที่ผูกไว้'),
      canEdit&&h('button',{className:'btn btn-sm',onClick:()=>openDefectModal(null,tc.id,testCases)},'+  เพิ่ม Defect')
    ),
    tcDefects.length===0?h('p',{style:{color:'var(--text3)',fontSize:'13px'}},'ยังไม่มี Defect ที่ผูกไว้'):
    tcDefects.map(d=>{
      const relTcs=toArr(d.relatedTcIds).length?toArr(d.relatedTcIds).map(id=>testCases.find(x=>x.id===id)).filter(Boolean):(d.testCaseId?[testCases.find(x=>x.id===d.testCaseId)].filter(Boolean):[]);
      return h('div',{key:d.id,className:'card-sm',style:{marginBottom:'8px'}},
        h('div',{style:{display:'flex',alignItems:'flex-start',justifyContent:'space-between'}},
          h('div',{style:{flex:1}},
            h('div',{style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'4px',flexWrap:'wrap'}},
              h('span',{style:{fontFamily:'var(--mono)',fontSize:'11px',color:'var(--accent)'}},d.defectId),
              h('span',{className:'badge '+(DEF_SEVERITY_COLORS[d.severity]||'badge-gray')},d.severity),
              h('span',{className:'badge '+(d.status==='Closed'?'badge-green':d.status==='Open'?'badge-red':d.status==='In Progress'?'badge-blue':d.status==='Resolved'?'badge-cyan':d.status==='Rejected'?'badge-gray':'badge-amber')},d.status)
            ),
            h('div',{style:{fontWeight:'500'}},d.title),
            d.description&&h('div',{style:{fontSize:'12px',color:'var(--text2)',marginTop:'4px'}},d.description),
            d.targetDate&&h('div',{style:{fontSize:'11px',color:'var(--amber)',marginTop:'4px'}},'Target: '+fmtDateOnly(d.targetDate)),
            relTcs.length>1&&h('div',{style:{marginTop:'6px',display:'flex',flexWrap:'wrap',gap:'4px'}},
              h('span',{style:{fontSize:'11px',color:'var(--text3)'}},'Related TCs:'),
              relTcs.map(t=>h('span',{key:t.id,className:'tag'},t.title))
            )
          ),
          h('div',{style:{display:'flex',gap:'4px',flexShrink:0}},
            canEdit&&h('button',{className:'btn btn-sm',onClick:()=>openDefectModal(d,null,testCases)},'แก้ไข'),
            canDelete&&h('button',{className:'btn btn-sm btn-danger',onClick:()=>del(d)},'ลบ')
          )
        )
      );
    }),

  );
}

// ─── DEFECTS PAGE ─────────────────────────────────────────────────────────────
function DefectsPage({ teamDefects, setDefects, setDefectsState, testCases, teamTCs, teamTasks, teamProjects, currentUser, users, canEdit, canDelete, showToast, addLog, openDefectModal, navigate, USE_GAS, pendingDefStatusRef, isUnlimitedPlan }) {
  const [search, setSearch] = useState('');
  const [filterSev, setFilterSev] = useState('');
  const [filterStatus, setFilterStatus] = useState('');
  const [selected, setSelected] = useState([]);
  const [defCommentPending, setDefCommentPending] = useState(null); // {defect, newStatus}
  const [defCommentInput, setDefCommentInput] = useState('');
  // [v24-SORT] Sort state for Defects table
  const [defSortField, setDefSortField] = useState('title');
  const [defSortDir, setDefSortDir] = useState('asc');
  const toggleDefSort = (field) => {
    if (defSortField === field) setDefSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setDefSortField(field); setDefSortDir('asc'); }
  };

  const filtered = teamDefects.filter(d =>
    (!search || d.title.toLowerCase().includes(search.toLowerCase()) || (d.defectId||'').toLowerCase().includes(search.toLowerCase())) &&
    (!filterSev || d.severity===filterSev) && (!filterStatus || d.status===filterStatus)
  ).slice().sort((a, b) => {
    const valA = (a[defSortField] || '').toString().toLowerCase();
    const valB = (b[defSortField] || '').toString().toLowerCase();
    return defSortDir === 'asc' ? valA.localeCompare(valB, 'th') : valB.localeCompare(valA, 'th');
  });

  const exportDefects = () => {
    const list = selected.length ? filtered.filter(d=>selected.includes(d.id)) : filtered;
    const rows = list.map(d => {
      const ids = toArr(d.relatedTcIds).length ? toArr(d.relatedTcIds) : (d.testCaseId?[d.testCaseId]:[]);
      const relTcs = ids.map(id=>testCases.find(x=>x.id===id)).filter(Boolean);
      const tc = relTcs[0];
      const task = teamTasks.find(t=>t.id===tc?.taskId);
      const proj = teamProjects.find(p=>p.id===task?.projectId);
      return { 'Defect ID':d.defectId, Title:d.title, Severity:d.severity, Status:d.status,
        'Related Test Cases':relTcs.map(t=>t.title).join(', ')||'—',
        Task:task?.name||'—', Project:proj?.name||'—', 'Target Date':d.targetDate||'', 'Created At':fmtDate(d.createdAt), Description:d.description };
    });
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rows), 'Defects');
    XLSX.writeFile(wb, 'Defects_Export.xlsx');
    showToast('Export Defects สำเร็จ');
  };

  const updateStatus = (defect, status) => {
    if(['Rejected'].includes(status)){
      setDefCommentPending({defect,newStatus:status});
    } else {
      if(pendingDefStatusRef) pendingDefStatusRef.current[defect.id] = { status, ts: Date.now() };
      setDefects(p=>p.map(x=>x.id===defect.id?{...x,status,updatedAt:now(),updatedBy:currentUser.id}:x));
      addLog('Update Defect','เปลี่ยน Status: '+status);
      showToast('อัพเดทแล้ว');
    }
  };
  const deleteDefect = async (id) => {
    // [FIX-TEAMID] หา teamId จาก defect record เพื่อส่งไปกับ delete
    const defectObj = teamDefects.find(d => d.id === id);
    const tid = defectObj?.teamId || null;

    // [FIX-DEL] Optimistic update local state ก่อน
    setDefectsState(p => p.map(x => x.id === id ? {...x, isDeleted: true, updatedAt: now()} : x));

    if (USE_GAS) {
      try {
        await api.delete('defects', id, tid);
        addLog('Delete Defect', `ลบ Defect id: ${id}`);
        showToast('ลบ Defect สำเร็จ');
      } catch(e) {
        console.error('deleteDefect error:', e.message);
        // [FIX-DEL] Rollback local state เมื่อ GAS ล้มเหลว
        setDefectsState(p => p.map(x => x.id === id ? {...x, isDeleted: false} : x));
        showToast(`ลบล้มเหลว: ${e.message} — กรุณาลองใหม่`, 'error');
      }
    } else {
      addLog('Delete Defect', `ลบ Defect id: ${id}`);
      showToast('ลบ Defect สำเร็จ');
    }
  };
  const cloneDefect = (d) => {
    const cloned = {...d, id:uid(), defectId:'DEF-'+uid().slice(0,5).toUpperCase(), createdAt:now(), createdBy:currentUser.id, relatedTcIds:[], testCaseId:null, title:'[Clone] '+d.title};
    setDefects(p=>[...p,cloned]);
    addLog('Clone Defect','Clone: '+d.title);
    showToast('Clone Defect สำเร็จ — Relate to ถูก reset แล้ว');
  };

  return h('div',null,
    h('div',{className:'page-header'},
      h('div',null,
        h('h1',{className:'page-title'},'Defects'),
        h('p',{className:'page-subtitle'},teamDefects.filter(d=>d.status!=='Closed'&&d.status!=='Rejected').length+' Open • รวม '+teamDefects.length+' Defects')
      ),
      h('div',{className:'flex'},
        selected.length>0&&h('button',{className:'btn',onClick:exportDefects},'Export ('+selected.length+')'),
        h('button',{className:'btn',onClick:exportDefects},'Export All'),
        (()=>{
          // [v26-FIX] ใช้ isUnlimitedPlan prop แทน window check
          const atDefLimit=!isUnlimitedPlan&&teamDefects.length>=10;
          return canEdit&&h('button',{
            className:'btn btn-primary',
            disabled:atDefLimit,
            style:{opacity:atDefLimit?0.45:1,cursor:atDefLimit?'not-allowed':'pointer'},
            title:atDefLimit?'Free Plan: Defect สูงสุด 10 รายการ — Upgrade ใน System Settings':'',
            onClick:atDefLimit?undefined:()=>openDefectModal(null,null,teamTCs)
          },
            h('span',{className:'ms ms-xs'},atDefLimit?'lock':'bug_report'),
            atDefLimit?'+  Defect (เต็มแล้ว)':'+  New Defect'
          );
        })()
      )
    ),
    h('div',{className:'stats-grid'},
      ['Open','In Progress','Resolved','Closed','Rejected'].map(s=>h('div',{key:s,className:'stat-card'},
        h('div',{className:'stat-label'},s),
        h('div',{className:'stat-value',style:{color:s==='Open'?'var(--red)':s==='In Progress'?'var(--accent)':s==='Resolved'?'var(--cyan)':s==='Closed'?'var(--green)':'var(--text3)'}},teamDefects.filter(d=>d.status===s).length)
      ))
    ),
    h('div',{className:'filter-bar'},
      h('input',{className:'search-input',placeholder:'ค้นหา Defect ID หรือ Title...',value:search,onChange:e=>setSearch(e.target.value)}),
      h('select',{className:'form-select',style:{width:'130px'},value:filterSev,onChange:e=>setFilterSev(e.target.value)},h('option',{value:''},'All Severity'),['Critical','High','Medium','Low'].map(s=>h('option',{key:s,value:s},s))),
      h('select',{className:'form-select',style:{width:'130px'},value:filterStatus,onChange:e=>setFilterStatus(e.target.value)},h('option',{value:''},'All Status'),['Open','In Progress','Resolved','Closed','Rejected'].map(s=>h('option',{key:s,value:s},s)))
    ),
    filtered.length===0
      ? h('div',{className:'empty'},
          h('span',{className:'ms ms-xxl',style:{opacity:0.4,display:'block',marginBottom:'14px',color:'var(--text3)'}},'bug_report'),
          h('div',{className:'empty-title'},'ไม่พบ Defect'),
          canEdit&&h('button',{className:'btn btn-primary',style:{marginTop:'12px'},onClick:()=>openDefectModal(null,null,teamTCs)},'+  New Defect')
        )
      : h('div',{className:'table-wrap'},
          h('table',null,
            h('thead',null,h('tr',null,
              h('th',null,h('input',{type:'checkbox',checked:selected.length===filtered.length&&filtered.length>0,onChange:e=>setSelected(e.target.checked?filtered.map(d=>d.id):[])})),
              h(SortTh,{label:'Defect ID',field:'defectId',sortField:defSortField,sortDir:defSortDir,onSort:toggleDefSort}),
              h(SortTh,{label:'Title',field:'title',sortField:defSortField,sortDir:defSortDir,onSort:toggleDefSort}),
              h(SortTh,{label:'Assignee',field:'assignee',sortField:defSortField,sortDir:defSortDir,onSort:toggleDefSort}),
              h(SortTh,{label:'Severity',field:'severity',sortField:defSortField,sortDir:defSortDir,onSort:toggleDefSort}),
              h(SortTh,{label:'Status',field:'status',sortField:defSortField,sortDir:defSortDir,onSort:toggleDefSort}),
              h('th',null,'Related Test Cases'),
              h(SortTh,{label:'Target Date',field:'targetDate',sortField:defSortField,sortDir:defSortDir,onSort:toggleDefSort}),
              h('th',null,'')
            )),
            h('tbody',null,filtered.map(d=>{
              const ids = toArr(d.relatedTcIds).length ? toArr(d.relatedTcIds) : (d.testCaseId?[d.testCaseId]:[]);
              const relTcs = ids.map(id=>testCases.find(x=>x.id===id)).filter(Boolean);
              const defFileCount = Array.isArray(d.files) ? d.files.length : 0;
              return h('tr',{key:d.id},
                h('td',null,h('input',{type:'checkbox',checked:selected.includes(d.id),onChange:e=>setSelected(p=>e.target.checked?[...p,d.id]:p.filter(x=>x!==d.id))})),
                h('td',null,
                  h('div',{style:{display:'flex',flexDirection:'column',gap:'3px'}},
                    h('span',{className:'font-mono',style:{color:'var(--accent)',fontSize:'12px'}},d.defectId),
                    defFileCount>0&&h('span',{style:{display:'inline-flex',alignItems:'center',gap:'3px',fontSize:'11px',color:'var(--amber)',fontWeight:'500'},title:defFileCount+' ไฟล์แนบ'},
                      h('span',{className:'ms ms-sm',style:{fontSize:'13px'}},'attach_file'),
                      defFileCount
                    )
                  )
                ),
                h('td',null,
                  h('div',null,
                    h('div',{style:{fontWeight:'600',cursor:'pointer',color:'var(--text)',transition:'color 0.15s'},
                      onMouseEnter:e=>{e.currentTarget.style.color='var(--accent3)';},
                      onMouseLeave:e=>{e.currentTarget.style.color='var(--text)';},
                      onClick:()=>openDefectModal(d,null,testCases),
                      title:'คลิกเพื่อเปิด Defect นี้'
                    },d.title),
                    d.description&&h('div',{style:{fontSize:'11px',color:'var(--text3)',marginTop:'2px'}},d.description.slice(0,60)+(d.description.length>60?'...':'')),
                    h('div',{style:{display:'flex',alignItems:'center',gap:'4px',marginTop:'4px'}},
                      h('button',{className:'btn-icon',title:'เปิดใน Tab ใหม่',style:{padding:'2px 4px',fontSize:'12px',opacity:'0.6',color:'var(--purple)'},onClick:(ev)=>{ev.stopPropagation();window.open(shortUrl('def',d.id),'_blank');}},h('span',{className:'ms ms-sm'},'open_in_new')),
h('button',{className:'btn-icon',title:'คัดลอก Link',style:{padding:'2px 4px',fontSize:'12px',opacity:'0.6'},onClick:(ev)=>{ev.stopPropagation();copyText(shortUrl('def',d.id),showToast);}},h('span',{className:'ms ms-sm'},'content_copy'))
                    )
                  )
                ),
                h('td',null,
                  (()=>{
                    const au=(users||[]).find(u=>u.id===d.assignee);
                    return au
                      ?h('div',{style:{display:'flex',alignItems:'center',gap:'5px'}},
                          h('div',{className:'avatar',style:{width:'20px',height:'20px',fontSize:'9px',flexShrink:0,background:au.color+'22',color:au.color}},au.name[0]),
                          h('span',{style:{fontSize:'12px',color:'var(--text2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:'90px'}},au.name)
                        )
                      :h('span',{style:{fontSize:'12px',color:'var(--text3)'}},'—');
                  })()
                ),
                h('td',null,h('span',{className:'badge '+(DEF_SEVERITY_COLORS[d.severity]||'badge-gray')},d.severity)),
                h('td',null,h('select',{className:'form-select',style:{width:'140px',padding:'4px 8px',fontSize:'12px'},value:d.status,onChange:e=>updateStatus(d,e.target.value)},['Open','In Progress','Resolved','Closed','Rejected'].map(s=>h('option',{key:s,value:s},s)))),
                h('td',null,relTcs.length===0
                  ? h('span',{style:{fontSize:'12px',color:'var(--text3)'}},'—')
                  : h('div',{style:{display:'flex',flexWrap:'wrap',gap:'4px'}},relTcs.map(tc=>h('span',{
                      key:tc.id,className:'tag',
                      style:{fontSize:'11px',cursor:'pointer',transition:'all 0.15s',borderColor:'var(--accent)',color:'var(--accent3)'},
                      onMouseEnter:e=>{e.currentTarget.style.background='var(--accent-bg)';e.currentTarget.style.transform='translateY(-1px)';},
                      onMouseLeave:e=>{e.currentTarget.style.background='';e.currentTarget.style.transform='';},
                      onClick:()=>{
                        const tcTask = teamTasks ? teamTasks.find(t=>t.id===tc.taskId) : null;
                        if(tcTask) navigate('task-detail',{taskId:tcTask.id, projectId:tcTask.projectId||tcTask.project_id, openTcId:tc.id});
                      },
                      title:'คลิกเพื่อเปิด '+tc.title
                    },tc.title)))
                ),
                h('td',null,h('span',{style:{fontSize:'12px',color:d.targetDate&&new Date(d.targetDate)<new Date()?'var(--red)':'var(--amber)'}},d.targetDate?fmtDateOnly(d.targetDate):'—')),
                h('td',null,h('div',{style:{display:'flex',gap:'4px'}},
                  canEdit&&h('button',{className:'btn btn-sm',onClick:()=>openDefectModal(d,null,testCases)},'แก้ไข'),
                  canEdit&&h('button',{className:'btn btn-sm',style:{borderColor:'var(--cyan,#22d3ee)',color:'var(--cyan,#22d3ee)'},onClick:()=>cloneDefect(d)},'Clone'),
                  canDelete&&h('button',{className:'btn btn-sm btn-danger',onClick:()=>deleteDefect(d.id)},'ลบ')
                ))
              );
            }))
          )
        ),
    defCommentPending&&ReactDOM.createPortal(
      h('div',{className:'modal-overlay',style:{zIndex:10001},onClick:e=>{if(e.target.className==='modal-overlay'){setDefCommentPending(null);setDefCommentInput('');}}},
        h('div',{className:'modal modal-sm'},
          h('div',{className:'modal-header'},
            h('span',{className:'modal-title',style:{display:'flex',alignItems:'center',gap:'8px'}},
              h('span',{className:'ms ms-sm',style:{color:'var(--amber)'}},'comment'),
              'บังคับ Comment — '+defCommentPending.newStatus
            ),
            h('button',{className:'modal-close',onClick:()=>{setDefCommentPending(null);setDefCommentInput('');}},h('span',{className:'ms ms-sm'},'close'))
          ),
          h('div',{className:'modal-body'},
            h('p',{style:{fontSize:'13px',color:'var(--text2)',marginBottom:'12px'}},
              'Defect: ',h('strong',{style:{color:'var(--text)'}},defCommentPending.defect.title)
            ),
            h('div',{className:'form-group',style:{marginBottom:0}},
              h('label',{className:'form-label'},'Comment ',h('span',{className:'req'},'*')),
              h('textarea',{
                className:'form-textarea',autoFocus:true,value:defCommentInput,
                onChange:e=>setDefCommentInput(e.target.value),
                placeholder:defCommentPending.newStatus==='Rejected'?'กรุณาระบุเหตุผลที่ Reject...':'กรุณาใส่ Comment...',
                style:{minHeight:'100px'}
              })
            )
          ),
          h('div',{className:'modal-footer'},
            h('button',{className:'btn',onClick:()=>{setDefCommentPending(null);setDefCommentInput('');}}, 'ยกเลิก'),
            h('button',{
              className:'btn btn-primary',
              disabled:!defCommentInput.trim(),
              onClick:()=>{
                if(!defCommentInput.trim()){showToast('กรุณาใส่ Comment','error');return;}
                const {defect,newStatus}=defCommentPending;
                if(pendingDefStatusRef) pendingDefStatusRef.current[defect.id] = { status: newStatus, ts: Date.now() };
                setDefects(p=>p.map(x=>x.id===defect.id?{...x,status:newStatus,comment:defCommentInput,updatedAt:now(),updatedBy:currentUser.id}:x));
                addLog('Update Defect','เปลี่ยน Status: '+defect.title+' → '+newStatus);
                showToast('อัพเดทแล้ว');
                setDefCommentPending(null);
                setDefCommentInput('');
              }
            },'บันทึก')
          )
        )
      ),
      document.getElementById('modal-root')
    )
  );
}

// ─── TEAM SETTINGS PAGE ───────────────────────────────────────────────────────
function TeamSettingsPage({ currentTeam, currentUser, setTeams, members, setMembers, setMembersState, users, isAdmin, showToast, addLog, pendingMembers, setPendingMembers, pendingMemberOpsRef, navigate, setCurrentTeam, setPage, navCtx, setTeamPlanData }) {
  const [tab, setTab] = useState(() => (navCtx?.tab && ['members','pending','permissions','invite','system'].includes(navCtx.tab)) ? navCtx.tab : 'members');
  const teamMembers = members.filter(m=>m.teamId===currentTeam.id);
  const roles = ['admin','function','edit','view'];

  const updateRole = (memberId, role) => {
    setMembers(p=>p.map(m=>m.id===memberId?{...m,role}:m));
    showToast('อัพเดทสิทธิ์สำเร็จ');
  };

  // [v21] Toggle Active / Inactive — admin อยู่หน้าเดิม, user ที่ถูกเซ็ต inactive จะถูก redirect อัตโนมัติผ่าน useEffect ใน App
  const toggleMemberStatus = (memberId) => {
    const m = members.find(x=>x.id===memberId);
    if (!m) return;
    if (m.userId===currentUser.id) { showToast('ไม่สามารถเปลี่ยนสถานะตัวเองได้','error'); return; }
    const newStatus = (m.status === 'inactive') ? 'active' : 'inactive';
    const uName = users.find(u=>u.id===m.userId)?.name || m.userId;
    // Register pending op เพื่อป้องกัน polling overwrite ก่อน GAS ยืนยัน
    if (pendingMemberOpsRef) pendingMemberOpsRef.current[memberId] = { type: newStatus, ts: Date.now() };
    // setMembers ผ่าน makeSet → syncSheet จะ detect status เปลี่ยนแล้ว call api.update อัตโนมัติ
    setMembers(p=>p.map(x=>x.id===memberId ? {...x, status:newStatus, updatedAt:new Date().toISOString()} : x));
    showToast(newStatus==='inactive' ? `ปิดการใช้งาน ${uName} แล้ว` : `เปิดการใช้งาน ${uName} แล้ว`);
    addLog('Update Member Status', `Set ${uName} status → ${newStatus}`);
    // [v22] ไม่ navigate admin ออก — user ที่ถูก inactive จะถูก redirect อัตโนมัติผ่าน useEffect ใน App
  };
  const approvePending = (req, role='edit') => {
    setMembers(p=>[...p,{id:uid(),teamId:req.teamId,userId:req.userId,role,joinedAt:now(),status:'active'}]);
    // mark ทุก record ของ userId+teamId นี้เป็น approved (ป้องกัน duplicate ค้าง)
    setPendingMembers(p=>p.map(x=>(x.teamId===req.teamId&&x.userId===req.userId)?{...x,status:'approved'}:x));
    const u=users.find(u=>u.id===req.userId);
    addLog('Approve Member',`Approve ${u?.name||req.userId} เข้าทีม`);
    showToast(`อนุมัติ ${u?.name||'user'} สำเร็จ`);
  };

  const rejectPending = (req) => {
    // [FIX-DEL] ลบออกจาก pending list เลย ไม่ใช่แค่ mark rejected (ไม่ให้กลับมาหลัง refresh)
    setPendingMembers(p=>p.filter(x=>!(x.teamId===req.teamId&&x.userId===req.userId)));
    const u=users.find(u=>u.id===req.userId);
    if (USE_GAS) {
      // ลบ pending records ออกจาก Sheet
      const toDelete = pendingMembers.filter(x=>x.teamId===req.teamId&&x.userId===req.userId);
      toDelete.forEach(x => api.delete('pending', x.id).catch(e => console.error('reject pending delete error:', e.message)));
    }
    showToast(`ปฏิเสธ ${u?.name||'user'} แล้ว`,'error');
  };

  const baseUrl = window.location.href.split('?')[0].split('#')[0];
  const teamPayload = btoa(JSON.stringify({ id: currentTeam.id, name: currentTeam.name, inviteCode: currentTeam.inviteCode }));
  const inviteLink = baseUrl + '?join=' + encodeURIComponent(teamPayload);

  // Dedup count — นับแค่ unique userId ต่อทีม (ป้องกัน badge แสดงตัวเลขเกิน)
  const pendingCount = isAdmin ? Object.keys(
    (pendingMembers||[])
      .filter(p=>p.teamId===currentTeam.id&&p.status==='pending')
      .reduce((acc,p)=>{ acc[p.userId]=true; return acc; }, {})
  ).length : 0;
  const tabList = [
    {key:'members',label:'Members'},
    {key:'pending',label:`Pending${pendingCount>0?' ('+pendingCount+')':''}`,adminOnly:false},
    {key:'permissions',label:'Permission Guide',adminOnly:true},
    {key:'invite',label:'Invite'},
    {key:'system',label:'System Settings',adminOnly:true},  // [v23]
  ].filter(t => !t.adminOnly || isAdmin);

  return h('div',null,
    h('div',{className:'page-header'},h('div',null,h('h1',{className:'page-title'},'Team Settings'),h('p',{className:'page-subtitle'},currentTeam.name))),
    h('div',{className:'tabs'},
      tabList.map(t=>h('div',{key:t.key,className:`tab${tab===t.key?' active':''}`,onClick:()=>setTab(t.key)},t.label))
    ),

    tab==='members'&&h('div',null,
      h('div',{className:'table-wrap'},
        h('table',null,
          h('thead',null,h('tr',null,h('th',null,'สมาชิก'),h('th',null,'อีเมล'),h('th',null,'Role'),h('th',null,'สถานะ'),isAdmin&&h('th',null,''))),
          h('tbody',null,teamMembers.map(m=>{
            const u=users.find(u=>u.id===m.userId);
            const isInactive = m.status === 'inactive';
            return h('tr',{key:m.id,style:{opacity:isInactive?0.55:1}},
              h('td',null,h('div',{style:{display:'flex',alignItems:'center',gap:'8px'}},
                h('div',{className:'avatar',style:{background:u?.color+'22',color:u?.color,width:'28px',height:'28px',fontSize:'12px'}},u?.name?.[0]||'?'),
                h('span',{style:{fontWeight:'500'}},u?.name||'—'),
                m.userId===currentTeam.createdBy&&h('span',{className:'badge badge-purple',style:{marginLeft:'4px'}},'Creator')
              )),
              h('td',null,h('span',{style:{color:'var(--text2)',fontSize:'13px'}},u?.email||'—')),
              h('td',null,isAdmin?h('select',{className:'form-select',style:{width:'120px',padding:'4px 8px'},value:m.role,onChange:e=>updateRole(m.id,e.target.value),disabled:m.userId===currentTeam.createdBy||isInactive},roles.map(r=>h('option',{key:r,value:r},r))):h('span',{className:`badge ${m.role==='admin'?'badge-purple':m.role==='function'?'badge-blue':m.role==='edit'?'badge-green':'badge-gray'}`},m.role)),
              h('td',null,
                isInactive
                  ? h('span',{className:'badge badge-gray',style:{fontSize:'11px'}},'Inactive')
                  : h('span',{className:'badge badge-green',style:{fontSize:'11px'}},'Active')
              ),
              isAdmin&&h('td',null,
                m.userId!==currentTeam.createdBy&&h('div',{style:{display:'flex',gap:'6px',alignItems:'center'}},
                  h('button',{
                    className:`btn btn-sm ${isInactive?'btn-success':'btn-warning'}`,
                    style:{fontSize:'11px',padding:'3px 8px'},
                    onClick:()=>toggleMemberStatus(m.id),
                    title:isInactive?'เปิดการใช้งาน':'ปิดการใช้งานชั่วคราว'
                  }, isInactive?'Active':'Inactive')
                )
              )
            );
          }))
        )
      )
    ),

    tab==='permissions'&&h('div',{className:'card'},
      h('div',{className:'card-title',style:{marginBottom:'16px'}},'สิทธิ์การใช้งาน'),
      h('div',{className:'table-wrap'},
        h('table',null,
          h('thead',null,h('tr',null,h('th',null,'Feature'),h('th',null,'Admin'),h('th',null,'Function'),h('th',null,'Edit'),h('th',null,'View'))),
          h('tbody',null,
            [['สร้าง Project/Task','✓','✓','✓','✗'],['แก้ไข TC','✓','✓','✓','✗'],['ลบ ทุกอย่าง','✓','✓','✗','✗'],['ดูข้อมูล','✓','✓','✓','✓'],['Export','✓','✓','✓','✓'],['จัดการ Member','✓','✗','✗','✗'],['ดู Login Log','✓','✗','✗','✗']].map((row,i)=>h('tr',{key:i},row.map((c,j)=>h('td',{key:j,style:j>0?{textAlign:'center',color:c==='✓'?'var(--green)':'var(--text3)'}:{}},c))))
          )
        )
      )
    ),

    tab==='invite'&&h('div',{className:'card'},
      h('div',{className:'card-title',style:{marginBottom:'16px'}},'Invite'),

      h('p',{className:'section-title',style:{marginBottom:'8px'}},h(React.Fragment,null,h('span',{className:'ms ms-xs',style:{marginRight:'4px'}},'link'),'Invite Link (คลิกเพื่อเข้าร่วมได้ทันที)')),
      h('p',{style:{color:'var(--text2)',fontSize:'13px',marginBottom:'10px'}},'ส่ง Link นี้ให้สมาชิก กดแล้วสมัคร/Login จากนั้นรอ Admin Approve'),
      h('div',{className:'url-box',style:{marginBottom:'6px'}},
        h('span',{className:'url-text',style:{fontSize:'12px',wordBreak:'break-all'}},inviteLink),
        h('button',{className:'btn-icon',title:'คัดลอก Link',style:{padding:'5px 8px',fontSize:'16px',flexShrink:0},onClick:()=>copyText(inviteLink,showToast)},h('span',{className:'ms ms-sm'},'content_copy'))
      ),
      h('p',{style:{fontSize:'11px',color:'var(--text3)',marginBottom:'24px'}},'* Link มี Invite Code ฝังอยู่ เปิดแล้วระบบจะส่งคำขอให้ Admin อนุมัติอัตโนมัติ'),

      h('hr',{style:{border:'none',borderTop:'1px solid var(--border)',marginBottom:'20px'}}),

      h('p',{className:'section-title',style:{marginBottom:'8px'}},h(React.Fragment,null,h('span',{className:'ms ms-xs',style:{marginRight:'4px'}},'key'),'Invite Code (กรอกเองในหน้าเลือกทีม)')),
      h('p',{style:{color:'var(--text2)',fontSize:'13px',marginBottom:'10px'}},'สำหรับแชร์ Code ให้สมาชิกกรอกเอง'),
      h('div',{className:'url-box'},
        h('span',{className:'url-text',style:{fontFamily:'var(--mono)',fontSize:'15px',letterSpacing:'2px'}},currentTeam.inviteCode),
        h('button',{className:'btn-icon',title:'คัดลอก Code',style:{padding:'5px 8px',fontSize:'16px'},onClick:()=>copyText(currentTeam.inviteCode,showToast)},h('span',{className:'ms ms-sm'},'content_copy'))
      )
    ),

    tab==='pending'&&isAdmin&&h(PendingApprovalTab,{pendingMembers,currentTeam,users,approvePending,rejectPending}),
    tab==='system'&&isAdmin&&h(SystemSettingsTab,{currentUser,currentTeam,showToast,setTeamPlanData})
  );
}

// ─── [v23] SYSTEM SETTINGS TAB (Admin only) ─────────────────────────────────
function SystemSettingsTab({ currentUser, currentTeam, showToast, setTeamPlanData }) {
  const [saving, setSaving] = useState(false);
  const [loading, setLoading] = useState(true);
  const [lockedUsers, setLockedUsers] = useState([]);
  const [unlocking, setUnlocking] = useState({});

  // Session timeout settings
  const [idleMin, setIdleMin]   = useState(120);
  const [absHours, setAbsHours] = useState(12);
  const [lockMin, setLockMin]   = useState(5);
  const [maxFail, setMaxFail]   = useState(5);

  // [v23-PLAN] Plan/Token state
  const [planInfo, setPlanInfo]       = useState(null);
  const [authToken, setAuthToken_]    = useState('');
  const [tokenSaving, setTokenSaving] = useState(false);
  const [upgrading, setUpgrading]     = useState(false);
  const [planLoading, setPlanLoading] = useState(true);

  useEffect(() => {
    setLoading(true);
    api.rawWrite({ action:'getSystemSettings', token:getAuthToken() })
      .then(res => {
        if (res && res.ok && res.data) {
          setIdleMin(res.data.idleTimeoutMinutes || 120);
          setAbsHours(res.data.absTimeoutHours || 12);
          setLockMin(res.data.loginLockMinutes || 5);
          setMaxFail(res.data.loginMaxFail || 5);
        }
      }).catch(()=>{})
      .finally(() => setLoading(false));
    loadLockedUsers();
    // [v23-PLAN] โหลด Plan info
    if (currentTeam) {
      setPlanLoading(true);
      api.getMyPlan(currentTeam.id)
        .then(data => {
          const d = data || {};
          setPlanInfo(d);
          // [v25] Free Plan + paid_trial → แสดง Payment Popup เพื่อให้ชำระเงิน
          // [v25] Unlimited (paid) → ไม่แสดงอัตโนมัติ รอให้กดปุ่ม Upgrade เอง
          if (d.plan === 'free' || !d.plan || d.plan === 'paid_trial') {
            setShowPaymentPopup(true);
          }
        })
        .catch(() => setPlanInfo({}))
        .finally(() => setPlanLoading(false));
    }
  }, [currentTeam?.id]); // eslint-disable-line

  const loadLockedUsers = () => {
    api.rawWrite({ action:'getLockedUsers', token:getAuthToken() })
      .then(res => {
        if (res && res.ok) setLockedUsers(res.data && res.data.locked ? res.data.locked : []);
      }).catch(()=>{});
  };

  const saveSettings = async () => {
    setSaving(true);
    try {
      const res = await api.rawWrite({
        action: 'saveSystemSettings', token: getAuthToken(),
        idleTimeoutMinutes: idleMin, absTimeoutHours: absHours,
        loginLockMinutes: lockMin, loginMaxFail: maxFail
      });
      if (!res || res.ok === false) { showToast(res?.error || 'บันทึกไม่สำเร็จ', 'error'); }
      else {
        try {
          localStorage.setItem('qah_idle_timeout_min',  String(idleMin));
          localStorage.setItem('qah_abs_timeout_hours', String(absHours));
        } catch {}
        showToast('บันทึก System Settings สำเร็จ');
      }
    } catch(e) { showToast('เกิดข้อผิดพลาด: ' + e.message, 'error'); }
    setSaving(false);
  };

  const unlockUser = async (email) => {
    setUnlocking(p => ({...p, [email]: true}));
    try {
      const res = await api.rawWrite({ action:'unlockUser', token:getAuthToken(), email });
      if (!res || res.ok === false) { showToast(res?.error || 'ปลดล็อคไม่สำเร็จ', 'error'); }
      else {
        showToast(`ปลดล็อค ${email} สำเร็จ — สามารถ Login ได้ทันที`);
        try { sessionStorage.removeItem('qah_login_locked_until'); sessionStorage.removeItem('qah_login_fail_count'); } catch {}
        setLockedUsers(p => p.filter(u => u.email !== email));
      }
    } catch(e) { showToast('เกิดข้อผิดพลาด: ' + e.message, 'error'); }
    setUnlocking(p => ({...p, [email]: false}));
  };

  // [v24] Token state for validation popup
  const [tokenErrorPopup, setTokenErrorPopup] = useState(null); // null | 'reused' | 'email_mismatch' | 'fraud'

  // [v25] Payment Popup state
  const [showPaymentPopup, setShowPaymentPopup] = useState(false);
  const [devSettings, setDevSettings] = useState({});

  // [v25] Load devSettings (public) for payment popup display
  useEffect(() => {
    api.getPublicDevSettings().then(data => { if (data && !data.error) setDevSettings(data); }).catch(()=>{});
  }, []);

  // [v23-PLAN] บันทึก Token ใน System Settings with validation
  const saveToken = async () => {
    if (!authToken.trim()) { showToast('กรุณากรอก Auth Token', 'error'); return; }
    if (!currentTeam) { showToast('ไม่พบ Team', 'error'); return; }
    setTokenSaving(true);
    try {
      const res = await api.rawWrite({
        action: 'saveSystemToken',
        token: getAuthToken(),
        teamId: currentTeam.id,
        authToken: authToken.trim(),
        adminEmail: currentUser?.email || ''
      });
      if (!res || res.ok === false) {
        const errMsg = String(res?.error || '');
        if (errMsg.includes('TOKEN_REUSED')) {
          setTokenErrorPopup('reused');
        } else if (errMsg.includes('EMAIL_MISMATCH')) {
          setTokenErrorPopup('email_mismatch');
        } else if (errMsg.includes('TOKEN_INVALID') || errMsg.includes('FRAUD') || errMsg.includes('tamper')) {
          setTokenErrorPopup('fraud');
        } else {
          showToast('บันทึก Token ล้มเหลว: ' + (res?.error || 'Unknown error'), 'error');
        }
      } else {
        showToast('บันทึก Token สำเร็จ — Unlimited Plan พร้อมใช้งาน');
        const newPlanInfo = { ...planInfo, token: authToken.trim(), status:'active', plan: 'paid', trialEndAt: '', planExpiry: '' };
        setPlanInfo(newPlanInfo);
        // [v25] อัปเดต global plan state → แถบเหลือง Free Plan หายทันที
        if (setTeamPlanData) setTeamPlanData(newPlanInfo);
      }
    } catch(e) { showToast('บันทึก Token ล้มเหลว: ' + e.message, 'error'); }
    setTokenSaving(false);
  };

  // [v23-PLAN] Upgrade Free → Paid
  // [v25] แสดง PaymentPopup แทน Upgrade โดยตรง
  const upgradeToPaid = async () => {
    setShowPaymentPopup(true);
  };

  const planLabel = (p) => {
    if (!p) return '—';
    if (p === 'free')        return 'Free Plan';
    if (p === 'paid_trial')  return 'Unlimited Trial';
    if (p === 'paid')        return 'Unlimited Plan';
    return p;
  };

  const planIcon = (p) => {
    if (p === 'free')        return 'sentiment_neutral';
    if (p === 'paid_trial')  return 'hourglass_top';
    if (p === 'paid')        return 'workspace_premium';
    return 'help';
  };

  const planColor = (p) => {
    if (p === 'free')        return 'var(--text2)';
    if (p === 'paid_trial')  return 'var(--amber)';
    if (p === 'paid')        return 'var(--green)';
    return 'var(--text3)';
  };

  if (loading) return h('div',{className:'card',style:{padding:'32px',textAlign:'center',color:'var(--text3)'}},
    h('span',{className:'ms ms-lg',style:{display:'block',marginBottom:'8px'}},'settings'),h('div',null,'กำลังโหลด...')
  );

  return h('div',null,

    // [v25] Token error popup — Portal ระดับ top เพื่อไม่ถูก z-index หรือ overflow ของ card ตัด
    tokenErrorPopup && h(TokenErrorPopup, { type: tokenErrorPopup, onClose: ()=>setTokenErrorPopup(null) }),

    // [v25] Payment Popup
    showPaymentPopup && h(PaymentPopup, {
      planInfo,
      devSettings,
      currentUser,
      currentTeam,
      showToast,
      onClose: () => setShowPaymentPopup(false),
      onUseFree: () => setShowPaymentPopup(false)
    }),

    // ── [v23-PLAN] Plan & Token Card ──
    h('div',{className:'card',style:{marginBottom:'16px',border:'1px solid var(--accent)'}},
      h('div',{className:'card-header'},
        h('h3',{className:'card-title',style:{display:'flex',alignItems:'center',gap:'8px'}},
          h('span',{className:'ms ms-sm',style:{color:'var(--accent)'}},'workspace_premium'),
          'Plan & Token'
        )
      ),
      planLoading
        ? h('div',{style:{padding:'20px',textAlign:'center',color:'var(--text3)'}},'กำลังโหลด Plan...')
        : h('div',{style:{padding:'16px 20px'}},
            // [v24] สถานะ Plan ปัจจุบัน — แยก Free vs Unlimited ชัดเจน
            h('div',{style:{display:'flex',alignItems:'center',gap:'14px',padding:'16px',
              background: planInfo?.plan==='paid'?'var(--green-bg)':planInfo?.plan==='paid_trial'?'var(--amber-bg)':'var(--bg3)',
              borderRadius:'var(--r2)',marginBottom:'16px',
              border:'1px solid '+(planInfo?.plan==='paid'?'var(--green)':planInfo?.plan==='paid_trial'?'var(--amber)':'var(--border)')
            }},
              h('div',{style:{
                width:'48px',height:'48px',borderRadius:'12px',flexShrink:0,
                display:'flex',alignItems:'center',justifyContent:'center',
                background: planInfo?.plan==='paid'?'var(--green)':planInfo?.plan==='paid_trial'?'var(--amber)':'var(--bg4)',
              }},
                h('span',{className:'ms ms-lg',style:{color:'#fff',fontSize:'24px'}},planIcon(planInfo?.plan))
              ),
              h('div',{style:{flex:1}},
                h('div',{style:{fontSize:'10px',color:'var(--text3)',fontWeight:'700',textTransform:'uppercase',letterSpacing:'1.2px',marginBottom:'4px'}},'Plan ปัจจุบัน'),
                h('div',{style:{fontWeight:'800',fontSize:'18px',color:planColor(planInfo?.plan),display:'flex',alignItems:'center',gap:'8px'}},
                  planLabel(planInfo?.plan),
                  planInfo?.plan==='free' && h('span',{style:{fontSize:'10px',background:'var(--bg4)',color:'var(--text3)',padding:'2px 8px',borderRadius:'10px',fontWeight:'600',fontFamily:'var(--mono)'}},'FREE'),
                  planInfo?.plan==='paid' && h('span',{style:{fontSize:'10px',background:'var(--green)',color:'#fff',padding:'2px 8px',borderRadius:'10px',fontWeight:'700',fontFamily:'var(--mono)'}},'UNLIMITED'),
                  planInfo?.plan==='paid_trial' && h('span',{style:{fontSize:'10px',background:'var(--amber)',color:'#fff',padding:'2px 8px',borderRadius:'10px',fontWeight:'700',fontFamily:'var(--mono)'}},'TRIAL')
                ),
                planInfo?.plan === 'free' && h('div',{style:{fontSize:'12px',color:'var(--text3)',marginTop:'4px'}},
                  'ทีม 1 | Project 1 | Task 2 | Test Case 30 | Defect 10'
                ),
                planInfo?.plan === 'paid_trial' && planInfo?.trialEndAt &&
                  h('div',{style:{fontSize:'12px',color:'var(--amber)',marginTop:'4px',display:'flex',alignItems:'center',gap:'4px'}},
                    h('span',{className:'ms ms-xs'},'schedule'),
                    ` Trial สิ้นสุด: ${new Date(planInfo.trialEndAt).toLocaleDateString('th-TH')}`
                  ),
                planInfo?.plan === 'paid' && h('div',{style:{fontSize:'12px',color:'var(--green)',marginTop:'4px',display:'flex',alignItems:'center',gap:'4px'}},
                  h('span',{className:'ms ms-xs'},'all_inclusive'), 'ไม่จำกัดจำนวน — เต็มสิทธิ์'
                )
              ),
              // ปุ่ม Upgrade (Free Plan) / ปุ่ม ต่ออายุ (Unlimited Plan)
              planInfo?.plan === 'free' && h('button',{
                className:'btn btn-sm',
                style:{background:'linear-gradient(135deg,var(--amber),#f97316)',color:'#fff',border:'none',display:'flex',alignItems:'center',gap:'4px',flexShrink:0,fontWeight:'700',boxShadow:'0 4px 12px rgba(245,158,11,0.35)'},
                onClick: upgradeToPaid, disabled: upgrading
              }, h('span',{className:'ms ms-xs'}, upgrading?'sync':'rocket_launch'),
                upgrading ? 'กำลัง...' : 'Upgrade'
              ),
              (planInfo?.plan === 'paid' || planInfo?.plan === 'unlimited') && h('button',{
                className:'btn btn-sm',
                style:{background:'linear-gradient(135deg,var(--accent),var(--accent2))',color:'#fff',border:'none',display:'flex',alignItems:'center',gap:'4px',flexShrink:0,fontWeight:'700',boxShadow:'0 4px 12px rgba(37,99,235,0.35)'},
                onClick: upgradeToPaid
              }, h('span',{className:'ms ms-xs'},'autorenew'), 'ต่ออายุ / จัดการ'
              )
            ),

            // [v26] Token Update — ไม่ใช้ prefix แล้ว ใช้ Token ตรงๆ ที่ได้รับทาง Email
            (planInfo?.plan === 'paid' || planInfo?.plan === 'paid_trial') && h('div',null,
              h('div',{style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'10px'}},
                h('span',{className:'ms ms-sm',style:{color:'var(--cyan)'}},'vpn_key'),
                h('span',{style:{fontWeight:'700',fontSize:'14px'}},'กรอก Auth Token'),
                planInfo?.status === 'trial' &&
                  h('span',{style:{fontSize:'11px',background:'var(--amber)',color:'#fff',padding:'2px 8px',borderRadius:'10px',fontWeight:'700'}},'TRIAL — ต้องใช้ Token Unlimited')
              ),
              h('p',{style:{fontSize:'12px',color:'var(--text2)',marginBottom:'8px',lineHeight:'1.7'}},
                planInfo?.status === 'trial'
                  ? 'กรอก Token ที่ได้รับทาง Email หลัง Dev อนุมัติการชำระเงิน เพื่อเปิดใช้งานแบบถาวร'
                  : 'กรอก Token ที่ได้รับจาก Dev เพื่ออัพเดทสิทธิ์'
              ),
              h('div',{style:{display:'flex',gap:'8px',alignItems:'center'}},
                h('input',{
                  className:'form-input', type:'text',
                  placeholder:'วาง Token ที่ได้รับทาง Email ที่นี่',
                  value: authToken,
                  onChange: e => setAuthToken_(e.target.value),
                  style:{fontFamily:'var(--mono)',fontSize:'13px',letterSpacing:'0.5px',flex:1}
                }),
                h('button',{
                  className:'btn btn-primary', onClick: saveToken, disabled: tokenSaving || !authToken.trim(),

// ─── PENDING APPROVAL SUB-COMPONENT ──────────────────────────────────────────
function PendingApprovalTab({ pendingMembers, currentTeam, users, approvePending, rejectPending }) {
  const [approveRoles, setApproveRoles] = useState({});
  const [lastUpdate, setLastUpdate] = useState(Date.now());

  // Re-render when pendingMembers changes (via polling)
  useEffect(() => { setLastUpdate(Date.now()); }, [pendingMembers]);

  // Dedup: เอาแค่ record ล่าสุด 1 รายการต่อ userId (ป้องกัน duplicate แสดงซ้ำ)
  const allPending = (pendingMembers||[]).filter(p => p.teamId===currentTeam.id && p.status==='pending');
  const reqs = Object.values(
    allPending.reduce((acc, p) => {
      if (!acc[p.userId] || p.requestedAt > acc[p.userId].requestedAt) acc[p.userId] = p;
      return acc;
    }, {})
  );

  if (reqs.length === 0) return h('div',{className:'card'},
    h('div',{className:'empty'},
      h('span',{className:'ms ms-xxl',style:{opacity:0.4,display:'block',marginBottom:'14px',color:'var(--green)'}},'check_circle'),
      h('div',{className:'empty-title'},'ไม่มีคำขอเข้าร่วมทีม'),
      h('div',{className:'empty-sub'},'ทุกคำขอได้รับการดำเนินการแล้ว')
    )
  );

  return h('div',{className:'card'},
    h('div',{className:'card-header'},
      h('div',{className:'card-title',style:{display:'flex',alignItems:'center',gap:'8px'}},
        `รออนุมัติ (${reqs.length})`,
        h('span',{style:{fontSize:'10px',color:'var(--text3)',fontWeight:'400',fontFamily:'var(--mono)'}},'อัปเดตอัตโนมัติทุก 30วิ')
      ),
      reqs.length > 0 && h('span',{style:{display:'flex',alignItems:'center',gap:'4px',fontSize:'11px',color:'var(--green)'}},
        h('span',{className:'ms ms-xs',style:{color:'var(--green)'}},'fiber_manual_record'),
        'Live'
      )
    ),
    h('div',{className:'table-wrap'},
      h('table',null,
        h('thead',null,h('tr',null,
          h('th',null,'ผู้ขอเข้าร่วม'),
          h('th',null,'อีเมล'),
          h('th',null,'วันที่ขอ'),
          h('th',null,'Role'),
          h('th',null,'')
        )),
        h('tbody',null, reqs.map(req => {
          const u = users.find(u => u.id===req.userId);
          const selRole = approveRoles[req.id] || 'edit';
          return h('tr',{key:req.id},
            h('td',null,h('div',{style:{display:'flex',alignItems:'center',gap:'8px'}},
              h('div',{className:'avatar',style:{background:(u?.color||'#4f8ef7')+'22',color:u?.color||'#4f8ef7',width:'28px',height:'28px',fontSize:'12px'}},(u?.name||'?')[0]),
              h('span',{style:{fontWeight:'500'}},u?.name||req.userId)
            )),
            h('td',null,h('span',{style:{color:'var(--text2)',fontSize:'13px'}},u?.email||'—')),
            h('td',null,h('span',{style:{color:'var(--text3)',fontSize:'12px',fontFamily:'var(--mono)'}},fmtDate(req.requestedAt))),
            h('td',null,h('select',{className:'form-select',style:{width:'110px',padding:'4px 8px'},value:selRole,
              onChange:e=>setApproveRoles(p=>({...p,[req.id]:e.target.value}))},
              ['admin','function','edit','view'].map(r=>h('option',{key:r,value:r},r))
            )),
            h('td',null,h('div',{style:{display:'flex',gap:'6px'}},
              h('button',{className:'btn btn-sm btn-primary',onClick:()=>approvePending(req,selRole)},h(React.Fragment,null,h('span',{className:'ms ms-sm'},'check'),' Approve')),
              h('button',{className:'btn btn-sm btn-danger',onClick:()=>rejectPending(req)},h(React.Fragment,null,h('span',{className:'ms ms-sm'},'close'),' Reject'))
            ))
          );
        }))
      )
    )
  );
}

// ─── DATA EXPLORER PAGE ───────────────────────────────────────────────────────
// แสดงข้อมูลแบบ hierarchy: Team → Project → Task → TestCase → Defect
// ให้ตรวจสอบได้ว่าข้อมูลของแต่ละ Project / Task มีอะไรบ้าง และมีปัญหาตรงไหน
function DataExplorerPage({ teamProjects, teamTasks, teamTCs, teamDefects, defects, testCases, tasks, navigate, navCtx, currentTeam }) {
  const [search, setSearch]           = useState('');
  const [filterProject, setFilterProject] = useState('');
  const [filterTask, setFilterTask]   = useState('');
  const [filterStatus, setFilterStatus] = useState('');
  const [filterSev, setFilterSev]     = useState('');
  const [expandedProjects, setExpandedProjects] = useState({});
  const [expandedTasks, setExpandedTasks]       = useState({});
  const [view, setView] = useState('project'); // 'project' | 'task' | 'tc' | 'defect'

  const toggleProj = (id) => setExpandedProjects(p => ({ ...p, [id]: !p[id] }));
  const toggleTask = (id) => setExpandedTasks(p => ({ ...p, [id]: !p[id] }));

  const expandAll   = () => {
    const pm = {}; teamProjects.forEach(p => { pm[p.id] = true; });
    const tm = {}; teamTasks.forEach(t => { tm[t.id] = true; });
    setExpandedProjects(pm); setExpandedTasks(tm);
  };
  const collapseAll = () => { setExpandedProjects({}); setExpandedTasks({}); };

  // ── filtered lists ──
  const srcProjects = filterProject
    ? teamProjects.filter(p => p.id === filterProject)
    : teamProjects.filter(p =>
        !search || p.name.toLowerCase().includes(search.toLowerCase())
      );

  const srcTasks = (pid) =>
    teamTasks.filter(t => t.projectId === pid &&
      (!filterTask || t.id === filterTask) &&
      (!search || t.name.toLowerCase().includes(search.toLowerCase()) || teamProjects.find(p=>p.id===pid)?.name.toLowerCase().includes(search.toLowerCase()))
    );

  const srcTCs = (tid) =>
    teamTCs.filter(tc => tc.taskId === tid &&
      (!filterStatus || tc.status === filterStatus) &&
      (!search || tc.title.toLowerCase().includes(search.toLowerCase()))
    );

  const srcDefects = (tcId) =>
    teamDefects.filter(d => {
      const ids = toArr(d.relatedTcIds).length ? toArr(d.relatedTcIds) : (d.testCaseId ? [d.testCaseId] : []);
      return ids.includes(tcId) && (!filterSev || d.severity === filterSev);
    });

  // ── stat helpers ──
  const tcStatusColor = { Passed:'var(--green)', Failed:'var(--red)', 'In Progress':'var(--accent)',
    'Pass with Comment':'var(--cyan)', 'Not Start':'var(--text3)', Cancelled:'#555', Deferred:'var(--amber)' };
  const sevColor = { Critical:'var(--red)', High:'var(--orange)', Medium:'var(--amber)', Low:'var(--green)' };
  const statusBg  = { Passed:'var(--green-bg)', Failed:'var(--red-bg)', 'In Progress':'var(--accent-bg)',
    'Pass with Comment':'var(--cyan-bg)', 'Not Start':'var(--bg4)', Cancelled:'var(--bg4)', Deferred:'var(--amber-bg)' };

  const miniBar = (tcs) => {
    const total = tcs.length;
    if (!total) return h('span', { style:{color:'var(--text3)',fontSize:'11px'} }, '—');
    const passed = tcs.filter(tc => tc.status==='Passed'||tc.status==='Pass with Comment').length;
    const failed = tcs.filter(tc => tc.status==='Failed').length;
    const inprog = tcs.filter(tc => tc.status==='In Progress').length;
    const rate   = Math.round(passed/total*100);
    return h('div', { style:{display:'flex',alignItems:'center',gap:'6px'} },
      h('div', { style:{width:'80px',height:'6px',background:'var(--bg4)',borderRadius:'3px',overflow:'hidden',display:'flex'} },
        passed>0 && h('div',{style:{width:`${Math.round(passed/total*100)}%`,height:'100%',background:'var(--green)'}}),
        inprog>0 && h('div',{style:{width:`${Math.round(inprog/total*100)}%`,height:'100%',background:'var(--accent)'}}),
        failed>0 && h('div',{style:{width:`${Math.round(failed/total*100)}%`,height:'100%',background:'var(--red)'}})
      ),
      h('span',{style:{fontSize:'11px',color:rate>=70?'var(--green)':rate>=40?'var(--amber)':'var(--red)',fontWeight:'600',minWidth:'32px'}},`${rate}%`),
      total>0&&h('span',{style:{fontSize:'11px',color:'var(--text3)'}},`${total} TC`)
    );
  };

  const statChips = (tcs) => {
    const groups = {};
    tcs.forEach(tc => { groups[tc.status] = (groups[tc.status]||0)+1; });
    return h('div',{style:{display:'flex',flexWrap:'wrap',gap:'4px',marginTop:'4px'}},
      Object.entries(groups).map(([s,c]) =>
        h('span',{key:s,style:{fontSize:'10px',padding:'1px 7px',borderRadius:'10px',background:statusBg[s]||'var(--bg4)',color:tcStatusColor[s]||'var(--text3)',border:`1px solid ${tcStatusColor[s]||'var(--border)'}`,opacity:0.9}},`${s}: ${c}`)
      )
    );
  };

  // ── Summary row: total across all ──
  const allProjTCs   = teamProjects.reduce((acc,p)=>acc+srcTasks(p.id).reduce((a2,t)=>a2+srcTCs(t.id).length,0),0);
  const allProjDefs  = teamProjects.reduce((acc,p)=>acc+srcTasks(p.id).reduce((a2,t)=>a2+srcTCs(t.id).reduce((a3,tc)=>a3+srcDefects(tc.id).length,0),0),0);
  const passedTotal  = teamTCs.filter(tc=>tc.status==='Passed'||tc.status==='Pass with Comment').length;
  const failedTotal  = teamTCs.filter(tc=>tc.status==='Failed').length;
  const openDefs     = teamDefects.filter(d=>d.status!=='Closed').length;

  return h('div', null,
    // ── Header ──
    h('div', { className:'page-header' },
      h('div', null,
        h('h1', { className:'page-title' }, 'Data Explorer'),
        h('p',  { className:'page-subtitle' }, `Team: ${currentTeam?.name} — ตรวจสอบข้อมูลแบบ Hierarchy`)
      ),
      h('div', { className:'flex', style:{gap:'8px',flexWrap:'wrap'} },
        h('button',{className:'btn btn-sm',onClick:expandAll},  h('span',{className:'ms ms-xs'},'unfold_more'),   ' Expand All'),
        h('button',{className:'btn btn-sm',onClick:collapseAll},h('span',{className:'ms ms-xs'},'unfold_less'), ' Collapse All'),
      )
    ),

    // ── Summary stats ──
    h('div', { className:'stats-grid', style:{marginBottom:'16px'} },
      h('div',{className:'stat-card'},h('div',{className:'stat-label'},'Projects'),    h('div',{className:'stat-value',style:{color:'var(--purple)'}}, teamProjects.length), h('div',{className:'stat-sub'},'ใน Team นี้')),
      h('div',{className:'stat-card'},h('div',{className:'stat-label'},'Tasks'),       h('div',{className:'stat-value',style:{color:'var(--cyan)'}},   teamTasks.length),    h('div',{className:'stat-sub'},'ทั้งหมด')),
      h('div',{className:'stat-card'},h('div',{className:'stat-label'},'Test Cases'),  h('div',{className:'stat-value',style:{color:'var(--accent)'}}, teamTCs.length),      h('div',{className:'stat-sub'}, `Passed ${passedTotal} / Failed ${failedTotal}`)),
      h('div',{className:'stat-card'},h('div',{className:'stat-label'},'Defects'),     h('div',{className:'stat-value',style:{color:'var(--amber)'}},  teamDefects.length),  h('div',{className:'stat-sub'}, `Open: ${openDefs}`)),
    ),

    // ── Filters ──
    h('div', { className:'card', style:{marginBottom:'16px',padding:'12px 16px'} },
      h('div', { style:{display:'flex',gap:'8px',flexWrap:'wrap',alignItems:'center'} },
        h('span',{className:'ms ms-sm',style:{color:'var(--text3)'}},'filter_list'),
        h('input', { className:'form-input', placeholder:'ค้นหา Project / Task / TC...', value:search,
          onChange:e=>setSearch(e.target.value), style:{flex:1,minWidth:'160px',maxWidth:'260px'} }),
        h('select', { className:'form-select', value:filterProject, style:{maxWidth:'180px'},
          onChange:e=>{ setFilterProject(e.target.value); setFilterTask(''); } },
          h('option',{value:''},'All Projects'),
          teamProjects.map(p=>h('option',{key:p.id,value:p.id},p.name))
        ),
        filterProject && h('select', { className:'form-select', value:filterTask, style:{maxWidth:'180px'},
          onChange:e=>setFilterTask(e.target.value) },
          h('option',{value:''},'All Tasks'),
          teamTasks.filter(t=>t.projectId===filterProject).map(t=>h('option',{key:t.id,value:t.id},t.name))
        ),
        h('select', { className:'form-select', value:filterStatus, style:{maxWidth:'150px'},
          onChange:e=>setFilterStatus(e.target.value) },
          h('option',{value:''},'All TC Status'),
          statusOpts.map(s=>h('option',{key:s,value:s},s))
        ),
        h('select', { className:'form-select', value:filterSev, style:{maxWidth:'150px'},
          onChange:e=>setFilterSev(e.target.value) },
          h('option',{value:''},'All Severity'),
          ['Critical','High','Medium','Low'].map(s=>h('option',{key:s,value:s},s))
        ),
        (search||filterProject||filterTask||filterStatus||filterSev) &&
          h('button',{className:'btn btn-sm',onClick:()=>{setSearch('');setFilterProject('');setFilterTask('');setFilterStatus('');setFilterSev('');}},'Clear')
      )
    ),

    // ── Tree View ──
    srcProjects.length === 0
      ? h('div',{className:'card'},h('div',{className:'empty'},
          h('span',{className:'ms ms-xxl',style:{opacity:0.3,display:'block',marginBottom:'12px'}},'account_tree'),
          h('div',{className:'empty-title'},'ไม่พบข้อมูล'),
          h('div',{className:'empty-sub'},'ลองปรับ filter ใหม่')
        ))
      : h('div', { style:{display:'flex',flexDirection:'column',gap:'10px'} },
          srcProjects.map(proj => {
            const projTasks = srcTasks(proj.id);
            const projTCs   = projTasks.flatMap(t => srcTCs(t.id));
            const projDefs  = projTCs.flatMap(tc => srcDefects(tc.id));
            const isExpanded = expandedProjects[proj.id];
            const passedP   = projTCs.filter(tc=>tc.status==='Passed'||tc.status==='Pass with Comment').length;
            const failedP   = projTCs.filter(tc=>tc.status==='Failed').length;
            const openDefsP = projDefs.filter(d=>d.status!=='Closed').length;

            return h('div', { key:proj.id, className:'card', style:{padding:'0',overflow:'hidden'} },
              // Project row
              h('div', {
                style:{display:'flex',alignItems:'center',gap:'10px',padding:'12px 16px',cursor:'pointer',
                  background:isExpanded?'var(--bg3)':'var(--bg2)',borderBottom:isExpanded?'1px solid var(--border)':'none',
                  transition:'background 0.15s'},
                onClick:()=>toggleProj(proj.id)

function ActivityLogPage({ logs, loginLogs, users, isAdmin, members, currentTeam, myTeams }) {
  const [tab, setTab] = useState('activity');
  const [search, setSearch] = useState('');

  // [FIX HIGH-4] Client-side guard
  if (!isAdmin) {
    return h('div', { className:'card' },
      h('div', { className:'empty' },
        h('span', { className:'ms ms-xxl', style:{opacity:0.5,display:'block',marginBottom:'14px',color:'var(--red)'} }, 'lock'),
        h('div', { className:'empty-title' }, 'Access Denied'),
        h('div', { className:'empty-sub' }, 'เฉพาะ Admin เท่านั้นที่สามารถดู Activity Log ได้')
      )
    );
  }

  // [NEW v13] กรอง log เฉพาะในทีม currentTeam เท่านั้น
  const teamMemberIds = useMemo(() => {
    if (!currentTeam) return new Set();
    return new Set((members||[]).filter(m => m.teamId === currentTeam.id).map(m => m.userId));
  }, [members, currentTeam]);

  const teamLogs = useMemo(() => (logs||[]).filter(l => teamMemberIds.has(l.userId))
    .sort((a,b) => (b.at||'').localeCompare(a.at||'')), [logs, teamMemberIds]);
  const teamLoginLogs = useMemo(() => (loginLogs||[]).filter(l => teamMemberIds.has(l.userId))
    .sort((a,b) => (b.at||'').localeCompare(a.at||'')), [loginLogs, teamMemberIds]);

  const filtLogs = teamLogs.filter(l => !search ||
    (l.action||'').toLowerCase().includes(search.toLowerCase()) ||
    (l.detail||'').toLowerCase().includes(search.toLowerCase()) ||
    (l.userName||'').toLowerCase().includes(search.toLowerCase()));
  const filtLogin = teamLoginLogs.filter(l => !search ||
    (l.userName||'').toLowerCase().includes(search.toLowerCase()));

  // action color map
  const actionColor = (action='') => {
    const a = action.toLowerCase();
    if (a.includes('delete') || a.includes('ลบ')) return 'var(--red)';
    if (a.includes('create') || a.includes('add') || a.includes('สร้าง')) return 'var(--green)';
    if (a.includes('update') || a.includes('edit') || a.includes('แก้ไข')) return 'var(--amber)';
    if (a.includes('login') || a.includes('logout')) return 'var(--cyan)';
    if (a.includes('approve') || a.includes('อนุมัติ')) return 'var(--purple)';
    return 'var(--text2)';
  };

  const teamMemberCount = teamMemberIds.size;

  return h('div',null,
    h('div',{className:'page-header'},
      h('div',null,
        h('h1',{className:'page-title'},
          h('span',{className:'ms ms-sm',style:{marginRight:'8px',color:'var(--accent)'}},'history'),
          'Activity Log'
        ),
        h('p',{className:'page-subtitle'},
          h(React.Fragment,null,
            h('span',{className:'ms ms-xs',style:{marginRight:'4px',verticalAlign:'middle',color:'var(--accent)'}},'shield'),
            'เฉพาะ Admin — แสดงเฉพาะข้อมูลในทีม ',
            h('strong',{style:{color:'var(--text)'}},(currentTeam?.name||'ปัจจุบัน')),
            ' (',teamMemberCount,' สมาชิก)'
          )
        )
      ),
      h('div',{style:{display:'flex',gap:'8px',flexWrap:'wrap'}},
        h('div',{className:'badge',style:{background:'var(--bg3)',color:'var(--text2)',fontSize:'12px',padding:'4px 10px'}},
          h('span',{className:'ms ms-xs',style:{marginRight:'4px',color:'var(--accent)'}},'bolt'),
          teamLogs.length+' activity'
        ),
        h('div',{className:'badge',style:{background:'var(--bg3)',color:'var(--text2)',fontSize:'12px',padding:'4px 10px'}},
          h('span',{className:'ms ms-xs',style:{marginRight:'4px',color:'var(--cyan)'}},'login'),
          teamLoginLogs.length+' login'
        )
      )
    ),
    h('div',{className:'tabs'},
      [['activity','Activity Log'],['login','Login Log']].map(([t,l])=>
        h('div',{key:t,className:`tab${tab===t?' active':''}`,onClick:()=>setTab(t)},
          h(React.Fragment,null,
            h('span',{className:'ms ms-xs',style:{marginRight:'4px'}}, t==='activity'?'bolt':'login'),
            l,
            ' ',
            h('span',{className:'badge',style:{background:'var(--bg4)',color:'var(--text3)',fontSize:'10px',padding:'1px 6px',marginLeft:'4px'}},
              t==='activity'?filtLogs.length:filtLogin.length
            )
          )
        )
      )
    ),
    h('div',{style:{display:'flex',gap:'8px',alignItems:'center',marginBottom:'16px'}},
      h('input',{className:'search-input',placeholder:'ค้นหาชื่อ / action / รายละเอียด...',value:search,onChange:e=>setSearch(e.target.value),style:{flex:1,maxWidth:'400px'}}),
      search && h('button',{className:'btn btn-sm',onClick:()=>setSearch('')},
        h('span',{className:'ms ms-xs'},'close'),' ล้าง'
      )
    ),
    tab==='activity'&&h('div',{className:'card'},
      filtLogs.length===0
        ? h('div',{className:'empty'},
            h('span',{className:'ms ms-xxl',style:{opacity:0.3,display:'block',marginBottom:'10px'}},'history'),
            h('div',{className:'empty-title'},'ยังไม่มี Activity'),
            search && h('div',{className:'empty-sub'},'ลองเปลี่ยน keyword การค้นหา')
          )
        : filtLogs.map(l=>h('div',{key:l.id,className:'log-entry',style:{gap:'12px',alignItems:'flex-start'}},
            h('div',{style:{minWidth:'130px',fontSize:'11px',color:'var(--text3)',fontFamily:'var(--mono)',paddingTop:'2px'}},fmtDate(l.at)),
            h('div',{style:{flex:1,minWidth:0}},
              h('div',{style:{display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap'}},
                h('span',{style:{color:'var(--accent)',fontWeight:'600',fontSize:'13px'}},l.userName),
                h('span',{style:{background:'var(--bg3)',color:actionColor(l.action),fontSize:'11px',padding:'1px 7px',borderRadius:'3px',fontWeight:'600',whiteSpace:'nowrap'}},l.action)
              ),
              l.detail&&h('div',{style:{color:'var(--text2)',fontSize:'12px',marginTop:'3px',lineHeight:'1.4'}},l.detail)
            )
          ))
    ),
    tab==='login'&&h('div',{className:'card'},
      filtLogin.length===0
        ? h('div',{className:'empty'},
            h('span',{className:'ms ms-xxl',style:{opacity:0.3,display:'block',marginBottom:'10px'}},'login'),
            h('div',{className:'empty-title'},'ยังไม่มี Login Log'),
            search && h('div',{className:'empty-sub'},'ลองเปลี่ยน keyword การค้นหา')

            h('div',{style:{minWidth:'130px',fontSize:'11px',color:'var(--text3)',fontFamily:'var(--mono)',paddingTop:'2px'}},fmtDate(l.at)),
            h('div',{style:{flex:1}},
              h('div',{style:{display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap'}},
                h('span',{style:{color:'var(--accent)',fontWeight:'600',fontSize:'13px'}},l.userName),
                h('span',{style:{background:'var(--cyan-bg)',color:'var(--cyan)',fontSize:'11px',padding:'1px 7px',borderRadius:'3px',fontWeight:'600'}},'Login'),
                l.isNew&&h('span',{className:'badge badge-green',style:{fontSize:'10px'}},'New Account')
              ),
              h('div',{style:{fontSize:'11px',color:'var(--text3)',marginTop:'3px',fontFamily:'var(--mono)'}},l.ip)
            )
          ))
    )
  );
