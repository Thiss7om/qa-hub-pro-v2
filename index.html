function PlanPage({ currentTeam, currentUser, teamPlans, setPlans, setPlansState, isAdmin, users, showToast, addLog, USE_GAS }) {

  const DEFAULT_ENVS = ['DEV','SIT','UAT','PROD'];
  const PLAN_TYPES   = ['Sprint','Release','Regression','Smoke','Sanity','Other'];
  const PLAN_STATUS  = ['Planned','In Progress','Completed','Cancelled'];
  const PLAN_COLORS  = ['#4f8ef7','#46d369','#f5a623','#e50914','#b197fc','#63e6be','#f783ac','#ff6b35'];

  const [activeEnv, setActiveEnv]   = useState('ALL');
  const [viewMode, setViewMode]     = useState('timeline'); // 'timeline' | 'list'
  const [showModal, setShowModal]   = useState(false);
  const [editPlan, setEditPlan]     = useState(null);
  const [delConfirm, setDelConfirm] = useState(null);
  const [search, setSearch]         = useState('');
  const [filterStatus, setFilterStatus] = useState('');
  const [filterType, setFilterType]     = useState('');
  const [envInput, setEnvInput]     = useState('');
  const [showEnvMgr, setShowEnvMgr] = useState(false);
  const [saving, setSaving]         = useState(false);

  const emptyForm = { title:'', env:'', type:'Sprint', startDate:'', endDate:'', status:'Planned', description:'', assignee:'', color:'#4f8ef7' };
  const [form, setForm] = useState(emptyForm);

  // Compute all unique ENVs from existing plans + defaults
  const allEnvs = useMemo(() => {
    const fromPlans = (teamPlans||[]).map(p => p.env).filter(Boolean);
    const merged = [...new Set([...DEFAULT_ENVS, ...fromPlans])];
    return merged;
  }, [teamPlans]);

  // Filter plans by active env
  const visiblePlans = useMemo(() => {
    let list = teamPlans || [];
    if (activeEnv !== 'ALL') list = list.filter(p => p.env === activeEnv);
    if (search) list = list.filter(p => p.title?.toLowerCase().includes(search.toLowerCase()) || p.description?.toLowerCase().includes(search.toLowerCase()));
    if (filterStatus) list = list.filter(p => p.status === filterStatus);
    if (filterType)   list = list.filter(p => p.type   === filterType);
    return list;
  }, [teamPlans, activeEnv, search, filterStatus, filterType]);

  // Timeline: group plans by ENV and compute column positions
  const timelinePlans = useMemo(() => {
    if (!visiblePlans.length) return [];
    const withDates = visiblePlans.filter(p => p.startDate && p.endDate);
    if (!withDates.length) return [];
    // find global min/max dates
    const allStarts = withDates.map(p => new Date(p.startDate));
    const allEnds   = withDates.map(p => new Date(p.endDate));
    const minDate   = new Date(Math.min(...allStarts));
    const maxDate   = new Date(Math.max(...allEnds));
    // total days
    const totalMs   = maxDate - minDate || 1;
    return withDates.map(p => {
      const start = new Date(p.startDate);
      const end   = new Date(p.endDate);
      const left  = ((start - minDate) / totalMs) * 100;
      const width = Math.max(((end - start) / totalMs) * 100, 2);
      return { ...p, _left: left, _width: width, _minDate: minDate, _maxDate: maxDate };
    });
  }, [visiblePlans]);

  const openCreate = (env) => {
    setForm({ ...emptyForm, env: env || activeEnv !== 'ALL' ? (activeEnv !== 'ALL' ? activeEnv : '') : '' });
    setEditPlan(null);
    setShowModal(true);
  };

  const openEdit = (plan) => {
    setForm({
      title: plan.title || '', env: plan.env || '', type: plan.type || 'Sprint',
      startDate: plan.startDate ? plan.startDate.slice(0,10) : '',
      endDate:   plan.endDate   ? plan.endDate.slice(0,10)   : '',
      status: plan.status || 'Planned', description: plan.description || '',
      assignee: plan.assignee || '', color: plan.color || '#4f8ef7',
    });
    setEditPlan(plan);
    setShowModal(true);
  };

  const savePlan = async () => {
    if (!form.title.trim()) { showToast('กรุณาใส่ชื่อ Plan','error'); return; }
    if (!form.env.trim())   { showToast('กรุณาระบุ ENV','error'); return; }
    setSaving(true);
    const ts = new Date().toISOString();
    if (editPlan) {
      const updated = { ...editPlan, ...form, updatedAt: ts, updatedBy: currentUser.id };
      setPlansState(prev => prev.map(x => x.id === editPlan.id ? updated : x));
      if (USE_GAS) {
        try { await api.update('plans', updated, currentTeam.id); addLog('Update Plan', `แก้ไข Plan: ${form.title}`); showToast('อัพเดท Plan สำเร็จ'); }
        catch(e) { setPlansState(prev => prev.map(x => x.id === editPlan.id ? editPlan : x)); showToast('บันทึกล้มเหลว: '+e.message,'error'); setSaving(false); return; }
      } else { addLog('Update Plan', `แก้ไข Plan: ${form.title}`); showToast('อัพเดท Plan สำเร็จ'); }
    } else {
      const newPlan = { id: uid(), teamId: currentTeam.id, ...form, order: (teamPlans.length + 1) * 10, createdBy: currentUser.id, createdAt: ts, updatedAt: ts, updatedBy: currentUser.id, isDeleted: false };
      setPlansState(prev => [...prev, newPlan]);
      if (USE_GAS) {
        try { await api.insert('plans', newPlan, currentTeam.id); addLog('Create Plan', `สร้าง Plan: ${form.title}`); showToast('สร้าง Plan สำเร็จ'); }
        catch(e) { setPlansState(prev => prev.filter(x => x.id !== newPlan.id)); showToast('บันทึกล้มเหลว: '+e.message,'error'); setSaving(false); return; }
      } else { addLog('Create Plan', `สร้าง Plan: ${form.title}`); showToast('สร้าง Plan สำเร็จ'); }
    }
    setSaving(false);
    setShowModal(false);
  };

  const deletePlan = async (plan) => {
    setDelConfirm(null);
    const ts = new Date().toISOString();
    setPlansState(prev => prev.map(x => x.id === plan.id ? {...x, isDeleted: true, updatedAt: ts} : x));
    if (USE_GAS) {
      try { await api.delete('plans', plan.id, currentTeam.id); addLog('Delete Plan', `ลบ Plan: ${plan.title}`); showToast('ลบ Plan สำเร็จ'); }
      catch(e) { setPlansState(prev => prev.map(x => x.id === plan.id ? {...x, isDeleted: false} : x)); showToast('ลบล้มเหลว: '+e.message,'error'); }
    } else { addLog('Delete Plan', `ลบ Plan: ${plan.title}`); showToast('ลบ Plan สำเร็จ'); }
  };

  const statusColor = { 'Planned':'var(--text3)', 'In Progress':'var(--accent)', 'Completed':'var(--green)', 'Cancelled':'var(--text3)' };
  const statusBg    = { 'Planned':'var(--bg4)', 'In Progress':'var(--accent-bg)', 'Completed':'var(--green-bg)', 'Cancelled':'var(--bg4)' };
  const statusBadge = { 'Planned':'badge-gray', 'In Progress':'badge-red', 'Completed':'badge-green', 'Cancelled':'badge-gray' };
  const typeColor   = { 'Sprint':'var(--cyan)', 'Release':'var(--purple)', 'Regression':'var(--amber)', 'Smoke':'var(--green)', 'Sanity':'var(--pink)', 'Other':'var(--text3)' };

  const fmtD = (d) => d ? new Date(d).toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'2-digit'}) : '—';
  const daysBetween = (a,b) => a && b ? Math.ceil((new Date(b) - new Date(a)) / 86400000) : null;
  const isOverdue   = (p) => p.endDate && p.status !== 'Completed' && p.status !== 'Cancelled' && new Date(p.endDate) < new Date();

  // Env group stats
  const envStats = (env) => {
    const ep = (teamPlans||[]).filter(p => p.env === env);
    return { total: ep.length, done: ep.filter(p => p.status==='Completed').length, inprog: ep.filter(p => p.status==='In Progress').length };
  };

  const teamMembers = (users||[]).filter(u => true); // all users visible in team

  return h('div', null,
    // ── Header ──
    h('div', { className:'page-header' },
      h('div', null,
        h('h1', { className:'page-title' },
          h('span',{className:'ms ms-sm',style:{marginRight:'8px',color:'var(--accent)'}},'calendar_month'), 'Plan'
        ),
        h('p', { className:'page-subtitle' }, `Team: ${currentTeam?.name} — จัดการ Timeline / Sprint ต่อ ENV`)
      ),
      h('div', { style:{display:'flex',gap:'8px',flexWrap:'wrap',alignItems:'center'} },
        isAdmin && h('button', { className:'btn btn-sm', onClick:()=>setShowEnvMgr(v=>!v), style:{borderColor:'var(--cyan)',color:'var(--cyan)'} },
          h('span',{className:'ms ms-xs'},'settings'), ' จัดการ ENV'
        ),
        h('button', { className:`btn btn-sm${viewMode==='timeline'?' btn-primary':''}`, onClick:()=>setViewMode('timeline') },
          h('span',{className:'ms ms-xs'},'view_timeline'), ' Timeline'
        ),
        h('button', { className:`btn btn-sm${viewMode==='list'?' btn-primary':''}`, onClick:()=>setViewMode('list') },
          h('span',{className:'ms ms-xs'},'list'), ' List'
        ),
        isAdmin && h('button', { className:'btn btn-primary btn-sm', onClick:()=>openCreate() },
          h('span',{className:'ms ms-xs'},'add'), ' New Plan'
        )
      )
    ),

    // ── ENV Manager (admin only) ──
    showEnvMgr && isAdmin && h('div', { className:'card', style:{marginBottom:'16px',padding:'14px 18px'} },
      h('div', { style:{display:'flex',alignItems:'center',gap:'10px',marginBottom:'12px'} },
        h('span',{className:'ms ms-sm',style:{color:'var(--cyan)'}},'tag'),
        h('strong',null,'Custom ENV'),
        h('span',{style:{fontSize:'12px',color:'var(--text3)'}},'(เพิ่ม ENV ที่ต้องการนอกจาก DEV/SIT/UAT/PROD)')
      ),
      h('div', { style:{display:'flex',gap:'8px',flexWrap:'wrap',marginBottom:'12px'} },
        allEnvs.map(env => h('span', { key:env, className:'tag', style:{cursor:'default',fontSize:'13px',padding:'4px 10px'} },
          env,
          !DEFAULT_ENVS.includes(env) && isAdmin && h('span', {
            className:'ms ms-xs', style:{marginLeft:'6px',cursor:'pointer',color:'var(--text3)',fontSize:'11px'},
            onClick:()=>{
              // mark all plans with this env as a different env? No — just remove ENV from the list display.
              // In practice, user can just stop using this env. We don't store ENV list separately.
              showToast('ENV จะหายจากรายการเมื่อไม่มี Plan ใช้งาน','info');
            }
          },'close')
        ))
      ),
      h('div', { style:{display:'flex',gap:'8px'} },
        h('input', { className:'form-input', style:{maxWidth:'200px'}, placeholder:'ชื่อ ENV ใหม่ เช่น PERF', value:envInput, onChange:e=>setEnvInput(e.target.value.toUpperCase()),
          onKeyDown:e=>e.key==='Enter'&&envInput.trim()&&(showToast(`ENV "${envInput}" จะใช้งานได้เมื่อสร้าง Plan แรก`),setEnvInput('')) }),
        h('button', { className:'btn btn-sm btn-primary', onClick:()=>{ if(envInput.trim()) { showToast(`ENV "${envInput}" จะใช้ได้เมื่อสร้าง Plan แรก`); setEnvInput(''); } } }, 'เพิ่ม')
      )
    ),

    // ── ENV Tabs ──
    h('div', { className:'tabs', style:{marginBottom:'16px',flexWrap:'wrap'} },
      ['ALL',...allEnvs].map(env => {
        const st = env !== 'ALL' ? envStats(env) : null;
        return h('div', { key:env, className:`tab${activeEnv===env?' active':''}`, onClick:()=>setActiveEnv(env) },
          env,
          st && st.total > 0 && h('span', { className:'badge', style:{marginLeft:'6px',background:activeEnv===env?'rgba(255,255,255,0.2)':'var(--bg4)',color:activeEnv===env?'#fff':'var(--text3)',fontSize:'10px',padding:'1px 6px'} },
            st.done + '/' + st.total
          )
        );
      })
    ),

    // ── Filters ──
    h('div', { style:{display:'flex',gap:'8px',marginBottom:'16px',flexWrap:'wrap',alignItems:'center'} },
      h('input', { className:'search-input', placeholder:'ค้นหา Plan...', value:search, onChange:e=>setSearch(e.target.value), style:{flex:1,minWidth:'160px',maxWidth:'300px'} }),
      h('select', { className:'form-select', value:filterStatus, onChange:e=>setFilterStatus(e.target.value), style:{maxWidth:'150px'} },
        h('option',{value:''},'All Status'),
        PLAN_STATUS.map(s=>h('option',{key:s,value:s},s))
      ),
      h('select', { className:'form-select', value:filterType, onChange:e=>setFilterType(e.target.value), style:{maxWidth:'150px'} },
        h('option',{value:''},'All Type'),
        PLAN_TYPES.map(t=>h('option',{key:t,value:t},t))
      ),
      (search||filterStatus||filterType) && h('button', { className:'btn btn-sm', onClick:()=>{setSearch('');setFilterStatus('');setFilterType('');} }, 'Clear')
    ),

    // ── TIMELINE VIEW ──
    viewMode === 'timeline' && h('div', null,
      visiblePlans.length === 0
        ? h('div', { className:'card' },
            h('div', { className:'empty' },
              h('span',{className:'ms ms-xxl',style:{opacity:0.3,display:'block',marginBottom:'12px'}},'calendar_month'),
              h('div',{className:'empty-title'},'ยังไม่มี Plan'),
              isAdmin && h('button',{className:'btn btn-primary',style:{marginTop:'12px'},onClick:()=>openCreate()},h('span',{className:'ms ms-xs'},'add'),' New Plan')
            )
          )
        : h('div', { style:{display:'flex',flexDirection:'column',gap:'8px'} },
            // Group by ENV
            (activeEnv === 'ALL' ? allEnvs : [activeEnv]).map(env => {
              const envPlans = visiblePlans.filter(p => p.env === env);
              if (!envPlans.length) return null;
              const withDates = envPlans.filter(p => p.startDate && p.endDate);
              const noDates   = envPlans.filter(p => !p.startDate || !p.endDate);
              // Compute timeline positions for this ENV
              let minDate, maxDate, totalMs2 = 1;
              if (withDates.length) {
                minDate  = new Date(Math.min(...withDates.map(p=>new Date(p.startDate))));
                maxDate  = new Date(Math.max(...withDates.map(p=>new Date(p.endDate))));
                totalMs2 = (maxDate - minDate) || 1;
              }
              return h('div', { key:env, className:'card', style:{padding:'0',overflow:'hidden',marginBottom:'4px'} },
                // ENV header
                h('div', { style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 16px',background:'var(--bg3)',borderBottom:'1px solid var(--border)'} },
                  h('div', { style:{display:'flex',alignItems:'center',gap:'8px'} },
                    h('span', { style:{fontWeight:'700',fontSize:'13px',letterSpacing:'1px',color:'var(--cyan)'} }, env),
                    h('span', { style:{fontSize:'12px',color:'var(--text3)'} }, `${envPlans.length} plan${envPlans.length>1?'s':''}`),
                    envPlans.filter(p=>p.status==='In Progress').length > 0 && h('span',{className:'badge badge-red',style:{fontSize:'10px'}},envPlans.filter(p=>p.status==='In Progress').length+' in progress')
                  ),
                  isAdmin && h('button', { className:'btn btn-sm', style:{padding:'3px 10px',fontSize:'11px'}, onClick:()=>openCreate(env) },
                    h('span',{className:'ms ms-xs'},'add'), ' Plan'
                  )
                ),

                // Timeline bar area
                withDates.length > 0 && h('div', { style:{padding:'12px 16px'} },
                  // Date ruler
                  h('div', { style:{position:'relative',height:'20px',marginBottom:'6px',fontSize:'10px',color:'var(--text3)',fontFamily:'var(--mono)'} },
                    [0, 25, 50, 75, 100].map(pct => {
                      const dateAt = new Date(minDate.getTime() + (pct/100) * totalMs2);
                      return h('span', { key:pct, style:{position:'absolute',left:pct+'%',transform:'translateX(-50%)',whiteSpace:'nowrap'} },
                        dateAt.toLocaleDateString('th-TH',{month:'short',day:'numeric'})
                      );
                    })
                  ),
                  // Plan bars
                  h('div', { style:{position:'relative',display:'flex',flexDirection:'column',gap:'4px'} },
                    withDates.map(plan => {
                      const left  = ((new Date(plan.startDate) - minDate) / totalMs2) * 100;
                      const width = Math.max(((new Date(plan.endDate) - new Date(plan.startDate)) / totalMs2) * 100, 2);
                      const days  = daysBetween(plan.startDate, plan.endDate);
                      const od    = isOverdue(plan);
                      const planColor = plan.color || '#4f8ef7';
                      return h('div', { key:plan.id, style:{position:'relative',height:'32px',marginBottom:'2px'} },
                        h('div', {
                          title: `${plan.title} (${fmtD(plan.startDate)} → ${fmtD(plan.endDate)}, ${days} วัน)`,
                          style:{
                            position:'absolute', left:left+'%', width:width+'%', height:'100%',
                            background: od ? 'var(--red-bg)' : planColor+'22',
                            border: `2px solid ${od ? 'var(--red)' : planColor}`,
                            borderRadius:'4px', display:'flex', alignItems:'center',
                            padding:'0 8px', cursor: isAdmin ? 'pointer' : 'default',
                            transition:'opacity 0.15s', overflow:'hidden', whiteSpace:'nowrap',
                            minWidth:'30px', boxSizing:'border-box',
                          },
                          onClick: () => isAdmin && openEdit(plan),
                          onMouseEnter: e => { e.currentTarget.style.opacity='0.85'; },
                          onMouseLeave: e => { e.currentTarget.style.opacity='1'; }
                        },
                          h('span', { style:{fontSize:'11px',fontWeight:'600',color: od ? 'var(--red)' : planColor, overflow:'hidden', textOverflow:'ellipsis', flex:1} },
                            od && h('span',{className:'ms ms-xs',style:{marginRight:'3px'}},'warning'),
                            plan.title
                          ),
                          width > 8 && h('span', { style:{fontSize:'10px',color:'var(--text3)',marginLeft:'4px',flexShrink:0} }, days ? days+'d' : '')
                        )
                      );
                    })
                  )
                ),

                // Plans without dates (list below timeline)
                noDates.length > 0 && h('div', { style:{padding:'0 16px 10px',borderTop: withDates.length ? '1px solid var(--border)' : 'none'} },
                  noDates.length > 0 && h('div',{style:{fontSize:'11px',color:'var(--text3)',padding:'8px 0 4px'}},'ยังไม่ระบุวันที่:'),
                  noDates.map(plan =>
                    h('div', { key:plan.id, style:{display:'flex',alignItems:'center',gap:'8px',padding:'4px 0'} },
                      h('span', { style:{width:'10px',height:'10px',borderRadius:'50%',background:plan.color||'var(--text3)',flexShrink:0,display:'inline-block'} }),
                      h('span', { style:{fontSize:'12px',flex:1} }, plan.title),
                      h('span', { className:`badge ${statusBadge[plan.status]||'badge-gray'}`, style:{fontSize:'10px'} }, plan.status),
                      isAdmin && h('button', { className:'btn btn-sm', style:{padding:'2px 8px',fontSize:'11px'}, onClick:()=>openEdit(plan) }, 'แก้ไข')
                    )
                  )
                )
              );
            })
          )
    ),

    // ── LIST VIEW ──
    viewMode === 'list' && h('div', { className:'card' },
      visiblePlans.length === 0
        ? h('div', { className:'empty' },
            h('span',{className:'ms ms-xxl',style:{opacity:0.3,display:'block',marginBottom:'12px'}},'list'),
            h('div',{className:'empty-title'},'ยังไม่มี Plan'),
            isAdmin && h('button',{className:'btn btn-primary',style:{marginTop:'12px'},onClick:()=>openCreate()},h('span',{className:'ms ms-xs'},'add'),' New Plan')
          )
        : h('div', { className:'table-wrap' },
            h('table', null,
              h('thead', null,
                h('tr', null,
                  h('th',null,'Plan'),
                  h('th',null,'ENV'),
                  h('th',null,'Type'),
                  h('th',null,'วันเริ่ม – วันสิ้นสุด'),
                  h('th',null,'ระยะเวลา'),
                  h('th',null,'Assignee'),
                  h('th',null,'Status'),
                  isAdmin && h('th',null,'')
                )
              ),
              h('tbody', null,
                visiblePlans.map(plan => {
                  const assigneeUser = (users||[]).find(u => u.id === plan.assignee);
                  const days = daysBetween(plan.startDate, plan.endDate);
                  const od   = isOverdue(plan);
                  return h('tr', { key: plan.id },
                    h('td', null,
                      h('div', { style:{display:'flex',alignItems:'center',gap:'8px'} },
                        h('div', { style:{width:'10px',height:'10px',borderRadius:'50%',background:plan.color||'var(--text3)',flexShrink:0} }),
                        h('div', null,
                          h('div', { style:{fontWeight:'500',fontSize:'13px'} }, plan.title),
                          plan.description && h('div', { style:{fontSize:'11px',color:'var(--text3)',marginTop:'2px'} }, plan.description.slice(0,60)+(plan.description.length>60?'...':''))
                        )
                      )
                    ),
                    h('td', null, h('span', { style:{fontWeight:'600',fontSize:'12px',color:'var(--cyan)',letterSpacing:'0.5px'} }, plan.env || '—')),
                    h('td', null, h('span', { style:{fontSize:'12px',color:typeColor[plan.type]||'var(--text3)'} }, plan.type || '—')),
                    h('td', null,
                      plan.startDate || plan.endDate
                        ? h('span', { style:{fontSize:'12px', color: od ? 'var(--red)' : 'var(--text2)', fontFamily:'var(--mono)'} },
                            od && h('span',{className:'ms ms-xs',style:{marginRight:'3px',color:'var(--red)'}},'warning'),
                            fmtD(plan.startDate), ' – ', fmtD(plan.endDate)
                          )
                        : h('span', { style:{color:'var(--text3)',fontSize:'12px'} }, '—')
                    ),
                    h('td', null, days != null ? h('span',{style:{fontSize:'12px',color:'var(--text2)',fontFamily:'var(--mono)'}},days+' วัน') : h('span',{style:{color:'var(--text3)'}},'—')),
                    h('td', null,
                      assigneeUser
                        ? h('div', { style:{display:'flex',alignItems:'center',gap:'5px'} },
                            h('div',{className:'avatar',style:{width:'20px',height:'20px',fontSize:'9px',flexShrink:0,background:(assigneeUser.color||'#4f8ef7')+'22',color:assigneeUser.color||'#4f8ef7'}},(assigneeUser.name||'?')[0]),
                            h('span',{style:{fontSize:'12px',color:'var(--text2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:'90px'}},assigneeUser.name)
                          )
                        : h('span',{style:{fontSize:'12px',color:'var(--text3)'}},'—')
                    ),
                    h('td', null,
                      h('span', { className:`badge ${statusBadge[plan.status]||'badge-gray'}` }, plan.status || '—')
                    ),
                    isAdmin && h('td', null,
                      h('div', { style:{display:'flex',gap:'4px'} },
                        h('button', { className:'btn btn-sm', onClick:()=>openEdit(plan) }, 'แก้ไข'),
                        h('button', { className:'btn btn-sm btn-danger', onClick:()=>setDelConfirm(plan) }, 'ลบ')
                      )
                    )
                  );
                })
              )
            )
          )
    ),

    // ── CREATE / EDIT MODAL ──
    showModal && isAdmin && h(Modal, {
      title: editPlan ? 'แก้ไข Plan' : 'สร้าง Plan ใหม่',
      onClose: () => setShowModal(false),
      size: 'modal-lg'
    },
      h('div', { className:'modal-body' },
        // Form grid
        h('div', { className:'form-row' },
          h('div', { className:'form-group' },
            h('label', { className:'form-label' }, h('span',{className:'ms ms-xs',style:{marginRight:'4px'}},'title'), 'ชื่อ Plan ', h('span',{className:'req'},'*')),
            h('input', { className:'form-input', value:form.title, onChange:e=>setForm(p=>({...p,title:e.target.value})), placeholder:'เช่น Sprint 1, UAT Round 1...' })
          ),
          h('div', { className:'form-group' },
            h('label', { className:'form-label' }, h('span',{className:'ms ms-xs',style:{marginRight:'4px'}},'tag'), 'ENV ', h('span',{className:'req'},'*')),
            h('div', { style:{display:'flex',gap:'6px'} },
              h('select', { className:'form-select', value: allEnvs.includes(form.env) ? form.env : '_custom', style:{flex:1},
                onChange:e=>{ if(e.target.value !== '_custom') setForm(p=>({...p,env:e.target.value})); } },
                allEnvs.map(e=>h('option',{key:e,value:e},e)),
                !allEnvs.includes(form.env) && form.env && h('option',{value:form.env},form.env),
                h('option',{value:'_custom'},'+ กำหนดเอง...')
              ),
              (form.env === '' || !allEnvs.includes(form.env)) && h('input', { className:'form-input', style:{flex:1}, value:form.env, onChange:e=>setForm(p=>({...p,env:e.target.value.toUpperCase()})), placeholder:'ENV ใหม่ เช่น PERF' })
            )
          )
        ),
        h('div', { className:'form-row' },
          h('div', { className:'form-group' },
            h('label', { className:'form-label' }, 'ประเภท'),
            h('select', { className:'form-select', value:form.type, onChange:e=>setForm(p=>({...p,type:e.target.value})) },
              PLAN_TYPES.map(t=>h('option',{key:t,value:t},t))
            )
          ),
          h('div', { className:'form-group' },
            h('label', { className:'form-label' }, 'สถานะ'),
            h('select', { className:'form-select', value:form.status, onChange:e=>setForm(p=>({...p,status:e.target.value})) },
              PLAN_STATUS.map(s=>h('option',{key:s,value:s},s))
            )
          )
        ),
        h('div', { className:'form-row' },
          h('div', { className:'form-group' },
            h('label', { className:'form-label' }, h('span',{className:'ms ms-xs',style:{marginRight:'4px'}},'calendar_today'), 'วันเริ่มต้น'),
            h(DatePicker, { value:form.startDate, onChange:v=>setForm(p=>({...p,startDate:v})), placeholder:'เลือกวันเริ่มต้น' })
          ),
          h('div', { className:'form-group' },
            h('label', { className:'form-label' }, h('span',{className:'ms ms-xs',style:{marginRight:'4px'}},'event'), 'วันสิ้นสุด'),
            h(DatePicker, { value:form.endDate, onChange:v=>setForm(p=>({...p,endDate:v})), placeholder:'เลือกวันสิ้นสุด' })
          )
        ),
        form.startDate && form.endDate && h('div', { style:{marginBottom:'12px',fontSize:'12px',color:'var(--cyan)',display:'flex',alignItems:'center',gap:'4px'} },
          h('span',{className:'ms ms-xs'},'schedule'), `ระยะเวลา: ${daysBetween(form.startDate, form.endDate)} วัน`
        ),
        h('div', { className:'form-group' },
          h('label', { className:'form-label' }, 'Assignee'),
          h('select', { className:'form-select', value:form.assignee, onChange:e=>setForm(p=>({...p,assignee:e.target.value})) },
            h('option',{value:''},'— ไม่ระบุ —'),
            (users||[]).map(u=>h('option',{key:u.id,value:u.id},u.name))
          )
        ),
        h('div', { className:'form-group' },
          h('label', { className:'form-label' }, 'คำอธิบาย'),
          h('textarea', { className:'form-textarea', value:form.description, onChange:e=>setForm(p=>({...p,description:e.target.value})), placeholder:'รายละเอียดเพิ่มเติม...', style:{minHeight:'70px'} })
        ),
        h('div', { className:'form-group' },
          h('label', { className:'form-label' }, h('span',{className:'ms ms-xs',style:{marginRight:'4px'}},'palette'), 'สี'),
          h('div', { style:{display:'flex',gap:'8px',flexWrap:'wrap',marginTop:'4px'} },
            PLAN_COLORS.map(c =>
              h('div', { key:c, onClick:()=>setForm(p=>({...p,color:c})),
                style:{width:'28px',height:'28px',borderRadius:'50%',background:c,cursor:'pointer',
                  border: form.color===c ? '3px solid var(--text)' : '3px solid transparent',
                  boxShadow: form.color===c ? '0 0 0 2px '+c : 'none', transition:'all 0.1s'
                }
              })
            ),
            h('label', { style:{width:'28px',height:'28px',borderRadius:'50%',cursor:'pointer',overflow:'hidden',border:'2px dashed var(--border2)',display:'flex',alignItems:'center',justifyContent:'center'} },
              h('span',{className:'ms',style:{fontSize:'14px',color:'var(--text3)'}},'add'),
              h('input',{type:'color',value:form.color,onChange:e=>setForm(p=>({...p,color:e.target.value})),style:{position:'absolute',opacity:0,pointerEvents:'none'}})
            )
          )
        )
      ),
      h('div', { className:'modal-footer' },
        h('button', { className:'btn', onClick:()=>setShowModal(false) }, 'ยกเลิก'),
        h('button', { className:'btn btn-primary', onClick:savePlan, disabled:saving, style:{display:'flex',alignItems:'center',gap:'6px'} },
          h('span',{className:'ms ms-xs'},saving?'sync':'save'), saving?'กำลังบันทึก...':'บันทึก'
        )
      )
    ),

    // ── DELETE CONFIRM ──
    delConfirm && h(ConfirmModal, {
      title: `ลบ Plan "${delConfirm.title}"?`,
      message: 'Plan นี้จะถูกลบออกจากระบบ การกระทำนี้ไม่สามารถยกเลิกได้',
      danger: true,
      onConfirm: () => deletePlan(delConfirm),
      onClose: () => setDelConfirm(null)
    })
  );
}

// ─── RENDER ────────────────────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(h(ErrorBoundary,null,h(App)));
</script>
</body>
</html>
