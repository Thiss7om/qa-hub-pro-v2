// ─── SESSION TOKEN ────────────────────────────────────────────────────────────
// [FIX VULN-02] Token ออกโดย GAS หลัง login สำเร็จ แนบทุก request
// [FIX CRITICAL-3] ใช้ sessionStorage แทน localStorage สำหรับ auth token
// sessionStorage: token หายเมื่อปิด tab — ลด exposure window จาก XSS
// localStorage ยังคงใช้สำหรับ theme, file cache (ไม่ใช่ secret)
const getAuthToken = () => { try { return sessionStorage.getItem('qah_auth_token') || ''; } catch { return ''; } };
const setAuthToken = (t) => { try { if (t) sessionStorage.setItem('qah_auth_token', t); else sessionStorage.removeItem('qah_auth_token'); } catch {} };

// ─── CROSS-TAB SESSION SHARING (BroadcastChannel) ────────────────────────────
// [FIX NEW-TAB] ปัญหา: sessionStorage ไม่แชร์ข้าม tab → tab ใหม่ไม่มี token → ต้อง login ใหม่
// วิธีแก้: ใช้ BroadcastChannel ให้ tab ใหม่ขอ token จาก tab ที่ login อยู่แล้ว
// Security: token ไม่ถูกเก็บใน localStorage (ยังคงปลอดภัย) — ส่งผ่าน memory channel เท่านั้น
(function initCrossTabSession() {
  try {
    if (typeof BroadcastChannel === 'undefined') return; // browser ไม่รองรับ → ข้าม
    const ch = new BroadcastChannel('qah_session_sync');

    // ── ถ้า tab นี้ยังไม่มี token → ขอจาก tab อื่น ──
    if (!sessionStorage.getItem('qah_auth_token')) {
      // ส่งคำขอ
      ch.postMessage({ type: 'REQUEST_SESSION' });
      // รับ token ที่ tab อื่นตอบกลับ (รับแค่ครั้งแรก)
      const onMsg = (ev) => {
        if (ev.data && ev.data.type === 'SESSION_RESPONSE' && ev.data.token) {
          if (!sessionStorage.getItem('qah_auth_token')) {
            sessionStorage.setItem('qah_auth_token', ev.data.token);
            if (ev.data.issuedAt)    sessionStorage.setItem('qah_issued_at',     ev.data.issuedAt);
            if (ev.data.lastActivity)sessionStorage.setItem('qah_last_activity', ev.data.lastActivity);
            // user/team (display-only, non-secret) เก็บใน localStorage อยู่แล้ว → ไม่ต้องส่งเพิ่ม
          }
          ch.removeEventListener('message', onMsg);
        }
      };
      ch.addEventListener('message', onMsg);
      // หยุดรอหลัง 3 วินาที (ถ้าไม่มี tab อื่นตอบ)
      setTimeout(() => ch.removeEventListener('message', onMsg), 3000);
    }

    // ── ทุก tab รับฟัง REQUEST_SESSION และตอบกลับถ้ามี token ──
    ch.addEventListener('message', (ev) => {
      if (ev.data && ev.data.type === 'REQUEST_SESSION') {
        const tok = sessionStorage.getItem('qah_auth_token');
        if (tok) {
          ch.postMessage({
            type:         'SESSION_RESPONSE',
            token:        tok,
            issuedAt:     sessionStorage.getItem('qah_issued_at')     || '',
            lastActivity: sessionStorage.getItem('qah_last_activity') || '',
          });
        }
      }
      // ── sync logout ข้าม tab ──
      if (ev.data && ev.data.type === 'LOGOUT') {
        sessionStorage.removeItem('qah_auth_token');
        sessionStorage.removeItem('qah_issued_at');
        sessionStorage.removeItem('qah_last_activity');
        sessionStorage.removeItem('qah_session_user');
        sessionStorage.removeItem('qah_session_team');
        sessionStorage.removeItem('qah_is_admin');
        // reload ไปหน้า login
        window.location.reload();
      }
    });

    // expose channel เพื่อให้ logout handler ใช้ broadcast ได้
    window._qahBroadcast = ch;
  } catch(e) { /* BroadcastChannel อาจถูก block ใน iframe sandbox */ }
})();

// ─── SESSION TIMEOUT: IDLE 2h + ABSOLUTE 12h ─────────────────────────────────
// [SECURITY] ป้องกัน session ค้าง:
//   • IDLE_TIMEOUT_MS   = 2 ชั่วโมง (default, Admin ปรับได้)
//   • ABS_TIMEOUT_MS    = 12 ชั่วโมง (default, Admin ปรับได้)
// [v23] Admin สามารถปรับ timeout ได้จาก Settings → System

// อ่านค่าจาก localStorage (ที่ Admin บันทึกไว้) หรือใช้ default
function getIdleTimeoutMs()  { try { var v = localStorage.getItem('qah_idle_timeout_min');  return v ? parseInt(v,10)*60*1000 : 2*60*60*1000; } catch { return 2*60*60*1000; } }
function getAbsTimeoutMs()   { try { var v = localStorage.getItem('qah_abs_timeout_hours'); return v ? parseInt(v,10)*60*60*1000 : 12*60*60*1000; } catch { return 12*60*60*1000; } }

// backward-compat constants (used in checkSessionTimeout)
var IDLE_TIMEOUT_MS = 2 * 60 * 60 * 1000;   // ค่า default fallback
var ABS_TIMEOUT_MS  = 12 * 60 * 60 * 1000;  // ค่า default fallback

const getLastActivity  = () => { try { return parseInt(sessionStorage.getItem('qah_last_activity')  || '0', 10); } catch { return 0; } };
const setLastActivity  = ()  => { try { sessionStorage.setItem('qah_last_activity',  Date.now()); } catch {} };
const getSessionIssuedAt = () => { try { return parseInt(sessionStorage.getItem('qah_issued_at') || '0', 10); } catch { return 0; } };
const setSessionIssuedAt = (ts) => { try { sessionStorage.setItem('qah_issued_at', ts || Date.now()); } catch {} };
const clearSessionIssuedAt = () => { try { sessionStorage.removeItem('qah_issued_at'); sessionStorage.removeItem('qah_last_activity'); } catch {} };

// เรียกเพื่อตรวจ timeout — return 'idle' | 'absolute' | null
function checkSessionTimeout() {
  if (!getAuthToken()) return null;
  const _now = Date.now();
  const issuedAt = getSessionIssuedAt();
  const lastAct  = getLastActivity();
  const idleMs = getIdleTimeoutMs();
  const absMs  = getAbsTimeoutMs();
  if (issuedAt && (_now - issuedAt) >= absMs)  return 'absolute';
  if (lastAct  && (_now - lastAct)  >= idleMs) return 'idle';
  return null;
}

// helper ล้าง session ทั้งหมด (ใช้จาก timeout handler)
// [FIX NEW-TAB] broadcast LOGOUT ไปยัง tab อื่นด้วย
function clearAllSession(opts) {
  var broadcastLogout = opts && opts.broadcastLogout;
  setAuthToken(null);
  clearSessionIssuedAt();
  try {
    sessionStorage.removeItem('qah_session_user');
    sessionStorage.removeItem('qah_session_team');
    sessionStorage.removeItem('qah_is_admin');
  } catch {}
  if (broadcastLogout && window._qahBroadcast) {
    try { window._qahBroadcast.postMessage({ type: 'LOGOUT' }); } catch {}
  }
}

// [FIX VULN-01] ลบ ENCRYPT_KEY ออกจาก client ทั้งหมดแล้ว
// การ encrypt/decrypt ทำบน GAS ฝั่งเดียว Browser รับข้อมูล plain text จาก GAS โดยตรง

// ─── FILE ATTACHMENT HELPERS ──────────────────────────────────────────────────
// ปัญหา: ไฟล์แนบถูกเก็บเป็น base64 dataURL ขนาดใหญ่ใน field `data`
// เมื่อรวมใน testCase/defect แล้วส่งผ่าน GET URL จะใหญ่เกิน URL limit ของ GAS (~8KB)
// วิธีแก้: strip field `data` ออกก่อนส่งไป Sheet เก็บแค่ metadata
//          dataURL เก็บใน localStorage แยกเพื่อให้ download ได้

const FILE_CACHE_KEY = 'qah_file_cache';

// บันทึก dataURL ลง localStorage โดยใช้ file id เป็น key
function cacheFileData(fileId, dataUrl) {
  try {
    const cache = JSON.parse(localStorage.getItem(FILE_CACHE_KEY) || '{}');
    cache[fileId] = dataUrl;
    localStorage.setItem(FILE_CACHE_KEY, JSON.stringify(cache));
  } catch(e) { console.warn('[QAHUBs] cacheFileData failed:', e.message); }
}

// ดึง dataURL จาก localStorage ตาม id
function getCachedFileData(fileId) {
  try {
    const cache = JSON.parse(localStorage.getItem(FILE_CACHE_KEY) || '{}');
    return cache[fileId] || null;
  } catch(e) { return null; }
}

// ลบ dataURL ที่ไม่ใช้แล้วออกจาก cache (pass ชุด fileIds ที่ยังคงอยู่)
function pruneFileCache(keepIds) {
  try {
    const cache = JSON.parse(localStorage.getItem(FILE_CACHE_KEY) || '{}');
    const pruned = {};
    keepIds.forEach(id => { if (cache[id]) pruned[id] = cache[id]; });
    localStorage.setItem(FILE_CACHE_KEY, JSON.stringify(pruned));
  } catch(e) {}
}

// Strip binary data ออกจาก file objects ใน testCase/defect ก่อนส่ง Sheet
// เก็บแค่ metadata: id, name, size, type (ไม่มี data field)
function stripFilesForSheet(obj) {
  if (!obj || typeof obj !== 'object') return obj;
  const stripped = { ...obj };

  // strip files ระดับ top-level
  if (Array.isArray(stripped.files)) {
    stripped.files = stripped.files.map(f => {
      const { data, ...meta } = f; // eslint-disable-line no-unused-vars
      return meta;
    });
  }

  // strip files ใน steps[]
  if (Array.isArray(stripped.steps)) {
    stripped.steps = stripped.steps.map(s => {
      if (!Array.isArray(s.files)) return s;
      return { ...s, files: s.files.map(f => {
        const { data, ...meta } = f; // eslint-disable-line no-unused-vars
        return meta;
      })};
    });
  }
  return stripped;
}

// ─── API CLIENT ───────────────────────────────────────────────────────────────
// [FIX VULN-02] แนบ token ทุก request  |  [FIX VULN-01] ลบ encrypt/decrypt ฝั่ง client

const SHEETS_VALID = new Set(['users','teams','members','projects','tasks','testCases','defects','logs','loginLogs','pending','plans','orders','teamTokens']);

const api = {
  // [FIX VULN-02][FIX HIGH-1] GET — token ส่งใน encoded payload (ไม่ใช่ URL query string)
  // เดิมส่ง token ใน ?token=xxx → ถูกบันทึกใน GAS execution log + browser history
  // ใหม่: encode { action, sheet, token } เป็น base64 แล้วส่งเป็น ?payload=xxx
  async getAll(sheet) {
    if (!SHEETS_VALID.has(sheet)) throw new Error(`getAll: invalid sheet "${sheet}"`);
    const token = getAuthToken();
    const payloadObj = { action: 'getAll', sheet, token };
    const jsonStr = JSON.stringify(payloadObj);
    const bytes = new TextEncoder().encode(jsonStr);
    let _bin = ''; for (let i = 0; i < bytes.length; i++) _bin += String.fromCharCode(bytes[i]);
    const b64 = btoa(_bin);
    const url = `${GAS_URL}?payload=${encodeURIComponent(b64)}&t=${Date.now()}`;
    const res = await fetch(url, { redirect: 'follow' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    if (json.ok === false) {
      if (json.error && (json.error.includes('Unauthorized') || json.error.includes('session'))) {
        // Token expired — clear session and redirect to login
        setAuthToken(null);
        setSession('qah_session_user', null);
        setSession('qah_session_team', null);
        window.location.reload();
      }
      throw new Error(json.error);
    }
    // [FIX VULN-01][FIX VULN-11] ข้อมูลจาก GAS เป็น plain text แล้ว ไม่ต้อง decrypt
    return json.data || [];
  },

  // [FIX VULN-02] Write — แนบ token ทุก write request
  async _write(payload) {
    // Validate sheet key ถ้ามี
    if (payload.sheet && !SHEETS_VALID.has(payload.sheet)) {
      const publicActions = ['sendVerifyCode','verifyCode','login','register'];
      if (publicActions.indexOf(payload.action) === -1) {
        throw new Error(`_write: invalid sheet "${payload.sheet}" (action=${payload.action})`);
      }
    }
    // [FIX VULN-01] ไม่ encrypt ฝั่ง client — GAS จัดการทั้งหมด
    // [FIX VULN-02] แนบ token (ยกเว้น public actions)
    // [FIX CRITICAL-1] เพิ่ม 'resetPassword' เป็น public action — ไม่ต้องแนบ session token
    const publicWriteActions = ['sendVerifyCode','verifyCode','login','register','resetPassword'];
    const sendPayload = { ...payload };
    if (publicWriteActions.indexOf(payload.action) === -1) {
      sendPayload.token = getAuthToken();
    }
    // Strip file binary data เพื่อป้องกัน payload ใหญ่เกิน URL limit
    if (sendPayload.data && typeof sendPayload.data === 'object' && !Array.isArray(sendPayload.data)) {
      sendPayload.data = stripFilesForSheet(sendPayload.data);
    }
    if (Array.isArray(sendPayload.data)) {
      sendPayload.data = sendPayload.data.map(item => stripFilesForSheet(item));
    }
    const jsonStr = JSON.stringify(sendPayload);
    const bytes   = new TextEncoder().encode(jsonStr);
    let _bin = ''; for (let i = 0; i < bytes.length; i++) _bin += String.fromCharCode(bytes[i]);
    const b64 = btoa(_bin);
    // [FIX] ถ้า payload ใหญ่เกิน ~6KB (เช่น มีรูปสลีป) ให้ใช้ POST แทน GET
    // เพราะ GAS GET URL มีขีดจำกัด และ ERR_CONNECTION_RESET เมื่อ URL ยาวเกิน
    let res;
    if (b64.length > 6000) {
      res = await fetch(GAS_URL, {
        method: 'POST',
        redirect: 'follow',
        headers: { 'Content-Type': 'text/plain' },
        body: b64,
      });
    } else {
      const url = `${GAS_URL}?payload=${encodeURIComponent(b64)}&t=${Date.now()}`;
      res = await fetch(url, { redirect: 'follow' });
    }
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    if (json.ok === false) {
      if (json.error && (json.error.includes('Unauthorized') || json.error.includes('session'))) {
        setAuthToken(null);
        setSession('qah_session_user', null);
        setSession('qah_session_team', null);
        window.location.reload();
      }
      throw new Error(json.error);
    }
    return json.data;
  },

  insert(sheet, data)     { return this._write({ action:'insert',     sheet, data }); },
  update(sheet, data)     { return this._write({ action:'update',     sheet, id:data.id, data }); },
  // [FIX-TEAMID] ส่ง teamId ไปด้วยเสมอสำหรับ delete — GAS ต้องการ teamId เพื่อ verify permissions
  delete(sheet, id, teamId) { return this._write({ action:'delete', sheet, id, ...(teamId ? { teamId } : {}) }); },
  bulkInsert(sheet, data) { return this._write({ action:'bulkInsert', sheet, data }); },
  write(payload)          { return this._write(payload); },
  // [FIX-INVITE] ค้นหาทีมจาก invite code — query GAS โดยตรง (ไม่ใช้ local state ที่กรองเฉพาะทีมของตัวเอง)
  lookupTeamByCode(inviteCode) { return this._write({ action:'lookupTeamByCode', inviteCode }); },

  // [v23-PLAN] Plan & Token API
  selectPlan(teamId, plan, adminEmail, adminName, teamName) {
    return this._write({ action:'selectPlan', teamId, plan, adminEmail, adminName, teamName });
  },
  getMyPlan(teamId)  { return this._write({ action:'getMyPlan',  teamId }); },
  upgradePlan(teamId, adminEmail, adminName, teamName) {
    return this._write({ action:'upgradePlan', teamId, adminEmail, adminName, teamName });
  },
  getDevOrders(filterStatus) { return this._write({ action:'getDevOrders', filterStatus: filterStatus||'' }); },
  approveOrder(orderId, note) { return this._write({ action:'approveOrder', orderId, note: note||'' }); },
  rejectOrder(orderId, note)  { return this._write({ action:'rejectOrder',  orderId, note: note||'' }); },
  resendToken(teamId)         { return this._write({ action:'resendToken',  teamId }); },
  saveSystemToken(teamId, authToken, adminEmail) { return this._write({ action:'saveSystemToken', teamId, authToken, adminEmail: adminEmail||'' }); },
  // [v26] ส่งสลีปการชำระเงิน — base64 encoded image
  submitSlip(teamId, teamName, adminEmail, adminName, slipFileName, slipBase64, slipType) {
    return this._write({ action:'submitSlip', teamId, teamName, adminEmail, adminName, slipFileName, slipBase64, slipType });
  },
  // [v25] Dev Settings API
  getPublicDevSettings() { return this._write({ action:'getPublicDevSettings' }); },
  getDevSettings()       { return this.rawWrite({ action:'getDevSettings',       token:getAuthToken() }); },
  saveDevSettings(settings) { return this.rawWrite({ action:'saveDevSettings',   token:getAuthToken(), ...settings }); },

  // rawWrite — สำหรับ sendVerifyCode / verifyCode / login / register (ไม่ต้อง token)
  // ✅ กลับมาใช้ GET เหมือนเดิม
  async rawWrite(payload) {
    const jsonStr = JSON.stringify(payload);
    const bytes   = new TextEncoder().encode(jsonStr);
    let _bin = ''; for (let i = 0; i < bytes.length; i++) _bin += String.fromCharCode(bytes[i]);
    const b64 = btoa(_bin);
    const url = `${GAS_URL}?payload=${encodeURIComponent(b64)}&t=${Date.now()}`;
    const res = await fetch(url, { redirect: 'follow' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  },
};

// ─── LOCAL SESSION (เก็บเฉพาะ session ไม่เอา data) ────────────────────────────
const getSession = (k, def) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : def; } catch { return def; } };
const setSession = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };

// ─── INITIAL DATA ─────────────────────────────────────────────────────────────
// [FIX VULN-04] DEFAULT_USERS กับ plain-text password ถูกลบออกแล้ว
// การสร้าง user ต้องผ่าน register flow (OTP verify) เท่านั้น
// GAS จะ hash password ก่อนบันทึกลง Sheet เสมอ

// ─── TOAST ────────────────────────────────────────────────────────────────────
let toastFn = null;
function Toast({ msg, type, duration=3000, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, duration); return () => clearTimeout(t); }, []);
  return h('div', { className: `toast toast-${type}` }, msg);
}

// ─── LOADING DOTS ─────────────────────────────────────────────────────────────
function LoadingDots({ small = false }) {
  const [dots, setDots] = useState('');
  useEffect(() => {
    const t = setInterval(() => setDots(d => d.length >= 10 ? '' : d + '.'), 200);
    return () => clearInterval(t);
  }, []);
  if (small) return h('span', { style:{color:'var(--text3)',fontFamily:'var(--mono)',fontSize:'12px',letterSpacing:'1px'} }, 'Loading' + dots);
  return h('div', { style:{color:'var(--text3)',fontSize:'15px',fontFamily:'var(--mono)',letterSpacing:'1px',minWidth:'160px'} }, 'Loading' + dots);
}

// ── SORT TABLE HEADER HELPER ──
function SortTh({ label, field, sortField, sortDir, onSort, style }) {
  const active = sortField === field;
  const icon = active ? (sortDir === 'asc' ? 'arrow_upward' : 'arrow_downward') : 'unfold_more';
  return h('th', {
    className: `th-sort${active ? ' active' : ''}`,
    style,
    onClick: () => onSort(field)
  },
    label,
    h('span', { className: 'th-sort-icon' },
      h('span', { className: 'ms ms-xs' }, icon)
    )
  );
}

// ── GLOBAL LOADING OVERLAY ──
function GlobalLoadingOverlay({ visible, text }) {
  if (!visible) return null;
  return ReactDOM.createPortal(
    h('div', { className:'global-loading-overlay' },
      h('div', { className:'global-loading-box' },
        h('div', { className:'global-loading-spinner' }),
        h('div', { className:'global-loading-text' }, text || 'กำลังโหลดข้อมูล...')
      )
    ),
    document.getElementById('modal-root')
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [users, setUsersState] = useState([]);
  const [teams, setTeamsState] = useState([]);
  const [members, setMembersState] = useState([]);
  const [projects, setProjectsState] = useState([]);
  const [tasks, setTasksState] = useState([]);
  const [testCases, setTestCasesState] = useState([]);
  const [defects, setDefectsState] = useState([]);
  const [logs, setLogsState] = useState([]);
  const [loginLogs, setLoginLogsState] = useState([]);
  const [pendingMembers, setPendingMembersState] = useState([]);
  const [plans, setPlansState] = useState([]);
  const [loading, setLoading] = useState(true);       // initial full-page load
  const [navLoading, setNavLoading] = useState(false); // [v23] overlay during navigate/refresh
  const [syncErr, setSyncErr] = useState(null);

  // [v20.1] ติดตาม member ops ที่ยังรอ GAS ยืนยัน (ป้องกัน polling overwrite)
  // format: { [memberId]: { type:'delete'|'inactive', ts: timestamp } }
  const pendingMemberOpsRef = useRef({});

  // [FIX-STATUS-FLASH] ติดตาม status update ล่าสุดของ TC/Defect
  // เพื่อป้องกัน realtime polling overwrite ระหว่างรอ GAS commit (~15 วินาที)
  // format: { [id]: { status: string, ts: timestamp } }
  const pendingTcStatusRef  = useRef({});
  const pendingDefStatusRef = useRef({});

  // [FIX] token อยู่ใน sessionStorage (หายเมื่อ reload) — ถ้าไม่มี token อย่า restore user/team
  // [FIX NEW-TAB] BroadcastChannel อาจส่ง token มาหลัง init เล็กน้อย
  //   → ใช้ tokenReady state เพื่อรอก่อนตัดสินใจ page
  const [tokenReady, setTokenReady] = useState(() => !!getAuthToken());
  const [currentUser, setCurrentUserState] = useState(() => getAuthToken() ? getSession('qah_session_user', null) : null);
  const [currentTeam, setCurrentTeamState] = useState(() => getAuthToken() ? getSession('qah_session_team', null) : null);
  const [page, setPage] = useState(() => {
    // [FIX] sessionStorage token หายเมื่อ reload → ถ้าไม่มี token ต้อง login ใหม่เสมอ
    if (!getAuthToken()) return 'login';
    const u = getSession('qah_session_user', null);
    const t = getSession('qah_session_team', null);
    if (u && t) return 'dashboard';
    if (u) return 'team-select';
    return 'login';
  });

  // [FIX NEW-TAB] รับ token จาก tab อื่นผ่าน BroadcastChannel แล้ว re-init session
  useEffect(() => {
    if (tokenReady) return; // มี token อยู่แล้ว ไม่ต้องรอ
    if (typeof BroadcastChannel === 'undefined') { setTokenReady(true); return; }
    // รอ token สูงสุด 1.5 วินาที (ถ้าไม่มี tab อื่นตอบ)
    const timer = setTimeout(() => { setTokenReady(true); }, 1500);
    const ch = window._qahBroadcast;
    if (!ch) { clearTimeout(timer); setTokenReady(true); return; }
    const onMsg = (ev) => {
      if (ev.data && ev.data.type === 'SESSION_RESPONSE' && ev.data.token) {
        clearTimeout(timer);
        // token ถูก set ใน sessionStorage โดย initCrossTabSession แล้ว
        // ต้อง re-read แล้ว update React state
        const tok = getAuthToken();
        if (tok) {
          const u = getSession('qah_session_user', null);
          const t = getSession('qah_session_team', null);
          if (u) setCurrentUserState(u);
          if (t) setCurrentTeamState(t);
          if (u && t) setPage('dashboard');
          else if (u) setPage('team-select');
        }
        setTokenReady(true);
        ch.removeEventListener('message', onMsg);
      }
    };
    ch.addEventListener('message', onMsg);
    return () => { clearTimeout(timer); ch.removeEventListener('message', onMsg); };
  }, []); // eslint-disable-line react-hooks/exhaustive-deps
  const [inviteWaitingTeam, setInviteWaitingTeam] = useState(null);
  const [navCtx, setNavCtx] = useState({ projectId: null, taskId: null });
  // [NEW v13] เก็บ deep-link hash ไว้รอจนกว่า data+session จะพร้อม (tab ใหม่)
  // ใช้ sessionStorage เพื่อให้รอดผ่าน login flow ได้
  const [pendingDeepLink, setPendingDeepLink] = useState(() => {
    const h = window.location.hash;
    if (h && h.length > 4 && /^#(tc|def)=.+/.test(h)) {
      history.replaceState(null, '', window.location.pathname + window.location.search);
      const raw = h.slice(1);
      sessionStorage.setItem('qah_pending_deeplink', raw);
      return raw;
    }
    // fallback: ดึงจาก sessionStorage ถ้ายังมีค้างอยู่ (จาก login redirect)
    return sessionStorage.getItem('qah_pending_deeplink') || null;
  });
  const [toasts, setToasts] = useState([]);
  const removeToast = useCallback((id) => setToasts(p => p.filter(t => t.id !== id)), []);
  // legacy: compat for setToast used in makeSet error handler
  const [toast, _setToast] = useState(null);
  const setToast = useCallback((t) => {
    if (!t) return;
    setToasts(p => [...p, { ...t, id: t.id || uid() }]);
  }, []);

  // ── Load all data from Google Sheets on startup ──
  // [FIX NEW-TAB] รอ tokenReady ก่อน (BroadcastChannel อาจส่ง token มาช้า ~1.5s)
  useEffect(() => {
    if (!tokenReady) return; // ยังรอ token จาก tab อื่น → ยังไม่ fetch
    const token = getAuthToken();

    // [FIX MEDIUM-3] ถ้าไม่มี GAS_URL — ระบบยังไม่พร้อมใช้งาน
    if (!GAS_URL) {
      setSyncErr('GAS_URL ยังไม่ได้ตั้งค่า — แก้ไขค่า const GAS_URL ในไฟล์ให้ชี้ไปยัง Google Apps Script Web App URL');
      setLoading(false);
      return;
    }

    // [FIX] token อยู่ใน sessionStorage — ถ้าไม่มีให้ clear localStorage session แล้วไป login
    if (!token) {
      setCurrentUserState(null); setSession('qah_session_user', null);
      setCurrentTeamState(null); setSession('qah_session_team', null);
      setLoading(false);
      return;
    }

    Promise.all([
      api.getAll('users'),
      api.getAll('teams'),
      api.getAll('members'),
      api.getAll('projects'),
      api.getAll('tasks'),
      api.getAll('testCases'),
      api.getAll('defects'),
      api.getAll('logs'),
      api.getAll('loginLogs'),
      api.getAll('pending'),
      api.getAll('plans'),
    ]).then(([u,te,m,p,ta,tc,d,l,ll,pm,pl]) => {
      // [FIX VULN-04] ไม่ seed DEFAULT_USERS อีกต่อไป — user ต้องสมัครผ่าน register flow
      setUsersState(u);
      setTeamsState(te);
      setMembersState(m);
      setProjectsState(p);
      setTasksState(ta);
      setTestCasesState(tc);
      setDefectsState(d);
      setLogsState(l);
      setLoginLogsState(ll);
      setPendingMembersState(pm);
      setPlansState(pl || []);
      setLoading(false);
    }).catch(e => {
      // [FIX MEDIUM-3] ไม่ fallback เป็น localStorage อัตโนมัติ — แสดง error ให้ user refresh เอง
      // (ป้องกันการใช้ข้อมูลเก่าที่อาจไม่ตรงกับ server + bypass auth)
      setSyncErr(e.message);
      setLoading(false);
      // ล้าง state ทั้งหมดเพื่อป้องกันแสดงข้อมูลเก่าจาก session ก่อน
      setUsersState([]);
      setTeamsState([]);
      setMembersState([]);
      setProjectsState([]);
      setTasksState([]);
      setTestCasesState([]);
      setDefectsState([]);
      setLogsState([]);
      setLoginLogsState([]);
      setPendingMembersState([]);
    });
  }, [tokenReady]); // [FIX NEW-TAB] re-run เมื่อ tokenReady เปลี่ยน

  // ── Sync status indicator ──
  const [syncing, setSyncing] = useState(false);
  const syncTimerRef = useRef(null);
  const showSync = () => {
    setSyncing(true);
    clearTimeout(syncTimerRef.current);
    syncTimerRef.current = setTimeout(() => setSyncing(false), 2000);
  };

  const USE_GAS = !!GAS_URL;
  const USE_GAS_REF = useRef(USE_GAS);
  useEffect(() => { USE_GAS_REF.current = USE_GAS; }, [USE_GAS]);

  // ── localStorage keymap (fallback) ──
  const LS_KEY = { users:'qah_users', teams:'qah_teams', members:'qah_members',
    projects:'qah_projects', tasks:'qah_tasks', testCases:'qah_tcs',
    defects:'qah_defects', logs:'qah_logs', loginLogs:'qah_login_logs', pending:'qah_pending_members' };

  // ── Core sync: diff old vs new, push only changes ──
  // [FIX v13] ใช้ stableStringify เพื่อ sort keys ก่อนเปรียบเทียบ — ป้องกัน false-negative จาก key order ต่างกัน
  const stableStr = (obj) => {
    // [FIX v13] normalize null/undefined/empty-string ให้เป็นค่าเดียวกัน
    // เพื่อป้องกัน false-negative update เมื่อ GAS return null แต่ client set ''
    if (obj === null || obj === undefined || obj === '') return '__EMPTY__';
    if (Array.isArray(obj)) return '[' + obj.map(stableStr).join(',') + ']';
    if (typeof obj === 'object') {
      return '{' + Object.keys(obj).sort().map(k => JSON.stringify(k) + ':' + stableStr(obj[k])).join(',') + '}';
    }
    return JSON.stringify(obj);
  };

  const syncSheet = useCallback((sheet, newData, oldData) => {
    if (!USE_GAS_REF.current) {
      setSession(LS_KEY[sheet] || sheet, newData);
      return;
    }
    showSync();
    const oldMap = Object.fromEntries((oldData||[]).map(o => [o.id, o]));
    const newMap = Object.fromEntries(newData.map(o => [o.id, o]));

    const onErr = (action, id, e) => {
      // [v23-PLAN] Intercept plan limit errors → show upgrade modal
      if (e.message && e.message.startsWith('PLAN_LIMIT_')) {
        showPlanLimitModal(e.message);
        return;
      }
      console.error(`[QAHUBs] ${action} ${sheet}#${id} failed:`, e.message);
      setToast({ msg: `Sync ล้มเหลว (${action} ${sheet}): ${e.message}`, type:'error', id: uid() });
    };

    // [FIX-SD] ไม่ sync item ที่ isDeleted=true ผ่าน INSERT/UPDATE (ถูกจัดการโดย api.delete โดยตรงแล้ว)
    const SOFT_DEL_SHEETS = ['projects','tasks','testCases','defects'];
    const isSoftDelSheet = SOFT_DEL_SHEETS.indexOf(sheet) !== -1;

    // [v20.1] members ใช้ status-based soft-delete — ไม่ส่ง api.delete เมื่อหาย
    // แต่ส่ง api.update เมื่อ status เปลี่ยน, และ api.delete เมื่อลบจริง (จัดการโดย removeMember โดยตรง)
    const isMemberSheet = sheet === 'members';

    // INSERT new rows
    newData.forEach(item => {
      if (isSoftDelSheet && (item.isDeleted === true || item.isDeleted === 'true')) return;
      if (!oldMap[item.id]) {
        api.insert(sheet, item).catch(e => onErr('insert', item.id, e));
      }
    });
    // UPDATE changed rows
    newData.forEach(item => {
      if (isSoftDelSheet && (item.isDeleted === true || item.isDeleted === 'true')) return;
      if (oldMap[item.id] && stableStr(oldMap[item.id]) !== stableStr(item)) {
        api.update(sheet, item).catch(e => onErr('update', item.id, e));
      }
    });
    // DELETE removed rows
    // [v20.1] members: ไม่ใช้ syncSheet delete — removeMember จัดการโดยตรงเพื่อป้องกัน race condition
    if (!isMemberSheet) {
      (oldData||[]).forEach(item => {
        if (!newMap[item.id]) {
          api.delete(sheet, item.id).catch(e => onErr('delete', item.id, e));
        }
      });
    }
  }, []);

  // ── Wrapped setters: update React state + auto-sync to Sheets ──
  const makeSet = (stateSetter, sheet) => (fn) => {
    stateSetter(prev => {
      const next = typeof fn === 'function' ? fn(prev) : fn;
      syncSheet(sheet, next, prev);
      return next;
    });
  };

  const setUsers        = makeSet(setUsersState,        'users');
  const setTeams        = makeSet(setTeamsState,        'teams');
  const setMembers      = makeSet(setMembersState,      'members');
  const setProjects     = makeSet(setProjectsState,     'projects');
  const setTasks        = makeSet(setTasksState,        'tasks');
  const setTestCases    = makeSet(setTestCasesState,    'testCases');
  const setDefects      = makeSet(setDefectsState,      'defects');
  const setLogs         = makeSet(setLogsState,         'logs');
  const setLoginLogs    = makeSet(setLoginLogsState,    'loginLogs');
  const setPlans        = makeSet(setPlansState,        'plans');
  // setPendingMembers: dedup by (teamId+userId) ก่อนบันทึกเสมอ — ป้องกัน duplicate ทุกกรณี
  // FIX v7: ใช้ api.insert/update/delete ตรงๆ แทน syncSheet diff เพื่อป้องกัน race condition
  const setPendingMembers = (fn) => {
    setPendingMembersState(prev => {
      const next = typeof fn === 'function' ? fn(prev) : fn;
      // Dedup: ถ้า teamId+userId ซ้ำ ให้เอา record ที่ requestedAt ใหม่กว่า
      const dedupMap = {};
      next.forEach(p => {
        const key = p.teamId + '|' + p.userId;
        if (!dedupMap[key] || String(p.requestedAt) > String(dedupMap[key].requestedAt)) {
          dedupMap[key] = p;
        }
      });
      const deduped = Object.values(dedupMap);

      // ── Direct API sync (ไม่ใช้ diff เพื่อป้องกัน bug React updater closure) ──
      if (USE_GAS_REF.current) {
        const prevMap = Object.fromEntries((prev || []).map(o => [o.id, o]));
        const nextMap = Object.fromEntries(deduped.map(o => [o.id, o]));

        // INSERT rows ใหม่ที่ไม่เคยมีใน prev
        deduped.forEach(item => {
          if (!prevMap[item.id]) {
            api.insert('pending', item).catch(e =>
              console.error('[QAHUBs] insert pending failed:', e.message)
            );
          }
        });

  // สร้าง AudioContext เพื่อเล่นเสียง beep โดยไม่ต้องใช้ไฟล์เสียงภายนอก
  const playJoinRequestSound = useCallback(() => {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      // เล่นเสียง 2 note สั้นๆ (notification chime)
      const notes = [880, 1100];
      notes.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.18);
        gain.gain.setValueAtTime(0, ctx.currentTime + i * 0.18);
        gain.gain.linearRampToValueAtTime(0.25, ctx.currentTime + i * 0.18 + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.18 + 0.22);
        osc.start(ctx.currentTime + i * 0.18);
        osc.stop(ctx.currentTime + i * 0.18 + 0.25);
      });
      // ปิด context หลังเสียงหมด
      setTimeout(() => { try { ctx.close(); } catch(e) {} }, 800);
    } catch(e) { /* ไม่รองรับ AudioContext — ข้าม */ }
  }, []);

  useEffect(() => {

  // เมื่อ User A บันทึก/อัพเดทข้อมูล User B/C จะเห็นการเปลี่ยนแปลงอัตโนมัติ
  // พร้อม toast แจ้งเตือนสั้นๆ โดยไม่รบกวนการทำงาน

        // → ถ้า pendingMemberOpsRef มี op สำหรับ member นั้นอยู่ ให้ apply local state ไว้ก่อน
        setMembersState(prev => {

          Object.keys(ops).forEach(id => { if (now - ops[id].ts > 30000) delete ops[id]; });

          const merged = freshMembers.filter(m => {

  const teamTCs = useMemo(() => testCases.filter(tc => !tc.isDeleted && tc.isDeleted !== 'true' && teamTasks.some(t => t.id === tc.taskId)), [testCases, teamTasks]);
  const teamDefects = useMemo(() => defects.filter(d => {
    if (d.isDeleted || d.isDeleted === 'true') return false;
    // [v21-FIX] filter strict ตาม teamId เท่านั้น (เหมือน testCases/tasks)
    // ป้องกัน user ที่อยู่หลายทีมเห็น defect ข้ามทีม
    return d.teamId === currentTeam?.id;
  }), [defects, currentTeam]);
  const teamPlans = useMemo(() => (plans||[]).filter(p => p.teamId === currentTeam?.id && !p.isDeleted && p.isDeleted !== 'true').sort((a,b) => (Number(a.order)||0) - (Number(b.order)||0)), [plans, currentTeam]);

  const [defectModalCtx, setDefectModalCtx] = useState(null);
  const openDefectModal = (editDef, initialTcId, allTCs) => setDefectModalCtx({ editDef, initialTcId, allTCs, _key: editDef ? editDef.id : 'new-defect-'+uid() });
  const closeDefectModal = () => setDefectModalCtx(null);

  const [theme, setTheme] = useState(() => localStorage.getItem('qah_theme') || 'dark');
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('qah_theme', theme);
  }, [theme]);

  // [v23-PLAN] Super Admin detection (email-based, loaded from session)
  const isSuperAdminUser = useMemo(() => {
    if (!currentUser) return false;
    const superEmails = (window.__QAH_SUPER_ADMINS__ || '').split(',').map(e => e.trim().toLowerCase()).filter(Boolean);
    return superEmails.includes((currentUser.email||'').toLowerCase());
  }, [currentUser]);

  // [v23-PLAN] Plan Limit Modal state
  const [planLimitType, setPlanLimitType] = useState(null); // e.g. 'PLAN_LIMIT_PROJECTS'
  const showPlanLimitModal = (errMsg) => {
    const m = String(errMsg||'').match(/PLAN_LIMIT_(\w+)/);
    setPlanLimitType(m ? m[0] : 'PLAN_LIMIT_ITEM');
  };

  // [v24] Super Admin auto Unlimited Plan on login — no need to upgrade
  const [teamPlanData, setTeamPlanData] = useState(null);
  useEffect(() => {
    if (!currentTeam || !currentUser) { setTeamPlanData(null); return; }
    if (isSuperAdminUser) {
      // Super Admin gets unlimited plan automatically
      setTeamPlanData({ plan: 'unlimited', status: 'active' });
      return;
    }
    (async () => {
      try {
        const data = await api.getMyPlan(currentTeam.id);
        setTeamPlanData(data || { plan: 'free', status: 'active' });
      } catch(e) { setTeamPlanData({ plan: 'free', status: 'active' }); }
    })();
  }, [currentTeam?.id, isSuperAdminUser]); // eslint-disable-line

  // Derived plan info
  const currentPlan = isSuperAdminUser ? 'unlimited' : (teamPlanData?.plan || 'free');
  const isFreePlan = currentPlan === 'free';
  const isUnlimitedPlan = currentPlan === 'unlimited' || currentPlan === 'paid' || isSuperAdminUser;

  // Free plan limits
  const FREE_LIMITS = { teams: 1, projects: 1, tasks: 2, testCases: 30, defects: 10 };

  // [v23-PLAN] Trial warning — check on every team switch
  const [trialDaysLeft, setTrialDaysLeft] = useState(null);
  useEffect(() => {
    if (!currentTeam || !currentUser) { setTrialDaysLeft(null); return; }
    if (isSuperAdminUser) { setTrialDaysLeft(null); return; }
    (async () => {
      try {
        const data = await api.getMyPlan(currentTeam.id);
        if (data?.plan === 'paid_trial' && data?.trialEndAt) {
          const ms = new Date(data.trialEndAt).getTime() - Date.now();
          setTrialDaysLeft(Math.max(0, Math.ceil(ms / 86400000)));
        } else {
          setTrialDaysLeft(null);
        }
      } catch(e) { setTrialDaysLeft(null); }
    })();
  }, [currentTeam?.id]); // eslint-disable-line

  // Handle invite link: capture ?join=BASE64_PAYLOAD from URL
  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const payload = params.get('join');
    if (payload) {
      try {
        const teamInfo = JSON.parse(atob(decodeURIComponent(payload)));
        localStorage.setItem('qah_join_payload', JSON.stringify(teamInfo));
      } catch(e) { console.error('Invalid invite link', e); }
      params.delete('join');
      history.replaceState(null, '', window.location.pathname + (params.toString() ? '?' + params.toString() : '') + window.location.hash);
    }
  }, []);

  // Invite: auto-fill join code and trigger join flow after login
  const [autoJoinCode, setAutoJoinCode] = useState(() => {
    try {
      const p = localStorage.getItem('qah_join_payload');
      return p ? JSON.parse(p).inviteCode || '' : '';
    } catch(e) { return ''; }
  });

  // useRef เก็บ pendingMembers ล่าสุดเสมอ — ป้องกัน stale closure ใน processInvite
  const pendingMembersRef = useRef(pendingMembers);
  useEffect(() => { pendingMembersRef.current = pendingMembers; }, [pendingMembers]);

  const processInvite = (user) => {
    if (!user) return;
    const raw = localStorage.getItem('qah_join_payload');
    if (!raw) return;
    let teamInfo;
    try { teamInfo = JSON.parse(raw); } catch(e) { localStorage.removeItem('qah_join_payload'); return; }
    localStorage.removeItem('qah_join_payload');
    setAutoJoinCode('');

    const { id: teamId, name: teamName, inviteCode } = teamInfo;
    const localTeam = teams.find(t => t.id === teamId);
    if (localTeam && localTeam.inviteCode !== inviteCode) {
      showToast('Invite Link หมดอายุหรือถูกรีเซ็ต', 'error'); return;
    }
    // Already a member -> go straight in
    if (members.some(m => m.teamId===teamId && m.userId===user.id)) {
      if (localTeam) { setCurrentTeam(localTeam); setPage('dashboard'); }
      showToast(`คุณเป็นสมาชิกทีม "${teamName}" อยู่แล้ว`, 'info'); return;
    }
    // ใช้ ref เพื่อดู pendingMembers ล่าสุด (ไม่ใช่ค่าเก่าจาก closure)
    const currentPending = pendingMembersRef.current;
    const existingReq = currentPending.find(p => p.teamId===teamId && p.userId===user.id);
    if (existingReq) {
      if (existingReq.status === 'pending') {
        // Already pending -> just show waiting page, no new record
        setInviteWaitingTeam({ id: teamId, name: teamName });
        showToast(`มีการขอเข้าร่วมทีม "${teamName}" แล้ว กรุณารอ Admin อนุมัติ`, 'info');
        return;
      }
      if (existingReq.status === 'rejected') {
        // Rejected -> allow re-request: update existing record back to pending (no duplicate)
        setPendingMembers(p => p.map(r =>
          r.id === existingReq.id ? { ...r, status: 'pending', requestedAt: now() } : r
        ));
        setInviteWaitingTeam({ id: teamId, name: teamName });
        showToast(`ส่งคำขอเข้าร่วมทีม "${teamName}" ใหม่แล้ว -- รอ Admin อนุมัติ`);
        return;
      }
    }
    // No prior record -> add fresh pending entry (with functional update for dedup safety)
    setPendingMembers(p => {
      if (p.some(r => r.teamId===teamId && r.userId===user.id)) return p; // double-guard
      // [FIX MEDIUM-2] ส่ง inviteCode ไปด้วยเพื่อให้ GAS ตรวจสอบ server-side
    return [...p, { id: uid(), teamId, teamName, userId: user.id, requestedAt: now(), status: 'pending', inviteCode: inviteCode }];
    });
    setInviteWaitingTeam({ id: teamId, name: teamName });
    showToast(`ส่งคำขอเข้าร่วมทีม "${teamName}" แล้ว -- รอ Admin อนุมัติ`);
  };

  useEffect(() => { processInvite(currentUser); }, [currentUser]);
  const toggleTheme = () => setTheme(t => t === 'dark' ? 'light' : 'dark');

  const [sidebarOpen, setSidebarOpen] = useState(false);
  const toggleSidebar = () => setSidebarOpen(v => !v);
  const closeSidebar = () => setSidebarOpen(false);

  const navigate = (pg, ctx2={}) => {
    setPage(pg);
    closeSidebar();
    if (ctx2.projectId !== undefined) setNavCtx(p=>({...p,...ctx2}));
    else if (Object.keys(ctx2).length) setNavCtx(p=>({...p,...ctx2}));
    else setNavCtx(p=>({...p, tab: undefined})); // reset tab เมื่อ navigate ปกติ
    // [v23-FIX] โหลดข้อมูลใหม่ทุกครั้งที่เปลี่ยนหน้า — แสดง overlay แทน full-page loading
    if (USE_GAS && getAuthToken() && pg !== 'login' && pg !== 'team-select') {
      setNavLoading(true);
      Promise.all([
        api.getAll('users'), api.getAll('teams'), api.getAll('members'),
        api.getAll('projects'), api.getAll('tasks'), api.getAll('testCases'),
        api.getAll('defects'), api.getAll('logs'), api.getAll('loginLogs'), api.getAll('pending'),
        api.getAll('plans'),
      ]).then(([u,te,m,p,ta,tc,d,l,ll,pm,pl]) => {
        setUsersState(u); setTeamsState(te); setMembersState(m);
        setProjectsState(p); setTasksState(ta); setTestCasesState(tc);
        setDefectsState(d); setLogsState(l); setLoginLogsState(ll); setPendingMembersState(pm);
        setPlansState(pl || []);
        setNavLoading(false);
      }).catch(() => { setNavLoading(false); }); // silent error — ยังคงไปหน้าที่เลือก
    }
  };

  // ── [NEW v13] Deep-link: #tc=ID หรือ #def=ID → เปิดใน Tab ใหม่ได้ทันที ──
  // capture hash ตอน init ไว้ใน pendingDeepLink เพราะ hash ถูกล้างก่อนที่ data จะโหลดเสร็จ
  // useEffect นี้จะ fire ทุกครั้งที่ loading/currentUser/currentTeam/data เปลี่ยน
  // → รอจนกว่า session พร้อมและ data โหลดเสร็จ แล้วค่อย navigate
  // [FIX NEW-TAB v14] รองรับ Private Browser และ Browser อื่น:
  //   - BroadcastChannel ไม่ทำงานข้าม browser profile หรือ private window
  //   - user ต้อง login ก่อน → หลัง login สำเร็จ deep link ยังคงอยู่ใน sessionStorage
  //   - ถ้า currentUser มีแล้วแต่ยัง ไม่มี currentTeam → ค้นหา team จาก defect/tc โดยตรง
  //   - เมื่อ currentTeam พร้อมแล้ว deep link จะทำงานตามปกติ
  useEffect(() => {
    if (loading) return;
    if (!currentUser) return; // ยังไม่ login

    let raw = pendingDeepLink;
    if (!raw) {
      const h = window.location.hash;
      if (h && h.length > 4) {
        const hm = h.slice(1).match(/^(tc|def)=(.+)$/);
        if (hm) {
          raw = h.slice(1);
          history.replaceState(null, '', window.location.pathname + window.location.search);
        }
      }
    }
    if (!raw) return;

    const m = raw.match(/^(tc|def)=(.+)$/);
    if (!m) { setPendingDeepLink(null); sessionStorage.removeItem('qah_pending_deeplink'); return; }
    const [, type, id] = m;

    // ถ้ายังไม่มี currentTeam (เช่น หลัง login ในหน้า team-select หรือ private browser)
    // ให้พยายามหา team จาก data แล้ว auto-switch ไปก่อน
    if (!currentTeam) {
      let targetTeamId = null;
      if (type === 'def') {
        const d = defects.find(x => x.id === id);
        if (d && d.teamId) targetTeamId = d.teamId;
      } else if (type === 'tc') {
        const tc = testCases.find(x => x.id === id);
        if (tc) {
          const task = tasks.find(t => t.id === tc.taskId);
          if (task) {
            const proj = projects.find(p => p.id === task.projectId);
            if (proj && proj.teamId) targetTeamId = proj.teamId;
          }
        }
      }
      if (targetTeamId) {
        // หา team object แล้ว set currentTeam — deep link จะ fire ใหม่อัตโนมัติ
        const teamObj = teams && teams.find(t => t.id === targetTeamId);
        if (teamObj) {
          setCurrentTeam(teamObj);
          return; // รอให้ currentTeam set แล้ว useEffect จะ fire ใหม่
        }
      }
      return; // ยังหา team ไม่เจอ รอ data โหลดเสร็จ
    }

    if (type === 'def') {
      const d = defects.find(x => x.id === id);
      if (!d) {
        showToast('ไม่พบ Defect นี้ หรือคุณไม่มีสิทธิ์เข้าถึง', 'error');
        setPendingDeepLink(null); sessionStorage.removeItem('qah_pending_deeplink');
        return;
      }
      setPendingDeepLink(null); sessionStorage.removeItem('qah_pending_deeplink');
      setPage('defects');
      // ใช้ setTimeout เล็กน้อยให้ page render ก่อน แล้วค่อยเปิด modal
      setTimeout(() => openDefectModal(d, null, teamTCs), 80);
    } else if (type === 'tc') {
      const tc = testCases.find(x => x.id === id);
      if (!tc) {
        showToast('ไม่พบ Test Case นี้ หรือคุณไม่มีสิทธิ์เข้าถึง', 'error');
        setPendingDeepLink(null); sessionStorage.removeItem('qah_pending_deeplink');
        return;
      }
      const task = tasks.find(t => t.id === tc.taskId);
      if (!task) {
        showToast('ไม่พบ Task ของ Test Case นี้', 'error');
        setPendingDeepLink(null); sessionStorage.removeItem('qah_pending_deeplink');
        return;
      }
      const proj = projects.find(p => p.id === task.projectId);
      if (!proj) {
        showToast('ไม่พบ Project ของ Test Case นี้', 'error');
        setPendingDeepLink(null); sessionStorage.removeItem('qah_pending_deeplink');
        return;
      }
      setPendingDeepLink(null); sessionStorage.removeItem('qah_pending_deeplink');
      setNavCtx({ projectId: proj.id, taskId: task.id, openTcId: tc.id });
      setPage('task-detail');
    }
  }, [loading, currentUser, currentTeam, pendingDeepLink, testCases, tasks, projects, defects, teams]); // eslint-disable-line react-hooks/exhaustive-deps

  const ctx = { users, setUsers, teams, setTeams, members, setMembers, setTeamsState, setMembersState,
    projects, setProjects, tasks, setTasks, testCases, setTestCases,
    defects, setDefects, logs, setLogs, loginLogs, setLoginLogs,
    setProjectsState, setTasksState, setTestCasesState, setDefectsState,
    currentUser, setCurrentUser, currentTeam, setCurrentTeam,
    page, setPage, navCtx, setNavCtx, showToast, addLog,
    myTeams, myRole, isAdmin, canEdit, canDelete, canView,
    teamProjects, teamTasks, teamTCs, teamDefects,
    defectModalCtx, openDefectModal, closeDefectModal,
    theme, toggleTheme,
    pendingMembers, setPendingMembers,
    autoJoinCode, setAutoJoinCode, processInvite,
    syncing, USE_GAS, refreshFromSheets,
    inviteWaitingTeam, setInviteWaitingTeam,
    newPendingIds, clearNewPending,
    newSlipOrderIds, clearNewSlipOrders,
    userNotifs, clearUserNotifs,
    approvePending: appApprove, rejectPending: appReject,
    plans, setPlans, setPlansState, teamPlans,
    sessionTimeoutMsg, setSessionTimeoutMsg,
    pendingMemberOpsRef, pendingTcStatusRef, pendingDefStatusRef,
    // [v23-PLAN]
    isSuperAdminUser, showPlanLimitModal, trialDaysLeft,
    // [v24] Plan info
    currentPlan, isFreePlan, isUnlimitedPlan,
    // [v25] allow child components to refresh global plan state
    setTeamPlanData };

  // LOADING SCREEN
  if (loading || !tokenReady) {
    return h('div', { style:{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'var(--bg)',gap:'16px'} },
      h('div', { className:'login-logo', style:{fontSize:'24px'} },
        // h('div', { className:'logo-icon',style:{width:'36px',height:'36px',borderRadius:'10px'} }, h('span',{className:'ms',style:{fontSize:'19px',color:'white'}},'verified')),
        h('span',null,'QAHub', h('span',{style:{fontWeight:'400',color:'var(--text2)'}},'s'))
      ),
      h(LoadingDots),
      // [FIX MEDIUM-3] แสดง error ชัดเจน + ปุ่ม retry ไม่ fallback localStorage
      syncErr && h('div', { style:{marginTop:'8px',padding:'12px 20px',background:'var(--red-bg)',border:'1px solid var(--red)',borderRadius:'8px',color:'var(--red)',fontSize:'12px',maxWidth:'440px',textAlign:'center'} },
        h('div',{style:{marginBottom:'8px'}}, h('span',{className:'ms ms-xs',style:{marginRight:'4px'}},'error'), 'เชื่อมต่อ Google Sheets ไม่ได้'),
        h('div',{style:{color:'var(--text3)',fontSize:'11px',marginBottom:'10px',wordBreak:'break-all'}}, syncErr),
        h('button',{
          onClick: () => window.location.reload(),
          style:{background:'var(--red)',color:'#fff',border:'none',padding:'6px 16px',borderRadius:'4px',cursor:'pointer',fontSize:'12px',fontWeight:'600'}
        }, 'ลองเชื่อมต่อใหม่')
      )
    );
  }

  // LOGIN
  if (!currentUser) {
    return h(React.Fragment, null,
      h(LoginPage, { ...ctx, navigate, setUsersState, setTeamsState, setMembersState, setProjectsState, setTasksState, setTestCasesState, setDefectsState, setLogsState, setLoginLogsState, setPendingMembersState, setPlansState, setLoading }),
      h('div',{className:'toast-stack'},toasts.map(t=>h(Toast,{key:t.id,msg:t.msg,type:t.type,duration:t.duration||3000,onDone:()=>removeToast(t.id)})))
    );
  }

  // INVITE WAITING PAGE (after login/register via invite link)
  if (inviteWaitingTeam) {
    return h(React.Fragment, null,
      h(InviteWaitingPage, {
        teamName: inviteWaitingTeam.name,
        teamId: inviteWaitingTeam.id,
        currentUser,
        pendingMembers,
        setPendingMembers,
        members,
        teams,
        setCurrentTeam,
        setPage,
        setInviteWaitingTeam,
        refreshFromSheets,
        USE_GAS,
      }),
      h('div',{className:'toast-stack'},toasts.map(t=>h(Toast,{key:t.id,msg:t.msg,type:t.type,duration:t.duration||3000,onDone:()=>removeToast(t.id)})))
    );
  }

  // TEAM SELECTION
  if (!currentTeam) {
    return h(React.Fragment, null,
      h(TeamSelectPage, { ...ctx, navigate }),
      h('div',{className:'toast-stack'},toasts.map(t=>h(Toast,{key:t.id,msg:t.msg,type:t.type,duration:t.duration||3000,onDone:()=>removeToast(t.id)})))
    );
  }

  // [v18-PWDEXPIRY] ตรวจ password expiry หลัง login
  // ถ้าครบ 30 วัน (daysLeft < 0) → บังคับเปลี่ยนก่อนใช้งาน
  const passwordExpired = currentUser && currentTeam && (currentUser.passwordDaysLeft != null) && currentUser.passwordDaysLeft < 0;
  const passwordWarning = currentUser && (currentUser.passwordDaysLeft != null) && currentUser.passwordDaysLeft >= 0 && currentUser.passwordDaysLeft <= 3;

  if (passwordExpired) {
    return h(React.Fragment, null,
      h(ForceChangePasswordPage, { currentUser, setCurrentUser, setUsers, showToast, USE_GAS }),
      h('div',{className:'toast-stack'},toasts.map(t=>h(Toast,{key:t.id,msg:t.msg,type:t.type,duration:t.duration||3000,onDone:()=>removeToast(t.id)})))
    );
  }

  return h(React.Fragment, null,
    h('div', { className: 'app' },
      h(Topbar, { ...ctx, navigate, sidebarOpen, toggleSidebar }),
      // [v24] Free Plan banner — always shown when on free plan
      currentUser && currentTeam && isFreePlan && h(FreePlanBanner, { navigate }),
      // [v18-PWDEXPIRY] Password warning banner (3 วัน ก่อนหมดอายุ)
      passwordWarning && h('div', { style:{background:'var(--amber-bg)',borderBottom:'1px solid var(--amber)',padding:'8px 24px',display:'flex',alignItems:'center',gap:'10px',fontSize:'13px',color:'var(--amber)',flexShrink:0} },
        h('span',{className:'ms ms-sm'},'warning'),
        h('strong',null,`รหัสผ่านจะหมดอายุใน ${currentUser.passwordDaysLeft} วัน`),
        h('span',{style:{color:'var(--text2)'}},' กรุณาเปลี่ยนรหัสผ่านที่เมนูตั้งค่าโปรไฟล์')
      ),
      // [v23-PLAN] Trial warning banner
      trialDaysLeft !== null && h('div', { style:{background:'#fef3c7',borderBottom:'1px solid var(--amber)',padding:'8px 24px',display:'flex',alignItems:'center',gap:'10px',fontSize:'13px',color:'#92400e',flexShrink:0} },
        h('span',{className:'ms ms-sm',style:{color:'var(--amber)'}},'timer'),
        h('strong',null, trialDaysLeft > 0 ? `Trial Unlimited เหลือ ${trialDaysLeft} วัน` : 'Trial หมดอายุแล้ว'),
        h('span',{style:{color:'#78350f'}},' — กรุณา Update Token Unlimited ใน System Settings เพื่อใช้งานต่อ'),
        isAdmin && h('button', {
          className:'btn btn-sm',
          style:{marginLeft:'auto',background:'var(--amber)',color:'#fff',border:'none',padding:'4px 12px',fontSize:'12px'},
          onClick: () => navigate('team-settings')
        }, 'ไปที่ Settings')
      ),
      h('div', { className: 'main' },
        sidebarOpen && h('div', { className: 'sidebar-overlay', onClick: closeSidebar }),
        h(Sidebar, { ...ctx, navigate, currentPage: page, navCtx, sidebarOpen, closeSidebar }),
        h('div', { className: 'content' },
          h('div', { className: 'page' },
            page === 'dashboard' && h(DashboardPage, { ...ctx, navigate, users:ctx.users, currentUser:ctx.currentUser, currentTeam:ctx.currentTeam }),
            page === 'projects' && h(ProjectsPage, { ...ctx, navigate }),
            page === 'project-detail' && h(ProjectDetailPage, { ...ctx, navigate }),
            page === 'task-detail' && h(TaskDetailPage, { ...ctx, navigate }),
            page === 'defects' && h(DefectsPage, { ...ctx, navigate }),
            page === 'team-settings' && h(TeamSettingsPage, { ...ctx, navigate }),
            page === 'activity-log' && h(ActivityLogPage, { ...ctx, navigate, members, currentTeam }),
            page === 'data-explorer' && h(DataExplorerPage, { ...ctx, navigate }),
            page === 'plan' && h(PlanPage, { ...ctx, navigate }),
            // [v23-PLAN] Dev Dashboard — Super Admin only
            page === 'dev-dashboard' && isSuperAdminUser && h(DevDashboardPage, { currentUser, showToast }),
          )
        )
      )
    ),
    // [v23-OVERLAY] Global loading overlay — แสดงเมื่อโหลดข้อมูลระหว่างใช้งาน
    h(GlobalLoadingOverlay, { visible: navLoading, text: 'กำลังโหลดข้อมูล...' }),
    // [v23-PLAN] Plan Limit Modal
    planLimitType && h(PlanLimitModal, {
      limitType: planLimitType,
      onClose: () => setPlanLimitType(null),
      onUpgrade: async () => {
        setPlanLimitType(null);
        if (!currentTeam || !isAdmin) { showToast('เฉพาะ Admin เท่านั้นที่สามารถ Upgrade Plan ได้', 'error'); return; }
        try {

// ─── FORCE CHANGE PASSWORD PAGE ──────────────────────────────────────────────
// แสดงเมื่อ password ครบ 30 วัน — บังคับเปลี่ยนก่อนใช้งาน
function ForceChangePasswordPage({ currentUser, setCurrentUser, setUsers, showToast, USE_GAS }) {
  const [oldPass, setOldPass]       = useState('');
  const [newPass, setNewPass]       = useState('');
  const [confirmPass, setConfirmPass] = useState('');
  const [showOld, setShowOld]       = useState(false);
  const [showNew, setShowNew]       = useState(false);
  const [showConf, setShowConf]     = useState(false);
  const [err, setErr]               = useState('');
  const [loading, setLoading]       = useState(false);

  const handleChange = async () => {
    setErr('');
    if (!oldPass.trim()) { setErr('กรุณากรอกรหัสผ่านปัจจุบัน'); return; }
    if (!newPass.trim()) { setErr('กรุณากรอกรหัสผ่านใหม่'); return; }
    const chk = validatePasswordStrength(newPass.trim());
    if (!chk.ok) { setErr(chk.msg); return; }
    if (newPass.trim() !== confirmPass.trim()) { setErr('รหัสผ่านใหม่ไม่ตรงกัน'); return; }
    setLoading(true);
    if (USE_GAS) {
      try {
        const res = await api.rawWrite({
          action: 'update', sheet: 'users',
          token: getAuthToken(), id: currentUser.id,
          data: { ...currentUser, _oldPassword: oldPass.trim(), password: newPass.trim() }
        });
        if (!res || res.ok === false) { setErr(res?.error || 'เปลี่ยนรหัสผ่านไม่สำเร็จ'); setLoading(false); return; }
      } catch(e) { setErr('เกิดข้อผิดพลาด: ' + e.message); setLoading(false); return; }
    }
    // คำนวณ expiry ใหม่ (30 วันจากนี้)
    const newPca   = new Date().toISOString();
    const newExpiry = new Date(new Date().getTime() + 30*24*60*60*1000).toISOString();
    const updated  = { ...currentUser, passwordChangedAt: newPca, passwordExpiry: newExpiry, passwordDaysLeft: 30 };
    setCurrentUser(updated);
    if (setUsers) setUsers && setUsers(p => p.map(u => u.id === currentUser.id ? updated : u));
    showToast('เปลี่ยนรหัสผ่านสำเร็จ — ยินดีต้อนรับ!');
    setLoading(false);
  };

  return h('div', { style:{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)',padding:'24px'} },
    h('div', { style:{width:'100%',maxWidth:'440px'} },
      h('div', { style:{textAlign:'center',marginBottom:'28px'} },
        h('div', { className:'login-logo' },
          h('div', { className:'logo-icon',style:{width:'36px',height:'36px',borderRadius:'10px'} }, h('span',{className:'ms',style:{fontSize:'19px',color:'white'}},'verified')),
          h('span',null,'QAHub', h('span',{style:{fontWeight:'400',color:'var(--text2)'}},'s'))
        ),
        h('div', { style:{marginTop:'16px',padding:'12px 16px',background:'var(--red-bg)',border:'1px solid var(--red)',borderRadius:'var(--r2)',display:'inline-flex',alignItems:'center',gap:'8px',color:'var(--red)'} },
          h('span',{className:'ms ms-sm'},'lock_reset'),
          h('strong',null,'รหัสผ่านหมดอายุแล้ว กรุณาเปลี่ยนก่อนเข้าใช้งาน')
        )
      ),
      h('div', { style:{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'var(--r2)',padding:'28px'} },
        h('div', { style:{marginBottom:'20px',padding:'12px 14px',background:'var(--amber-bg)',border:'1px solid var(--amber)',borderRadius:'var(--r)',display:'flex',alignItems:'center',gap:'10px'} },
          h('span',{className:'ms ms-sm',style:{color:'var(--amber)'}},'security'),
          h('div',null,
            h('div',{style:{fontWeight:'600',fontSize:'13px',color:'var(--amber)'}},'เปลี่ยนรหัสผ่าน'),
            h('div',{style:{fontSize:'12px',color:'var(--text2)',marginTop:'2px'}},'เพื่อความปลอดภัย ระบบกำหนดให้เปลี่ยนทุก 30 วัน')
          )
        ),
        h('div',{className:'form-group'},
          h('label',{className:'form-label'},'รหัสผ่านปัจจุบัน'),
          h('div',{style:{position:'relative'}},
            h('input',{className:'form-input',type:showOld?'text':'password',value:oldPass,onChange:e=>{setOldPass(e.target.value);setErr('');},placeholder:'รหัสผ่านปัจจุบัน',style:{paddingRight:'40px'}}),
            h('button',{type:'button',style:{position:'absolute',right:'8px',top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'var(--text3)',cursor:'pointer'},onClick:()=>setShowOld(v=>!v)},h('span',{className:'ms ms-xs'},showOld?'visibility_off':'visibility'))
          )
        ),
        h('div',{className:'form-group'},
          h('label',{className:'form-label'},'รหัสผ่านใหม่'),
          h('div',{style:{position:'relative'}},
            h('input',{className:'form-input',type:showNew?'text':'password',value:newPass,onChange:e=>{setNewPass(e.target.value);setErr('');},placeholder:'รหัสผ่านใหม่',style:{paddingRight:'40px'}}),
            h('button',{type:'button',style:{position:'absolute',right:'8px',top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'var(--text3)',cursor:'pointer'},onClick:()=>setShowNew(v=>!v)},h('span',{className:'ms ms-xs'},showNew?'visibility_off':'visibility'))
          ),
          newPass && h(PasswordRules, { pass: newPass })
        ),
        h('div',{className:'form-group'},
          h('label',{className:'form-label'},'ยืนยันรหัสผ่านใหม่'),
          h('div',{style:{position:'relative'}},
            h('input',{className:'form-input',type:showConf?'text':'password',value:confirmPass,onChange:e=>{setConfirmPass(e.target.value);setErr('');},
              placeholder:'ยืนยันรหัสผ่านใหม่',style:{paddingRight:'40px',borderColor:confirmPass&&newPass?(confirmPass===newPass?'var(--green)':'var(--red)'):''},
              onKeyDown:e=>e.key==='Enter'&&handleChange()
            }),
            h('button',{type:'button',style:{position:'absolute',right:'8px',top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'var(--text3)',cursor:'pointer'},onClick:()=>setShowConf(v=>!v)},h('span',{className:'ms ms-xs'},showConf?'visibility_off':'visibility'))
          )
        ),
        err && h('div',{style:{display:'flex',alignItems:'center',gap:'6px',background:'var(--red-bg)',border:'1px solid var(--red)',borderRadius:'var(--r)',padding:'8px 12px',marginBottom:'8px',fontSize:'12px',color:'var(--red)'}},
          h('span',{className:'ms ms-xs'},'error'), err
        ),
        h('button',{className:'btn btn-primary',style:{width:'100%',justifyContent:'center',padding:'10px',marginTop:'4px'},onClick:handleChange,disabled:loading},
          h('span',{className:'ms ms-sm'},loading?'sync':'lock_reset'), loading?'กำลังบันทึก...':'เปลี่ยนรหัสผ่าน'
        )
      )
    )
  );
}

// ─── [v23] MICROSOFT SIGN-IN (MSAL.js popup flow) ────────────────────────────
// msalInstance — สร้าง 1 ครั้ง lazy init เมื่อกดปุ่มแรก
let _msalInstance = null;
function getMsalInstance() {
  if (_msalInstance) return _msalInstance;
  if (!MSAL_CLIENT_ID) return null;
  if (typeof msal === 'undefined' || !msal.PublicClientApplication) return null;
  _msalInstance = new msal.PublicClientApplication({
    auth: {
      clientId: MSAL_CLIENT_ID,
      authority: 'https://login.microsoftonline.com/' + MSAL_TENANT_ID,
      redirectUri: window.location.href.split('?')[0].split('#')[0],
    },
    cache: { cacheLocation: 'sessionStorage', storeAuthStateInCookie: false },
  });
  return _msalInstance;
}

function MicrosoftSignInButton({ onCredential, disabled, label }) {
  const [loading, setLoading] = React.useState(false);

  const handleClick = async () => {
    if (!MSAL_CLIENT_ID) {
      // แสดง modal แจ้งวิธีตั้งค่าแทน alert
      alert('Microsoft Sign-In: กรุณาใส่ MSAL_CLIENT_ID ในบรรทัด const MSAL_CLIENT_ID ของไฟล์ HTML\n\nวิธีขอ Client ID:\n1. ไปที่ portal.azure.com\n2. Azure Active Directory → App registrations → New registration\n3. คัดลอก Application (client) ID มาใส่');
      return;
    }
    const msalInst = getMsalInstance();
    if (!msalInst) {
      // MSAL SDK ยังโหลดไม่เสร็จ — รอสักครู่แล้วลองใหม่
      alert('Microsoft SDK กำลังโหลด กรุณารอสักครู่แล้วลองใหม่');
      return;
    }
    setLoading(true);
    try {
      const loginRequest = {
        scopes: ['openid', 'profile', 'email', 'User.Read'],
        prompt: 'select_account',
      };
      // ใช้ popup flow (ไม่ redirect ออกจากหน้า)
      const result = await msalInst.loginPopup(loginRequest);
      // ส่ง idToken (JWT) ไปยัง backend เหมือนกับ Google
      if (result && result.idToken && onCredential) {
        await onCredential(result.idToken, result.account);
      }
    } catch(e) {
      if (e.errorCode !== 'user_cancelled') {
        console.error('[MSAL]', e);
        alert('Microsoft Sign-In ล้มเหลว: ' + (e.message || e.errorCode));
      }
    }
    setLoading(false);
  };

  return h('button', {
    className: 'btn-social-icon',
    disabled: disabled || loading,
    onClick: handleClick,
    title: label || 'Sign in with Microsoft',
  },
    loading
      ? h('span', { className:'ms ms-sm', style:{animation:'spin 1s linear infinite'} }, 'sync')
      : h('svg', { width:'20', height:'20', viewBox:'0 0 21 21', xmlns:'http://www.w3.org/2000/svg' },
          h('rect', { x:'1', y:'1', width:'9', height:'9', fill:'#f25022' }),
          h('rect', { x:'11', y:'1', width:'9', height:'9', fill:'#7fba00' }),
          h('rect', { x:'1', y:'11', width:'9', height:'9', fill:'#00a4ef' }),
          h('rect', { x:'11', y:'11', width:'9', height:'9', fill:'#ffb900' })
        ),
    h('span', { className:'social-tooltip' }, label || 'Microsoft')
  );
}

// ─── [v21] GOOGLE SIGN-IN HELPER ─────────────────────────────────────────────
// GoogleSignInButton: render ปุ่ม Google Sign-In สไตล์ QAHubs
function GoogleSignInButton({ onCredential, disabled, label }) {
  const btnRef = React.useRef(null);
  const cbRef  = React.useRef(onCredential);
  React.useEffect(() => { cbRef.current = onCredential; }, [onCredential]);

  React.useEffect(() => {
    if (!GOOGLE_CLIENT_ID) return; // ยังไม่ได้ตั้งค่า Client ID
    const el = btnRef.current;
    if (!el) return;
    let tryCount = 0;
    const tryInit = () => {
      if (typeof google === 'undefined' || !google.accounts) {
        if (tryCount++ < 20) { setTimeout(tryInit, 300); return; }
        return; // GSI SDK ยังไม่โหลด
      }
      google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: (res) => cbRef.current && cbRef.current(res.credential),
        auto_select: false,
        cancel_on_tap_outside: true,
      });
      google.accounts.id.renderButton(el, {
        type: 'standard', shape: 'rectangular', theme: 'outline',
        size: 'large', text: 'signin_with', width: el.offsetWidth || 340,
        logo_alignment: 'center',
      });
    };
    tryInit();
    return () => { try { google.accounts.id.cancel(); } catch(e) {} };
  }, []);

  // Fallback ปุ่ม manual ถ้า GSI ยังไม่โหลด หรือ GOOGLE_CLIENT_ID ว่าง
  if (!GOOGLE_CLIENT_ID) {
    return h('div', { style:{color:'var(--text3)',fontSize:'12px',textAlign:'center',padding:'8px',background:'var(--bg3)',borderRadius:'var(--r)',border:'1px dashed var(--border2)'} },
      h('span',{className:'ms ms-xs',style:{marginRight:'4px'}},'info'),
      'ตั้งค่า GOOGLE_CLIENT_ID ก่อนใช้งาน Google Sign-In'
    );
  }
  return h('div', { ref: btnRef, style:{position:'absolute',opacity:0,pointerEvents:'none',width:'1px',height:'1px',overflow:'hidden'} });
}

// ─── [v21] TOTP SETUP MODAL ──────────────────────────────────────────────────
// TotpSetupModal: แสดง QR code + manual key สำหรับตั้งค่า Google Authenticator
function TotpSetupModal({ currentUser, onClose, showToast, onSuccess }) {
  const [step, setStep]           = useState('loading'); // loading | qr | verify | done
  const [secret, setSecret]       = useState('');
  const [qrUrl, setQrUrl]         = useState('');
  const [code, setCode]           = useState('');
  const [err, setErr]             = useState('');
  const [loading, setLoading]     = useState(false);
  const [copied, setCopied]       = useState(false);

  useEffect(() => {
    // ขอ TOTP secret ใหม่จาก GAS
    const setup = async () => {
      try {
        const res = await api.rawWrite({ action: 'setupTotp', token: getAuthToken(), email: currentUser.email });
        if (!res.ok) { setErr(res.error || 'ไม่สามารถตั้งค่าได้'); setStep('error'); return; }
        const { secret: s, otpauthUrl } = res.data;
        setSecret(s);
        setQrUrl(otpauthUrl); // เก็บ otpauthUrl ไว้ render ด้วย canvas
        setStep('qr');
      } catch(e) { setErr(e.message); setStep('error'); }
    };
    setup();
  }, []);

  // render QR code ลง canvas โดยใช้ ref callback + drawQROnCanvas (pure JS, no CDN)
  const qrCanvasRef = React.useCallback((canvas) => {
    if (!canvas || !qrUrl) return;
    try { drawQROnCanvas(canvas, qrUrl, 200); } catch(e) { console.error('QR draw error:', e); }
  }, [qrUrl]);

  const verify = async () => {
    if (code.replace(/\s/g,'').length !== 6) { setErr('กรุณากรอกรหัส 6 หลัก'); return; }
    setLoading(true); setErr('');
    try {
      const res = await api.rawWrite({ action: 'verifyTotpSetup', token: getAuthToken(), email: currentUser.email, code: code.replace(/\s/g,''), secret });
      if (!res.ok) { setErr(res.error || 'รหัสไม่ถูกต้อง'); setLoading(false); return; }
      setStep('done');
      showToast('ตั้งค่า Google Authenticator สำเร็จ!');
      if (onSuccess) onSuccess();
    } catch(e) { setErr(e.message); }
    setLoading(false);
  };

  const copyKey = () => {
    copyText(secret, () => { setCopied(true); setTimeout(() => setCopied(false), 2000); });
  };

  return h('div', { className:'modal-overlay', style:{zIndex:10010} },
    h('div', { className:'modal modal-sm', style:{maxWidth:'440px',height:'auto',borderColor:'var(--green)'} },
      h('div', { className:'modal-header', style:{borderColor:'var(--green)'} },
        h('span', { className:'modal-title', style:{display:'flex',alignItems:'center',gap:'8px'} },
          h('span',{className:'ms ms-sm',style:{color:'var(--green)'}},'security'), 'ตั้งค่า Google Authenticator'
        ),
        h('button', { className:'modal-close', onClick:onClose }, h('span',{className:'ms ms-sm'},'close'))
      ),
      h('div', { className:'modal-body' },
        step === 'loading' && h('div',{style:{textAlign:'center',padding:'32px'}},h(LoadingDots,{})),
        step === 'error'   && h('div',{style:{color:'var(--red)',textAlign:'center',padding:'24px'}}, h('span',{className:'ms ms-lg'},'error'), h('div',{style:{marginTop:'8px'}},err)),
        step === 'done'    && h('div',{style:{textAlign:'center',padding:'24px'}},
          h('span',{className:'ms ms-xxl',style:{color:'var(--green)'}},'check_circle'),
          h('div',{style:{fontWeight:'700',fontSize:'16px',marginTop:'12px',color:'var(--green)'}},'ตั้งค่าสำเร็จ!'),
          h('div',{style:{color:'var(--text2)',fontSize:'13px',marginTop:'8px',lineHeight:'1.7'}},'ตอนนี้คุณสามารถใช้ Google Authenticator แทนรหัสผ่านได้แล้ว'),
          h('button',{className:'btn btn-primary',style:{marginTop:'20px'},onClick:onClose},'เสร็จสิ้น')
        ),
        (step === 'qr' || step === 'verify') && h('div', null,

                h('div',{style:{width:'22px',height:'22px',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'11px',fontWeight:'700',
                  background: i === (step==='qr'?0:1) ? 'var(--green)' : (step==='verify'&&i===0)?'var(--bg4)':'var(--bg4)',
                  color: i === (step==='qr'?0:1) ? '#fff' : 'var(--text3)',
