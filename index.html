            ),
            h('div',{style:{textAlign:'right',flexShrink:0}},
              h('div',{style:{fontSize:'14px',fontWeight:'700',color:t.total?'var(--green)':'var(--text3)',fontFamily:'var(--mono)'}},''+Math.round(t.total?t.passed/t.total*100:0)+'%'),
              h('div',{style:{fontSize:'10px',color:'var(--text3)'}},'pass rate')
            )
          ))
        )
      )
    ),

    // ── DEFECTS TAB ──
    activeTab==='defects' && h('div', null,
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'16px',marginBottom:'16px'}},
        h('div',{className:'card'},
          h('div',{className:'card-header'},h('h3',{className:'card-title'},'By Severity')),
          h(HBarChart,{data:defectSeverities,colorFn:sevColor,showPct:true})
        ),
        h('div',{className:'card'},
          h('div',{className:'card-header'},h('h3',{className:'card-title'},'By Status')),
          h(HBarChart,{data:defectStatuses,colorFn:defStatusColor,showPct:true})

      h('div',{style:{display:'grid',gridTemplateColumns:'2fr 1fr',gap:'16px',marginBottom:'16px'}},
        h('div',{className:'card'},
          h('div',{className:'card-header'},h('h3',{className:'card-title'},'Defect Status Donut')),
          h('div',{style:{display:'flex',gap:'24px',alignItems:'center'}},
            h(DonutChart,{data:defectStatuses,colorFn:defStatusColor,size:160,thickness:28}),
            h('div',{style:{flex:1}},
              defectStatuses.map(ds=>h('div',{key:ds.s,style:{display:'flex',alignItems:'center',gap:'8px',padding:'6px 0',borderBottom:'1px solid var(--border)'}},

// ─── PROJECTS PAGE ────────────────────────────────────────────────────────────
function ProjectsPage({ teamProjects, setProjects, tasks, setTasks, testCases, setTestCases, defects, setDefects, setProjectsState, setTasksState, setTestCasesState, setDefectsState, teamTasks, currentTeam, currentUser, canEdit, canDelete, showToast, addLog, navigate, USE_GAS, isUnlimitedPlan }) {
  const [showModal, setShowModal] = useState(false);
  const [editProj, setEditProj] = useState(null);
  const [form, setForm] = useState({ name:'', description:'', status:'Active', startDate:'', endDate:'', tcMode:'standard' });
  const [search, setSearch] = useState('');
  const [delConfirm, setDelConfirm] = useState(null);

  const filtered = teamProjects.filter(p => p.name.toLowerCase().includes(search.toLowerCase()));

  const openCreate = () => { setForm({name:'',description:'',status:'Active',startDate:'',endDate:'',tcMode:'standard'}); setEditProj(null); setShowModal(true); };
  // [v26-FIX] ใช้ isUnlimitedPlan prop (อัพเดตทันทีหลัง upgradePlan) แทน window check
  const atProjectLimit = !isUnlimitedPlan && teamProjects.length >= 1;
  const openEdit = (p) => { setForm({name:p.name,description:p.description||'',status:p.status||'Active',startDate:p.startDate||'',endDate:p.endDate||'',tcMode:p.tcMode||'standard'}); setEditProj(p); setShowModal(true); };

  const save = () => {
    if (!form.name.trim()) { showToast('กรุณาใส่ชื่อ Project','error'); return; }
    if (editProj) {
      setProjects(p => p.map(x => x.id===editProj.id ? {...x,...form,updatedAt:now(),updatedBy:currentUser.id} : x));
      addLog('Update Project', `แก้ไข Project: ${form.name}`);
      showToast('อัพเดท Project สำเร็จ');
    } else {
      const np = { id:uid(), teamId:currentTeam.id, createdBy:currentUser.id, createdAt:now(), ...form };
      setProjects(p => [...p, np]);
      addLog('Create Project', `สร้าง Project: ${form.name}`);
      showToast('สร้าง Project สำเร็จ');
    }
    setShowModal(false);
  };

  const deleteProj = async (p) => {
    // cascade soft-delete: defects → testCases → tasks → project
    const projTaskIds = tasks.filter(t => t.projectId === p.id).map(t => t.id);
    const projTCIds = (testCases || []).filter(tc => projTaskIds.includes(tc.taskId)).map(tc => tc.id);
    const projDefIds = defects.filter(d => {
      const tc = (testCases || []).find(x => x.id === d.testCaseId);
      return tc && projTaskIds.includes(tc.taskId);
    }).map(d => d.id);

    setDelConfirm(null);

    // [FIX-DEL] Optimistic update local state ก่อน
    const ts = now();
    setDefectsState(prev => prev.map(d => projDefIds.includes(d.id) ? {...d, isDeleted: true, updatedAt: ts} : d));
    setTestCasesState(prev => prev.map(tc => projTCIds.includes(tc.id) ? {...tc, isDeleted: true, updatedAt: ts} : tc));
    setTasksState(prev => prev.map(t => projTaskIds.includes(t.id) ? {...t, isDeleted: true, updatedAt: ts} : t));
    setProjectsState(prev => prev.map(x => x.id === p.id ? {...x, isDeleted: true, updatedAt: ts} : x));

    // [FIX-DEL] ถ้าใช้ GAS — รอ api.delete ทุกตัวสำเร็จก่อน toast; ถ้าล้มเหลว rollback
    if (USE_GAS) {
      try {
        // [FIX-TEAMID] ส่ง teamId ไปกับ delete — GAS ต้องใช้ verify permissions
        const tid = currentTeam?.id;
        await Promise.all([
          ...projDefIds.map(id => api.delete('defects', id, tid)),
          ...projTCIds.map(id => api.delete('testCases', id, tid)),
          ...projTaskIds.map(id => api.delete('tasks', id, tid)),
          api.delete('projects', p.id, tid),
        ]);
        addLog('Delete Project', `ลบ Project: ${p.name} (cascade)`);
        showToast(`ลบ Project "${p.name}" และข้อมูลทั้งหมดสำเร็จ`);
      } catch(e) {
        console.error('deleteProj error:', e.message);
        // [FIX-DEL] Rollback local state เมื่อ GAS ล้มเหลว
        setDefectsState(prev => prev.map(d => projDefIds.includes(d.id) ? {...d, isDeleted: false} : d));
        setTestCasesState(prev => prev.map(tc => projTCIds.includes(tc.id) ? {...tc, isDeleted: false} : tc));
        setTasksState(prev => prev.map(t => projTaskIds.includes(t.id) ? {...t, isDeleted: false} : t));
        setProjectsState(prev => prev.map(x => x.id === p.id ? {...x, isDeleted: false} : x));
        showToast(`ลบล้มเหลว: ${e.message} — กรุณาลองใหม่`, 'error');
      }
    } else {
      addLog('Delete Project', `ลบ Project: ${p.name} (cascade)`);
      showToast(`ลบ Project "${p.name}" และข้อมูลทั้งหมดสำเร็จ`);
    }
  };

  return h('div', null,
    h('div', { className:'page-header' },
      h('div', null, h('h1',{className:'page-title'},'Projects'), h('p',{className:'page-subtitle'},`${teamProjects.length} Projects`)),
      (()=>{
          const disabled = atProjectLimit;
          return h('button',{
            className:'btn btn-primary',
            disabled:!canEdit||disabled,
            style:{opacity:(!canEdit||disabled)?0.45:1,cursor:(!canEdit||disabled)?'not-allowed':'pointer'},
            title:disabled?'Free Plan: สร้างได้สูงสุด 1 Project — Upgrade ใน System Settings':'',
            onClick:(!canEdit||disabled)?undefined:openCreate
          },
            h('span',{className:'ms ms-xs'},disabled?'lock':'create_new_folder'),
            disabled?' + Project (เต็มแล้ว)':'+  New Project'
          );
        })()
    ),
    h('div', { className:'filter-bar' },
      h('input', { className:'search-input', placeholder:'ค้นหา Project...', value:search, onChange:e=>setSearch(e.target.value) })
    ),
    filtered.length === 0 ? h('div',{className:'empty'},h('div',{className:'empty-icon'},h('span',{className:'ms ms-xxl',style:{color:'var(--text3)'}},'folder_open')),h('div',{className:'empty-title'},'ยังไม่มี Project'),canEdit&&h('button',{className:'btn btn-primary',style:{marginTop:'12px'},onClick:openCreate},'+ New Project')) :
    h('div', { style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:'14px'} },
      filtered.map(p => {
        const ptasks = tasks.filter(t=>t.projectId===p.id && !t.isDeleted && t.isDeleted!=='true');
        return h('div', { key:p.id, className:'card', style:{cursor:'pointer'}, onClick:()=>navigate('project-detail',{projectId:p.id}) },
          h('div', { className:'flex-between', style:{marginBottom:'10px'} },
            h('div', { style:{display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap'} },
              h('div', { style:{fontWeight:'600',fontSize:'15px'} }, p.name)
            ),
            h('span', { className:`badge ${p.status==='Active'?'badge-green':'badge-gray'}` }, p.status||'Active')
          ),
          p.description && h('p', { style:{fontSize:'12px',color:'var(--text2)',marginBottom:'10px'} }, p.description),
          h('div', { style:{fontSize:'12px',color:'var(--text3)',marginBottom:'10px'} }, `${ptasks.length} Tasks • สร้าง ${fmtDateOnly(p.createdAt)}`),
          h('div', { style:{display:'flex',gap:'6px',marginTop:'10px'} },
            h('button', { className:'btn btn-sm', onClick:e=>{e.stopPropagation();openEdit(p);}, style:{flex:1} }, 'แก้ไข'),
            canDelete && h('button', { className:'btn btn-sm btn-danger', onClick:e=>{e.stopPropagation();setDelConfirm(p);} }, 'ลบ')
          )
        );
      })
    ),
    showModal && h(Modal, { title: editProj?'แก้ไข Project':'สร้าง Project ใหม่', onClose:()=>setShowModal(false) },
      h('div', { className:'form-group' }, h('label',{className:'form-label'},'ชื่อ Project ',h('span',{className:'req'},'*')),h('input',{className:'form-input',value:form.name,onChange:e=>setForm(p=>({...p,name:e.target.value}))})),
      h('div', { className:'form-group' }, h('label',{className:'form-label'},'คำอธิบาย'),h('textarea',{className:'form-textarea',value:form.description,onChange:e=>setForm(p=>({...p,description:e.target.value}))})),
      h('div', { className:'form-row' },
        h('div',{className:'form-group'},h('label',{className:'form-label'},'สถานะ'),h('select',{className:'form-select',value:form.status,onChange:e=>setForm(p=>({...p,status:e.target.value}))},['Active','On Hold','Completed','Cancelled'].map(s=>h('option',{key:s,value:s},s)))),
        h('div',{className:'form-group'},h('label',{className:'form-label'},'Start Date'),h(DatePicker,{value:form.startDate,onChange:v=>setForm(p=>({...p,startDate:v})),placeholder:'เลือกวันเริ่มต้น'})),
      ),
      h('div', { className:'modal-footer' }, h('button',{className:'btn',onClick:()=>setShowModal(false)},'ยกเลิก'), h('button',{className:'btn btn-primary',onClick:save},'บันทึก'))
    ),
    delConfirm && h(ConfirmModal, {
      title:`ลบ Project "${delConfirm.name}"?`,
      message:'ข้อมูลทั้งหมดใน Project นี้ รวมถึง Tasks, Test Cases และ Defects จะถูกลบทั้งหมด การกระทำนี้ไม่สามารถยกเลิกได้',
      danger: true,
      onConfirm:()=>deleteProj(delConfirm),
      onClose:()=>setDelConfirm(null)
    })
  );
}

// ─── EXPORT HELPERS: แยก Sheet ตาม Project / Task / TestCase / Defect ──────────
// ใช้ SheetJS (xlsx) สร้าง Workbook หลาย Sheet แยกตาม Project > Task
// exportTCsByTeam(teamProjects, teamTasks, teamTCs)  → Excel หลาย sheet
// exportDefectsByTeam(teamProjects, teamTasks, teamTCs, teamDefects) → Excel หลาย sheet

function buildTCSheetRows(tcs) {
  const headerRow = ['Title','Priority','Detection','Status','Scenario Description','Tags','Test Data','Test Steps','Expected Result','Actual Result'];
  const dataRows = [];
  tcs.forEach(tc => {
    const steps = tc.steps && tc.steps.length ? tc.steps : [{ action:'', expected:'', actual:'' }];
    steps.forEach((s, i) => {
      if (i === 0) {
        dataRows.push([tc.title, tc.priority, tc.detection, tc.status,
          tc.scenarioDescription||'', tc.tags||'', tc.testData||'',
          s.action||'', s.expected||'', s.actual||'']);
      } else {
        dataRows.push(['','','','','','','', s.action||'', s.expected||'', s.actual||'']);
      }
    });
  });
  return [headerRow, ...dataRows];
}

function applyTCSheetStyle(ws, dataRows) {
  const headerStyle = {
    font:{ bold:true, color:{ rgb:'FFFFFF' }, sz:10 },
    fill:{ patternType:'solid', fgColor:{ rgb:'1E3A5F' } },
    alignment:{ horizontal:'center', vertical:'center', wrapText:true },
    border:{ top:{style:'thin',color:{rgb:'FFFFFF'}}, bottom:{style:'thin',color:{rgb:'FFFFFF'}}, left:{style:'thin',color:{rgb:'FFFFFF'}}, right:{style:'thin',color:{rgb:'FFFFFF'}} }
  };
  const tcTitleStyle = {
    font:{ bold:true, color:{ rgb:'0F2A4A' }, sz:10 },
    fill:{ patternType:'solid', fgColor:{ rgb:'D6E8FA' } },
    alignment:{ vertical:'center', wrapText:true },
    border:{ top:{style:'thin',color:{rgb:'A0BFD8'}}, bottom:{style:'thin',color:{rgb:'A0BFD8'}}, left:{style:'thin',color:{rgb:'A0BFD8'}}, right:{style:'thin',color:{rgb:'A0BFD8'}} }
  };
  const stepStyle = {
    font:{ color:{ rgb:'374151' }, sz:10 },
    fill:{ patternType:'solid', fgColor:{ rgb:'FFFFFF' } },
    alignment:{ vertical:'center', wrapText:true },
    border:{ top:{style:'thin',color:{rgb:'D1DAE8'}}, bottom:{style:'thin',color:{rgb:'D1DAE8'}}, left:{style:'thin',color:{rgb:'D1DAE8'}}, right:{style:'thin',color:{rgb:'D1DAE8'}} }
  };
  const totalRows = 1 + dataRows.length;
  const totalCols = 10;
  for (let R = 0; R < totalRows; R++) {
    for (let C = 0; C < totalCols; C++) {
      const addr = XLSX.utils.encode_cell({ r:R, c:C });
      if (!ws[addr]) ws[addr] = { t:'s', v:'' };
      if (R === 0) ws[addr].s = headerStyle;
      else ws[addr].s = dataRows[R-1][0] !== '' ? tcTitleStyle : stepStyle;
    }
  }
  ws['!cols'] = [18,10,12,14,20,18,16,20,20,20].map(w=>({wch:w}));
  ws['!rows'] = [{ hpt:22 }];
}

// Export TC แยก Sheet ตาม Project > Task
function exportTCsByTeam(teamProjects, teamTasks, teamTCs, showToast) {
  const wb = XLSX.utils.book_new();
  let totalSheets = 0;

  teamProjects.forEach(proj => {
    const projTasks = teamTasks.filter(t => t.projectId === proj.id);
    projTasks.forEach(task => {
      const tcs = teamTCs.filter(tc => tc.taskId === task.id);
      if (!tcs.length) return;
      // ชื่อ Sheet: "ProjName - TaskName" (ตัดให้ไม่เกิน 31 ตัวอักษร ตาม Excel limit)
      const rawName = `${proj.name} - ${task.name}`;
      const sheetName = rawName.replace(/[\\\/\?\*\[\]]/g,'').substring(0, 31);
      const rows = buildTCSheetRows(tcs);
      const ws = XLSX.utils.aoa_to_sheet(rows);
      applyTCSheetStyle(ws, rows.slice(1));
      XLSX.utils.book_append_sheet(wb, ws, sheetName);
      totalSheets++;
    });

    // ถ้าไม่มี task ที่มี TC เลย ให้สร้าง sheet ว่าง (แสดง project ยังไม่มี TC)
    if (!projTasks.some(t => teamTCs.some(tc => tc.taskId === t.id))) {
      const sheetName = proj.name.replace(/[\\\/\?\*\[\]]/g,'').substring(0, 31) || 'No Task';
      const ws = XLSX.utils.aoa_to_sheet([['ยังไม่มี Test Case ใน Project นี้']]);
      XLSX.utils.book_append_sheet(wb, ws, sheetName);
      totalSheets++;
    }
  });

  if (totalSheets === 0) { showToast('ไม่มีข้อมูลสำหรับ Export', 'error'); return; }
  XLSX.writeFile(wb, 'TestCases_ByTeam.xlsx');
  showToast(`Export TC สำเร็จ — ${totalSheets} Sheets`);
}

// Export Defect แยก Sheet ตาม Project > Task
function exportDefectsByTeam(teamProjects, teamTasks, teamTCs, teamDefects, showToast) {
  const wb = XLSX.utils.book_new();
  let totalSheets = 0;

  teamProjects.forEach(proj => {
    const projTasks = teamTasks.filter(t => t.projectId === proj.id);
    const projDefects = teamDefects.filter(d => {
      const ids = (Array.isArray(d.relatedTcIds) ? d.relatedTcIds : (d.relatedTcIds ? String(d.relatedTcIds).split(',').map(s=>s.trim()) : []));
      const allIds = ids.length ? ids : (d.testCaseId ? [d.testCaseId] : []);
      return allIds.some(id => {
        const tc = teamTCs.find(x => x.id === id);
        if (!tc) return false;
        const task = teamTasks.find(t => t.id === tc.taskId);
        return task?.projectId === proj.id;
      });
    });

    if (!projDefects.length) return;

    projTasks.forEach(task => {
      const taskDefects = projDefects.filter(d => {
        const ids = (Array.isArray(d.relatedTcIds) ? d.relatedTcIds : (d.relatedTcIds ? String(d.relatedTcIds).split(',').map(s=>s.trim()) : []));
        const allIds = ids.length ? ids : (d.testCaseId ? [d.testCaseId] : []);
        return allIds.some(id => {
          const tc = teamTCs.find(x => x.id === id);
          return tc?.taskId === task.id;
        });
      });
      if (!taskDefects.length) return;

      const sheetName = (`${proj.name} - ${task.name}`).replace(/[\\\/\?\*\[\]]/g,'').substring(0, 31);
      const rows = taskDefects.map(d => {
        const ids = (Array.isArray(d.relatedTcIds) ? d.relatedTcIds : (d.relatedTcIds ? String(d.relatedTcIds).split(',').map(s=>s.trim()) : []));
        const allIds = ids.length ? ids : (d.testCaseId ? [d.testCaseId] : []);
        const relTcs = allIds.map(id => teamTCs.find(x => x.id === id)).filter(Boolean);
        return {
          'Defect ID': d.defectId || '',
          'Title': d.title || '',
          'Severity': d.severity || '',
          'Status': d.status || '',
          'Related TCs': relTcs.map(t => t.title).join(', ') || '—',
          'Task': task.name,
          'Project': proj.name,
          'Target Date': d.targetDate || '',
          'Description': d.description || '',
          'Comment': d.comment || '',
          'Created At': d.createdAt || ''
        };
      });
      const ws = XLSX.utils.json_to_sheet(rows);
      ws['!cols'] = [12,24,10,12,28,16,16,12,30,20,14].map(w=>({wch:w}));
      XLSX.utils.book_append_sheet(wb, ws, sheetName);
      totalSheets++;
    });
  });

  if (totalSheets === 0) { showToast('ไม่มีข้อมูล Defect สำหรับ Export', 'error'); return; }
  XLSX.writeFile(wb, 'Defects_ByTeam.xlsx');
  showToast(`Export Defects สำเร็จ — ${totalSheets} Sheets`);
}

// ─── PROJECT DASHBOARD COMPONENT ──────────────────────────────────────────────
function ProjectDashboard({ project, ptasks, ptcs, defects, teamTasks }) {
  const sColor = s => ({'Passed':'var(--green)','Failed':'var(--red)','In Progress':'var(--accent)','Pass with Comment':'var(--cyan)','Deferred':'var(--amber)','Not Start':'var(--text3)','Cancelled':'#555'}[s]||'var(--accent)');
  const sevColor = s => ({'Critical':'var(--red)','High':'#ff6b35','Medium':'var(--amber)','Low':'var(--green)'}[s]||'var(--text3)');
  const defStatusColor = s => ({'Open':'var(--red)','In Progress':'var(--accent)','Resolved':'var(--cyan)','Closed':'var(--green)','Rejected':'var(--text3)'}[s]||'var(--text2)');

  const statuses = statusOpts.map(s => ({ s, count: ptcs.filter(tc=>tc.status===s).length }));
  const passed = ptcs.filter(tc=>tc.status==='Passed'||tc.status==='Pass with Comment').length;
  const failed = ptcs.filter(tc=>tc.status==='Failed').length;
  const inProg = ptcs.filter(tc=>tc.status==='In Progress').length;
  const notStart = ptcs.filter(tc=>tc.status==='Not Start').length;
  const total = ptcs.length;
  const passRate = total ? Math.round(passed/total*100) : 0;

  const projDefects = defects.filter(d => {
    const tc = ptcs.find(tc => tc.id === d.testCaseId || toArr(d.relatedTcIds).includes(tc.id));
    return !!tc;
  });
  const openDefs = projDefects.filter(d => d.status !== 'Closed' && d.status !== 'Rejected').length;
  const critDefs = projDefects.filter(d => d.severity === 'Critical' && d.status !== 'Closed' && d.status !== 'Rejected').length;

  const sevBreakdown = ['Critical','High','Medium','Low'].map(s => ({ s, count: projDefects.filter(d=>d.severity===s).length }));
  const defStatusBreakdown = ['Open','In Progress','Resolved','Closed','Rejected'].map(s => ({ s, count: projDefects.filter(d=>d.status===s).length }));

  // Per-task data
  const taskRows = ptasks.map(t => {
    const tcs = ptcs.filter(tc => tc.taskId === t.id);
    const tp = tcs.filter(tc=>tc.status==='Passed'||tc.status==='Pass with Comment').length;
    const tf = tcs.filter(tc=>tc.status==='Failed').length;
    const pr = tcs.length ? Math.round(tp/tcs.length*100) : 0;
    const tdefs = projDefects.filter(d => tcs.some(tc => tc.id === d.testCaseId || toArr(d.relatedTcIds).includes(tc.id)));
    return { ...t, tcs, tp, tf, pr, openDefs: tdefs.filter(d=>d.status!=='Closed'&&d.status!=='Rejected').length };
  });

  // Shared chart helpers (self-contained)
  const HBar = ({ data, colorFn, showPct }) => {
    const max = Math.max(...data.map(d=>d.count), 1);
    const tot = data.reduce((a,b)=>a+b.count,0)||1;
    return h('div',{style:{display:'flex',flexDirection:'column',gap:'10px'}},
      data.map(item => h('div',{key:item.s},
        h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'4px'}},
          h('span',{style:{fontSize:'12px',color:'var(--text2)',fontWeight:'500'}},item.s),
          h('div',{style:{display:'flex',gap:'8px',alignItems:'center'}},
            showPct&&h('span',{style:{fontSize:'10px',color:'var(--text3)',fontFamily:'var(--mono)'}},Math.round(item.count/tot*100)+'%'),
            h('span',{style:{fontSize:'13px',fontWeight:'700',color:colorFn(item.s),fontFamily:'var(--mono)',minWidth:'20px',textAlign:'right'}},item.count)
          )
        ),
        h('div',{style:{background:'var(--bg4)',borderRadius:'3px',height:'7px',overflow:'hidden'}},
          h('div',{style:{width:Math.round(item.count/max*100)+'%',height:'100%',background:colorFn(item.s),borderRadius:'3px',transition:'width 0.5s',boxShadow:`0 0 5px ${colorFn(item.s)}55`,minWidth:item.count>0?'5px':'0'}})
        )
      ))
    );
  };

  const Donut = ({ data, colorFn, size=140, thickness=24 }) => {
    const tot = data.reduce((a,b)=>a+b.count,0)||1;
    const r=(size-thickness*2)/2; const cx=size/2; const cy=size/2;
    const circ=2*Math.PI*r; let cum=0;
    const segs = data.filter(d=>d.count>0).map(d => {
      const pct=d.count/tot; const off=circ*(1-cum); const dash=circ*pct; cum+=pct;
      return {...d,off,dash};
    });
    const top = [...segs].sort((a,b)=>b.count-a.count)[0];
    return h('div',{style:{position:'relative',width:size,height:size,flexShrink:0}},
      h('svg',{width:size,height:size,viewBox:`0 0 ${size} ${size}`},
        h('circle',{cx,cy,r,fill:'none',stroke:'var(--bg4)',strokeWidth:thickness}),
        segs.map((s,i)=>h('circle',{key:i,cx,cy,r,fill:'none',stroke:colorFn(s.s),strokeWidth:thickness,
          strokeDasharray:`${s.dash} ${circ}`,strokeDashoffset:s.off,
          style:{transform:'rotate(-90deg)',transformOrigin:'center',transition:'stroke-dasharray 0.5s'}}))
      ),
      top&&h('div',{style:{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}},
        h('div',{style:{fontSize:'20px',fontWeight:'800',color:colorFn(top.s),fontFamily:'var(--mono)',lineHeight:'1'}},top.count),
        h('div',{style:{fontSize:'9px',color:'var(--text3)',maxWidth:'50px',textAlign:'center',marginTop:'2px'}},top.s)
      )
    );
  };

  const VBar = ({ data, colorFn, height=100 }) => {
    const max = Math.max(...data.map(d=>d.count),1);
    return h('div',{style:{display:'flex',alignItems:'flex-end',gap:'5px',height:height+28,paddingTop:'6px'}},
      data.map((item,i)=>{
        const bh = item.count ? Math.max(Math.round(item.count/max*height),4) : 0;
        return h('div',{key:i,style:{display:'flex',flexDirection:'column',alignItems:'center',flex:1,gap:'3px'}},
          item.count>0&&h('span',{style:{fontSize:'9px',fontWeight:'700',color:colorFn(item.s),fontFamily:'var(--mono)'}},item.count),
          h('div',{style:{width:'100%',height:bh+'px',background:colorFn(item.s),borderRadius:'3px 3px 0 0',boxShadow:`0 0 6px ${colorFn(item.s)}44`,transition:'height 0.4s'}}),
          h('div',{style:{fontSize:'8px',color:'var(--text3)',textAlign:'center',maxWidth:'40px',lineHeight:'1.2'}},item.s.slice(0,8)+(item.s.length>8?'…':''))
        );
      })
    );
  };

  const Stacked = ({ segments, total: tot2 }) => {
    const t = tot2||segments.reduce((a,b)=>a+b.count,0)||1;
    return h('div',{style:{display:'flex',height:'16px',borderRadius:'3px',overflow:'hidden',gap:'1px'}},
      segments.filter(s=>s.count>0).map((s,i)=>
        h('div',{key:i,title:`${s.s}: ${s.count}`,style:{width:`${s.count/t*100}%`,background:s.color,minWidth:'2px',transition:'width 0.5s'}})
      )
    );
  };

  const Gauge = ({ value, color='var(--green)', size=130 }) => {
    const pct=Math.min(value/100,1), angle=pct*180-90, r=45, cx=60, cy=65;
    const sx=cx-r, ex=cx+r;
    const mx=cx+r*Math.cos((angle-90)*Math.PI/180), my=cy+r*Math.sin((angle-90)*Math.PI/180);
    return h('div',{style:{position:'relative',width:size,height:size/1.6}},
      h('svg',{viewBox:'0 0 120 80',width:size,height:size/1.6},
        h('path',{d:`M ${sx} ${cy} A ${r} ${r} 0 0 1 ${ex} ${cy}`,fill:'none',stroke:'var(--bg4)',strokeWidth:'12',strokeLinecap:'round'}),
        pct>0&&h('path',{d:`M ${sx} ${cy} A ${r} ${r} 0 0 1 ${mx.toFixed(1)} ${my.toFixed(1)}`,fill:'none',stroke:color,strokeWidth:'12',strokeLinecap:'round',style:{filter:`drop-shadow(0 0 4px ${color}88)`}}),
        h('text',{x:cx,y:cy+4,textAnchor:'middle',fontSize:'16',fontWeight:'700',fill:color,fontFamily:'var(--mono)'},''+value+'%')
      )
    );
  };

  const health = passRate>=80&&critDefs===0?'Healthy':passRate>=50?'At Risk':'Critical';
  const healthColor = {'Healthy':'var(--green)','At Risk':'var(--amber)','Critical':'var(--red)'}[health];

  return h('div',{style:{display:'flex',flexDirection:'column',gap:'16px'}},
    // ── KPI Row ──
    h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(130px,1fr))',gap:'10px'}},
      [
        {label:'Total TCs',val:total,color:'var(--accent)',icon:'science'},
        {label:'Pass Rate',val:passRate+'%',color:passRate>=80?'var(--green)':passRate>=50?'var(--amber)':'var(--red)',icon:'check_circle'},
        {label:'Passed',val:passed,color:'var(--green)',icon:'done'},
        {label:'Failed',val:failed,color:'var(--red)',icon:'cancel'},
        {label:'In Progress',val:inProg,color:'var(--accent)',icon:'sync'},
        {label:'Not Started',val:notStart,color:'var(--text3)',icon:'pending'},
        {label:'Open Defects',val:openDefs,color:openDefs>0?'var(--amber)':'var(--green)',icon:'bug_report'},
        {label:'Critical',val:critDefs,color:critDefs>0?'var(--red)':'var(--text3)',icon:'warning'},
      ].map(item=>h('div',{key:item.label,
        style:{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:'6px',padding:'12px 14px',position:'relative',overflow:'hidden'},
        onMouseEnter:e=>{e.currentTarget.style.borderColor=item.color;e.currentTarget.style.boxShadow=`0 4px 16px ${item.color}22`},
        onMouseLeave:e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.boxShadow='none'}
      },
        h('div',{style:{position:'absolute',top:0,left:0,right:0,height:'2px',background:item.color,opacity:0.7}}),
        h('div',{style:{fontSize:'9px',color:'var(--text3)',textTransform:'uppercase',letterSpacing:'1px',fontWeight:'700',marginBottom:'6px'}},''+item.label),
        h('div',{style:{fontSize:'26px',fontWeight:'800',color:item.color,fontFamily:'var(--mono)',lineHeight:'1'}},''+item.val)
      ))
    ),
    // ── Health Score ──
    h('div',{style:{display:'grid',gridTemplateColumns:'auto 1fr',gap:'16px',background:'var(--bg2)',border:`1px solid ${healthColor}44`,borderRadius:'8px',padding:'16px 20px',alignItems:'center'}},
      h(Gauge,{value:passRate,color:passRate>=80?'var(--green)':passRate>=50?'var(--amber)':'var(--red)',size:150}),
      h('div',null,
        h('div',{style:{display:'flex',alignItems:'center',gap:'10px',marginBottom:'10px'}},
          h('span',{style:{fontSize:'16px',fontWeight:'700'}},'Project Health'),
          h('span',{style:{padding:'3px 10px',borderRadius:'3px',fontSize:'12px',fontWeight:'700',background:healthColor+'22',color:healthColor,border:`1px solid ${healthColor}44`}},health)
        ),
        h('div',{style:{marginBottom:'8px'}},
          h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:'5px'}},
            h('span',{style:{fontSize:'11px',color:'var(--text3)'}},'TC Execution'),
            h('span',{style:{fontSize:'11px',color:'var(--text3)',fontFamily:'var(--mono)'}},`${total-notStart}/${total}`)

          h(Stacked,{total,segments:[
            {s:'Passed',count:passed,color:'var(--green)'},
            {s:'Pass w/ Comment',count:ptcs.filter(tc=>tc.status==='Pass with Comment').length,color:'var(--cyan)'},
            {s:'In Progress',count:inProg,color:'var(--accent)'},
            {s:'Failed',count:failed,color:'var(--red)'},
            {s:'Deferred',count:ptcs.filter(tc=>tc.status==='Deferred').length,color:'var(--amber)'},
            {s:'Not Start',count:notStart,color:'var(--bg4)'},
          ]})
        ),
        h('div',{style:{display:'flex',gap:'12px',flexWrap:'wrap'}},
          [{s:'Passed',count:passed,c:'var(--green)'},{s:'Failed',count:failed,c:'var(--red)'},{s:'In Progress',count:inProg,c:'var(--accent)'},{s:'Not Start',count:notStart,c:'var(--text3)'}]
          .map(r=>h('div',{key:r.s,style:{display:'flex',alignItems:'center',gap:'5px'}},
            h('div',{style:{width:'8px',height:'8px',borderRadius:'2px',background:r.c}}),

    // ── Charts Row ──
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'14px'}},
      h('div',{className:'card'},
        h('div',{className:'card-header'},
          h('div',null,h('h3',{className:'card-title'},'TC Status'),h('p',{style:{fontSize:'11px',color:'var(--text3)',marginTop:'2px'}},'Breakdown'))

                  h('div',{style:{display:'flex',alignItems:'center',gap:'8px'}},
                    h('div',{style:{flex:1,background:'var(--bg4)',borderRadius:'2px',height:'6px',overflow:'hidden',minWidth:'40px'}},
                      h('div',{style:{width:`${t.pr}%`,height:'100%',background:t.pr>=80?'var(--green)':t.pr>=50?'var(--amber)':'var(--red)',borderRadius:'2px',transition:'width 0.4s'}})
                    ),
                    h('span',{style:{fontSize:'12px',fontWeight:'700',color:t.pr>=80?'var(--green)':t.pr>=50?'var(--amber)':'var(--red)',fontFamily:'var(--mono)',minWidth:'36px'}},''+t.pr+'%')
                  )

                h('td',{style:{padding:'10px 12px',fontFamily:'var(--mono)',fontSize:'12px',color:t.openDefs>0?'var(--amber)':'var(--text3)',borderBottom:'1px solid var(--border)'}},t.openDefs),
                h('td',{style:{padding:'10px 12px',borderBottom:'1px solid var(--border)'}},
                  h('span',{className:`badge ${t.status==='Completed'?'badge-green':t.status==='Active'?'badge-blue':'badge-gray'}`},t.status||'Active')
                )
              )
            ))
          )
        )
    ),
    // ── Defect Detail List ──
    projDefects.length > 0 && h('div',{className:'card'},
      h('div',{className:'card-header'},
        h('h3',{className:'card-title'},'Defect List'),
        h('span',{style:{fontSize:'12px',color:'var(--text3)'}},projDefects.length+' Defects · '+openDefs+' Open')
      ),
      h('div',{style:{overflowX:'auto'}},
        h('table',{style:{width:'100%',borderCollapse:'collapse'}},
          h('thead',null,h('tr',null,
            ['ID','Title','Severity','Status','Priority'].map(col=>
              h('th',{key:col,style:{padding:'8px 12px',textAlign:'left',fontSize:'11px',fontWeight:'700',color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.8px',borderBottom:'1px solid var(--border)'}},col)
            )
          )),
          h('tbody',null,projDefects.slice(0,10).map(d=>
            h('tr',{key:d.id,
              onMouseEnter:e=>e.currentTarget.style.background='var(--bg3)',
              onMouseLeave:e=>e.currentTarget.style.background='transparent'
            },
              h('td',{style:{padding:'8px 12px',borderBottom:'1px solid var(--border)',fontFamily:'var(--mono)',fontSize:'11px',color:'var(--text3)'}},''+( d.defectId||d.id.slice(0,8))),
              h('td',{style:{padding:'8px 12px',borderBottom:'1px solid var(--border)',fontSize:'12px',fontWeight:'500',maxWidth:'220px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},''+d.title),
              h('td',{style:{padding:'8px 12px',borderBottom:'1px solid var(--border)'}},h('span',{style:{color:sevColor(d.severity),fontWeight:'600',fontSize:'12px'}},''+( d.severity||'—'))),
              h('td',{style:{padding:'8px 12px',borderBottom:'1px solid var(--border)'}},h('span',{className:`badge ${d.status==='Closed'?'badge-green':d.status==='Open'?'badge-red':d.status==='Resolved'?'badge-cyan':'badge-amber'}`},''+( d.status||'—'))),
              h('td',{style:{padding:'8px 12px',borderBottom:'1px solid var(--border)'}},h('span',{className:`badge ${PRIORITY_COLORS[d.priority]||'badge-gray'}`},''+( d.priority||'—')))
            )
          ))
        )
      )
    )
  );
}

// ─── TASK DASHBOARD COMPONENT ─────────────────────────────────────────────────
function TaskDashboard({ task, project, taskTCs, taskDefects, defects }) {
  const sColor = s => ({'Passed':'var(--green)','Failed':'var(--red)','In Progress':'var(--accent)','Pass with Comment':'var(--cyan)','Deferred':'var(--amber)','Not Start':'var(--text3)','Cancelled':'#555'}[s]||'var(--accent)');
  const sevColor = s => ({'Critical':'var(--red)','High':'#ff6b35','Medium':'var(--amber)','Low':'var(--green)'}[s]||'var(--text3)');
  const priColor = s => ({'Critical':'var(--red)','High':'#ff6b35','Medium':'var(--amber)','Low':'var(--green)'}[s]||'var(--text3)');

  const statuses = statusOpts.map(s => ({ s, count: taskTCs.filter(tc=>tc.status===s).length }));
  const priorities = ['Critical','High','Medium','Low'].map(s => ({ s, count: taskTCs.filter(tc=>tc.priority===s).length }));
  const detections = ['Positive','Negative','Edge Case','Performance'].map(s => ({ s, count: taskTCs.filter(tc=>tc.detection===s).length }));
  const total = taskTCs.length;
  const passed = taskTCs.filter(tc=>tc.status==='Passed'||tc.status==='Pass with Comment').length;
  const failed = taskTCs.filter(tc=>tc.status==='Failed').length;
  const inProg = taskTCs.filter(tc=>tc.status==='In Progress').length;
  const notStart = taskTCs.filter(tc=>tc.status==='Not Start').length;
  const passRate = total ? Math.round(passed/total*100) : 0;

  const openDefs = taskDefects.filter(d=>d.status!=='Closed'&&d.status!=='Rejected').length;
  const critDefs = taskDefects.filter(d=>d.severity==='Critical'&&d.status!=='Closed').length;
  const sevBreakdown = ['Critical','High','Medium','Low'].map(s => ({ s, count: taskDefects.filter(d=>d.severity===s).length }));
  const defStatusBreakdown = ['Open','In Progress','Resolved','Closed','Rejected'].map(s => ({ s, count: taskDefects.filter(d=>d.status===s).length }));

  // Shared chart helpers
  const HBar = ({ data, colorFn, showPct }) => {
    const max = Math.max(...data.map(d=>d.count),1);
    const tot = data.reduce((a,b)=>a+b.count,0)||1;
    return h('div',{style:{display:'flex',flexDirection:'column',gap:'9px'}},
      data.map(item=>h('div',{key:item.s},
        h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'4px'}},
          h('span',{style:{fontSize:'12px',color:'var(--text2)',fontWeight:'500'}},item.s),
          h('div',{style:{display:'flex',gap:'7px',alignItems:'center'}},
            showPct&&h('span',{style:{fontSize:'10px',color:'var(--text3)',fontFamily:'var(--mono)'}},Math.round(item.count/tot*100)+'%'),
            h('span',{style:{fontSize:'13px',fontWeight:'700',color:colorFn(item.s),fontFamily:'var(--mono)',minWidth:'20px',textAlign:'right'}},item.count)
          )
        ),
        h('div',{style:{background:'var(--bg4)',borderRadius:'3px',height:'7px',overflow:'hidden'}},
          h('div',{style:{width:Math.round(item.count/max*100)+'%',height:'100%',background:colorFn(item.s),borderRadius:'3px',transition:'width 0.5s',boxShadow:`0 0 5px ${colorFn(item.s)}55`,minWidth:item.count>0?'4px':'0'}})
        )
      ))
    );
  };

  const Donut = ({ data, colorFn, size=130, thickness=22 }) => {
    const tot=data.reduce((a,b)=>a+b.count,0)||1;
    const r=(size-thickness*2)/2; const cx=size/2; const cy=size/2;
    const circ=2*Math.PI*r; let cum=0;
    const segs=data.filter(d=>d.count>0).map(d=>{const pct=d.count/tot;const off=circ*(1-cum);const dash=circ*pct;cum+=pct;return{...d,off,dash};});
    const top=[...segs].sort((a,b)=>b.count-a.count)[0];
    return h('div',{style:{position:'relative',width:size,height:size,flexShrink:0}},
      h('svg',{width:size,height:size,viewBox:`0 0 ${size} ${size}`},
        h('circle',{cx,cy,r,fill:'none',stroke:'var(--bg4)',strokeWidth:thickness}),
        segs.map((s,i)=>h('circle',{key:i,cx,cy,r,fill:'none',stroke:colorFn(s.s),strokeWidth:thickness,strokeDasharray:`${s.dash} ${circ}`,strokeDashoffset:s.off,style:{transform:'rotate(-90deg)',transformOrigin:'center'}}))
      ),
      top&&h('div',{style:{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}},
        h('div',{style:{fontSize:'18px',fontWeight:'800',color:colorFn(top.s),fontFamily:'var(--mono)',lineHeight:'1'}},top.count),
        h('div',{style:{fontSize:'9px',color:'var(--text3)',maxWidth:'48px',textAlign:'center',marginTop:'2px'}},top.s)
      )
    );
  };

  const Stacked = ({segments,total:tot2})=>{
    const t=tot2||segments.reduce((a,b)=>a+b.count,0)||1;
    return h('div',{style:{display:'flex',height:'14px',borderRadius:'3px',overflow:'hidden',gap:'1px'}},
      segments.filter(s=>s.count>0).map((s,i)=>h('div',{key:i,title:`${s.s}: ${s.count}`,style:{width:`${s.count/t*100}%`,background:s.color,minWidth:'2px',transition:'width 0.5s'}}))
    );
  };

  const Gauge = ({ value, color='var(--green)', size=140 }) => {
    const pct=Math.min(value/100,1),angle=pct*180-90,r=45,cx=60,cy=65;
    const sx=cx-r,ex=cx+r,mx=cx+r*Math.cos((angle-90)*Math.PI/180),my=cy+r*Math.sin((angle-90)*Math.PI/180);
    return h('div',{style:{position:'relative',width:size,height:size/1.6}},
      h('svg',{viewBox:'0 0 120 80',width:size,height:size/1.6},
        h('path',{d:`M ${sx} ${cy} A ${r} ${r} 0 0 1 ${ex} ${cy}`,fill:'none',stroke:'var(--bg4)',strokeWidth:'12',strokeLinecap:'round'}),
        pct>0&&h('path',{d:`M ${sx} ${cy} A ${r} ${r} 0 0 1 ${mx.toFixed(1)} ${my.toFixed(1)}`,fill:'none',stroke:color,strokeWidth:'12',strokeLinecap:'round',style:{filter:`drop-shadow(0 0 4px ${color}88)`}}),
        h('text',{x:cx,y:cy+4,textAnchor:'middle',fontSize:'16',fontWeight:'700',fill:color,fontFamily:'var(--mono)'},''+value+'%')
      )
    );
  };

  const passColor = passRate>=80?'var(--green)':passRate>=50?'var(--amber)':'var(--red)';

  return h('div',{style:{display:'flex',flexDirection:'column',gap:'16px'}},
    // ── KPI Row ──
    h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(120px,1fr))',gap:'10px'}},
      [
        {label:'Total TCs',val:total,color:'var(--accent)'},
        {label:'Pass Rate',val:passRate+'%',color:passColor},
        {label:'Passed',val:passed,color:'var(--green)'},
        {label:'Failed',val:failed,color:failed>0?'var(--red)':'var(--text3)'},
        {label:'In Progress',val:inProg,color:inProg>0?'var(--accent)':'var(--text3)'},
        {label:'Not Started',val:notStart,color:'var(--text3)'},
        {label:'Open Defects',val:openDefs,color:openDefs>0?'var(--amber)':'var(--green)'},
        {label:'Critical Defs',val:critDefs,color:critDefs>0?'var(--red)':'var(--text3)'},
      ].map(item=>h('div',{key:item.label,
        style:{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:'6px',padding:'12px',position:'relative',overflow:'hidden'},
        onMouseEnter:e=>{e.currentTarget.style.borderColor=item.color;e.currentTarget.style.boxShadow=`0 4px 12px ${item.color}22`},
        onMouseLeave:e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.boxShadow='none'}
      },
        h('div',{style:{position:'absolute',top:0,left:0,right:0,height:'2px',background:item.color}}),
        h('div',{style:{fontSize:'9px',color:'var(--text3)',textTransform:'uppercase',letterSpacing:'1px',fontWeight:'700',marginBottom:'5px'}},''+item.label),
        h('div',{style:{fontSize:'24px',fontWeight:'800',color:item.color,fontFamily:'var(--mono)',lineHeight:'1'}},''+item.val)
      ))
    ),

    // ── Gauge + Stacked ──
    h('div',{style:{display:'grid',gridTemplateColumns:'auto 1fr',gap:'16px',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'8px',padding:'16px 20px',alignItems:'center'}},
      h(Gauge,{value:passRate,color:passColor,size:150}),
      h('div',{style:{flex:1}},
        h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'8px'}},
          h('span',{style:{fontSize:'14px',fontWeight:'600'}},'Execution Progress'),
          h('span',{style:{fontSize:'12px',color:'var(--text3)',fontFamily:'var(--mono)'}},`${total-notStart} / ${total} executed`)
        ),
        h(Stacked,{total,segments:[
          {s:'Passed',count:passed,color:'var(--green)'},
          {s:'Pass w/Comment',count:taskTCs.filter(tc=>tc.status==='Pass with Comment').length,color:'var(--cyan)'},
          {s:'In Progress',count:inProg,color:'var(--accent)'},
          {s:'Failed',count:failed,color:'var(--red)'},
          {s:'Deferred',count:taskTCs.filter(tc=>tc.status==='Deferred').length,color:'var(--amber)'},
          {s:'Not Start',count:notStart,color:'var(--bg4)'},
        ]}),
        h('div',{style:{display:'flex',gap:'10px',marginTop:'10px',flexWrap:'wrap'}},
          [{s:'Passed',c:'var(--green)',n:passed},{s:'Failed',c:'var(--red)',n:failed},{s:'In Progress',c:'var(--accent)',n:inProg},{s:'Not Start',c:'var(--text3)',n:notStart}]
          .map(r=>h('div',{key:r.s,style:{display:'flex',alignItems:'center',gap:'5px'}},
            h('div',{style:{width:'7px',height:'7px',borderRadius:'2px',background:r.c}}),
            h('span',{style:{fontSize:'11px',color:'var(--text2)'}},''+r.s),
            h('span',{style:{fontSize:'11px',fontWeight:'700',color:r.c,fontFamily:'var(--mono)',marginLeft:'3px'}},r.n)
          ))
        )
      )
    ),

    // ── Charts 2×2 ──
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'14px'}},
      h('div',{className:'card'},
        h('div',{className:'card-header'},h('h3',{className:'card-title'},'TC Status Distribution')),
        h('div',{style:{display:'flex',gap:'14px',alignItems:'center'}},
          h(Donut,{data:statuses,colorFn:sColor,size:120,thickness:20}),
          h('div',{style:{flex:1}},h(HBar,{data:statuses.filter(s=>s.count>0),colorFn:sColor,showPct:true}))
        )
      ),
      h('div',{className:'card'},
        h('div',{className:'card-header'},h('h3',{className:'card-title'},'TC Priority Breakdown')),
        h('div',{style:{display:'flex',gap:'14px',alignItems:'center'}},
          h(Donut,{data:priorities,colorFn:priColor,size:120,thickness:20}),
          h('div',{style:{flex:1}},h(HBar,{data:priorities.filter(s=>s.count>0),colorFn:priColor,showPct:true}))
        )
      ),
      h('div',{className:'card'},
        h('div',{className:'card-header'},h('h3',{className:'card-title'},'Defect Severity')),
        taskDefects.length===0
          ? h('div',{style:{textAlign:'center',padding:'24px',color:'var(--green)',fontSize:'13px'}},h('span',{className:'ms ms-lg',style:{display:'block',marginBottom:'8px'}},'check_circle'),'ไม่มี Defect ✓')
          : h('div',{style:{display:'flex',gap:'14px',alignItems:'center'}},
            h(Donut,{data:sevBreakdown,colorFn:sevColor,size:120,thickness:20}),
            h('div',{style:{flex:1}},h(HBar,{data:sevBreakdown.filter(s=>s.count>0),colorFn:sevColor,showPct:true}))
          )
      ),
      h('div',{className:'card'},
        h('div',{className:'card-header'},h('h3',{className:'card-title'},'Defect Status')),
        taskDefects.length===0
          ? h('div',{style:{textAlign:'center',padding:'24px',color:'var(--green)',fontSize:'13px'}},h('span',{className:'ms ms-lg',style:{display:'block',marginBottom:'8px'}},'verified'),'No Defects Found ✓')
          : h('div',{style:{flex:1}},h(HBar,{data:defStatusBreakdown.filter(s=>s.count>0),colorFn:s=>({'Open':'var(--red)','In Progress':'var(--accent)','Resolved':'var(--cyan)','Closed':'var(--green)','Rejected':'var(--text3)'}[s]||'var(--text2)'),showPct:true}))
      )
    ),

    // ── Detection type breakdown ──
    detections.some(d=>d.count>0) && h('div',{className:'card'},
      h('div',{className:'card-header'},h('h3',{className:'card-title'},'Detection Type Distribution')),
      h(HBar,{data:detections.filter(d=>d.count>0),colorFn:s=>({'Positive':'var(--green)','Negative':'var(--red)','Edge Case':'var(--amber)','Performance':'var(--cyan)'}[s]||'var(--text2)'),showPct:true})
    ),

    // ── Defect detail table ──
    taskDefects.length > 0 && h('div',{className:'card'},
      h('div',{className:'card-header'},
        h('h3',{className:'card-title'},'Defect List'),
        h('span',{style:{fontSize:'12px',color:'var(--text3)'}},taskDefects.length+' total · '+openDefs+' open')
      ),
      h('div',{style:{overflowX:'auto'}},
        h('table',{style:{width:'100%',borderCollapse:'collapse'}},
          h('thead',null,h('tr',null,
            ['ID','Title','Severity','Status','Priority','Related TC'].map(col=>
              h('th',{key:col,style:{padding:'8px 12px',textAlign:'left',fontSize:'11px',fontWeight:'700',color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.8px',borderBottom:'1px solid var(--border)'}},col)
            )
          )),
          h('tbody',null,taskDefects.map(d=>{
            const relTc = taskTCs.find(tc=>tc.id===d.testCaseId||toArr(d.relatedTcIds).includes(tc.id));
            return h('tr',{key:d.id,
              onMouseEnter:e=>e.currentTarget.style.background='var(--bg3)',
              onMouseLeave:e=>e.currentTarget.style.background='transparent'
            },
              h('td',{style:{padding:'8px 12px',borderBottom:'1px solid var(--border)',fontFamily:'var(--mono)',fontSize:'11px',color:'var(--text3)'}},d.defectId||d.id.slice(0,8)),
              h('td',{style:{padding:'8px 12px',borderBottom:'1px solid var(--border)',fontSize:'12px',fontWeight:'500',maxWidth:'200px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},d.title),
              h('td',{style:{padding:'8px 12px',borderBottom:'1px solid var(--border)'}},h('span',{style:{color:sevColor(d.severity),fontWeight:'600',fontSize:'12px'}},d.severity||'—')),
              h('td',{style:{padding:'8px 12px',borderBottom:'1px solid var(--border)'}},h('span',{className:`badge ${d.status==='Closed'?'badge-green':d.status==='Open'?'badge-red':d.status==='Resolved'?'badge-cyan':'badge-amber'}`},d.status||'—')),
              h('td',{style:{padding:'8px 12px',borderBottom:'1px solid var(--border)'}},h('span',{className:`badge ${PRIORITY_COLORS[d.priority]||'badge-gray'}`},d.priority||'—')),
              h('td',{style:{padding:'8px 12px',borderBottom:'1px solid var(--border)',fontSize:'11px',color:'var(--text3)',maxWidth:'140px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},relTc?relTc.title:'—')
            );
          }))
        )
      )
    )
  );
}

// ─── PROJECT DETAIL PAGE ──────────────────────────────────────────────────────
function ProjectDetailPage({ navCtx, projects, tasks, setTasks, testCases, setTestCases, defects, setDefects, setTasksState, setTestCasesState, setDefectsState, teamTCs, teamTasks, currentUser, currentTeam, canEdit, canDelete, showToast, addLog, navigate, USE_GAS, isUnlimitedPlan }) {
  const project = projects.find(p => p.id === navCtx.projectId);
  const [showModal, setShowModal] = useState(false);
  const [editTask, setEditTask] = useState(null);
  const [form, setForm] = useState({ name:'', description:'', status:'Active', priority:'Medium', assignee:'' });
  const [delConfirm, setDelConfirm] = useState(null);
  const [tab, setTab] = useState('tasks');

  if (!project) return h('div',{className:'empty'},h('div',null,'ไม่พบ Project'));
  const ptasks = tasks.filter(t => t.projectId === project.id && !t.isDeleted && t.isDeleted !== 'true');
  const ptcs = teamTCs.filter(tc => ptasks.some(t => t.id === tc.taskId));

  const save = () => {
    if (!form.name.trim()) { showToast('กรุณาใส่ชื่อ Task','error'); return; }
    if (editTask) {
      setTasks(p => p.map(x => x.id===editTask.id ? {...x,...form,updatedAt:now(),updatedBy:currentUser.id} : x));
      addLog('Update Task', `แก้ไข Task: ${form.name}`);
      showToast('อัพเดท Task สำเร็จ');
    } else {
      const nt = { id:uid(), projectId:project.id, createdBy:currentUser.id, createdAt:now(), ...form };
      setTasks(p => [...p, nt]);
      addLog('Create Task', `สร้าง Task: ${form.name} ใน Project: ${project.name}`);
      showToast('สร้าง Task สำเร็จ');
    }
    setShowModal(false);
  };

  const openCreate = () => { setForm({name:'',description:'',status:'Active',priority:'Medium',assignee:''}); setEditTask(null); setShowModal(true); };
  // [v26-FIX] ใช้ isUnlimitedPlan prop แทน window check
  const ptasksForLimit=(tasks||[]).filter(t=>t.projectId===project?.id&&!t.isDeleted&&t.isDeleted!=='true');
  const atTaskLimit=!isUnlimitedPlan&&ptasksForLimit.length>=2;
  const openEdit = (t) => { setForm({name:t.name,description:t.description||'',status:t.status||'Active',priority:t.priority||'Medium',assignee:t.assignee||''}); setEditTask(t); setShowModal(true); };

  const deleteTask = async (t) => {
    // cascade soft-delete: defects → testCases → task
    const taskTCIds = testCases.filter(tc => tc.taskId === t.id).map(tc => tc.id);
    const taskDefIds = defects.filter(d => {
      const tc = testCases.find(x => x.id === d.testCaseId);
      return tc && tc.taskId === t.id;
    }).map(d => d.id);

    setDelConfirm(null);

    // [FIX-DEL] Optimistic update local state ก่อน
    const ts = now();
    setDefectsState(prev => prev.map(d => taskDefIds.includes(d.id) ? {...d, isDeleted: true, updatedAt: ts} : d));
    setTestCasesState(prev => prev.map(tc => taskTCIds.includes(tc.id) ? {...tc, isDeleted: true, updatedAt: ts} : tc));
    setTasksState(prev => prev.map(x => x.id === t.id ? {...x, isDeleted: true, updatedAt: ts} : x));

    if (USE_GAS) {
      try {
        // [FIX-TEAMID] ส่ง teamId ไปกับ delete — GAS ต้องใช้ verify permissions
        const tid = currentTeam?.id;
        await Promise.all([
          ...taskDefIds.map(id => api.delete('defects', id, tid)),
          ...taskTCIds.map(id => api.delete('testCases', id, tid)),
          api.delete('tasks', t.id, tid),
        ]);
        addLog('Delete Task', `ลบ Task: ${t.name}`);
        showToast(`ลบ Task "${t.name}" สำเร็จ`);
      } catch(e) {
        console.error('deleteTask error:', e.message);
        // [FIX-DEL] Rollback local state เมื่อ GAS ล้มเหลว
        setDefectsState(prev => prev.map(d => taskDefIds.includes(d.id) ? {...d, isDeleted: false} : d));
        setTestCasesState(prev => prev.map(tc => taskTCIds.includes(tc.id) ? {...tc, isDeleted: false} : tc));
        setTasksState(prev => prev.map(x => x.id === t.id ? {...x, isDeleted: false} : x));
        showToast(`ลบล้มเหลว: ${e.message} — กรุณาลองใหม่`, 'error');
      }
    } else {
      addLog('Delete Task', `ลบ Task: ${t.name}`);
      showToast(`ลบ Task "${t.name}" สำเร็จ`);
    }
  };

  const statuses = statusOpts.map(s=>({s,count:ptcs.filter(tc=>tc.status===s).length}));
  const passed = ptcs.filter(tc=>tc.status==='Passed'||tc.status==='Pass with Comment').length;
  const passRate = ptcs.length ? Math.round(passed/ptcs.length*100) : 0;

  return h('div', null,
    h('div', { className:'breadcrumb' },
      h('a', { onClick:()=>navigate('projects') }, 'Projects'),
      h('span',{className:'breadcrumb-sep'},'>'),
      h('span', null, project.name)
    ),
    h('div', { className:'page-header' },
      h('div', null,
        h('h1',{className:'page-title'},project.name),
        h('p',{className:'page-subtitle'},project.description||'')
      ),
      (()=>{

      h('div',{className:'stat-card'},h('div',{className:'stat-label'},'Test Cases'),h('div',{className:'stat-value',style:{color:'var(--purple)'}},ptcs.length)),
      h('div',{className:'stat-card'},h('div',{className:'stat-label'},'Pass Rate'),h('div',{className:'stat-value',style:{color:'var(--green)'}},`${passRate}%`)),
      h('div',{className:'stat-card'},h('div',{className:'stat-label'},'Failed'),h('div',{className:'stat-value',style:{color:'var(--red)'}},ptcs.filter(tc=>tc.status==='Failed').length)),

    h('div',{className:'tabs'},

    tab==='tasks' && h('div',null,
      ptasks.length===0?h('div',{className:'empty'},h('span',{className:'ms ms-xxl',style:{opacity:0.4,display:'block',marginBottom:'14px',color:'var(--text3)'}},'folder_open'),h('div',{className:'empty-title'},'ยังไม่มี Task'),canEdit&&h('button',{className:'btn btn-primary',style:{marginTop:'12px'},onClick:openCreate},'+ New Task')):
      h('div',{className:'table-wrap'},
        h('table',null,
          h('thead',null,h('tr',null,
            h('th',null,'Task'),h('th',null,'Priority'),h('th',null,'Status'),h('th',null,'TCs'),h('th',null,'Pass%'),h('th',null,'')
          )),
          h('tbody',null,ptasks.map(t=>{
            const ttcs=ptcs.filter(tc=>tc.taskId===t.id);
            const tp=ttcs.filter(tc=>tc.status==='Passed'||tc.status==='Pass with Comment').length;
            const tpr=ttcs.length?Math.round(tp/ttcs.length*100):0;
            return h('tr',{key:t.id},
              h('td',null,h('span',{className:'tc-title',onClick:()=>navigate('task-detail',{taskId:t.id,projectId:project.id})},t.name)),
              h('td',null,h('span',{className:`badge ${PRIORITY_COLORS[t.priority]||'badge-gray'}`},t.priority||'—')),
              h('td',null,h('span',{className:`badge ${t.status==='Completed'?'badge-green':'badge-blue'}`},t.status||'Active')),
              h('td',null,ttcs.length),
              h('td',null,h('div',{style:{display:'flex',alignItems:'center',gap:'8px'}},
                h('div',{className:'progress-bar',style:{width:'60px'}},h('div',{className:'progress-fill',style:{width:`${tpr}%`,background:tpr>70?'var(--green)':tpr>40?'var(--amber)':'var(--red)'}})),
                h('span',{style:{fontSize:'12px',color:'var(--text2)'}},`${tpr}%`)
              )),
              h('td',null,h('div',{style:{display:'flex',gap:'6px'}},
                canEdit&&h('button',{className:'btn btn-sm',onClick:e=>{e.stopPropagation();openEdit(t);}},'แก้ไข'),
                canDelete&&h('button',{className:'btn btn-sm btn-danger',onClick:e=>{e.stopPropagation();setDelConfirm(t);}},'ลบ')
              ))
            );
          }))
        )
      )
    ),
    tab==='dashboard' && h(ProjectDashboard, { project, ptasks, ptcs, defects, teamTasks }),
    showModal && h(Modal,{title:editTask?'แก้ไข Task':'สร้าง Task ใหม่',onClose:()=>setShowModal(false)},
      h('div',{className:'form-group'},h('label',{className:'form-label'},'ชื่อ Task ',h('span',{className:'req'},'*')),h('input',{className:'form-input',value:form.name,onChange:e=>setForm(p=>({...p,name:e.target.value}))})),
      h('div',{className:'form-group'},h('label',{className:'form-label'},'คำอธิบาย'),h('textarea',{className:'form-textarea',value:form.description,onChange:e=>setForm(p=>({...p,description:e.target.value}))})),
      h('div',{className:'form-row'},
        h('div',{className:'form-group'},h('label',{className:'form-label'},'Priority'),h('select',{className:'form-select',value:form.priority,onChange:e=>setForm(p=>({...p,priority:e.target.value}))},priorityOpts.map(o=>h('option',{key:o,value:o},o)))),
        h('div',{className:'form-group'},h('label',{className:'form-label'},'สถานะ'),h('select',{className:'form-select',value:form.status,onChange:e=>setForm(p=>({...p,status:e.target.value}))},['Active','In Progress','Completed','On Hold'].map(o=>h('option',{key:o,value:o},o))))
      ),
      h('div',{className:'modal-footer'},h('button',{className:'btn',onClick:()=>setShowModal(false)},'ยกเลิก'),h('button',{className:'btn btn-primary',onClick:save},'บันทึก'))
    ),
    delConfirm&&h(ConfirmModal,{title:`ลบ Task "${delConfirm.name}"?`,message:'ข้อมูลทั้งหมดใน Task นี้ รวมถึง Test Cases และ Defects จะถูกลบทั้งหมด',danger:true,onConfirm:()=>deleteTask(delConfirm),onClose:()=>setDelConfirm(null)})
  );
}

// ─── TASK DETAIL PAGE (Test Cases) ───────────────────────────────────────────
function TaskDetailPage({ navCtx, setNavCtx, projects, tasks, testCases, setTestCases, defects, setDefects, setTestCasesState, setDefectsState, currentUser, users, currentTeam, canEdit, canDelete, showToast, addLog, navigate, openDefectModal, USE_GAS, pendingTcStatusRef, isUnlimitedPlan }) {
  const task = tasks.find(t => t.id === navCtx.taskId);
  const project = projects.find(p => p.id === navCtx.projectId);
  const [tab, setTab] = useState('testcases');
  const [showTC, setShowTC] = useState(false);
  const [editTC, setEditTC] = useState(null);
  const [search, setSearch] = useState('');
  const [filterStatus, setFilterStatus] = useState('');
  const [filterPriority, setFilterPriority] = useState('');
  const [selected, setSelected] = useState([]);
  const [delConfirm, setDelConfirm] = useState(null);
  const [cloneRename, setCloneRename] = useState(null); // {tc, pendingTitle}
  const [tcCommentPending, setTcCommentPending] = useState(null); // {tc, newStatus}
  const [tcCommentInput, setTcCommentInput] = useState('');
  const [moveModal, setMoveModal] = useState(null); // { tcIds: [] } — Move TC modal
  // [v24-SORT] Sort state for TC table
  const [tcSortField, setTcSortField] = useState('title');
  const [tcSortDir, setTcSortDir] = useState('asc');
  const toggleTcSort = (field) => {
    if (tcSortField === field) setTcSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setTcSortField(field); setTcSortDir('asc'); }
  };

  // ── Deep-link: ถ้า navCtx มี openTcId ให้เปิด TCModal ทันที ──
  useEffect(() => {
    if (!navCtx.openTcId) return;
    const tc = testCases.find(x => x.id === navCtx.openTcId);
    if (tc) { setEditTC(tc); setShowTC(true); }
    // ล้าง openTcId ออกจาก navCtx หลังใช้แล้ว
    setNavCtx(p => ({ ...p, openTcId: null }));
  }, [navCtx.openTcId]); // eslint-disable-line react-hooks/exhaustive-deps

  if (!task || !project) return h('div',{className:'empty'},'ไม่พบ Task');

  const taskTCs = testCases.filter(tc => tc.taskId === task.id && !tc.isDeleted && tc.isDeleted !== 'true');
  const filtered = taskTCs.filter(tc => {
    const matchSearch = !search || tc.title.toLowerCase().includes(search.toLowerCase()) || tc.scenarioDescription?.toLowerCase().includes(search.toLowerCase());
    const matchStatus = !filterStatus || tc.status === filterStatus;
    const matchPriority = !filterPriority || tc.priority === filterPriority;
    return matchSearch && matchStatus && matchPriority;
  }).slice().sort((a, b) => {
    const valA = (a[tcSortField] || '').toString().toLowerCase();
    const valB = (b[tcSortField] || '').toString().toLowerCase();
    return tcSortDir === 'asc' ? valA.localeCompare(valB, 'th') : valB.localeCompare(valA, 'th');
  });

  const deleteTC = async (tc) => {
    const linkedDefectIds = defects.filter(d => d.testCaseId === tc.id).map(d => d.id);
    setDelConfirm(null);

    // [FIX-DEL] Optimistic update local state ก่อน
    const ts = now();
    setTestCasesState(p => p.map(x => x.id === tc.id ? {...x, isDeleted: true, updatedAt: ts} : x));
    setDefectsState(p => p.map(x => x.testCaseId === tc.id ? {...x, isDeleted: true, updatedAt: ts} : x));

    if (USE_GAS) {
      try {
        // [FIX-TEAMID] ส่ง teamId ไปกับ delete — GAS ต้องใช้ verify permissions
        const tid = currentTeam?.id;
        await Promise.all([
          ...linkedDefectIds.map(id => api.delete('defects', id, tid)),
          api.delete('testCases', tc.id, tid),
        ]);
        addLog('Delete TC', `ลบ TC: ${tc.title}`);
        showToast('ลบ Test Case สำเร็จ');
      } catch(e) {
        console.error('deleteTC error:', e.message);
        // [FIX-DEL] Rollback local state เมื่อ GAS ล้มเหลว
        setTestCasesState(p => p.map(x => x.id === tc.id ? {...x, isDeleted: false} : x));
        setDefectsState(p => p.map(x => x.testCaseId === tc.id ? {...x, isDeleted: false} : x));
        showToast(`ลบล้มเหลว: ${e.message} — กรุณาลองใหม่`, 'error');
      }
    } else {
      addLog('Delete TC', `ลบ TC: ${tc.title}`);
      showToast('ลบ Test Case สำเร็จ');
    }
  };

  const cloneTC = (tc) => {
    setCloneRename({ tc, pendingTitle: tc.title + ' (Copy)' });
  };

  const confirmClone = () => {
    const { tc, pendingTitle } = cloneRename;
    const title = pendingTitle.trim();
    if (!title) return;
    const cloned = {
      ...tc,
      id: uid(),
      title,
      status: 'Not Start',
      assignee: '',
      comment: '',
      files: [],
      relatedTcIds: [],
      testCaseId: null,
      createdAt: now(),
      updatedAt: now(),
      createdBy: currentUser.id,
      steps: (tc.steps||[]).map(s => ({ ...s, id: uid(), actual: '', files: [] })),
    };
    setTestCases(p => [...p, cloned]);
    addLog('Clone TC', `Clone TC: ${tc.title} → ${title}`);
    showToast(`Clone "${title}" สำเร็จ`);
    setCloneRename(null);
  };

  const deleteSelected = async () => {
    const selectedSet = new Set(selected);
    const linkedDefectIds = defects.filter(d => selectedSet.has(d.testCaseId)).map(d => d.id);
    const selectedIds = [...selected];

    setSelected([]);

    // [FIX-DEL] Optimistic update local state ก่อน
    const ts = now();
    setTestCasesState(p => p.map(x => selectedSet.has(x.id) ? {...x, isDeleted: true, updatedAt: ts} : x));
    setDefectsState(p => p.map(x => selectedSet.has(x.testCaseId) ? {...x, isDeleted: true, updatedAt: ts} : x));

    if (USE_GAS) {
      try {
        // [FIX-TEAMID] ส่ง teamId ไปกับ delete — GAS ต้องใช้ verify permissions
        const tid = currentTeam?.id;
        await Promise.all([
          ...linkedDefectIds.map(id => api.delete('defects', id, tid)),
          ...selectedIds.map(id => api.delete('testCases', id, tid)),
        ]);
        addLog('Bulk Delete TC', `ลบ ${selectedIds.length} TC`);
        showToast(`ลบ ${selectedIds.length} Test Cases สำเร็จ`);
      } catch(e) {
        console.error('deleteSelected error:', e.message);
        // [FIX-DEL] Rollback local state เมื่อ GAS ล้มเหลว
        setTestCasesState(p => p.map(x => selectedSet.has(x.id) ? {...x, isDeleted: false} : x));
        setDefectsState(p => p.map(x => selectedSet.has(x.testCaseId) ? {...x, isDeleted: false} : x));
        showToast(`ลบล้มเหลว: ${e.message} — กรุณาลองใหม่`, 'error');
      }
    } else {
      addLog('Bulk Delete TC', `ลบ ${selectedIds.length} TC`);
      showToast(`ลบ ${selectedIds.length} Test Cases สำเร็จ`);
    }
  };

  const moveTCs = (tcIds, targetTaskId) => {
    setTestCases(p => p.map(x => tcIds.includes(x.id) ? { ...x, taskId: targetTaskId, updatedAt: now(), updatedBy: currentUser.id } : x));
    addLog('Move TC', `ย้าย ${tcIds.length} TC → taskId: ${targetTaskId}`);
    showToast(`ย้าย ${tcIds.length} Test Case สำเร็จ`);
    setSelected([]);
    setMoveModal(null);
  };

  const exportTCs = (scope) => {
    let list = scope==='task' ? taskTCs : scope==='selected' ? taskTCs.filter(tc=>selected.includes(tc.id)) : taskTCs;

    // สร้าง rows แบบเดียวกับ Template / Import format
    // — TC header row: Title*, Project*, Task*, ... + Step 1
    // — Step rows (2+): Title* ว่าง + step ถัดไป
    const headerRow = ['Title*','Project*','Task*','Priority','Detection','Status','Scenario Description','Tags / Labels','Test Data','Test Steps','Expected Result','Actual Result'];
    const dataRows = [];
    list.forEach(tc => {
      const steps = tc.steps && tc.steps.length ? tc.steps : [{ action:'', expected:'', actual:'' }];
      steps.forEach((s, i) => {
        if (i === 0) {
          dataRows.push([
            tc.title, project.name, task.name,
            tc.priority, tc.detection, tc.status,
            tc.scenarioDescription||'', tc.tags||'', tc.testData||'',
            s.action||'', s.expected||'', s.actual||''
          ]);
        } else {
          dataRows.push(['','','','','','','','','', s.action||'', s.expected||'', s.actual||'']);
        }
      });
    });

    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet([headerRow, ...dataRows]);

    // Column widths (same as template)
    const colWidths = [18,12,10,10,12,14,20,22,16,18,18,18];
    ws['!cols'] = colWidths.map(w=>({wch:w}));

    // Styles
    const headerStyle = {
      font:{ bold:true, color:{ rgb:'FFFFFF' }, sz:11 },
      fill:{ patternType:'solid', fgColor:{ rgb:'1E3A5F' } },
      alignment:{ horizontal:'center', vertical:'center', wrapText:true },
      border:{ top:{style:'thin',color:{rgb:'FFFFFF'}}, bottom:{style:'thin',color:{rgb:'FFFFFF'}}, left:{style:'thin',color:{rgb:'FFFFFF'}}, right:{style:'thin',color:{rgb:'FFFFFF'}} }
    };
    const tcTitleStyle = {
      font:{ bold:true, color:{ rgb:'0F2A4A' }, sz:10 },
      fill:{ patternType:'solid', fgColor:{ rgb:'D6E8FA' } },
      alignment:{ vertical:'center', wrapText:true },
      border:{ top:{style:'thin',color:{rgb:'A0BFD8'}}, bottom:{style:'thin',color:{rgb:'A0BFD8'}}, left:{style:'thin',color:{rgb:'A0BFD8'}}, right:{style:'thin',color:{rgb:'A0BFD8'}} }
    };
    const stepStyle = {
      font:{ color:{ rgb:'374151' }, sz:10 },
      fill:{ patternType:'solid', fgColor:{ rgb:'FFFFFF' } },
      alignment:{ vertical:'center', wrapText:true },
      border:{ top:{style:'thin',color:{rgb:'D1DAE8'}}, bottom:{style:'thin',color:{rgb:'D1DAE8'}}, left:{style:'thin',color:{rgb:'D1DAE8'}}, right:{style:'thin',color:{rgb:'D1DAE8'}} }
    };

    const totalRows = 1 + dataRows.length;
    const totalCols = headerRow.length;
    for (let R = 0; R < totalRows; R++) {
      for (let C = 0; C < totalCols; C++) {
        const addr = XLSX.utils.encode_cell({ r:R, c:C });
        if (!ws[addr]) ws[addr] = { t:'s', v:'' };
        if (R === 0) { ws[addr].s = headerStyle; }
        else { ws[addr].s = dataRows[R-1][0] !== '' ? tcTitleStyle : stepStyle; }
      }
    }
    ws['!rows'] = [{ hpt:22 }];

    const fname = scope==='task' ? task.name : scope==='selected' ? 'Selected_TCs' : project.name;
    XLSX.utils.book_append_sheet(wb, ws, 'TestCases');
    XLSX.writeFile(wb, `${fname.replace(/\s+/g,'_')}_TestCases.xlsx`);
    showToast('Export สำเร็จ');
  };

  const downloadTemplate = () => {
    const headerRow = ['Title*','Project*','Task*','Priority','Detection','Status','Scenario Description','Tags / Labels','Test Data','Test Steps','Expected Result','Actual Result'];
    const sample = [
      ['TC_001_Test','DEMO','Set','High','Positive','In Progress','ทดสอบเบสิค','SIT, REGRESSION, E2E','11100010010','1','Test AAAAA','AAAAA'],
      ['','','','','','','','','','2','Test BBBBB','BBBBB'],
      ['','','','','','','','','','3','Test CCCCC','CCCCC'],
      ['TC_002_Test','DEMO','Set','High','Positive','Not Start','ทดสอบเบสิค','SIT, REGRESSION, E2E','11100010011','1','Test 11111','111111'],
      ['','','','','','','','','','2','Test 22222','22222'],
    ];
    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet([headerRow, ...sample]);
    const colWidths = [18,12,10,10,12,14,20,22,16,18,18,18];
    ws['!cols'] = colWidths.map(w=>({wch:w}));

    // Style header row — dark navy bg + white bold text
    const headerStyle = {
      font: { bold: true, color: { rgb: 'FFFFFF' }, sz: 11 },
      fill: { patternType: 'solid', fgColor: { rgb: '1E3A5F' } },
      alignment: { horizontal: 'center', vertical: 'center', wrapText: true },
      border: {
        top:    { style:'thin', color:{ rgb:'FFFFFF' } },
        bottom: { style:'thin', color:{ rgb:'FFFFFF' } },
        left:   { style:'thin', color:{ rgb:'FFFFFF' } },
        right:  { style:'thin', color:{ rgb:'FFFFFF' } },
      }
    };

    // Style TC title rows (rows where Title* is filled) — light blue bg
    const tcTitleStyle = {
      font: { bold: true, color: { rgb: '0F2A4A' }, sz: 10 },
      fill: { patternType: 'solid', fgColor: { rgb: 'D6E8FA' } },
      alignment: { vertical: 'center', wrapText: true },
      border: {
        top:    { style:'thin', color:{ rgb: 'A0BFD8' } },
        bottom: { style:'thin', color:{ rgb: 'A0BFD8' } },
        left:   { style:'thin', color:{ rgb: 'A0BFD8' } },
        right:  { style:'thin', color:{ rgb: 'A0BFD8' } },
      }
    };

    // Style step rows (rows where Title* is blank) — white bg
    const stepStyle = {
      font: { color: { rgb: '374151' }, sz: 10 },
      fill: { patternType: 'solid', fgColor: { rgb: 'FFFFFF' } },
      alignment: { vertical: 'center', wrapText: true },
      border: {
        top:    { style:'thin', color:{ rgb: 'D1DAE8' } },
        bottom: { style:'thin', color:{ rgb: 'D1DAE8' } },
        left:   { style:'thin', color:{ rgb: 'D1DAE8' } },
        right:  { style:'thin', color:{ rgb: 'D1DAE8' } },
      }
    };

    const totalRows = 1 + sample.length;
    const totalCols = headerRow.length;
    for (let R = 0; R < totalRows; R++) {
      for (let C = 0; C < totalCols; C++) {
        const addr = XLSX.utils.encode_cell({ r: R, c: C });
        if (!ws[addr]) ws[addr] = { t: 's', v: '' };
        if (R === 0) {
          ws[addr].s = headerStyle;
        } else {
          const isTC = sample[R-1][0] !== '';
          ws[addr].s = isTC ? tcTitleStyle : stepStyle;
        }
      }
    }

    ws['!rows'] = [{ hpt: 22 }]; // header row height
    XLSX.utils.book_append_sheet(wb, ws, 'Template');
    XLSX.writeFile(wb, 'TestCase_Template.xlsx');
  };

  const importTCs = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const wb = XLSX.read(ev.target.result, {type:'binary'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rawRows = XLSX.utils.sheet_to_json(ws, {defval:''});
        const tcGroups = [];
        let current = null;
        rawRows.forEach(row => {
          const titleVal = (row['Title*'] || row['Title'] || '').toString().trim();
          if (titleVal) { current = { headerRow: row, stepRows: [row] }; tcGroups.push(current); }
          else if (current) { current.stepRows.push(row); }
        });
        const imported = tcGroups.map(group => {
          const hdr = group.headerRow;
          const steps = group.stepRows.map(row => ({
            id:uid(), action:(row['Test Steps']||'').toString(),
            expected:(row['Expected Result']||'').toString(),
            actual:(row['Actual Result']||'').toString(), files:[]
          })).filter(s => s.action || s.expected || s.actual);
          if (!steps.length) steps.push({ id:uid(), action:'', expected:'', actual:'', files:[] });
          return {
            id:uid(), taskId:task.id, projectId:project.id, createdBy:currentUser.id, createdAt:now(),
            title:(hdr['Title*']||hdr['Title']||'Untitled').toString().trim(),
            priority:hdr['Priority']||'Medium', detection:hdr['Detection']||'Positive',
            status:hdr['Status']||'Not Start', scenarioDescription:(hdr['Scenario Description']||'').toString(),
            tags:(hdr['Tags / Labels']||hdr['Tags/Labels']||'').toString(),
            testData:(hdr['Test Data']||'').toString(), steps, files:[], comment:''
          };
        });
        setTestCases(p=>[...p,...imported]);
        addLog('Import TC', `Import ${imported.length} TCs ลงใน Task: ${task.name}`);
        showToast(`Import ${imported.length} Test Cases สำเร็จ`);
      } catch(err) { showToast('ไม่สามารถ Import ได้ กรุณาตรวจสอบรูปแบบไฟล์','error'); }
    };
    reader.readAsBinaryString(file);
    e.target.value='';
  };

  const passed = taskTCs.filter(tc=>tc.status==='Passed'||tc.status==='Pass with Comment').length;
  const passRate = taskTCs.length ? Math.round(passed/taskTCs.length*100) : 0;
  const taskDefects = defects.filter(d => { const ids=toArr(d.relatedTcIds).length?toArr(d.relatedTcIds):(d.testCaseId?[d.testCaseId]:[]); return ids.some(id=>taskTCs.some(tc=>tc.id===id)); });

  const statuses2 = statusOpts.map(s=>({s,count:taskTCs.filter(tc=>tc.status===s).length}));

  return h('div', null,
    h('div',{className:'breadcrumb'},
      h('a',{onClick:()=>navigate('projects')},'Projects'),
      h('span',{className:'breadcrumb-sep'},'>'),
      h('a',{onClick:()=>navigate('project-detail',{projectId:project.id})},project.name),
      h('span',{className:'breadcrumb-sep'},'>'),
      h('span',null,task.name)
    ),

// ─── MOVE TC MODAL ────────────────────────────────────────────────────────────
function MoveTCModal({ tcIds, testCases, projects, tasks, currentTask, currentProject, onMove, onClose }) {
  const tcsToMove = testCases.filter(tc => tcIds.includes(tc.id));
  // เริ่มต้นที่ project ปัจจุบัน
  const [selProjectId, setSelProjectId] = useState(currentProject.id);
  const [selTaskId, setSelTaskId] = useState('');
  const [tcSearch, setTcSearch] = useState('');
  const [taskSearch, setTaskSearch] = useState('');

  // tasks ใน project ที่เลือก (ยกเว้น task ปัจจุบัน)
  const availableTasks = tasks.filter(t => t.projectId === selProjectId && t.id !== currentTask.id);
  const filteredTasks = availableTasks.filter(t => !taskSearch || t.name.toLowerCase().includes(taskSearch.toLowerCase()));

  const selProject = projects.find(p => p.id === selProjectId);
  const selTask = tasks.find(t => t.id === selTaskId);

  // จำนวน TC ใน task ปลายทาง (ข้อมูล preview)
  const targetTaskTcCount = selTaskId ? testCases.filter(tc => tc.taskId === selTaskId).length : 0;

          h('label',{className:'form-label',style:{display:'flex',alignItems:'center',gap:'6px'}},
            h('span',{className:'ms ms-xs',style:{color:'var(--cyan)'}},'checklist'),'Test Cases ที่จะย้าย',
            h('span',{style:{color:'var(--text3)',fontWeight:'400',fontSize:'11px',marginLeft:'4px'}},`(${tcIds.length} รายการ)`)
          ),
          tcIds.length>4&&h('input',{
            className:'search-input',style:{marginBottom:'8px'},
            placeholder:'ค้นหา TC...',value:tcSearch,

          h('div',{style:{border:'1px solid var(--border)',borderRadius:'var(--r)',background:'var(--bg)',maxHeight:'160px',overflowY:'auto'}},
            filteredTcsToMove.map((tc,i)=>
              h('div',{key:tc.id,style:{
                display:'flex',alignItems:'center',gap:'8px',padding:'7px 12px',
                borderBottom: i<filteredTcsToMove.length-1?'1px solid var(--border)':'none',fontSize:'13px'
              }},

              )

        ),

        // ── Summary arrow ──
        selTaskId&&h('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',gap:'10px',padding:'10px 14px',background:'var(--purple-bg)',border:'1px solid var(--purple)',borderRadius:'var(--r)',fontSize:'13px'}},
          h('span',{style:{color:'var(--text2)',fontWeight:'500'}},currentTask.name),
          h('span',{className:'ms',style:{color:'var(--purple)',fontSize:'22px'}},'arrow_forward'),
          h('div',{style:{textAlign:'center'}},
            h('div',{style:{color:'var(--purple)',fontWeight:'600'}},selTask?.name),
            h('div',{style:{fontSize:'11px',color:'var(--text3)',marginTop:'2px'}},selProject?.name,' • ',targetTaskTcCount,' TCs อยู่แล้ว → จะเป็น ',targetTaskTcCount+tcIds.length,' TCs')
          )
        )
      ),
      // ── Footer ──
      h('div',{className:'modal-footer'},
        h('button',{className:'btn',onClick:onClose},'ยกเลิก'),
        h('button',{
          className:'btn btn-primary',
          style:{background:'var(--purple)',borderColor:'var(--purple)',opacity:canConfirm?1:0.5},
          disabled:!canConfirm,
          onClick:()=>onMove(tcIds,selTaskId)
        },
          h(React.Fragment,null,
            h('span',{className:'ms ms-sm',style:{marginRight:'5px'}},'drive_file_move'),
            `ย้าย ${tcIds.length} TC${tcIds.length>1?'s':''}`
          )
        )
      )
    )
  );
}
