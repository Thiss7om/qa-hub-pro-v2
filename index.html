                h('span',{className:'ms',style:{color:'var(--green)',fontSize:'26px'}},'phonelink_lock')
              ),
              h('div',{style:{fontSize:'13px',color:'var(--text2)',lineHeight:'1.7'}},'เปิดแอป Authenticator แล้วกรอก', h('br'),'รหัส 6 หลักที่แสดงบนมือถือ')
            ),
            h('div',{className:'form-group'},
              h('label',{className:'form-label',style:{textAlign:'center',display:'block'}},'รหัสจาก Authenticator App'),
              h('input',{
                className:'form-input', type:'text', inputMode:'numeric', maxLength:7,
                value:code, placeholder:'000 000', autoFocus:true,
                onChange:e=>{ setCode(e.target.value.replace(/[^0-9 ]/g,'')); setErr(''); },
                onKeyDown:e=>e.key==='Enter'&&verify(),
                style:{textAlign:'center',fontSize:'28px',fontFamily:'var(--mono)',letterSpacing:'8px',fontWeight:'700',padding:'12px'}
              })
            ),
            err && h('div',{style:{display:'flex',alignItems:'center',gap:'6px',background:'var(--red-bg)',border:'1px solid var(--red)',borderRadius:'var(--r)',padding:'8px 12px',fontSize:'12px',color:'var(--red)',marginBottom:'8px'}},
              h('span',{className:'ms ms-xs'},'error'), err
            ),
            h('div',{style:{display:'flex',gap:'8px',marginTop:'4px'}},
              h('button',{className:'btn',style:{flex:'0 0 auto'},onClick:()=>{setStep('qr');setErr('');}},
                h('span',{className:'ms ms-xs'},'arrow_back'),' กลับ'
              ),
              h('button',{className:'btn btn-primary',style:{flex:1,justifyContent:'center'},disabled:loading||code.replace(/\s/g,'').length!==6,onClick:verify},
                loading?'กำลังยืนยัน...':h(React.Fragment,null,h('span',{className:'ms ms-sm'},'verified'),' ยืนยัน')
              )
            )
          )
        )
      )
    )
  );
}

// ─── LOGIN PAGE ───────────────────────────────────────────────────────────────
function LoginPage({ users, setUsers, setUsersState, setTeamsState, setMembersState, setProjectsState, setTasksState, setTestCasesState, setDefectsState, setLogsState, setLoginLogsState, setPendingMembersState, setLoading, loginLogs, setLoginLogs, setCurrentUser, setPage, showToast, navigate, autoJoinCode }) {
  const [email, setEmail] = useState('');
  const [pass, setPass] = useState('');
  const [confirmPass, setConfirmPass] = useState('');
  // If there's a pending invite, default to register tab if user likely hasn't registered
  const [isReg, setIsReg] = useState(false);
  const [name, setName] = useState('');
  const [err, setErr] = useState('');
  const [loginLoading, setLoginLoading] = useState(false);

  // [v23] Login lockout — client-side tracking (เสริม server-side lockout)
  const [loginFailCount, setLoginFailCount] = useState(() => {
    try { return parseInt(sessionStorage.getItem('qah_login_fail_count') || '0', 10); } catch { return 0; }
  });
  const [loginLockedUntil, setLoginLockedUntil] = useState(() => {
    try { return parseInt(sessionStorage.getItem('qah_login_locked_until') || '0', 10); } catch { return 0; }
  });
  const [lockCountdown, setLockCountdown] = useState(0);

  // ตรวจ lockout countdown ทุก 1 วินาที
  useEffect(() => {
    if (!loginLockedUntil) return;
    const iv = setInterval(() => {
      const rem = Math.ceil((loginLockedUntil - Date.now()) / 1000);
      if (rem <= 0) {
        setLockCountdown(0);
        setLoginLockedUntil(0);
        setLoginFailCount(0);
        try { sessionStorage.removeItem('qah_login_locked_until'); sessionStorage.removeItem('qah_login_fail_count'); } catch {}
        clearInterval(iv);
      } else {
        setLockCountdown(rem);
      }
    }, 1000);
    setLockCountdown(Math.ceil((loginLockedUntil - Date.now()) / 1000));
    return () => clearInterval(iv);
  }, [loginLockedUntil]);

  // ── Email Verify OTP State ──
  const [showVerify, setShowVerify]         = useState(false);
  const [verifyCode, setVerifyCode]         = useState("");
  const [verifyErr, setVerifyErr]           = useState("");
  const [verifyLoading, setVerifyLoading]   = useState(false);
  const [resendCooldown, setResendCooldown] = useState(0);
  const [pendingUser, setPendingUser]       = useState(null);

  // ── Login OTP State (v18) ──────────────────────────────────────────────────
  const [showLoginOtp, setShowLoginOtp]     = useState(false);
  const [loginOtpCode, setLoginOtpCode]     = useState('');
  const [loginOtpErr, setLoginOtpErr]       = useState('');
  const [loginOtpLoading, setLoginOtpLoading] = useState(false);
  const [loginOtpCooldown, setLoginOtpCooldown] = useState(0);
  const [pendingLoginData, setPendingLoginData] = useState(null); // เก็บ data จาก login สำเร็จ ก่อน OTP

  // ── [v21] TOTP Login State ────────────────────────────────────────────────
  const [showTotpLogin, setShowTotpLogin]   = useState(false);
  const [totpEmail, setTotpEmail]           = useState('');
  const [totpCode, setTotpCode]             = useState('');
  const [totpErr, setTotpErr]               = useState('');
  const [totpLoading, setTotpLoading]       = useState(false);

  // ── [v21] Google Sign-In handler ─────────────────────────────────────────
  const handleGoogleCredential = async (credential) => {
    if (!credential) return;
    setLoginLoading(true); setErr('');
    try {
      const res = await api.rawWrite({ action: 'googleAuth', idToken: credential });
      if (!res.ok) { setErr(res.error || 'Google Sign-In ล้มเหลว'); setLoginLoading(false); return; }
      const { token, user: safeUser, spreadsheetId } = res.data;
      setAuthToken(token);
      setSessionIssuedAt(Date.now());
      setLastActivity();
      if (spreadsheetId) { try { localStorage.setItem('qah_ssid', spreadsheetId); } catch {} }
      setCurrentUser(safeUser);
      setLoading(true);
      Promise.all([
        api.getAll('users'), api.getAll('teams'), api.getAll('members'),
        api.getAll('projects'), api.getAll('tasks'), api.getAll('testCases'),
        api.getAll('defects'), api.getAll('logs'), api.getAll('loginLogs'), api.getAll('pending'),
        api.getAll('plans'),
      ]).then(([u,te,m,p,ta,tc,d,l,ll,pm,pl]) => {
        setUsersState(u); setTeamsState(te); setMembersState(m);
        setProjectsState(p); setTasksState(ta); setTestCasesState(tc);
        setDefectsState(d); setLogsState(l); setLoginLogsState(ll); setPendingMembersState(pm);
        setPlansState(pl||[]);
        setLoading(false);
        navigate('team-select');
      }).catch(() => { setLoading(false); navigate('team-select'); });
    } catch(e) { setErr('เกิดข้อผิดพลาด: ' + e.message); }
    setLoginLoading(false);
  };

  // ── [v21] TOTP login ──────────────────────────────────────────────────────
  // ── [v23] Microsoft Sign-In handler ───────────────────────────────────────
  const handleMicrosoftCredential = async (idToken, account) => {
    if (!idToken) return;
    setLoginLoading(true); setErr('');
    try {
      const res = await api.rawWrite({ action: 'microsoftAuth', idToken });
      if (!res.ok) { setErr(res.error || 'Microsoft Sign-In ล้มเหลว'); setLoginLoading(false); return; }
      const u = res.user;
      setCurrentUser(u);
      // โหลดข้อมูลหลัง login (เหมือน Google flow)
      try {
        const tok = res.token;
        const [teams, members, projects, tasks, tcs, defects, logs, llogs, pending, plans, allUsers] =
          await Promise.all([
            api.getAll('teams',tok), api.getAll('members',tok), api.getAll('projects',tok),
            api.getAll('tasks',tok), api.getAll('testCases',tok), api.getAll('defects',tok),
            api.getAll('logs',tok), api.getAll('loginLogs',tok), api.getAll('pendingMembers',tok),
            api.getAll('plans',tok), api.getAll('users',tok),
          ]);
        setTeamsState(teams||[]); setMembersState(members||[]); setProjectsState(projects||[]);
        setTasksState(tasks||[]); setTestCasesState(tcs||[]); setDefectsState(defects||[]);
        setLogsState(logs||[]); setLoginLogsState(llogs||[]); setPendingMembersState(pending||[]);
        setPlansState(plans||[]); setUsersState(allUsers||[]);
      } catch(e) { console.warn('[QAHUBs] post-microsoft-auth data load:', e.message); }
      navigate('team-select');
    } catch(e) { setErr('เกิดข้อผิดพลาด: ' + e.message); }
    setLoginLoading(false);
  };


  const loginWithTotp = async () => {
    const emailTrim = totpEmail.trim().toLowerCase();
    const codeTrim  = totpCode.replace(/\s/g, '');
    if (!emailTrim) { setTotpErr('กรุณากรอกอีเมล'); return; }
    if (codeTrim.length !== 6) { setTotpErr('กรุณากรอกรหัส 6 หลัก'); return; }
    setTotpLoading(true); setTotpErr('');
    try {
      const res = await api.rawWrite({ action: 'loginWithTotp', email: emailTrim, code: codeTrim });
      if (!res.ok) { setTotpErr(res.error || 'รหัสไม่ถูกต้อง'); setTotpLoading(false); return; }
      const { token, user: safeUser, spreadsheetId } = res.data;
      setAuthToken(token);
      setSessionIssuedAt(Date.now());
      setLastActivity();
      if (spreadsheetId) { try { localStorage.setItem('qah_ssid', spreadsheetId); } catch {} }
      setCurrentUser(safeUser);
      setShowTotpLogin(false);
      setLoading(true);
      Promise.all([
        api.getAll('users'), api.getAll('teams'), api.getAll('members'),
        api.getAll('projects'), api.getAll('tasks'), api.getAll('testCases'),
        api.getAll('defects'), api.getAll('logs'), api.getAll('loginLogs'), api.getAll('pending'),
        api.getAll('plans'),
      ]).then(([u,te,m,p,ta,tc,d,l,ll,pm,pl]) => {
        setUsersState(u); setTeamsState(te); setMembersState(m);
        setProjectsState(p); setTasksState(ta); setTestCasesState(tc);
        setDefectsState(d); setLogsState(l); setLoginLogsState(ll); setPendingMembersState(pm);
        setPlansState(pl||[]);
        setLoading(false);
        navigate('team-select');
      }).catch(() => { setLoading(false); navigate('team-select'); });
    } catch(e) { setTotpErr('เกิดข้อผิดพลาด: ' + e.message); }
    setTotpLoading(false);
  };

  // ── Reset Password State ──────────────────────────────────────────────────
  // Steps: 'email' → 'otp' → 'newpass'
  const [showReset, setShowReset]           = useState(false);
  const [resetStep, setResetStep]           = useState('email');
  const [resetEmail, setResetEmail]         = useState('');
  const [resetErr, setResetErr]             = useState('');
  const [resetOtp, setResetOtp]             = useState('');
  const [resetOtpErr, setResetOtpErr]       = useState('');
  const [resetOtpLoading, setResetOtpLoading] = useState(false);
  const [resetEmailLoading, setResetEmailLoading] = useState(false);
  const [resetResendCooldown, setResetResendCooldown] = useState(0);
  const [resetNewPass, setResetNewPass]     = useState('');
  const [resetConfirmPass, setResetConfirmPass] = useState('');
  const [resetShowNew, setResetShowNew]     = useState(false);
  const [resetShowConfirm, setResetShowConfirm] = useState(false);
  const [resetFoundUser, setResetFoundUser] = useState(null);
  const [resetSaving, setResetSaving]       = useState(false);

  const startResetResendTimer = () => {
    setResetResendCooldown(60);
    const iv = setInterval(() => {
      setResetResendCooldown(prev => {
        if (prev <= 1) { clearInterval(iv); return 0; }
        return prev - 1;
      });
    }, 1000);
  };

  // Step 1 — ส่ง OTP ให้ GAS ตรวจ email + ส่งอีเมล (ไม่ต้อง getAll ซึ่งต้องการ token)
  const handleResetEmailCheck = async () => {
    const emailTrim = resetEmail.trim().toLowerCase();
    if (!emailTrim) { setResetErr('กรุณากรอกอีเมล'); return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailTrim)) { setResetErr('รูปแบบอีเมลไม่ถูกต้อง'); return; }
    setResetErr('');
    setResetEmailLoading(true);
    try {
      // [FIX v15] ส่ง purpose:'reset' → GAS จะตรวจ email ใน Users Sheet + ส่ง template รีเซ็ต password
      // ไม่เรียก api.getAll('users') ซึ่งต้องการ auth token (ยังไม่ได้ login)
      const res = await api.rawWrite({ action: 'sendVerifyCode', email: emailTrim, purpose: 'reset' });
      if (!res.ok) {
        setResetErr(res.error || 'ส่งอีเมลไม่สำเร็จ');
        setResetEmailLoading(false);
        return;
      }
    } catch(e) {
      setResetErr('เกิดข้อผิดพลาด: ' + e.message);
      setResetEmailLoading(false);
      return;
    }
    // GAS ยืนยัน email มีอยู่จริงและส่ง OTP แล้ว
    setResetFoundUser({ email: emailTrim }); // เก็บแค่ email ไว้ใช้ใน step ถัดไป
    setResetOtp('');
    setResetOtpErr('');
    setResetStep('otp');
    startResetResendTimer();
    setResetEmailLoading(false);
  };

  // Step 2 — verify OTP
  const handleResetOtpVerify = async () => {
    const codeTrim = resetOtp.trim();
    if (codeTrim.length !== 6) { setResetOtpErr('กรุณากรอกรหัส 6 หลัก'); return; }
    setResetOtpLoading(true);
    setResetOtpErr('');
    try {
      // [FIX CRITICAL-1] ส่ง purpose='reset' เพื่อให้ GAS เก็บ OTP verified flag ไว้สำหรับ handleResetPassword
      const res = await api.rawWrite({ action: 'verifyCode', email: resetFoundUser.email.trim().toLowerCase(), code: codeTrim, purpose: 'reset' });
      if (!res.ok) { setResetOtpErr(res.error || 'รหัสไม่ถูกต้อง'); setResetOtpLoading(false); return; }
    } catch(e) {
      setResetOtpErr('เกิดข้อผิดพลาด: ' + e.message); setResetOtpLoading(false); return;
    }
    setResetStep('newpass');
    setResetNewPass('');
    setResetConfirmPass('');
    setResetErr('');
    setResetOtpLoading(false);
  };

  // Step 3 — save new password (GAS hashes it server-side)
  // [FIX CRITICAL-1] handleResetConfirm — ใช้ action 'resetPassword' แทน 'update'
  // GAS จะตรวจสอบ OTP ที่ verified=true ก่อน reset — ไม่ต้องการ auth token
  const handleResetConfirm = async () => {
    setResetErr('');
    if (!resetNewPass.trim()) { setResetErr('กรุณากรอกรหัสผ่านใหม่'); return; }
    const pwdCheck = validatePasswordStrength(resetNewPass.trim());
    if (!pwdCheck.ok) { setResetErr(pwdCheck.msg); return; }
    if (resetNewPass.trim() !== resetConfirmPass.trim()) { setResetErr('รหัสผ่านไม่ตรงกัน'); return; }
    if (!resetFoundUser || !resetOtp) { setResetErr('ข้อมูล OTP ไม่ครบ — กรุณาเริ่มใหม่'); return; }
    setResetSaving(true);
    try {
      // [FIX CRITICAL-1] ใช้ action แยก 'resetPassword' — GAS ตรวจ OTP session ก่อนเปลี่ยน password
      const res = await api.rawWrite({
        action: 'resetPassword',
        email: resetFoundUser.email.trim().toLowerCase(),
        otpCode: resetOtp,           // ส่ง OTP กลับไปยืนยันฝั่ง server อีกครั้ง
        newPassword: resetNewPass.trim()
        // ไม่แนบ token — GAS ไม่ต้องการ session สำหรับ action นี้
      });
      if (!res.ok) {
        setResetErr(res.error || 'รีเซ็ตรหัสผ่านไม่สำเร็จ');
        setResetSaving(false);
        return;
      }
      // แสดง success เฉพาะเมื่อ GAS ยืนยันแล้ว
      showToast('รีเซ็ตรหัสผ่านสำเร็จ — กรุณาเข้าสู่ระบบด้วยรหัสใหม่');
      setResetSaving(false);
      closeResetModal();
    } catch(e) {
      setResetErr('เกิดข้อผิดพลาด: ' + e.message);
      setResetSaving(false);
    }
  };

  const closeResetModal = () => {
    setShowReset(false);
    setResetStep('email');
    setResetEmail('');
    setResetNewPass('');
    setResetConfirmPass('');
    setResetFoundUser(null);
    setResetOtp('');
    setResetOtpErr('');
    setResetErr('');
  };

  // Check if there's an invite payload pending
  const invitePayload = (() => { try { const p = localStorage.getItem('qah_join_payload'); return p ? JSON.parse(p) : null; } catch(e) { return null; } })();

  const login = async () => {
    const emailTrim = email.trim().toLowerCase();
    const passTrim  = pass.trim();
    if (!emailTrim || !passTrim) { setErr('กรุณากรอกอีเมลและรหัสผ่าน'); return; }

    // [v23] ตรวจ client-side lockout
    if (loginLockedUntil && Date.now() < loginLockedUntil) {
      setErr(`บัญชีถูกล็อค กรุณารอ ${lockCountdown} วินาที`); return;
    }

    setLoginLoading(true);
    setErr('');
    try {
      if (GAS_URL) {
        // [FIX VULN-02][FIX VULN-04] Server-side login — GAS ตรวจ hash + ออก token
        const res = await api.rawWrite({ action: 'login', email: emailTrim, password: passTrim });
        if (!res.ok) {
          // [v23] นับ fail count
          const newCount = loginFailCount + 1;
          const LOGIN_MAX = 5; // ตรงกับ GAS: LOGIN_MAX_FAIL = 5
          const LOCK_MS   = 5 * 60 * 1000; // 5 นาที
          if (newCount >= LOGIN_MAX) {
            const lockedUntil = Date.now() + LOCK_MS;
            setLoginLockedUntil(lockedUntil);
            setLoginFailCount(0);
            try { sessionStorage.setItem('qah_login_locked_until', lockedUntil); sessionStorage.setItem('qah_login_fail_count', '0'); } catch {}
            setErr(`ล็อคอินผิดครบ ${LOGIN_MAX} ครั้ง บัญชีถูกล็อค 5 นาที`);
          } else {
            setLoginFailCount(newCount);
            try { sessionStorage.setItem('qah_login_fail_count', String(newCount)); } catch {}
            const remaining = LOGIN_MAX - newCount;
            setErr((res.error || 'อีเมลหรือรหัสผ่านไม่ถูกต้อง') + (remaining > 0 ? ` (เหลือ ${remaining} ครั้ง)` : ''));
          }
          setLoginLoading(false); return;
        }
        // Login OK — reset fail count
        setLoginFailCount(0);
        try { sessionStorage.removeItem('qah_login_fail_count'); sessionStorage.removeItem('qah_login_locked_until'); } catch {}
        // [v18-LOGINOTP] เก็บข้อมูล login ไว้ก่อน แล้วส่ง OTP
        setPendingLoginData(res.data);
        // ส่ง Login OTP ทางอีเมล
        try {
          await api.rawWrite({ action: 'sendLoginOtp', email: emailTrim });
        } catch(e2) { /* ถ้าส่งเมลไม่ได้ยังไม่บล็อก */ }
        setLoginOtpCode(''); setLoginOtpErr('');
        setShowLoginOtp(true);
        // เริ่ม cooldown 60 วิ
        setLoginOtpCooldown(60);
        const iv = setInterval(() => setLoginOtpCooldown(prev => { if(prev<=1){clearInterval(iv);return 0;} return prev-1; }), 1000);
      } else {
        setErr('ไม่สามารถเชื่อมต่อระบบได้ — กรุณาตรวจสอบการเชื่อมต่อและลองใหม่');
      }
    } catch(e) {
      setErr('เกิดข้อผิดพลาด: ' + e.message);
    }
    setLoginLoading(false);
  };

  // [v18-LOGINOTP] ยืนยัน OTP แล้วเข้าสู่ระบบจริง
  const confirmLoginOtp = async () => {
    const codeTrim = loginOtpCode.trim();
    if (codeTrim.length !== 6) { setLoginOtpErr('กรุณากรอกรหัส 6 หลัก'); return; }
    setLoginOtpLoading(true); setLoginOtpErr('');
    const emailTrim = email.trim().toLowerCase();
    try {
      const res = await api.rawWrite({ action: 'verifyLoginOtp', email: emailTrim, code: codeTrim });
      if (!res.ok) { setLoginOtpErr(res.error || 'รหัส OTP ไม่ถูกต้อง'); setLoginOtpLoading(false); return; }
    } catch(e) { setLoginOtpErr('เกิดข้อผิดพลาด: ' + e.message); setLoginOtpLoading(false); return; }
    // OTP ผ่าน — ดำเนินการ login
    const { token, user: safeUser, spreadsheetId } = pendingLoginData;
    setAuthToken(token);
    setSessionIssuedAt(Date.now());
    setLastActivity();
    if (spreadsheetId) {
      setSession('qah_ssid', spreadsheetId);
      try { localStorage.setItem('qah_ssid', spreadsheetId); } catch {}
    }
    setCurrentUser(safeUser);
    setShowLoginOtp(false); setPendingLoginData(null);
    showToast(`ยินดีต้อนรับ, ${safeUser.name}!`);
    setLoading(true);
    Promise.all([
      api.getAll('users'), api.getAll('teams'), api.getAll('members'),
      api.getAll('projects'), api.getAll('tasks'), api.getAll('testCases'),
      api.getAll('defects'), api.getAll('logs'), api.getAll('loginLogs'), api.getAll('pending'),
    ]).then(([u,te,m,p,ta,tc,d,l,ll,pm]) => {
      setUsersState(u); setTeamsState(te); setMembersState(m);
      setProjectsState(p); setTasksState(ta); setTestCasesState(tc);
      setDefectsState(d); setLogsState(l); setLoginLogsState(ll); setPendingMembersState(pm);
      setLoginLogs(prev => [{ id: uid(), userId: safeUser.id, userName: safeUser.name, at: now(), ip:'client' }, ...prev]);
      setLoading(false);
      navigate('team-select');
    }).catch(e => {
      console.error('[QAHUBs] post-login data load failed:', e.message);
      setLoginLogs(prev => [{ id: uid(), userId: safeUser.id, userName: safeUser.name, at: now(), ip:'client' }, ...prev]);
      setLoading(false);
      navigate('team-select');
    });
    setLoginOtpLoading(false);
  };

  // ── Start countdown timer for resend ──────────────────────────────
  const startResendTimer = () => {
    setResendCooldown(60);
    const iv = setInterval(() => {
      setResendCooldown(prev => {
        if (prev <= 1) { clearInterval(iv); return 0; }
        return prev - 1;
      });
    }, 1000);
  };

  // ── Send OTP via backend then open verify modal ────────────────────
  const sendOTPAndOpenModal = async (userObj) => {
    setLoginLoading(true);
    setErr('');
    try {
      const res = await api.rawWrite({ action: 'sendVerifyCode', email: userObj.email });
      if (!res.ok) { setErr('ส่งอีเมลไม่สำเร็จ: ' + res.error); setLoginLoading(false); return; }
      setPendingUser(userObj);
      setVerifyCode('');
      setVerifyErr('');
      setShowVerify(true);
      startResendTimer();

// ─── INVITE WAITING PAGE ──────────────────────────────────────────────────────
function InviteWaitingPage({ teamName, teamId, currentUser, pendingMembers, setPendingMembers, members, teams, setCurrentTeam, setPage, setInviteWaitingTeam, refreshFromSheets, USE_GAS }) {
  const [status, setStatus] = useState('pending'); // 'pending' | 'approved' | 'rejected'
  const [countdown, setCountdown] = useState(5);
  const [nextRefresh, setNextRefresh] = useState(15);
  const [refreshing, setRefreshing] = useState(false); // กำลัง refresh ข้อมูลก่อน navigate

  // Check status from pendingMembers + members
  // [v20.1-REJOIN] GAS จะไม่ส่ง deleted/inactive กลับมา ดังนั้น members.some ตรงนี้จะเป็น active เท่านั้น
  const checkStatus = useCallback(() => {
    // Check if approved (now in members as active)
    if (members.some(m => m.teamId === teamId && m.userId === currentUser?.id)) {
      setStatus('approved');
      return;
    }
    // Check if rejected
    const req = (pendingMembers||[]).find(p => p.teamId === teamId && p.userId === currentUser?.id);
    if (req && req.status === 'rejected') {
      setStatus('rejected');
      return;
    }
    setStatus('pending');
  }, [members, pendingMembers, teamId, currentUser]);

  // Poll every 15s
  useEffect(() => {
    checkStatus();
    const refreshTimer = setInterval(() => {
      if (USE_GAS && refreshFromSheets) refreshFromSheets();
      checkStatus();
      setNextRefresh(15);
    }, 15000);
    // Countdown display
    const countTimer = setInterval(() => {
      setNextRefresh(n => n > 1 ? n - 1 : 15);
    }, 1000);
    return () => { clearInterval(refreshTimer); clearInterval(countTimer); };
  }, [checkStatus]);

  // Re-check whenever pendingMembers/members change
  useEffect(() => { checkStatus(); }, [pendingMembers, members, checkStatus]);

  // [FIX] refresh ข้อมูลจาก GAS ก่อน navigate เพื่อให้ myTeams มีทีมที่เพิ่งถูก approve
  const doNavigateApproved = useCallback(async () => {
    if (refreshing) return;
    setRefreshing(true);
    try {
      if (USE_GAS && refreshFromSheets) await refreshFromSheets(true); // silent=true ไม่ toast
    } catch(e) { /* ถ้า refresh ล้มเหลวก็ยังนำทางต่อ */ }
    setPendingMembers(p => p.filter(x => !(x.teamId === teamId && x.userId === currentUser?.id)));
    setInviteWaitingTeam(null);
    // ไปหน้า team-select (ไม่ set currentTeam ตรงๆ) เพื่อให้ myTeams โหลดจาก state ใหม่แล้วแสดงทีม
    setPage('team-select');
  }, [refreshing, USE_GAS, refreshFromSheets, teamId, currentUser, setPendingMembers, setInviteWaitingTeam, setPage]);

  // Countdown redirect when approved
  useEffect(() => {
    if (status !== 'approved') return;
    if (countdown <= 0) {
      doNavigateApproved();
      return;
    }
    const t = setTimeout(() => setCountdown(c => c - 1), 1000);
    return () => clearTimeout(t);
  }, [status, countdown]); // eslint-disable-line react-hooks/exhaustive-deps

  const goCreateTeam = () => {
    // ล้าง pending record ของทีมนี้ออกก่อนออกจากหน้า
    setPendingMembers(p => p.filter(x => !(x.teamId === teamId && x.userId === currentUser?.id)));
    setInviteWaitingTeam(null);
  };

  // ── APPROVED ──
  if (status === 'approved') {
    return h('div', { style:{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)',padding:'24px'} },
      h('div', { style:{width:'100%',maxWidth:'480px',textAlign:'center'} },
        h('span',{className:'ms',style:{fontSize:'72px',color:'var(--green)',display:'block',marginBottom:'16px',animation:'pulse 1s infinite'}}, 'check_circle'),
        h('div', { style:{fontSize:'22px',fontWeight:'700',color:'var(--accent)',marginBottom:'4px'} }, 'QAHub', h('span', { style:{color:'var(--text)'} }, 's')),
        h('h2', { style:{fontSize:'20px',fontWeight:'600',margin:'16px 0 8px',color:'var(--green)'} }, 'ได้รับอนุมัติเรียบร้อยแล้ว'),
        h('p', { style:{color:'var(--text2)',fontSize:'14px',lineHeight:'1.7',marginBottom:'24px'} },
          'คุณได้รับการอนุมัติเข้าร่วมทีม ',
          h('strong', { style:{color:'var(--accent)'} }, teamName),
          ' แล้ว'
        ),
        h('div', { style:{background:'var(--green-bg)',border:'1px solid var(--green)',borderRadius:'var(--r2)',padding:'20px',marginBottom:'20px'} },
          h('div', { style:{fontSize:'36px',fontWeight:'700',color:'var(--green)',lineHeight:'1'} }, refreshing ? h('span',{className:'ms',style:{animation:'spin 1s linear infinite',display:'inline-block',fontSize:'32px'}},'sync') : countdown),
          h('div', { style:{color:'var(--green)',fontSize:'13px',marginTop:'4px'} }, refreshing ? 'กำลังโหลดข้อมูลทีม...' : 'กำลังพาไปเลือกทีม...')
        ),
        h('button', { className:'btn btn-primary', style:{justifyContent:'center',padding:'10px 24px'}, disabled: refreshing,
          onClick: doNavigateApproved
        }, refreshing ? 'กำลังโหลด...' : 'ไปเลยตอนนี้ →')
      )
    );
  }

  // ── REJECTED ──
  const reRequestJoin = () => {
    if (!setPendingMembers) return;
    const existingReq = (pendingMembers||[]).find(p => p.teamId===teamId && p.userId===currentUser?.id);
    if (existingReq) {
      // Update existing record back to pending (no duplicate)
      setPendingMembers(p => p.map(r =>
        r.id === existingReq.id ? { ...r, status: 'pending', requestedAt: new Date().toISOString() } : r
      ));
    } else {
      // Fallback: create new record (shouldn't normally happen)
      const team = teams && teams.find(t => t.id === teamId);
      setPendingMembers(p => [...p, { id: uid(), teamId, teamName, userId: currentUser?.id, requestedAt: new Date().toISOString(), status: 'pending' }]);
    }
    setStatus('pending');
  };

  if (status === 'rejected') {
    return h('div', { style:{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)',padding:'24px'} },
      h('div', { style:{width:'100%',maxWidth:'480px',textAlign:'center'} },
        h('span',{className:'ms',style:{fontSize:'72px',color:'var(--red)',display:'block',marginBottom:'16px'}}, 'cancel'),
        h('div', { style:{fontSize:'22px',fontWeight:'700',color:'var(--accent)',marginBottom:'4px'} }, 'QAHub', h('span', { style:{color:'var(--text)'} }, 's')),
        h('h2', { style:{fontSize:'20px',fontWeight:'600',margin:'16px 0 8px',color:'var(--red)'} }, 'ไม่ได้รับการอนุมัติ'),
        h('p', { style:{color:'var(--text2)',fontSize:'14px',lineHeight:'1.7',marginBottom:'24px'} },
          'คำขอเข้าร่วมทีม ',
          h('strong', { style:{color:'var(--text)'} }, teamName),
          ' ถูกปฏิเสธโดย Admin'
        ),
        h('div', { style:{background:'var(--red-bg)',border:'1px solid var(--red)',borderRadius:'var(--r2)',padding:'16px 20px',marginBottom:'20px',textAlign:'left'} },
          h('div', { style:{fontSize:'16px',marginBottom:'6px',fontWeight:'600',color:'var(--red)'} }, h(React.Fragment,null,h('span',{className:'ms ms-sm',style:{marginRight:'6px'}},'block'),'คำขอถูกปฏิเสธ')),
          h('p', { style:{color:'var(--text2)',fontSize:'13px'} }, 'Admin ได้ปฏิเสธคำขอของคุณ หากต้องการสามารถส่งคำขอใหม่ได้ หรือติดต่อ Admin เพื่อสอบถามเหตุผล')
        ),
        h('div', { style:{display:'flex',flexDirection:'column',gap:'10px'} },
          h('button', { className:'btn btn-primary', style:{justifyContent:'center',padding:'10px 24px',width:'100%'},
            onClick: reRequestJoin
          }, h(React.Fragment,null,h('span',{className:'ms ms-sm',style:{marginRight:'6px'}},'refresh'),'ขอเข้าร่วมใหม่อีกครั้ง')),
          h('button', { className:'btn', style:{justifyContent:'center',padding:'10px 24px',width:'100%'},
            onClick: goCreateTeam
          }, '+ สร้างทีมใหม่')
        )
      )
    );
  }

  // ── PENDING ──
  // Dedup by teamId — แสดงแค่ทีมละ 1 แถว ไม่ว่าจะมีกี่ record
  const myPendingRaw = (pendingMembers||[]).filter(p => p.userId===currentUser?.id && p.status==='pending');
  const myPending = Object.values(
    myPendingRaw.reduce((acc, p) => {
      if (!acc[p.teamId] || String(p.requestedAt) > String(acc[p.teamId].requestedAt)) acc[p.teamId] = p;
      return acc;
    }, {})
  );
  return h('div', { style:{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)',padding:'24px'} },
    h('div', { style:{width:'100%',maxWidth:'480px',textAlign:'center'} },
      h('span',{className:'ms',style:{fontSize:'64px',color:'var(--amber)',display:'block',marginBottom:'16px',textAlign:'center'}},'hourglass_top'),
      h('div', { style:{fontSize:'22px',fontWeight:'700',color:'var(--accent)',marginBottom:'4px'} }, 'QAHub', h('span', { style:{color:'var(--text)'} }, 's')),
      h('h2', { style:{fontSize:'20px',fontWeight:'600',margin:'16px 0 8px'} }, 'รอการอนุมัติจาก Admin'),
      h('p', { style:{color:'var(--text2)',fontSize:'14px',lineHeight:'1.7',marginBottom:'24px'} },
        'คำขอเข้าร่วมทีม ',
        h('strong', { style:{color:'var(--accent)'} }, teamName),
        ' ได้ถูกส่งไปยัง Admin แล้ว', h('br'),
        'กรุณารอการอนุมัติ Admin จะแจ้งให้ทราบเมื่ออนุมัติ'
      ),
      h('div', { style:{background:'var(--amber-bg)',border:'1px solid var(--amber)',borderRadius:'var(--r2)',padding:'16px 20px',marginBottom:'16px',textAlign:'left'} },
        h('div', { style:{fontWeight:'600',color:'var(--amber)',marginBottom:'8px',fontSize:'13px'} }, h(React.Fragment,null,h('span',{className:'ms ms-xs',style:{marginRight:'4px'}},'list_alt'),'สถานะคำขอ')),
        myPending.map(p => h('div', { key:p.id, style:{display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:'13px',marginBottom:'4px'} },
          h('span', { style:{color:'var(--text2)'} }, p.teamName || p.teamId),
          h('span', { className:'badge badge-amber' }, h(React.Fragment,null,h('span',{className:'ms ms-xs',style:{marginRight:'3px'}},'hourglass_top'),'รออนุมัติ'))
        )),
        myPending.length===0 && h('div', { style:{color:'var(--text2)',fontSize:'13px',display:'flex',alignItems:'center',gap:'6px'} }, h(LoadingDots,{small:true}))
      ),
      h('div', { style:{fontSize:'12px',color:'var(--text3)',marginBottom:'20px'} },
        h('span',{className:'ms ms-xs',style:{marginRight:'4px'}},'refresh'), 'ตรวจสอบสถานะอัตโนมัติทุก 15 วินาที (อีก ', h('strong',{style:{color:'var(--text2)'}}, nextRefresh), ' วินาที)'
      ),
      h('button', { className:'btn btn-primary', style:{justifyContent:'center',padding:'10px 24px',width:'100%'},
        onClick: goCreateTeam
      }, '+ สร้างทีมใหม่')
    )
  );
}

// ─── [v25] PAYMENT POPUP ─────────────────────────────────────────────────────
// แสดงเมื่อ: (1) Free Plan User เข้า System Settings (2) Unlimited User กด Upgrade

  const [step, setStep] = React.useState('select'); // 'select' | 'bank'
  const [slipFile, setSlipFile] = React.useState(null);       // { name, base64, type }

  const [submitting, setSubmitting] = React.useState(false);

  const price           = devSettings?.unlimitedPrice || '—';
  const bankName        = devSettings?.bankName || '';
  const bankAccountName = devSettings?.bankAccountName || '';
  const bankAccountNo   = devSettings?.bankAccountNo || '';
  const bankQrImageUrl  = devSettings?.bankQrImageUrl || '';

  const isAlreadyUnlimited = planInfo?.plan === 'paid' || planInfo?.plan === 'unlimited';

  const priceDisplay = price !== '—' ? `฿${Number(price).toLocaleString()}` : '—';

  // ── Step: เลือกวิธีชำระเงิน ──────────────────────────────────────────────
  const StepSelect = () =>
    h('div', { style:{padding:'20px 24px'} },

      h('div', { style:{background:'var(--amber-bg)',border:'1px solid var(--amber)',borderRadius:'var(--r2)',padding:'14px 18px',marginBottom:'20px',textAlign:'center'} },
        h('div', { style:{fontSize:'12px',color:'var(--amber)',fontWeight:'700',textTransform:'uppercase',letterSpacing:'1px',marginBottom:'4px'} }, 'ราคา Unlimited Plan'),
        h('div', { style:{fontSize:'28px',fontWeight:'800',color:'var(--amber)',fontFamily:'var(--mono)'} }, priceDisplay),
        h('div', { style:{fontSize:'11px',color:'var(--text3)',marginTop:'4px'} }, 'ต่อทีม / ต่อเดือน')
      ),

      h('div', { style:{display:'flex',flexDirection:'column',gap:'10px',marginBottom:'20px'} },

        // 1. โอนผ่านธนาคาร — เปิดใช้งาน
        h('div', {
          style:{
            border:'2px solid var(--accent)', borderRadius:'var(--r2)',
            padding:'16px', cursor:'pointer', background:'var(--accent-bg)',
            transition:'all 0.18s'
          },
          onClick: () => setStep('bank'),
          onMouseEnter: e => { e.currentTarget.style.background='rgba(37,99,235,0.18)'; e.currentTarget.style.borderColor='var(--accent3)'; },
          onMouseLeave: e => { e.currentTarget.style.background='var(--accent-bg)'; e.currentTarget.style.borderColor='var(--accent)'; }
        },
          h('div', { style:{display:'flex',alignItems:'center',gap:'12px'} },
            h('div', { style:{width:'40px',height:'40px',borderRadius:'10px',background:'var(--accent)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0} },
              h('span', { className:'ms', style:{color:'#fff',fontSize:'22px'} }, 'account_balance')
            ),
            h('div', { style:{flex:1} },
              h('div', { style:{fontWeight:'700',fontSize:'14px',color:'var(--accent3)'} }, '1. โอนผ่านธนาคาร'),
              h('div', { style:{fontSize:'11px',color:'var(--text2)',marginTop:'2px'} },
                bankName ? `${bankName}${bankAccountNo ? ' · ' + bankAccountNo : ''}` : 'ชำระผ่านการโอนเงิน'
              ),
              h('div', { style:{fontSize:'10px',color:'var(--green)',fontWeight:'700',marginTop:'4px',display:'flex',alignItems:'center',gap:'4px'} },
                h('span',{className:'ms ms-xs'},'check_circle'), 'พร้อมใช้งานทันที'
              )
            ),
            h('span', { className:'ms', style:{color:'var(--accent)',fontSize:'20px'} }, 'chevron_right')
          )
        ),

        // 2. บัตรเครดิต — DIM ยังไม่พร้อม
        h('div', { style:{
          border:'1px solid var(--border)', borderRadius:'var(--r2)',
          padding:'16px', opacity:0.4, cursor:'not-allowed',
          background:'var(--bg3)', pointerEvents:'none'
        }},
          h('div', { style:{display:'flex',alignItems:'center',gap:'12px'} },
            h('div', { style:{width:'40px',height:'40px',borderRadius:'10px',background:'var(--bg4)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0} },
              h('span', { className:'ms', style:{color:'var(--text3)',fontSize:'22px'} }, 'credit_card')
            ),
            h('div', { style:{flex:1} },
              h('div', { style:{fontWeight:'700',fontSize:'14px',color:'var(--text2)'} }, '2. ชำระผ่านบัตรเครดิต'),
              h('div', { style:{fontSize:'11px',color:'var(--text3)',marginTop:'2px'} }, 'Visa / Mastercard / JCB'),
              h('div', { style:{
                fontSize:'10px',fontWeight:'700',color:'var(--red)',
                textDecoration:'underline',marginTop:'4px',letterSpacing:'0.3px'
              }}, '⚠ ยังไม่พร้อมใช้งาน')
            )
          )
        ),

        // 3. ใช้ Free Plan / คงอยู่ Unlimited
        h('div', {
          style:{
            border:'2px solid var(--green)', borderRadius:'var(--r2)',
            padding:'16px', cursor:'pointer', background:'var(--green-bg)',
            transition:'all 0.18s'
          },
          onClick: onUseFree,
          onMouseEnter: e => { e.currentTarget.style.background='rgba(16,185,129,0.2)'; },
          onMouseLeave: e => { e.currentTarget.style.background='var(--green-bg)'; }
        },
          h('div', { style:{display:'flex',alignItems:'center',gap:'12px'} },
            h('div', { style:{width:'40px',height:'40px',borderRadius:'10px',background:'var(--green)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0} },
              h('span', { className:'ms', style:{color:'#fff',fontSize:'22px'} }, 'check_circle')
            ),
            h('div', { style:{flex:1} },
              h('div', { style:{fontWeight:'700',fontSize:'14px',color:'var(--green)'} },
                isAlreadyUnlimited ? '3. คงอยู่กับ Unlimited Plan' : '3. ใช้ Free Plan ต่อไป'
              ),
              h('div', { style:{fontSize:'11px',color:'var(--text2)',marginTop:'2px'} },
                isAlreadyUnlimited ? 'ปิด popup และใช้งาน Unlimited Plan ต่อไป' : 'ทีม 1 | Project 1 | Task 2 | TC 30 | Defect 10'
              )
            ),
            h('span', { className:'ms', style:{color:'var(--green)',fontSize:'20px'} }, 'chevron_right')
          )
        )
      ),

      h('p', { style:{fontSize:'11px',color:'var(--text3)',textAlign:'center',lineHeight:'1.6'} },
        'เลือกวิธีชำระเงินเพื่อเปิดใช้งาน Unlimited Plan'
      )
    );

  // ── [v26] Submit Slip to GAS ─────────────────────────────────────────────
  const submitSlip = async () => {
    if (!slipFile) { showToast && showToast('กรุณาเลือกไฟล์สลีปก่อน', 'error'); return; }
    setSubmitting(true);
    try {
      const res = await api._write({
        action: 'submitSlip',
        teamId: currentTeam?.id || '',
        teamName: currentTeam?.name || '',
        adminEmail: currentUser?.email || '',
        adminName: currentUser?.name || '',
        slipFileName: slipFile.name,
        slipBase64: slipFile.base64,
        slipType: slipFile.type,
      });
      showToast && showToast('ส่งสลีปเรียบร้อย — Admin จะตรวจสอบและส่ง Token ให้ทาง Email');
      setStep('done');
    } catch(e) {
      showToast && showToast('ส่งสลีปไม่สำเร็จ: ' + e.message, 'error');
    }
    setSubmitting(false);
  };

  // ── Step: Done (slip sent) ────────────────────────────────────────────────
  const StepDone = () =>
    h('div', { style:{padding:'32px 24px',textAlign:'center'} },
      h('span',{className:'ms',style:{fontSize:'56px',color:'var(--green)',display:'block',marginBottom:'12px'}},'task_alt'),
      h('div',{style:{fontSize:'18px',fontWeight:'700',color:'var(--green)',marginBottom:'8px'}},'ส่งสลีปสำเร็จ!'),
      h('p',{style:{fontSize:'13px',color:'var(--text2)',lineHeight:'1.8',marginBottom:'24px'}},
        'Admin ได้รับหลักฐานการชำระเงินแล้ว จะตรวจสอบและส่ง Auth Token ให้ทาง Email ของคุณ หลังจากได้รับ Token ให้นำไปกรอกใน System Settings'
      ),
      h('button',{className:'btn btn-primary',style:{justifyContent:'center',padding:'10px 24px'},onClick:onUseFree},
        h('span',{className:'ms ms-xs'},'check'),' รับทราบ'
      )
    );

  // ── Step: รายละเอียดโอนธนาคาร ────────────────────────────────────────────
  const StepBank = () =>
    h('div', { style:{padding:'20px 24px'} },

      // back button
      h('button', {
        className:'btn btn-sm',
        style:{marginBottom:'16px',display:'flex',alignItems:'center',gap:'6px'},
        onClick: () => setStep('select')
      }, h('span',{className:'ms ms-xs'},'arrow_back'), 'ย้อนกลับ'),

      // Amount
      h('div', { style:{background:'var(--amber-bg)',border:'1px solid var(--amber)',borderRadius:'var(--r2)',padding:'14px 18px',marginBottom:'16px',textAlign:'center'} },
        h('div', { style:{fontSize:'11px',color:'var(--amber)',fontWeight:'700',textTransform:'uppercase',letterSpacing:'1px',marginBottom:'2px'} }, 'ยอดที่ต้องชำระ'),
        h('div', { style:{fontSize:'32px',fontWeight:'800',color:'var(--amber)',fontFamily:'var(--mono)',lineHeight:'1'} }, priceDisplay),
        h('div', { style:{fontSize:'11px',color:'var(--text3)',marginTop:'4px'} }, 'ต่อทีม / ต่อเดือน')
      ),

      // Bank Info
      h('div', { style:{background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:'var(--r2)',padding:'16px',marginBottom:'16px'} },
        h('div', { style:{fontSize:'12px',fontWeight:'700',color:'var(--text3)',textTransform:'uppercase',letterSpacing:'1px',marginBottom:'12px',display:'flex',alignItems:'center',gap:'6px'} },
          h('span',{className:'ms ms-xs',style:{color:'var(--accent)'}},'account_balance'), 'ข้อมูลบัญชีธนาคาร'
        ),
        bankName
          ? h('div', { style:{display:'flex',flexDirection:'column',gap:'8px'} },
              h('div', { style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 10px',background:'var(--bg4)',borderRadius:'var(--r)'} },
                h('span', { style:{fontSize:'12px',color:'var(--text3)'} }, 'ธนาคาร'),
                h('span', { style:{fontSize:'13px',fontWeight:'700',color:'var(--text)'} }, bankName)
              ),
              bankAccountName && h('div', { style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 10px',background:'var(--bg4)',borderRadius:'var(--r)'} },
                h('span', { style:{fontSize:'12px',color:'var(--text3)'} }, 'ชื่อบัญชี'),
                h('span', { style:{fontSize:'13px',fontWeight:'700',color:'var(--text)'} }, bankAccountName)
              ),
              bankAccountNo && h('div', { style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 10px',background:'var(--bg4)',borderRadius:'var(--r)'} },
                h('span', { style:{fontSize:'12px',color:'var(--text3)'} }, 'เลขบัญชี'),
                h('div', { style:{display:'flex',alignItems:'center',gap:'6px'} },
                  h('span', { style:{fontSize:'14px',fontWeight:'800',color:'var(--accent3)',fontFamily:'var(--mono)',letterSpacing:'1px'} }, bankAccountNo),
                  h('button', {
                    className:'btn-icon',
                    style:{padding:'3px',borderRadius:'4px'},
                    title:'คัดลอกเลขบัญชี',
                    onClick: () => { try { navigator.clipboard.writeText(bankAccountNo); } catch {} }
                  }, h('span',{className:'ms ms-xs',style:{color:'var(--text3)'}},'content_copy'))
                )
              )
            )
          : h('div', { style:{textAlign:'center',padding:'12px',color:'var(--text3)',fontSize:'13px'} },
              h('span',{className:'ms ms-sm',style:{display:'block',marginBottom:'6px'}},'info'),
              'ยังไม่ได้ตั้งค่าข้อมูลธนาคาร'
            )
      ),

      // QR Code
      bankQrImageUrl && h('div', { style:{textAlign:'center',marginBottom:'16px'} },
        h('div', { style:{fontSize:'12px',fontWeight:'700',color:'var(--text3)',textTransform:'uppercase',letterSpacing:'1px',marginBottom:'10px',display:'flex',alignItems:'center',justifyContent:'center',gap:'6px'} },
          h('span',{className:'ms ms-xs',style:{color:'var(--accent)'}},'qr_code'), 'สแกน QR Code'
        ),
        h('img', {
          src: bankQrImageUrl,
          alt: 'QR Code สำหรับโอนเงิน',
          style:{maxWidth:'200px',width:'100%',borderRadius:'var(--r2)',border:'3px solid var(--border2)',background:'#fff',padding:'8px'}
        })
      ),

      // Instruction
      h('div', { style:{background:'var(--accent-bg)',border:'1px solid var(--accent)',borderRadius:'var(--r)',padding:'12px 14px',marginBottom:'16px'} },
        h('div', { style:{fontSize:'12px',color:'var(--accent3)',fontWeight:'700',marginBottom:'6px',display:'flex',alignItems:'center',gap:'6px'} },
          h('span',{className:'ms ms-xs'},'info'), 'ขั้นตอนการชำระเงิน'
        ),
        h('ol', { style:{margin:'0',paddingLeft:'16px',fontSize:'12px',color:'var(--text2)',lineHeight:'2'} },
          h('li', null, `โอนเงินจำนวน ${priceDisplay} ไปยังบัญชีข้างต้น`),
          h('li', null, 'อัพโหลดสลีปหลักฐานการโอนเงินด้านล่างนี้'),
          h('li', null, 'Admin จะตรวจสอบและส่ง Auth Token ให้ทาง Email'),
          h('li', null, 'นำ Token ไปกรอกในช่อง Auth Token ใน System Settings')
        )
      ),

      // Slip Upload Section — [v26] React-state based with submit button
      h('div', { style:{background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:'var(--r2)',padding:'16px',marginBottom:'16px'} },
        h('div', { style:{fontSize:'12px',fontWeight:'700',color:'var(--text3)',textTransform:'uppercase',letterSpacing:'1px',marginBottom:'10px',display:'flex',alignItems:'center',gap:'6px'} },
          h('span',{className:'ms ms-xs',style:{color:'var(--accent)'}},'upload_file'), 'อัพโหลดหลักฐานการชำระเงิน (สลีป) *'
        ),
        // Preview + drop zone
        slipPreview
          ? h('div', { style:{position:'relative',marginBottom:'10px'} },
              h('img', { src: slipPreview, alt: 'slip preview',
                style:{maxWidth:'100%',maxHeight:'180px',borderRadius:'var(--r2)',border:'2px solid var(--green)',display:'block',margin:'0 auto'} }),
              h('div', { style:{display:'flex',alignItems:'center',gap:'6px',marginTop:'6px',justifyContent:'center'} },
                h('span',{className:'ms ms-xs',style:{color:'var(--green)'}},'check_circle'),
                h('span',{style:{fontSize:'12px',color:'var(--green)',fontWeight:'600'}}, slipFile?.name || '')
              ),
              h('button', {
                className:'btn btn-sm',
                style:{display:'block',margin:'8px auto 0',fontSize:'11px'},
                onClick: () => { setSlipFile(null); setSlipPreview(null); }
              }, h('span',{className:'ms ms-xs'},'close'), ' เปลี่ยนรูป')
            )
          : h('label', {
              style:{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:'8px',padding:'24px',border:'2px dashed var(--border2)',borderRadius:'var(--r2)',cursor:'pointer',background:'var(--bg4)',transition:'all 0.18s',color:'var(--text2)'},
              onMouseEnter: e => { e.currentTarget.style.borderColor='var(--accent)'; e.currentTarget.style.background='var(--accent-bg)'; },
              onMouseLeave: e => { e.currentTarget.style.borderColor='var(--border2)'; e.currentTarget.style.background='var(--bg4)'; }
            },
              h('span',{className:'ms',style:{fontSize:'36px',color:'var(--text3)'}},'add_photo_alternate'),
              h('span',{style:{fontSize:'13px',fontWeight:'600'}},'คลิกเพื่อเลือกไฟล์รูปสลีป'),
              h('span',{style:{fontSize:'11px',color:'var(--text3)'}},'รองรับ JPG, PNG ขนาดไม่เกิน 5MB'),
              h('input', {
                type:'file', accept:'image/*',
                style:{display:'none'},
                onChange: e => {
                  const file = e.target.files && e.target.files[0];
                  if (!file) return;
                  if (file.size > 5 * 1024 * 1024) { alert('ไฟล์ใหญ่เกิน 5MB'); return; }
                  const reader = new FileReader();
                  reader.onload = ev => {
                    setSlipPreview(ev.target.result);
                    // strip "data:image/...;base64," prefix → raw base64
                    const b64 = ev.target.result.split(',')[1] || ev.target.result;
                    setSlipFile({ name: file.name, base64: b64, type: file.type });
                  };
                  reader.readAsDataURL(file);
                }
              })
            )
      ),

      // Submit button
      h('button', {
        className:'btn btn-primary',
        style:{width:'100%',justifyContent:'center',padding:'12px',fontSize:'14px',opacity:(!slipFile||submitting)?0.55:1,cursor:(!slipFile||submitting)?'not-allowed':'pointer'},
        disabled: !slipFile || submitting,
        onClick: submitSlip
      },
        submitting
          ? h(React.Fragment, null, h('span',{className:'ms ms-xs',style:{animation:'spin 1s linear infinite'}},'sync'), ' กำลังส่ง...')
          : h(React.Fragment, null, h('span',{className:'ms ms-xs'},'send'), ' ส่งสลีปให้ Admin')
      ),
      !slipFile && h('p',{style:{fontSize:'11px',color:'var(--text3)',marginTop:'6px',marginBottom:0,textAlign:'center'}},'กรุณาเลือกไฟล์รูปสลีปก่อนส่ง')
    );

  return h('div', { className:'modal-overlay', onClick: onClose },

function DevDashboardPage({ currentUser, showToast }) {
  const [orders, setOrders]     = useState([]);
  const [loading, setLoading]   = useState(true);
  const [tab, setTab]           = useState('pending');
  const [approving, setApproving] = useState({});
  const [rejecting, setRejecting] = useState({});
  const [resending, setResending] = useState({});
  const [noteMap, setNoteMap]   = useState({});

  // [v25] Dev Settings state
  const [devSettings, setDevSettings] = useState({ unlimitedPrice:'', bankName:'', bankAccountName:'', bankAccountNo:'', bankQrImageUrl:'' });
  const [devSettingsLoading, setDevSettingsLoading] = useState(true);
  const [devSettingsSaving, setDevSettingsSaving] = useState(false);

  const loadOrders = async (filterStatus) => {
    setLoading(true);
    try {
      const data = await api.getDevOrders(filterStatus || '');
      setOrders(Array.isArray(data) ? data : []);
    } catch(e) { showToast('โหลด Orders ล้มเหลว: ' + e.message, 'error'); }
    setLoading(false);
  };

  // [v25] Load Dev Settings
  const loadDevSettings = async () => {
    setDevSettingsLoading(true);
    try {
      const data = await api.getDevSettings();
      if (data && !data.error) setDevSettings({ unlimitedPrice: data.unlimitedPrice||'', bankName: data.bankName||'', bankAccountName: data.bankAccountName||'', bankAccountNo: data.bankAccountNo||'', bankQrImageUrl: data.bankQrImageUrl||'' });
    } catch(e) {}
    setDevSettingsLoading(false);
  };

  // [v25] Save Dev Settings
  const saveDevSettings = async () => {
    setDevSettingsSaving(true);
    try {
      const res = await api.saveDevSettings(devSettings);
      if (!res || res.ok === false) showToast(res?.error || 'บันทึกไม่สำเร็จ', 'error');
      else showToast('บันทึก Dev Settings สำเร็จ');
    } catch(e) { showToast('เกิดข้อผิดพลาด: ' + e.message, 'error'); }
    setDevSettingsSaving(false);
  };

  useEffect(() => { loadOrders(); loadDevSettings(); }, []);

  const approve = async (orderId) => {
    setApproving(p => ({...p, [orderId]: true}));
    try {
      const res = await api.approveOrder(orderId, noteMap[orderId] || '');
      showToast('Approve สำเร็จ — ส่ง Token Unlimited ทาง Email แล้ว');
      await loadOrders();
    } catch(e) { showToast('Approve ล้มเหลว: ' + e.message, 'error'); }
    setApproving(p => ({...p, [orderId]: false}));
  };

  const reject = async (orderId) => {
    if (!confirm('ต้องการ Reject Order นี้? ระบบจะ Downgrade ทีมกลับเป็น Free Plan')) return;
    setRejecting(p => ({...p, [orderId]: true}));
    try {
      await api.rejectOrder(orderId, noteMap[orderId] || '');
      showToast('Reject แล้ว — Downgraded เป็น Free Plan', 'error');
      await loadOrders();
    } catch(e) { showToast('Reject ล้มเหลว: ' + e.message, 'error'); }
    setRejecting(p => ({...p, [orderId]: false}));
  };

  const resend = async (teamId) => {
    setResending(p => ({...p, [teamId]: true}));
    try {
      const res = await api.resendToken(teamId);
      showToast(`ส่ง Token อีกครั้งไปยัง ${res?.to || 'email'} แล้ว`);
    } catch(e) { showToast('ส่งซ้ำล้มเหลว: ' + e.message, 'error'); }
    setResending(p => ({...p, [teamId]: false}));
  };

  const statusColor = { pending_payment:'var(--amber)', approved:'var(--green)', rejected:'var(--red)', expired:'var(--text3)' };
  const statusLabel = { pending_payment:'รอชำระเงิน', approved:'อนุมัติแล้ว', rejected:'ปฏิเสธ', expired:'หมดเวลา' };

  const filtered = tab === 'all' ? orders : orders.filter(o => o.status === (tab === 'pending' ? 'pending_payment' : tab));

  return h('div', null,
    h('div', { className:'page-header' },
      h('div', null,
        h('h1', { className:'page-title' }, h(React.Fragment, null, h('span',{className:'ms ms-lg', style:{marginRight:'8px',color:'var(--accent)'}},'admin_panel_settings'), 'Dev Dashboard')),
        h('p', { className:'page-subtitle' }, 'จัดการ Plan, Token, และการชำระเงิน — Super Admin Only')
      ),
      h('button', { className:'btn btn-sm', onClick:()=>loadOrders(), style:{display:'flex',alignItems:'center',gap:'4px'} },
        h('span',{className:'ms ms-xs'},'refresh'), ' โหลดใหม่'
      )
    ),
    h('div', { className:'tabs', style:{marginBottom:'16px'} },
      [['pending','รอชำระเงิน'],['approved','อนุมัติแล้ว'],['rejected','ปฏิเสธ/หมดเวลา'],['all','ทั้งหมด']].map(([key,label]) =>
        h('div', { key, className:`tab${tab===key?' active':''}`, onClick:()=>setTab(key) }, label,
          key==='pending' && orders.filter(o=>o.status==='pending_payment').length > 0 &&
            h('span', { style:{marginLeft:'6px',background:'var(--amber)',color:'#fff',borderRadius:'10px',fontSize:'10px',padding:'1px 6px',fontWeight:'700'} },
              orders.filter(o=>o.status==='pending_payment').length
            )
        )
      )
    ),
    loading ? h('div', { className:'card', style:{padding:'40px', textAlign:'center', color:'var(--text3)'} },
      h('span', { className:'ms ms-xxl', style:{display:'block', marginBottom:'12px', animation:'spin 1s linear infinite'} }, 'autorenew'),
      'กำลังโหลด...'
    ) : filtered.length === 0
      ? h('div', { className:'card' },
          h('div', { className:'empty' },
            h('span', { className:'ms ms-xxl', style:{opacity:0.3, display:'block', marginBottom:'14px'} }, 'receipt_long'),
            h('div', { className:'empty-title' }, 'ไม่มี Order'),
            h('div', { className:'empty-sub' }, `ไม่พบ Order ที่มีสถานะ "${tab}"`)
          )
        )
      : h('div', { className:'card' },
          h('div', { className:'table-wrap' },
            h('table', null,
              h('thead', null, h('tr', null,
                h('th', null, 'ทีม'),
                h('th', null, 'Admin Email'),
                h('th', null, 'วันที่สร้าง'),
                h('th', null, 'สถานะ'),
                h('th', null, 'หมายเหตุ'),
                h('th', null, 'Action')
              )),
              h('tbody', null, filtered.map(order =>
                h('tr', { key: order.id },
                  h('td', null, h('div', { style:{fontWeight:'600'} }, order.teamName || order.teamId),
                    h('div', { style:{fontSize:'11px', color:'var(--text3)', fontFamily:'var(--mono)'} }, order.teamId?.slice(0,8) + '...')

                  h('td', null, order.status === 'pending_payment'

                  h('td', null,

                        h('button', {

                          onClick: () => approve(order.id)

                        h('button', {

                          style:{background:'var(--red-bg)',color:'var(--red)',borderColor:'var(--red)',display:'flex',alignItems:'center',gap:'4px'},
                          onClick: () => reject(order.id)

                      ),
                      (order.status === 'approved') && h('button', {
                        className:'btn btn-sm', disabled: resending[order.teamId],

                        onClick: () => resend(order.teamId)

function TeamSelectPage({ currentUser, teams, setTeams, setTeamsState, members, setMembers, setMembersState, myTeams, setCurrentTeam, setPage, showToast, addLog, pendingMembers, setPendingMembers, autoJoinCode, setAutoJoinCode, processInvite, setInviteWaitingTeam, isUnlimitedPlan }) {
