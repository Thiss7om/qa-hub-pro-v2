  const [showJoin, setShowJoin] = useState(!!autoJoinCode);
  const [joinErr, setJoinErr] = useState('');
  const [creating, setCreating] = useState(false);
  // [v23-PLAN] Plan selection state
  const [planStep, setPlanStep] = useState('name'); // 'name' | 'plan'
  const [pendingTeam, setPendingTeam] = useState(null); // team object รอเลือก plan
  const [selectingPlan, setSelectingPlan] = useState(false);
  // [v23-PLAN] Upgrade Modal
  const [showUpgradeModal, setShowUpgradeModal] = useState(false);
  const [upgradeTeam, setUpgradeTeam] = useState(null);
  // [v26] PaymentPopup หลัง createTeam เลือก Unlimited Plan
  const [showPostCreatePayment, setShowPostCreatePayment] = useState(false);
  const [postCreateDevSettings, setPostCreateDevSettings] = useState({});
  const [postCreatePlanInfo, setPostCreatePlanInfo] = useState({});

  useEffect(() => {
    if (autoJoinCode) { setInviteCode(autoJoinCode); setShowJoin(true); }
  }, [autoJoinCode]);

  // [v23-PLAN] createTeam — Step 1: สร้างทีม, Step 2: เลือก Plan
  // Step 1: กรอกชื่อทีม → สร้าง Team + Member → เปิดหน้าเลือก Plan
  const createTeamStep1 = async () => {
    if (!teamName.trim() || creating) return;
    setCreating(true);
    const teamIcons = ['rocket_launch','bolt','target','local_fire_department','diamond','shield','star','science'];
    const teamColors = ['#4f8ef7','#34d399','#f472b6','#a78bfa','#fbbf24','#f87171','#60a5fa','#a3e635'];
    const rndIdx = Math.floor(Math.random()*8);
    const t = { id: uid(), name: teamName.trim(), icon: teamIcons[rndIdx], color: teamColors[rndIdx], createdBy: currentUser.id, inviteCode: uid().slice(0,8), createdAt: now() };
    const newMember = { id: uid(), teamId: t.id, userId: currentUser.id, role: 'admin', joinedAt: now() };
    try {
      await api.insert('teams', t);
      await api.insert('members', newMember);
      // [v26-FIX] ยังไม่อัพเดต local state จนกว่าจะเลือก Plan เสร็จ
      // บันทึก pending team ไว้ รอเลือก Plan
      setPendingTeam({ team: t, member: newMember });
      // [v26-FIX] ถ้าเป็น Unlimited/Paid Plan อยู่แล้ว → ข้าม plan step (selectPlan free อัตโนมัติ)
      if (isUnlimitedPlan) {
        // Unlimited user: ไม่ต้องเลือก Plan → selectPlan('free') อัตโนมัติ แต่ทีมไม่มี limit
        // อัพเดต state ทันที แล้ว navigate ไป dashboard
        (setTeamsState || setTeams)(p => [...p, t]);
        (setMembersState || setMembers)(p => [...p, newMember]);
        setCurrentTeam(t);
        setPage('dashboard');
        setPendingTeam(null);
        setTeamName('');
        setShowCreate(false);
        showToast(`ทีม "${t.name}" สร้างสำเร็จ!`);
        // Call selectPlan in background (fire & forget) เพื่อบันทึก plan record
        api.selectPlan(t.id, 'free', currentUser.email, currentUser.name, t.name).catch(() => {});
      } else {
        setPlanStep('plan');
      }
    } catch(e) {
      showToast(`สร้างทีมล้มเหลว: ${e.message}`, 'error');
    } finally {
      setCreating(false);
    }
  };

  // Step 2: เลือก Plan → เรียก GAS selectPlan → navigate dashboard
  const selectPlan = async (plan) => {
    if (!pendingTeam || selectingPlan) return;
    setSelectingPlan(true);
    const { team, member } = pendingTeam;
    try {
      const res = await api.selectPlan(team.id, plan, currentUser.email, currentUser.name, team.name);
      // [v26-FIX] อัพเดต local state หลัง selectPlan สำเร็จ → ทีมจะแสดงใน list
      (setTeamsState || setTeams)(p => [...p, team]);
      (setMembersState || setMembers)(p => [...p, member]);
      if (plan === 'free') {
        showToast(`ทีม "${team.name}" สร้างสำเร็จ! Free Plan พร้อมใช้งาน`);
      } else {
        // paid_trial — แสดง PaymentPopup แจ้งช่องทางชำระเงิน
        const trialEnd = res?.trialEndAt ? new Date(res.trialEndAt).toLocaleDateString('th-TH') : '3 วัน';
        showToast(`ทีม "${team.name}" พร้อมใช้งาน — Trial Unlimited ถึง ${trialEnd} กรุณาชำระเงินเพื่อใช้ต่อ`, 'warning');
        // [v26] โหลด devSettings แล้วแสดง PaymentPopup
        try {
          const ds = await api.getPublicDevSettings();
          setPostCreateDevSettings(ds || {});
        } catch(e2) { setPostCreateDevSettings({}); }
        setPostCreatePlanInfo({ plan: 'paid_trial', status: 'trial', trialEndAt: res?.trialEndAt || '' });
        setCurrentTeam(team);
        setPage('dashboard');
        setPendingTeam(null);
        setPlanStep('name');
        setTeamName('');
        setShowCreate(false);
        setShowPostCreatePayment(true);
        return;
      }
      setCurrentTeam(team);
      setPage('dashboard');
      setPendingTeam(null);
      setPlanStep('name');
      setTeamName('');
      setShowCreate(false);
    } catch(e) {
      showToast(`เลือก Plan ล้มเหลว: ${e.message}`, 'error');
    } finally {
      setSelectingPlan(false);
    }
  };

  // legacy createTeam alias (ไม่ใช้แล้ว — เปลี่ยนเป็น createTeamStep1)
  const createTeam = createTeamStep1;

  const [joining, setJoining] = useState(false);

  // [FIX-INVITE] joinTeam ต้อง async + query GAS โดยตรง
  // เหตุผล: teams state มีเฉพาะทีมที่ user เป็นสมาชิกแล้ว (GAS isolation)
  //         → ค้นหา invite code ใน local state จึงหาไม่เจอเสมอสำหรับทีมที่ยังไม่ได้เข้า
  const joinTeam = async () => {
    const code = inviteCode.trim();
    if (!code || joining) return;
    setJoinErr('');
    setJoining(true);

    let t = null;
    try {
      // ── Step 1: lookup team จาก GAS (ได้ safe fields: id, name, icon, color) ──
      const result = await api.lookupTeamByCode(code);
      t = result; // { id, name, icon, color }
    } catch(e) {
      setJoinErr(e.message || 'ไม่พบ Invite Code นี้ กรุณาตรวจสอบ Code อีกครั้ง');
      setJoining(false);
      return;
    }

    // ── Step 2: ถ้าเป็น member อยู่แล้ว (active) → ไป dashboard เลย ──
    // [v20.1-REJOIN] inactive/deleted ไม่ถือว่าเป็น active member → อนุญาตให้ขอเข้าใหม่ได้
    const existingMember = members.find(m => m.teamId===t.id && m.userId===currentUser.id);
    if (existingMember) {
      // หา team object จาก local state (มีครบทุก field)
      const localTeam = teams.find(tm => tm.id === t.id) || t;
      setCurrentTeam(localTeam);
      setPage('dashboard');
      setJoining(false);
      return;
    }

    // ── Step 3: ตรวจ pending request เดิม ──
    const existingReq = pendingMembers && pendingMembers.find(p => p.teamId===t.id && p.userId===currentUser.id);
    if (existingReq) {
      if (existingReq.status === 'pending') {
        setJoinErr(`มีการขอเข้าร่วมทีม "${t.name}" แล้ว กรุณารอ Admin อนุมัติ`);
        setTimeout(() => { setInviteWaitingTeam && setInviteWaitingTeam({ id: t.id, name: t.name }); }, 1500);
        setJoining(false);
        return;
      }
      if (existingReq.status === 'rejected') {
        // อนุญาตให้ขอใหม่ได้ — update existing record กลับเป็น pending (ไม่สร้าง duplicate)
        setPendingMembers && setPendingMembers(p => p.map(r =>
          r.id === existingReq.id ? { ...r, status: 'pending', requestedAt: now(), inviteCode: code } : r
        ));
        setAutoJoinCode && setAutoJoinCode('');
        setShowJoin(false);
        setInviteWaitingTeam && setInviteWaitingTeam({ id: t.id, name: t.name });
        setJoining(false);
        return;
      }
    }

    // ── Step 4: สร้าง pending request ใหม่ พร้อมส่ง inviteCode ไปให้ GAS verify ──
    setPendingMembers && setPendingMembers(p => [
      ...p,
      { id: uid(), teamId: t.id, teamName: t.name, userId: currentUser.id,
        requestedAt: now(), status: 'pending', inviteCode: code }
    ]);
    setAutoJoinCode && setAutoJoinCode('');
    setShowJoin(false);
    setInviteWaitingTeam && setInviteWaitingTeam({ id: t.id, name: t.name });
    setJoining(false);
  };

  const colors = ['#4f8ef7','#34d399','#f472b6','#a78bfa','#fbbf24'];

  return h(React.Fragment, null,
    h('div', { style:{minHeight:'100vh', background:'var(--bg)', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'24px'} },
    h('div', { style:{width:'100%', maxWidth:'560px'} },
      h('div', { style:{textAlign:'center', marginBottom:'32px'} },
        h('div', { style:{fontSize:'22px', fontWeight:'700', color:'var(--accent)'} }, 'QAHub', h('span', { style:{color:'var(--text)'} }, 's')),
        h('p', { style:{color:'var(--text2)', marginTop:'6px'} }, `สวัสดี ${currentUser.name} — เลือกหรือสร้างทีม`)
      ),
      myTeams.length > 0 && h('div', { style:{marginBottom:'24px'} },
        h('p', { className:'section-title', style:{marginBottom:'12px'} }, 'ทีมของคุณ'),
        h('div', { style:{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'12px'} },
          myTeams.map((t,i) => h('div', { key:t.id, className:'team-card', onClick:()=>{ setCurrentTeam(t); setPage('dashboard'); } },
            h('div', { className:'team-icon', style:{background:colors[i%5]+'22',color:colors[i%5]} },
              t.icon && t.icon.length < 30
                ? h('span',{className:'ms',style:{fontSize:'22px'}}, t.icon)
                : h('span',{style:{fontWeight:'700',fontSize:'18px',fontFamily:'var(--display)'}}, t.name[0].toUpperCase())
            ),
            h('div', { style:{fontWeight:'600'} }, t.name),
            h('div', { style:{fontSize:'12px', color:'var(--text3)', marginTop:'4px'} }, 'สมาชิก')
          ))
        )
      ),
      // Pending approval section — dedup by teamId, แสดงแค่ทีมละ 1 แถว
      (()=>{
        const rawPending = (pendingMembers||[]).filter(p => p.userId===currentUser.id && p.status==='pending');
        const dedupPending = Object.values(rawPending.reduce((acc,p)=>{
          if(!acc[p.teamId]||String(p.requestedAt)>String(acc[p.teamId].requestedAt)) acc[p.teamId]=p;
          return acc;
        },{}));
        return dedupPending.length > 0 && h('div', { style:{marginBottom:'24px'} },
          h('p', { className:'section-title', style:{marginBottom:'12px',color:'var(--amber)'} }, h(React.Fragment,null,h('span',{className:'ms ms-xs',style:{marginRight:'4px'}},'hourglass_top'),'รอการอนุมัติ')),
          h('div', { style:{display:'flex', flexDirection:'column', gap:'10px'} },
            dedupPending.map(p =>
              h('div', { key:p.teamId, style:{background:'var(--amber-bg)',border:'1px solid var(--amber)',borderRadius:'var(--r)',padding:'12px 16px',display:'flex',alignItems:'center',justifyContent:'space-between'} },
                h('div', null,
                  h('div', { style:{fontWeight:'600',marginBottom:'2px'} }, p.teamName || p.teamId),
                  h('div', { style:{fontSize:'12px',color:'var(--amber)'} }, h(React.Fragment,null,h('span',{className:'ms ms-xs',style:{marginRight:'4px'}},'hourglass_top'),'รอ Admin อนุมัติเข้าร่วมทีม'))
                ),
                h('span', { className:'badge badge-amber' }, 'รออนุมัติ')
              )
            )
          )
        );
      })(),
      h('div', { style:{display:'flex', gap:'10px'} },
        (()=>{
          // [v26-FIX] Unlimited Plan สร้างทีมได้ไม่จำกัด
          const atTeamLimit = !isUnlimitedPlan && myTeams.length >= 1;
          return h('button', {
            className:'btn btn-primary',
            style:{flex:1, justifyContent:'center', opacity: atTeamLimit ? 0.45 : 1, cursor: atTeamLimit ? 'not-allowed' : 'pointer'},
            disabled: atTeamLimit,
            title: atTeamLimit ? 'Free Plan สร้างได้แค่ 1 ทีม — Upgrade เพื่อสร้างเพิ่ม' : '',
            onClick: atTeamLimit ? undefined : ()=>setShowCreate(true)
          },
            h('span',{className:'ms ms-xs'},atTeamLimit ? 'lock' : 'group_add'),
            ' + สร้างทีมใหม่',
            atTeamLimit && h('span',{style:{fontSize:'10px',opacity:0.8,marginLeft:'4px'}},'(Free: 1 ทีม)')
          );
        })(),
        h('button', { className:'btn', style:{flex:1, justifyContent:'center'}, onClick:()=>setShowJoin(true) },
          h('span',{className:'ms ms-xs'},'login'), ' เข้าร่วมด้วย Code'
        )
      ),
      showCreate && planStep === 'name' && h('div', { className:'card', style:{marginTop:'16px'} },
        h('p', { className:'card-title', style:{marginBottom:'12px'} }, 'สร้างทีมใหม่'),
        h('input', { className:'form-input', value:teamName, onChange:e=>setTeamName(e.target.value), placeholder:'ชื่อทีม...', style:{marginBottom:'10px'},
          onKeyDown: e => e.key==='Enter' && createTeamStep1() }),
        h('div', { style:{display:'flex', gap:'8px'} },
          h('button', { className:'btn btn-primary', onClick:createTeamStep1, disabled:creating||!teamName.trim() }, creating ? 'กำลังสร้าง...' : 'ถัดไป →'),
          h('button', { className:'btn', onClick:()=>{ setShowCreate(false); setTeamName(''); } }, 'ยกเลิก')
        )
      ),
      showCreate && planStep === 'plan' && pendingTeam && h(PlanSelectCard, {
        teamName: pendingTeam.team.name,
        onSelect: selectPlan,
        selecting: selectingPlan
      }),
      showJoin && h('div', { className:'card', style:{marginTop:'16px'} },
        h('p', { className:'card-title', style:{marginBottom:'12px'} }, 'เข้าร่วมทีม'),
        h('input', { className:'form-input', value:inviteCode, onChange:e=>{ setInviteCode(e.target.value); setJoinErr(''); }, placeholder:'Invite Code...', style:{marginBottom:'8px'},
          onKeyDown: e => e.key==='Enter' && joinTeam() }),
        joinErr && h('div', { style:{
          background: joinErr.includes('มีการขอเข้าร่วม') ? 'var(--amber-bg)' : 'var(--red-bg)',
          border: `1px solid ${joinErr.includes('มีการขอเข้าร่วม') ? 'var(--amber)' : 'var(--red)'}`,
          borderRadius:'var(--r)', padding:'8px 12px', marginBottom:'8px',
          fontSize:'12px', color: joinErr.includes('มีการขอเข้าร่วม') ? 'var(--amber)' : 'var(--red)',
          display:'flex', alignItems:'flex-start', gap:'6px'
        } },
          h('span', null, joinErr.includes('มีการขอเข้าร่วม') ? h('span',{className:'ms ms-xs'},'hourglass_top') : h('span',{className:'ms ms-xs'},'warning')),
          h('span', null, joinErr)
        ),
        h('div', { style:{display:'flex', gap:'8px'} },
          h('button', { className:'btn btn-primary', onClick:joinTeam, disabled:joining },
            joining
              ? h(React.Fragment, null, h('span',{className:'ms ms-xs',style:{animation:'spin 1s linear infinite',display:'inline-block',marginRight:'6px'}},'refresh'), 'กำลังตรวจสอบ...')
              : 'เข้าร่วม'
          ),
          h('button', { className:'btn', onClick:()=>{ setShowJoin(false); setJoinErr(''); setJoining(false); }, disabled:joining }, 'ยกเลิก')
        )
      )
    )),
    // [v26] PaymentPopup หลัง createTeam เลือก Unlimited Plan
    showPostCreatePayment && h(PaymentPopup, {
      currentUser,
      currentTeam,
      showToast,
      planInfo: postCreatePlanInfo,
      devSettings: postCreateDevSettings,
      onClose: () => setShowPostCreatePayment(false),
      onUseFree: () => setShowPostCreatePayment(false)
    })
  );
}

// ─── ADMIN NOTIFICATION BELL (คำขอเข้าร่วมทีม — คลิกพาไปหน้า Pending) ──────────
function NotificationBell({ pendingMembers, currentTeam, isAdmin, navigate, setPage, newPendingIds, clearNewPending, newSlipOrderIds, clearNewSlipOrders, isSuperAdminUser }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  const prevCountRef = useRef(0);

  useEffect(() => {
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  if (!isAdmin || !currentTeam) return null;

  const allPending = (pendingMembers||[]).filter(p => p.teamId===currentTeam.id && p.status==='pending');
  const reqs = Object.values(allPending.reduce((acc,p) => {
    if (!acc[p.userId] || p.requestedAt > acc[p.userId].requestedAt) acc[p.userId] = p;
    return acc;
  }, {}));

  const slipCount = isSuperAdminUser ? (newSlipOrderIds ? newSlipOrderIds.size : 0) : 0;
  const count = reqs.length + slipCount;
  const hasNew = (newPendingIds && reqs.some(r => newPendingIds.has(r.id))) || slipCount > 0;

  // เล่นเสียงเมื่อมี request ใหม่เข้ามา
  useEffect(() => {
    if (count > prevCountRef.current && prevCountRef.current >= 0) {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        [[880, 0], [1100, 0.18]].forEach(([freq, delay]) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.type = 'sine'; osc.frequency.value = freq;
          gain.gain.setValueAtTime(0, ctx.currentTime + delay);
          gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + delay + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.25);
          osc.start(ctx.currentTime + delay);
          osc.stop(ctx.currentTime + delay + 0.28);
        });
        setTimeout(() => { try { ctx.close(); } catch(e) {} }, 900);
      } catch(e) {}
    }
    prevCountRef.current = count;
  }, [count]);

  // นำทางไปหน้า Team Settings แท็บ Pending
  const goToPending = () => {
    setOpen(false);
    clearNewPending && clearNewPending();
    setPage('team-settings');
  };

  const btnRef = useRef(null);
  const [dropPos, setDropPos] = useState({ top: 0, right: 0 });

  const handleOpen = () => {
    if (!open && btnRef.current) {
      const rect = btnRef.current.getBoundingClientRect();
      setDropPos({ top: rect.bottom + 8, right: window.innerWidth - rect.right });
    }
    setOpen(o => !o);
  };

  return h('div', { ref, style:{position:'relative'} },
    h('button', {
      ref: btnRef,
      className: `notif-btn${count > 0 ? ' has-notif' : ''}`,
      title: count > 0 ? `${count} คำขอเข้าร่วมทีมรออนุมัติ` : 'แจ้งเตือน',
      onClick: handleOpen
    },
      h('span', { className:'ms ms-sm' }, count > 0 ? 'notifications_active' : 'notifications'),
      count > 0 && h('span', { className:'notif-badge' }, count > 9 ? '9+' : count)
    ),
    open && ReactDOM.createPortal(
      h(React.Fragment, null,
        h('div', { style:{position:'fixed',inset:0,zIndex:9999}, onClick:()=>setOpen(false) }),
        h('div', { className:'notif-dropdown', style:{top: dropPos.top+'px', right: dropPos.right+'px', bottom:'auto', left:'auto'} },
          h('div', { className:'notif-header' },
            h('span', { className:'notif-title' }, h(React.Fragment, null,
              h('span',{className:'ms ms-xs',style:{marginRight:'6px',color:'var(--accent)'}},'notifications_active'),
              'แจ้งเตือน'
            )),
            count > 0 && h('span', { style:{fontSize:'11px',color:'var(--text3)'} }, count+' รายการ')
          ),
          reqs.length === 0
            ? h('div', { className:'notif-empty' },
                h('span',{className:'ms ms-lg',style:{opacity:0.3,display:'block',marginBottom:'6px'}},'notifications_off'),
                'ไม่มีการแจ้งเตือน'
              )
            : h(React.Fragment, null,
                reqs.map(req => {
                  const isNew = newPendingIds && newPendingIds.has(req.id);
                  return h('div', { key:req.id, className:'notif-item', onClick:goToPending,
                    style:isNew ? {background:'var(--accent-bg)'} : {} },
                    h('div', { style:{display:'flex',alignItems:'center',gap:'10px'} },
                      h('div', { className:'notif-item-icon' },
                        h('span',{className:'ms ms-sm',style:{color:'var(--accent)'}},'person_add')
                      ),
                      h('div', { style:{flex:1,minWidth:0} },
                        h('div', { style:{fontSize:'13px',fontWeight:'600',marginBottom:'2px',display:'flex',alignItems:'center',gap:'6px'} },
                          'คำขอเข้าร่วมทีม',
                          isNew && h('span',{style:{fontSize:'10px',background:'var(--accent)',color:'#fff',padding:'1px 5px',borderRadius:'3px',fontWeight:'700'}},'ใหม่')
                        ),
                        h('div', { style:{fontSize:'12px',color:'var(--text2)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'} },
                          `ทีม ${req.teamName || currentTeam.name}`
                        ),
                        h('div', { style:{fontSize:'11px',color:'var(--text3)',marginTop:'2px',fontFamily:'var(--mono)'} }, fmtDate(req.requestedAt))
                      ),
                      h('span',{className:'ms ms-xs',style:{color:'var(--text3)'}},'chevron_right')
                    )
                  );
                }),
                h('div', { style:{padding:'10px 16px',borderTop:'1px solid var(--border)'} },
                  h('button', { className:'btn btn-sm btn-primary', style:{width:'100%',justifyContent:'center'},
                    onClick:goToPending },
                    h(React.Fragment,null,h('span',{className:'ms ms-xs'},'manage_accounts'),' ดูทั้งหมดและอนุมัติ')
                  )
                )
              ),
              // [v26] Slip payment notifications for Super Admin
              isSuperAdminUser && slipCount > 0 && h(React.Fragment, null,
                h('div', {
                  style:{padding:'10px 16px',borderTop:'1px solid var(--border)',background:'var(--amber-bg)',cursor:'pointer',transition:'background 0.15s'},
                  onClick: () => {
                    setOpen(false);
                    clearNewSlipOrders && clearNewSlipOrders();
                    setPage('dev-dashboard');
                  },
                  onMouseEnter: e => { e.currentTarget.style.background='rgba(245,158,11,0.2)'; },
                  onMouseLeave: e => { e.currentTarget.style.background='var(--amber-bg)'; }
                },
                  h('div', { style:{display:'flex',alignItems:'center',gap:'10px'} },
                    h('div', { style:{width:'32px',height:'32px',borderRadius:'8px',background:'var(--amber)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0} },
                      h('span',{className:'ms ms-sm',style:{color:'#fff'}},'receipt_long')
                    ),
                    h('div', { style:{flex:1,minWidth:0} },
                      h('div', { style:{fontSize:'13px',fontWeight:'700',color:'var(--amber)',display:'flex',alignItems:'center',gap:'6px'} },
                        h('span',{className:'ms ms-xs',style:{color:'var(--amber)'}},'payments'),
                        'มีสลีปชำระเงินใหม่',
                        h('span',{style:{fontSize:'10px',background:'var(--amber)',color:'#fff',padding:'1px 5px',borderRadius:'3px',fontWeight:'700'}}, slipCount)
                      ),
                      h('div', { style:{fontSize:'11px',color:'var(--text2)',marginTop:'2px'} }, 'คลิกเพื่อไปที่ Dev Dashboard ตรวจสอบ')
                    ),
                    h('span',{className:'ms ms-xs',style:{color:'var(--amber)'}},'chevron_right')
                  )
                )
              )
        )
      ),
      document.getElementById('modal-root')
    )
  );
}


// ─── USER UPDATE NOTIFICATION BELL (แจ้งเตือนการอัปเดตสำหรับ User ทั่วไป) ──────
function UserNotificationBell({ userNotifs, clearUserNotifs }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  const btnRef = useRef(null);
  const [dropPos, setDropPos] = useState({ top: 0, right: 0 });

  useEffect(() => {
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  const count = (userNotifs||[]).length;

  const handleOpen = () => {
    if (!open && btnRef.current) {
      const rect = btnRef.current.getBoundingClientRect();
      setDropPos({ top: rect.bottom + 8, right: window.innerWidth - rect.right });
      clearUserNotifs && clearUserNotifs();
    }
    setOpen(o => !o);
  };

  const getIcon = (type) => {
    if (type === 'defect') return 'bug_report';
    if (type === 'task') return 'assignment';
    if (type === 'tc') return 'science';
    return 'folder';
  };
  const getColor = (type) => {
    if (type === 'defect') return 'var(--red)';
    if (type === 'task') return 'var(--purple)';
    if (type === 'tc') return 'var(--cyan)';
    return 'var(--amber)';
  };
  const getLabel = (type) => {
    if (type === 'defect') return 'Defect';
    if (type === 'task') return 'Task';
    if (type === 'tc') return 'Test Case';
    return 'Project';
  };

  return h('div', { ref, style:{position:'relative'} },
    h('button', {
      ref: btnRef,
      className: `notif-btn${count > 0 ? ' has-notif' : ''}`,
      title: count > 0 ? `${count} การแจ้งเตือนใหม่` : 'แจ้งเตือน',
      onClick: handleOpen
    },
      h('span', { className:'ms ms-sm' }, count > 0 ? 'notifications_active' : 'notifications'),
      count > 0 && h('span', { className:'notif-badge' }, count > 9 ? '9+' : count)
    ),
    open && ReactDOM.createPortal(
      h(React.Fragment, null,
        h('div', { style:{position:'fixed',inset:0,zIndex:9999}, onClick:()=>setOpen(false) }),
        h('div', { className:'notif-dropdown', style:{
          top: dropPos.top+'px', right: dropPos.right+'px', bottom:'auto', left:'auto',
          width: '320px', maxWidth: 'calc(100vw - 20px)'
        } },
          h('div', { className:'notif-header' },
            h('span', { className:'notif-title' }, h(React.Fragment, null,
              h('span',{className:'ms ms-xs',style:{marginRight:'6px',color:'var(--accent)'}},'notifications_active'),
              'แจ้งเตือน'
            )),
            count > 0 && h('div', { style:{display:'flex',alignItems:'center',gap:'8px'} },
              h('span', { style:{fontSize:'11px',color:'var(--text3)'} }, count+' รายการ'),
              h('button', {
                style:{fontSize:'10px',color:'var(--text3)',background:'none',border:'none',cursor:'pointer',padding:'2px 5px',borderRadius:'3px'},
                onClick: e => { e.stopPropagation(); clearUserNotifs && clearUserNotifs(); }
              }, 'ล้างทั้งหมด')
            )
          ),
          (userNotifs||[]).length === 0
            ? h('div', { className:'notif-empty' },
                h('span',{className:'ms ms-lg',style:{opacity:0.3,display:'block',marginBottom:'6px'}},'notifications_off'),
                'ไม่มีการแจ้งเตือน'
              )
            : h('div', { style:{maxHeight:'360px',overflowY:'auto'} },
                [...(userNotifs||[])].reverse().map((n, i) =>
                  h('div', { key:i, className:'notif-item', style:{cursor:'default',padding:'10px 16px',borderBottom:'1px solid var(--border)'} },
                    h('div', { style:{display:'flex',alignItems:'flex-start',gap:'10px'} },
                      h('div', {
                        style:{
                          width:'30px',height:'30px',borderRadius:'7px',flexShrink:0,
                          background:getColor(n.type)+'1a',
                          display:'flex',alignItems:'center',justifyContent:'center'
                        }
                      },
                        h('span',{className:'ms ms-xs',style:{color:getColor(n.type)}},getIcon(n.type))
                      ),
                      h('div', { style:{flex:1,minWidth:0} },
                        h('div', { style:{fontSize:'12px',fontWeight:'600',color:'var(--text)',marginBottom:'2px'} },
                          h('span',{style:{fontSize:'10px',padding:'1px 5px',borderRadius:'3px',background:getColor(n.type)+'22',color:getColor(n.type),marginRight:'5px',fontWeight:'700'}},getLabel(n.type)),
                          n.name
                        ),
                        n.from && n.to && h('div', { style:{fontSize:'11px',color:'var(--text2)',marginBottom:'2px'} },
                          h('span',{style:{color:'var(--text3)'}},'สถานะ: '),
                          h('span',{style:{color:'var(--text3)',textDecoration:'line-through'}},n.from),
                          h('span',{className:'ms ms-xs',style:{fontSize:'10px',color:'var(--text3)',margin:'0 3px'}},'arrow_forward'),
                          h('span',{style:{color:n.to==='Passed'?'var(--green)':n.to==='Failed'?'var(--red)':'var(--accent)'}},n.to)
                        ),
                        h('div', { style:{fontSize:'10px',color:'var(--text3)',fontFamily:'var(--mono)'} }, n.time || '')
                      )
                    )
                  )
                )
              )
        )
      ),
      document.getElementById('modal-root')
    )
  );
}


// ─── TOPBAR ───────────────────────────────────────────────────────────────────
function Topbar({ currentUser, setCurrentUser, users, setUsers, currentTeam, setCurrentTeam, setPage, navigate, myTeams, theme, toggleTheme, syncing, USE_GAS, refreshFromSheets, isAdmin, showToast, pendingMembers, newPendingIds, clearNewPending, newSlipOrderIds, clearNewSlipOrders, isSuperAdminUser, sidebarOpen, toggleSidebar, approvePending, rejectPending, userNotifs, clearUserNotifs }) {
  const [showMenu, setShowMenu] = useState(false);
  const [showSheetPass, setShowSheetPass] = useState(false);
  const [sheetPass, setSheetPass] = useState('');
  const [sheetPassErr, setSheetPassErr] = useState('');
  const [sheetPassLoading, setSheetPassLoading] = useState(false);
  const [showSheetPassVisible, setShowSheetPassVisible] = useState(false);
  const [showProfile, setShowProfile] = useState(false);

  const openGoogleSheet = async () => {
    if (!sheetPass.trim()) { setSheetPassErr('กรุณากรอกรหัสผ่าน'); return; }
    // ตรวจ password ผ่าน GAS login action (รองรับ hashed password)
    if (USE_GAS && typeof api !== 'undefined' && currentUser?.email) {
      setSheetPassLoading(true);
      try {
        const res = await api.rawWrite({ action: 'login', email: currentUser.email, password: sheetPass.trim() });
        if (!res || res.ok === false) {
          setSheetPassErr('รหัสผ่านไม่ถูกต้อง — กรุณาใส่รหัสผ่านที่ใช้ Login ของบัญชีคุณ');
          setSheetPassLoading(false);
          return;
        }
      } catch(e) {
        setSheetPassErr('เกิดข้อผิดพลาด: ' + e.message);
        setSheetPassLoading(false);
        return;
      }
      setSheetPassLoading(false);
    } else {
      // Fallback สำหรับ non-GAS mode: เทียบ plain password ตรง ๆ
      const correctPass = currentUser?.password?.trim() || '';
      if (sheetPass.trim() !== correctPass || !correctPass) {
        setSheetPassErr('รหัสผ่านไม่ถูกต้อง — กรุณาใส่รหัสผ่านที่ใช้ Login ของบัญชีคุณ');
        return;
      }
    }
    setSheetPass(''); setSheetPassErr(''); setShowSheetPass(false); setSheetPassLoading(false);
    // ดึง ssId จาก sessionStorage ก่อน (บันทึกหลัง login)
    let ssId = '';
    try { ssId = sessionStorage.getItem('qah_ssid') || localStorage.getItem('qah_ssid') || ''; } catch {}
    const sheetUrl = ssId
      ? `https://docs.google.com/spreadsheets/d/${ssId}/edit`
      : 'https://docs.google.com/spreadsheets';
    window.open(sheetUrl, '_blank');
  };

  // Render avatar: icon or initial
  const renderAvatar = (user, size=26) => {
    const fs = Math.round(size * 0.55);
    if (user?.avatarIcon) {
      return h('div', { className:'avatar', style:{width:size+'px',height:size+'px',background:user.color+'22',color:user.color,fontSize:fs+'px'} },
        h('span',{className:'ms',style:{fontSize:fs+'px',lineHeight:'1'}},user.avatarIcon)
      );
    }
    return h('div', { className:'avatar', style:{width:size+'px',height:size+'px',background:user?.color+'22',color:user?.color,fontSize:Math.round(size*0.42)+'px',fontWeight:'700'} },
      (user?.name||'?')[0].toUpperCase()
    );
  };

  return h('div', { className: 'topbar' },
    h('div', { className: 'topbar-left' },
      h('div', { className: 'team-badge', onClick: () => { setCurrentTeam(null); setPage('team-select'); } }, currentTeam?.name || 'No Team')
    ),
    h('div', { className: 'topbar-right' },
      USE_GAS && h('button', {
        className: 'btn btn-sm',
        title: 'โหลดข้อมูลใหม่จาก Google Sheets',
        onClick: refreshFromSheets,
        style: { gap: '5px', fontSize: '12px', padding: '5px 10px',
          background: syncing ? 'var(--amber-bg)' : 'var(--bg3)',
          borderColor: syncing ? 'var(--amber)' : 'var(--border2)',
          color: syncing ? 'var(--amber)' : 'var(--text)',
        }
      },
        h('span', null, h('span',{className:'ms ms-sm'},syncing?'sync':'refresh')),
        syncing ? 'Syncing...' : ''
      ),
      isAdmin && h('div', { style:{position:'relative'} },
        h('button', {
          className: 'btn btn-sm',
          title: 'เปิด Google Sheets (Admin only)',
          onClick: () => { setShowSheetPass(v=>!v); setSheetPass(''); setSheetPassErr(''); },
          style: { gap: '5px', fontSize: '12px', padding: '5px 10px',
            background: showSheetPass ? 'var(--accent-bg)' : 'var(--bg3)',
            borderColor: showSheetPass ? 'var(--accent)' : 'var(--border)',
            color: showSheetPass ? 'var(--accent3)' : 'var(--text2)'
          }
        },
          h('span',{className:'ms ms-sm'},'table_chart')
        ),
        showSheetPass && h(React.Fragment, null,
          h('div', { style:{position:'fixed',inset:0,zIndex:9998}, onClick:()=>setShowSheetPass(false) }),
          h('div', { style:{
            position:'absolute', top:'calc(100% + 8px)', right:0, zIndex:9999,
            background:'var(--bg2)', border:'1px solid var(--border2)', borderRadius:'10px',
            boxShadow:'0 12px 40px rgba(0,0,0,0.5)', padding:'14px', width:'260px',
            animation:'dpIn 0.15s ease'
          }},
            h('div', { style:{display:'flex',alignItems:'center',gap:'6px',marginBottom:'10px',paddingBottom:'8px',borderBottom:'1px solid var(--border)'} },
              h('span',{className:'ms ms-xs',style:{color:'var(--accent3)'}},'lock'),
              h('span',{style:{fontSize:'12px',fontWeight:'600',color:'var(--text)'}},'ยืนยันตัวตน'),
              h('div',{style:{marginLeft:'auto',cursor:'pointer',color:'var(--text3)',display:'flex'},onClick:()=>setShowSheetPass(false)},
                h('span',{className:'ms ms-xs'},'close')
              )
            ),
            h('p', { style:{color:'var(--text3)',fontSize:'11px',marginBottom:'8px',lineHeight:'1.5'} },
              `รหัสผ่านของ "${currentUser?.name || 'Admin'}"`
            ),
            h('div', { style:{position:'relative',marginBottom:'8px'} },
              h('input', {
                className:'form-input', type: showSheetPassVisible ? 'text' : 'password',
                value:sheetPass, placeholder:'รหัสผ่าน...', autoFocus:true,
                style:{fontSize:'12px',padding:'7px 32px 7px 10px'},
                onChange:e=>{ setSheetPass(e.target.value); setSheetPassErr(''); },
                onKeyDown:e=>{ if(e.key==='Enter') openGoogleSheet(); if(e.key==='Escape') setShowSheetPass(false); }
              }),
              h('span', {
                className:'ms ms-xs',
                style:{position:'absolute',right:'8px',top:'50%',transform:'translateY(-50%)',color:'var(--text3)',cursor:'pointer'},
                onClick:()=>setShowSheetPassVisible(v=>!v)
              }, showSheetPassVisible ? 'visibility_off' : 'visibility')
            ),
            sheetPassErr && h('p', { style:{color:'var(--red)',fontSize:'11px',marginBottom:'6px',display:'flex',alignItems:'center',gap:'4px'} },
              h('span',{className:'ms ms-xs'},'error'), sheetPassErr
            ),
            h('div', { style:{display:'flex',gap:'6px'} },
              h('button', { className:'btn btn-sm', style:{flex:1,justifyContent:'center',fontSize:'11px'}, onClick:()=>setShowSheetPass(false) }, 'ยกเลิก'),
              h('button', { className:'btn btn-sm btn-primary', style:{flex:1,justifyContent:'center',fontSize:'11px'}, onClick:openGoogleSheet, disabled:sheetPassLoading },
                sheetPassLoading ? h('span',{className:'ms ms-xs',style:{animation:'spin 1s linear infinite'}},'sync') : h(React.Fragment,null,h('span',{className:'ms ms-xs'},'open_in_new'),' เปิด')
              )
            )
          )
        )
      ),
      h('button', { className: 'theme-toggle', onClick: toggleTheme, title: theme === 'dark' ? 'สลับเป็นโหมดสว่าง' : 'สลับเป็นโหมดมืด',
        style: { width:'auto', padding:'0 10px', gap:'5px', fontSize:'12px',
          background: theme === 'light' ? '#fff3e0' : 'var(--bg3)',
          borderColor: theme === 'light' ? '#f5a623' : 'var(--border)',
          color: theme === 'light' ? '#b86e00' : 'var(--text2)'
        }
      },
        h('span',{className:'ms ms-sm'},theme==='dark'?'light_mode':'dark_mode'),
        h('span',{style:{fontSize:'11px',fontWeight:'600',letterSpacing:'0.3px'}}, theme==='dark'?'':'')
      ),
      isAdmin && h(NotificationBell, { pendingMembers, currentTeam, isAdmin, navigate, setPage, newPendingIds, clearNewPending, newSlipOrderIds, clearNewSlipOrders, isSuperAdminUser }),
      currentTeam && h(UserNotificationBell, { userNotifs, clearUserNotifs }),
      h('div', { className: 'user-pill', style:{position:'relative'} },
        h('div', {
          style:{display:'flex',alignItems:'center',gap:'8px',cursor:'pointer'},
          onClick: () => setShowMenu(!showMenu)
        },
          renderAvatar(currentUser, 26),
          h('span', { style:{fontSize:'13px'} }, currentUser?.name),
          h('span',{className:'ms ms-xs',style:{opacity:0.5,fontSize:'12px'}},showMenu?'expand_less':'expand_more')
        ),
        showMenu && h(React.Fragment, null,
          h('div', {
            style:{position:'fixed',inset:0,zIndex:99},
            onClick:()=>setShowMenu(false)
          }),
          h('div', { style:{position:'absolute', top:'38px', right:0, background:'var(--bg2)', border:'1px solid var(--border)', borderRadius:'var(--r2)', minWidth:'200px', zIndex:100, boxShadow:'var(--shadow)',overflow:'hidden'} },
            h('div', { style:{padding:'12px 14px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', gap:'10px'} },
              renderAvatar(currentUser, 36),
              h('div',null,
                h('div',{style:{fontWeight:'600',fontSize:'13px',color:'var(--text)'}},currentUser?.name),
                h('div',{style:{fontSize:'11px',color:'var(--text3)'}},currentUser?.email)
              )
            ),
            h('div', { style:{padding:'4px 0'} },
              h('div', { style:{padding:'8px 14px', cursor:'pointer', fontSize:'13px', display:'flex', alignItems:'center', gap:'10px', transition:'background 0.12s'},
                onMouseEnter:e=>e.currentTarget.style.background='var(--bg3)',
                onMouseLeave:e=>e.currentTarget.style.background='transparent',
                onClick:()=>{ setShowMenu(false); setShowProfile(true); }
              },
                h('span',{className:'ms ms-sm',style:{color:'var(--text2)'}},'manage_accounts'), 'ตั้งค่าโปรไฟล์'
              ),
              h('div', { style:{padding:'8px 14px', cursor:'pointer', fontSize:'13px', display:'flex', alignItems:'center', gap:'10px', transition:'background 0.12s'},
                onMouseEnter:e=>e.currentTarget.style.background='var(--bg3)',
                onMouseLeave:e=>e.currentTarget.style.background='transparent',
                onClick:()=>{ setCurrentTeam(null); setShowMenu(false); }
              },
                h('span',{className:'ms ms-sm',style:{color:'var(--text2)'}},'swap_horiz'), 'เปลี่ยนทีม'
              ),
              h('div', { style:{height:'1px',background:'var(--border)',margin:'4px 0'}} ),
              h('div', { style:{padding:'8px 14px', cursor:'pointer', fontSize:'13px', display:'flex', alignItems:'center', gap:'10px', color:'var(--red)', transition:'background 0.12s'},
                onMouseEnter:e=>e.currentTarget.style.background='var(--bg3)',
                onMouseLeave:e=>e.currentTarget.style.background='transparent',
                onClick: async () => {
                  // [FIX VULN-02] Revoke token on server before clearing local session
                  const tok = getAuthToken();
                  if (GAS_URL && tok) {
                    try { await api.rawWrite({ action: 'logout', token: tok }); } catch(e) { /* silent */ }
                  }
                  // [FIX NEW-TAB] broadcast logout ไปยัง tab อื่นด้วย
                  if (window._qahBroadcast) { try { window._qahBroadcast.postMessage({ type: 'LOGOUT' }); } catch {} }
                  setAuthToken(null);
                  clearSessionIssuedAt(); // [SESSION-TIMEOUT] ล้าง issued-at + last-activity
                  setCurrentUser(null);
                  setCurrentTeam(null);
                  setPage('login');
                  setSession('qah_session_user', null);
                  setSession('qah_session_team', null);
                }
              },
                h('span',{className:'ms ms-sm'},'logout'), 'ออกจากระบบ'
              )
            )
          )
        )
      ),
      showProfile && h(ProfileModal, {
        currentUser, users, setUsers, setCurrentUser,
        showToast, onClose:()=>setShowProfile(false)
      })
    )
  );
}

const AVATAR_ICONS = [
  // People & Identity
  'person','face','face_2','face_3','face_4','face_5','face_6',
  'sentiment_satisfied','mood','psychology','engineering','construction',
  // Tech & Work
  'code','terminal','bug_report','devices','laptop','smartphone','cloud',

  // Fun & Personality
  'star','favorite','bolt','local_fire_department','rocket_launch','auto_awesome',

  // Nature & Objects
  'pets','local_florist','eco','diamond','coffee','cake',
  'travel_explore','public','nightlight','sunny','storm',
];
const AVATAR_COLORS = [
  '#4f8ef7','#34d399','#f472b6','#a78bfa','#fbbf24','#22d3ee',
  '#e50914','#f97316','#84cc16','#06b6d4','#8b5cf6','#ec4899',
  '#14b8a6','#f59e0b','#6366f1','#10b981','#ef4444','#3b82f6',
];

function ProfileModal({ currentUser, users, setUsers, setCurrentUser, showToast, onClose }) {
  const [tab, setTab] = useState('profile');
  const [name, setName] = useState(currentUser?.name || '');
  const [selIcon, setSelIcon] = useState(currentUser?.avatarIcon || '');
  const [selColor, setSelColor] = useState(currentUser?.color || '#4f8ef7');
  const [saving, setSaving] = useState(false);

  // [v21] TOTP Setup
  const [showTotpSetup, setShowTotpSetup] = useState(false);

  const [oldPass, setOldPass] = useState('');
  const [newPass, setNewPass] = useState('');
  const [confirmPass, setConfirmPass] = useState('');
  const [passErr, setPassErr] = useState('');
  const [showOld, setShowOld] = useState(false);
  const [showNew, setShowNew] = useState(false);
  const [showConfirm, setShowConfirm] = useState(false);

  const previewUser = { ...currentUser, name: name || currentUser?.name, avatarIcon: selIcon, color: selColor };

  const renderPreviewAvatar = (size=56) => {
    const fs = Math.round(size * 0.5);
    if (selIcon) {
      return h('div', { style:{
        width:size+'px',height:size+'px',borderRadius:'50%',
        background:selColor+'22',color:selColor,
        display:'flex',alignItems:'center',justifyContent:'center',
        border:'2px solid '+selColor+'44', flexShrink:0
      }}, h('span',{className:'ms',style:{fontSize:fs+'px',lineHeight:'1'}},selIcon));
    }
    return h('div', { style:{
      width:size+'px',height:size+'px',borderRadius:'50%',
      background:selColor+'22',color:selColor,
      display:'flex',alignItems:'center',justifyContent:'center',
      fontSize:Math.round(size*0.38)+'px',fontWeight:'700',
      border:'2px solid '+selColor+'44', flexShrink:0
    }}, (name||currentUser?.name||'?')[0].toUpperCase());
  };

  const saveProfile = async () => {
    if (!name.trim()) { showToast('กรุณากรอกชื่อ', 'error'); return; }
    setSaving(true);
    const updated = { ...currentUser, name: name.trim(), avatarIcon: selIcon, color: selColor };
    // [FIX-PROFILE] บันทึกลง GAS จริง — ไม่ส่ง password (GAS จะ preserve ให้อัตโนมัติ)
    if (GAS_URL) {
      try {
        const res = await api.rawWrite({
          action: 'update', sheet: 'users',
          token: getAuthToken(), id: currentUser.id, data: updated
        });
        if (!res || res.ok === false) {
          showToast(res?.error || 'บันทึกโปรไฟล์ไม่สำเร็จ', 'error');
          setSaving(false); return;
        }
      } catch(e) {
        showToast('เกิดข้อผิดพลาด: ' + e.message, 'error');
        setSaving(false); return;
      }
    }
    setUsers(p => p.map(u => u.id === currentUser.id ? updated : u));
    // [v18] อัพเดท currentUser ทันที — ไม่ต้อง reload เพื่อให้ avatar เปลี่ยนทันที
    setCurrentUser(updated);
    setSaving(false);
    showToast('บันทึกโปรไฟล์แล้ว');
    onClose();
  };

  const [passLoading, setPassLoading] = useState(false);

  const changePassword = async () => {
    setPassErr('');
    const isFirstTimePwd = currentUser?.authMethod === 'google' || currentUser?.authMethod === 'microsoft';
    if (!isFirstTimePwd && !oldPass.trim()) { setPassErr('กรุณากรอกรหัสผ่านปัจจุบัน'); return; }
    if (!newPass.trim()) { setPassErr('กรุณากรอกรหัสผ่านใหม่'); return; }
    const pwdCheck = validatePasswordStrength(newPass.trim());
    if (!pwdCheck.ok) { setPassErr(pwdCheck.msg); return; }
    if (newPass.trim() !== confirmPass.trim()) { setPassErr('รหัสผ่านใหม่ไม่ตรงกัน'); return; }
    setPassLoading(true);
    // [FIX VULN-04] ส่ง old+new password ไป GAS
    // GAS ตรวจ old password (verify hash) แล้ว hash new password ก่อนบันทึก
    if (GAS_URL) {
      try {
        const res = await api.rawWrite({
          action: 'update',
          sheet: 'users',
          token: getAuthToken(),
          id: currentUser.id,
          data: { ...currentUser, _oldPassword: oldPass.trim(), password: newPass.trim() }
        });
        if (!res || res.ok === false) {
          setPassErr(res?.error || 'เปลี่ยนรหัสผ่านไม่สำเร็จ');
          setPassLoading(false);
          return;
        }
      } catch(e) {
        setPassErr('เกิดข้อผิดพลาด: ' + e.message);
        setPassLoading(false);
        return;
      }
    }
    // [FIX VULN-11] ไม่เก็บ password ใน currentUser state
    setOldPass(''); setNewPass(''); setConfirmPass('');
    // [v18-PWDEXPIRY] อัพเดท passwordChangedAt ใน state

    const newExp = new Date(new Date().getTime() + 30*24*60*60*1000).toISOString();
    // [FIX-GOOGLE-PWD] อัพเดท authMethod เมื่อ Google user ตั้ง password สำเร็จ

// ─── MODERN DATE PICKER ────────────────────────────────────────────────────────
function DatePicker({ value, onChange, placeholder, className }) {
  const [open, setOpen] = useState(false);
  const [viewDate, setViewDate] = useState(() => {
    if (value) { const d = new Date(value); return { year: d.getFullYear(), month: d.getMonth() }; }
    const n = new Date(); return { year: n.getFullYear(), month: n.getMonth() };
  });
  const ref = useRef(null);

  useEffect(() => {
    if (!open) return;
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [open]);

  useEffect(() => {
    if (value) { const d = new Date(value); setViewDate({ year: d.getFullYear(), month: d.getMonth() }); }
  }, [value]);

  const thMonths = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  const weekdays = ['Mo','Tu','We','Th','Fr','Sa','Su'];

  const getDays = () => {
    const { year, month } = viewDate;
    const first = new Date(year, month, 1);
    let startDow = first.getDay(); // 0=Sun
    startDow = startDow === 0 ? 6 : startDow - 1; // Mo=0
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const prevDays = new Date(year, month, 0).getDate();
    const cells = [];
    for (let i = startDow - 1; i >= 0; i--) {
      cells.push({ day: prevDays - i, month: month - 1, year: month === 0 ? year - 1 : year, other: true });
    }
    for (let d = 1; d <= daysInMonth; d++) cells.push({ day: d, month, year, other: false });
    while (cells.length % 7 !== 0) {
      const n = cells.length - startDow - daysInMonth + 1;
      const nm = month === 11 ? 0 : month + 1;
      const ny = month === 11 ? year + 1 : year;
      cells.push({ day: n, month: nm, year: ny, other: true });
    }
    return cells;
  };

  const toIso = (year, month, day) => {
    const mm = String(month + 1).padStart(2,'0');
    const dd = String(day).padStart(2,'0');
    return `${year}-${mm}-${dd}`;
  };

  const formatDisplay = (iso) => {
    if (!iso) return '';
    const d = new Date(iso + 'T00:00:00');
    return d.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' });
  };

  const today = new Date();
  const todayIso = toIso(today.getFullYear(), today.getMonth(), today.getDate());

  const prevMonth = () => setViewDate(v => {
    if (v.month === 0) return { year: v.year - 1, month: 11 };
    return { ...v, month: v.month - 1 };
  });
  const nextMonth = () => setViewDate(v => {
    if (v.month === 11) return { year: v.year + 1, month: 0 };
    return { ...v, month: v.month + 1 };
  });

  const selectDay = (cell) => {
    const iso = toIso(cell.year, cell.month, cell.day);
    onChange(iso);
    setOpen(false);
  };

  const days = getDays();

  return h('div', { ref, className:'datepicker-wrap', style:{position:'relative'} },
    h('div', {
      className: 'datepicker-input' + (open ? ' open' : ''),
      style:{
        width:'100%', background:'var(--bg3)', border:'1px solid var(--border2)',
        borderColor: open ? 'var(--accent)' : 'var(--border2)',
        boxShadow: open ? '0 0 0 3px rgba(37,99,235,0.15)' : 'none',
        borderRadius:'var(--r)', padding:'9px 36px 9px 13px',
        color: value ? 'var(--text)' : 'var(--text3)', fontSize:'13px', fontFamily:'var(--font)',
        cursor:'pointer', userSelect:'none', transition:'all 0.2s', background: open ? 'var(--bg2)' : 'var(--bg3)'
      },
      onClick: () => setOpen(o => !o)
    },
      value ? formatDisplay(value) : (placeholder || 'เลือกวันที่')
    ),
    h('span', { className:'ms', style:{position:'absolute',right:'10px',top:'50%',transform:'translateY(-50%)',color:'var(--accent3)',fontSize:'16px',pointerEvents:'none'} }, 'calendar_month'),

    open && h('div', { className:'datepicker-popup' },
      h('div', { className:'dp-header' },
        h('div', { className:'dp-nav', onClick: prevMonth }, h('span',{className:'ms ms-xs'},'chevron_left')),
        h('div', { className:'dp-month-year' }, `${thMonths[viewDate.month]} ${viewDate.year + 543}`),
        h('div', { className:'dp-nav', onClick: nextMonth }, h('span',{className:'ms ms-xs'},'chevron_right'))
      ),
      h('div', { className:'dp-grid' },
        weekdays.map(d => h('div', { key:d, className:'dp-weekday' }, d)),
        days.map((cell, i) => {
          const iso = toIso(cell.year, cell.month, cell.day);
          const isSelected = iso === value;
          const isToday = iso === todayIso;
          return h('div', {
            key: i,
            className: 'dp-day' + (isSelected ? ' selected' : '') + (isToday && !isSelected ? ' today' : '') + (cell.other ? ' other-month' : ''),
            onClick: () => selectDay(cell)
          }, cell.day);
        })
      ),
      h('div', { style:{marginTop:'10px',paddingTop:'10px',borderTop:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'} },
        h('div', {
          style:{fontSize:'11px',color:'var(--text3)',cursor:'pointer',display:'flex',alignItems:'center',gap:'3px'},
          onClick: () => { onChange(''); setOpen(false); }
        }, h('span',{className:'ms ms-xs'},'close'), 'ล้างค่า'),
        h('div', {
          style:{fontSize:'11px',color:'var(--accent3)',cursor:'pointer',fontWeight:'600',display:'flex',alignItems:'center',gap:'3px'},
          onClick: () => { onChange(todayIso); setOpen(false); }

// ─── DASHBOARD PAGE ───────────────────────────────────────────────────────────
function DashboardPage({ teamTCs, teamDefects, teamProjects, teamTasks, navigate, navCtx, users, currentUser, currentTeam }) {
  const [filterFrom, setFilterFrom] = useState('');
  const [filterTo, setFilterTo] = useState('');
  const [activeTab, setActiveTab] = useState('overview');

  const filterTCs = useMemo(() => {
    let list = teamTCs;
    if (filterFrom) list = list.filter(t => new Date(t.createdAt) >= new Date(filterFrom));
    if (filterTo) list = list.filter(t => new Date(t.createdAt) <= new Date(filterTo+'T23:59:59'));
    return list;
  }, [teamTCs, filterFrom, filterTo]);

  const statuses = statusOpts.map(s => ({ s, count: filterTCs.filter(tc=>tc.status===s).length }));
  const defectSeverities = ['Critical','High','Medium','Low'].map(s => ({ s, count: teamDefects.filter(d=>d.severity===s).length }));
  const defectStatuses = ['Open','In Progress','Resolved','Closed','Rejected'].map(s => ({ s, count: teamDefects.filter(d=>d.status===s).length }));
  const total = filterTCs.length;
  const passed = filterTCs.filter(tc=>tc.status==='Passed'||tc.status==='Pass with Comment').length;
  const failed = filterTCs.filter(tc=>tc.status==='Failed').length;
  const inProgress = filterTCs.filter(tc=>tc.status==='In Progress').length;
  const notStart = filterTCs.filter(tc=>tc.status==='Not Start').length;
  const deferred = filterTCs.filter(tc=>tc.status==='Deferred').length;
  const passRate = total ? Math.round(passed/total*100) : 0;
  const openDefects = teamDefects.filter(d=>d.status!=='Closed'&&d.status!=='Rejected').length;
  const criticalDefects = teamDefects.filter(d=>d.severity==='Critical'&&d.status!=='Closed'&&d.status!=='Rejected').length;

  // Trend data: last 7 days TC created
  const trendDays = useMemo(() => {
    const days = [];
    for (let i=6; i>=0; i--) {
      const d = new Date(); d.setDate(d.getDate()-i); d.setHours(0,0,0,0);
      const next = new Date(d); next.setDate(next.getDate()+1);
      const label = d.toLocaleDateString('th-TH',{month:'short',day:'numeric'});
      const created = teamTCs.filter(tc => { const dt = new Date(tc.createdAt); return dt >= d && dt < next; }).length;
      const passedD = teamTCs.filter(tc => { const dt = new Date(tc.updatedAt||tc.createdAt); return dt >= d && dt < next && (tc.status==='Passed'||tc.status==='Pass with Comment'); }).length;
      const failedD = teamTCs.filter(tc => { const dt = new Date(tc.updatedAt||tc.createdAt); return dt >= d && dt < next && tc.status==='Failed'; }).length;
      const defD = teamDefects.filter(def => { const dt = new Date(def.createdAt); return dt >= d && dt < next; }).length;
      days.push({ label, created, passed:passedD, failed:failedD, defects:defD });
    }
    return days;
  }, [teamTCs, teamDefects]);

  // Project progress data
  const projectData = useMemo(() => teamProjects.map(p => {
    const ptcs = teamTCs.filter(tc => { const t = teamTasks.find(t2=>t2.id===tc.taskId); return t?.projectId===p.id; });
    const pDefs = teamDefects.filter(d => { const t = teamTasks.find(t2=>t2.id===d.taskId); return t?.projectId===p.id; });
    const ppassed = ptcs.filter(tc=>tc.status==='Passed'||tc.status==='Pass with Comment').length;
    const pfailed = ptcs.filter(tc=>tc.status==='Failed').length;
    const pr = ptcs.length ? Math.round(ppassed/ptcs.length*100) : 0;
    const tasks = teamTasks.filter(t=>t.projectId===p.id);
    return { ...p, ptcs, ppassed, pfailed, pr, pDefs, tasks };
  }), [teamProjects, teamTCs, teamTasks, teamDefects]);

  // Top testers by TC execution
  const testerStats = useMemo(() => {
    const map = {};
    teamTCs.forEach(tc => {
      const uid = tc.assignee || tc.createdBy || 'unknown';
      if (!map[uid]) map[uid] = { uid, passed:0, failed:0, total:0 };
      map[uid].total++;
      if (tc.status==='Passed'||tc.status==='Pass with Comment') map[uid].passed++;
      if (tc.status==='Failed') map[uid].failed++;
    });
    return Object.values(map).sort((a,b)=>b.total-a.total).slice(0,5).map(t => {
      const u = (users||[]).find(x=>x.id===t.uid);
      return { ...t, name: u?.name || 'Unknown', color: u?.color||'#4f8ef7' };
    });
  }, [teamTCs, users]);

  const exportChart = () => {
    const wb = XLSX.utils.book_new();
    const s1 = [['Status','Count'],...statuses.map(s=>[s.s,s.count])];
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(s1), 'TC Status');
    const s2 = [['Severity','Count'],...defectSeverities.map(s=>[s.s,s.count])];
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(s2), 'Defect Severity');
    const s3 = [['Project','Total TCs','Passed','Failed','Pass Rate%','Open Defects'],...projectData.map(p=>[p.name,p.ptcs.length,p.ppassed,p.pfailed,p.pr,p.pDefs.filter(d=>d.status!=='Closed').length])];
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(s3), 'Projects');
    XLSX.writeFile(wb, 'dashboard_report.xlsx');
  };

  const statusColor = (s) => ({ 'Failed':'var(--red)','In Progress':'var(--accent)','Deferred':'var(--amber)','Pass with Comment':'var(--cyan)','Passed':'var(--green)','Not Start':'var(--text3)','Cancelled':'#555' }[s]||'var(--accent)');
  const sevColor = (s) => ({ 'Critical':'var(--red)','High':'#ff6b35','Medium':'var(--amber)','Low':'var(--green)' }[s]||'var(--text3)');
  const defStatusColor = (s) => ({ 'Open':'var(--red)','In Progress':'var(--accent)','Resolved':'var(--cyan)','Closed':'var(--green)','Rejected':'var(--text3)' }[s]||'var(--text2)');

  // ── Chart Components ──────────────────────────────────────────────────────
  // Horizontal Bar Chart
  const HBarChart = ({ data, colorFn, showPct }) => {
    const max = Math.max(...data.map(d=>d.count), 1);
    const total2 = data.reduce((a,b)=>a+b.count,0)||1;
    return h('div', { style:{display:'flex',flexDirection:'column',gap:'10px'} },
      data.map(item => h('div', { key:item.s },
        h('div', { style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'5px'} },
          h('span', { style:{fontSize:'12px',color:'var(--text2)',fontWeight:'500'} }, item.s),
          h('div', { style:{display:'flex',gap:'8px',alignItems:'center'} },
            showPct && h('span', { style:{fontSize:'11px',color:'var(--text3)',fontFamily:'var(--mono)'} }, `${Math.round(item.count/total2*100)}%`),
            h('span', { style:{fontSize:'13px',fontWeight:'700',color:colorFn(item.s),fontFamily:'var(--mono)',minWidth:'24px',textAlign:'right'} }, item.count)
          )
        ),
        h('div', { style:{background:'var(--bg4)',borderRadius:'3px',height:'8px',overflow:'hidden'} },
          h('div', { style:{width:`${Math.round(item.count/max*100)}%`,height:'100%',background:colorFn(item.s),borderRadius:'3px',transition:'width 0.5s ease',minWidth:item.count>0?'6px':'0',boxShadow:`0 0 6px ${colorFn(item.s)}66`} })
        )
      ))
    );
  };

  // Donut / Pie Chart (SVG)
  const DonutChart = ({ data, colorFn, size=160, thickness=28 }) => {
    const total2 = data.reduce((a,b)=>a+b.count,0)||1;
    const r = (size-thickness*2)/2; const cx = size/2; const cy = size/2;
    const circumference = 2*Math.PI*r;
    let cumulative = 0;
    const segments = data.filter(d=>d.count>0).map(d => {
      const pct = d.count/total2;
      const offset = circumference*(1-cumulative);
      const dash = circumference*pct;
      cumulative += pct;
      return { ...d, offset, dash, pct };
    });
    const biggest = segments.sort((a,b)=>b.count-a.count)[0];
    return h('div', { style:{position:'relative',width:size,height:size,flexShrink:0} },
      h('svg', { width:size, height:size, viewBox:`0 0 ${size} ${size}` },
        h('circle', { cx, cy, r, fill:'none', stroke:'var(--bg4)', strokeWidth:thickness }),
        segments.map((seg,i) => h('circle', { key:i, cx, cy, r, fill:'none',
          stroke:colorFn(seg.s), strokeWidth:thickness,
          strokeDasharray:`${seg.dash} ${circumference}`,
          strokeDashoffset:seg.offset,
          style:{transform:`rotate(-90deg)`,transformOrigin:'center',transition:'stroke-dasharray 0.5s ease'}
        }))
      ),
      biggest && h('div', { style:{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'} },
        h('div', { style:{fontSize:'20px',fontWeight:'700',lineHeight:'1',color:colorFn(biggest.s)} }, biggest.count),
        h('div', { style:{fontSize:'10px',color:'var(--text3)',marginTop:'2px',textAlign:'center',maxWidth:'60px'} }, biggest.s)
      )
    );
  };

  // Vertical Bar Chart (SVG-based)
  const VBarChart = ({ data, colorFn, height=120 }) => {
    const max = Math.max(...data.map(d=>d.count),1);
    return h('div', { style:{display:'flex',alignItems:'flex-end',gap:'6px',height:height+30,paddingTop:'8px'} },
      data.map((item,i) => {
        const barH = max>0 ? Math.max(Math.round(item.count/max*height),item.count>0?4:0) : 0;
        return h('div', { key:i, style:{display:'flex',flexDirection:'column',alignItems:'center',flex:1,gap:'4px'} },
          item.count>0 && h('span',{style:{fontSize:'10px',fontWeight:'700',color:colorFn(item.s),fontFamily:'var(--mono)'}},''+item.count),
          h('div', { style:{width:'100%',height:barH+'px',background:colorFn(item.s),borderRadius:'3px 3px 0 0',transition:'height 0.5s ease',boxShadow:`0 0 8px ${colorFn(item.s)}44`,minHeight:item.count>0?'4px':'0'} }),
          h('div', { style:{fontSize:'9px',color:'var(--text3)',textAlign:'center',wordBreak:'break-word',lineHeight:'1.2',maxWidth:'48px'} }, item.s.length>8?item.s.slice(0,8)+'…':item.s)
        );
      })
    );
  };

  // Line/Sparkline Chart (SVG)
  const LineChart = ({ data, keys, colors, height=100 }) => {
    const w = 100; // percent-based via viewBox
    const allVals = data.flatMap(d=>keys.map(k=>d[k]||0));
    const maxV = Math.max(...allVals,1);
    const pts = (key) => data.map((d,i)=>{
      const x = (i/(data.length-1||1))*w;
      const y = height - ((d[key]||0)/maxV*(height-10)) - 5;
      return [x,y];
    });
    return h('div', { style:{position:'relative'} },
      h('svg', { viewBox:`0 0 ${w} ${height}`, style:{width:'100%',height:height+'px',overflow:'visible'} },
        // Grid lines
        [0,25,50,75,100].map(pct => {
          const y = height - (pct/100*(height-10)) - 5;
          return h('line',{key:pct,x1:0,y1:y,x2:w,y2:y,stroke:'var(--border)',strokeWidth:'0.3',strokeDasharray:'2,2'});
        }),
        keys.map((key,ki) => {
          const points = pts(key);
          const path = points.map((p,i)=>(i===0?'M':'L')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
          const areaPath = path + ` L${points[points.length-1][0].toFixed(1)},${height} L0,${height} Z`;
          return [
            h('path',{key:'area'+ki,d:areaPath,fill:colors[ki],opacity:'0.08'}),
            h('path',{key:'line'+ki,d:path,fill:'none',stroke:colors[ki],strokeWidth:'1.5',strokeLinejoin:'round',strokeLinecap:'round'}),
            ...points.map((p,i)=>h('circle',{key:'dot'+i,cx:p[0],cy:p[1],r:'2',fill:colors[ki]}))
          ];
        }).flat()
      ),
      // Legend
      h('div',{style:{display:'flex',gap:'12px',marginTop:'6px',flexWrap:'wrap'}},
        keys.map((k,i)=>h('div',{key:k,style:{display:'flex',alignItems:'center',gap:'4px'}},
          h('div',{style:{width:'12px',height:'3px',background:colors[i],borderRadius:'2px'}}),
          h('span',{style:{fontSize:'10px',color:'var(--text3)'}},k)
        ))
      )
    );
  };

  // Stacked Bar (horizontal)
  const StackedBar = ({ segments, total: tot }) => {
    const total2 = tot||segments.reduce((a,b)=>a+b.count,0)||1;
    return h('div', { style:{display:'flex',height:'20px',borderRadius:'4px',overflow:'hidden',gap:'1px'} },
      segments.filter(s=>s.count>0).map((seg,i) =>
        h('div',{key:i,title:`${seg.s}: ${seg.count}`,style:{width:`${seg.count/total2*100}%`,background:seg.color,minWidth:'2px',transition:'width 0.5s',position:'relative'}},
          seg.count/total2 > 0.1 && h('span',{style:{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'9px',fontWeight:'700',color:'rgba(255,255,255,0.9)'}},seg.count)
        )
      )
    );
  };

  // Gauge chart
  const GaugeChart = ({ value, max=100, color='var(--green)', size=120 }) => {
    const pct = Math.min(value/max,1);
    const angle = pct * 180 - 90;
    const r = 45; const cx=60; const cy=65;
    const startX = cx-r; const startY=cy;
    const endX = cx+r; const endY=cy;
    const midX = cx + r*Math.cos((angle-90)*Math.PI/180);
    const midY = cy + r*Math.sin((angle-90)*Math.PI/180);
    const largeArc = angle > 0 ? 1 : 0;
    return h('div',{style:{position:'relative',width:size,height:size/1.5}},
      h('svg',{viewBox:'0 0 120 80',width:size,height:size/1.5},
        h('path',{d:`M ${startX} ${startY} A ${r} ${r} 0 0 1 ${endX} ${endY}`,fill:'none',stroke:'var(--bg4)',strokeWidth:'12',strokeLinecap:'round'}),
        pct>0 && h('path',{d:`M ${startX} ${startY} A ${r} ${r} 0 0 1 ${midX.toFixed(1)} ${midY.toFixed(1)}`,fill:'none',stroke:color,strokeWidth:'12',strokeLinecap:'round',style:{filter:`drop-shadow(0 0 4px ${color}88)`}}),
        h('text',{x:cx,y:cy+4,textAnchor:'middle',fontSize:'16',fontWeight:'700',fill:color,fontFamily:'var(--mono)'},''+value+'%'),
        h('text',{x:startX,y:cy+14,fontSize:'8',fill:'var(--text3)',fontFamily:'var(--font)'},'0%'),
        h('text',{x:endX,y:cy+14,textAnchor:'end',fontSize:'8',fill:'var(--text3)',fontFamily:'var(--font)'},'100%')
      )
    );
  };

  // Radar-like stat summary row
  const StatPill = ({ label, value, color, icon, sub }) =>
    h('div',{style:{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'8px',padding:'16px 20px',position:'relative',overflow:'hidden',transition:'all 0.2s',cursor:'default'},
      onMouseEnter:e=>{e.currentTarget.style.borderColor=color;e.currentTarget.style.transform='translateY(-2px)';e.currentTarget.style.boxShadow=`0 8px 24px ${color}22`},
      onMouseLeave:e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.transform='translateY(0)';e.currentTarget.style.boxShadow='none'}},
      h('div',{style:{position:'absolute',top:0,left:0,right:0,height:'3px',background:`linear-gradient(90deg,${color},${color}88)`}}),
      h('div',{style:{position:'absolute',top:'12px',right:'14px',opacity:0.12,fontSize:'32px',lineHeight:'1',fontFamily:'Material Symbols Rounded'}},icon),
      h('div',{style:{fontSize:'10px',color:'var(--text3)',textTransform:'uppercase',letterSpacing:'1.2px',fontWeight:'700',marginBottom:'8px'}},label),
      h('div',{style:{fontSize:'32px',fontWeight:'800',color,lineHeight:'1',fontFamily:'var(--mono)',letterSpacing:'-1px'}},value),
      sub && h('div',{style:{fontSize:'11px',color:'var(--text3)',marginTop:'6px',display:'flex',alignItems:'center',gap:'4px'}},sub)
    );

  const tabs = [
    { id:'overview', label:'ภาพรวม', icon:'dashboard' },
    { id:'testcases', label:'Test Cases', icon:'science' },
    { id:'defects', label:'Defects', icon:'bug_report' },
    { id:'projects', label:'Projects', icon:'folder' },
    { id:'trend', label:'Trend', icon:'trending_up' },
  ];

  return h('div', null,
    // ── HEADER ──
    h('div', { style:{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:'20px',flexWrap:'wrap',gap:'12px'} },
      h('div', null,
        h('h1', { style:{fontSize:'22px',fontWeight:'800',letterSpacing:'-0.5px',margin:0} }, 'Dashboard'),
        h('p', { style:{color:'var(--text3)',fontSize:'13px',marginTop:'3px'} },
          currentTeam?.name ? `${currentTeam.name} · ` : '',
          `${teamProjects.length} Projects · ${total} Test Cases · ${teamDefects.length} Defects`
        )
      ),
      h('div', { style:{display:'flex',gap:'8px',alignItems:'center',flexWrap:'wrap'} },
        h(DatePicker, { value:filterFrom, onChange:setFilterFrom, placeholder:'จากวันที่' }),
        h('span', { style:{color:'var(--text3)',fontSize:'12px'} }, '–'),
        h(DatePicker, { value:filterTo, onChange:setFilterTo, placeholder:'ถึงวันที่' }),
        (filterFrom||filterTo) && h('button', { className:'btn btn-sm', onClick:()=>{setFilterFrom('');setFilterTo('');} },
          h('span',{className:'ms ms-xs'},'close'), 'Clear'
        ),
        h('button', { className:'btn btn-sm', onClick:exportChart, style:{display:'flex',alignItems:'center',gap:'5px'} },
          h('span',{className:'ms ms-xs'},'download'), 'Export'
        )
      )
    ),

    // ── CRITICAL ALERT BANNER ──
    criticalDefects > 0 && h('div', { style:{background:'var(--red-bg)',border:'1px solid var(--red)',borderRadius:'6px',padding:'10px 16px',marginBottom:'16px',display:'flex',alignItems:'center',gap:'10px'} },
      h('span',{className:'ms',style:{color:'var(--red)',fontSize:'20px',animation:'notif-pulse 2s infinite'}},'warning'),

      h('button',{className:'btn btn-sm btn-danger',style:{marginLeft:'auto'},onClick:()=>{}},
        h('span',{className:'ms ms-xs'},'bug_report'),' ดู Defects'

    // ── KPI STAT CARDS ──
    h('div', { style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(150px,1fr))',gap:'12px',marginBottom:'20px'} },
      h(StatPill, { label:'Total Test Cases', value:total, color:'var(--accent)', icon:'science',
        sub:h('span',null,h('span',{className:'ms ms-xs',style:{marginRight:'3px',color:'var(--text3)'}},'folder_open'),teamProjects.length+' Projects') }),
      h(StatPill, { label:'Pass Rate', value:passRate+'%', color:passRate>=80?'var(--green)':passRate>=50?'var(--amber)':'var(--red)', icon:'check_circle',
        sub:h('span',null,
          h('span',{style:{color:'var(--green)',fontWeight:'600',display:'flex',alignItems:'center',gap:'3px'}},h('span',{className:'ms ms-xs'},'check_circle'),passed),
          h('span',{style:{color:'var(--text3)'}},' Passed')
        ) }),
      h(StatPill, { label:'Failed', value:failed, color:'var(--red)', icon:'cancel',
        sub:h('span',null,
          h('span',{style:{color:'var(--amber)',fontWeight:'600'}},inProgress),
          h('span',{style:{color:'var(--text3)'}},' In Progress')
        ) }),
      h(StatPill, { label:'Open Defects', value:openDefects, color:openDefects>0?'var(--amber)':'var(--green)', icon:'bug_report',
        sub:h('span',null,
          h('span',{style:{color:criticalDefects>0?'var(--red)':'var(--text3)',fontWeight:criticalDefects>0?'700':'400'}},h('span',{className:'ms ms-xs',style:{marginRight:'3px'}},'warning'),(criticalDefects+' Critical'))
        ) }),
      h(StatPill, { label:'Total Defects', value:teamDefects.length, color:'var(--purple)', icon:'list_alt',
        sub:h('span',null,
          h('span',{style:{color:'var(--green)',fontWeight:'600'}},teamDefects.filter(d=>d.status==='Closed').length),
          h('span',{style:{color:'var(--text3)'}},' Closed')
        ) }),
      h(StatPill, { label:'Not Started', value:notStart, color:'var(--text3)', icon:'pending',
        sub:h('span',null,
          h('span',{style:{color:'var(--cyan)',fontWeight:'600'}},'↓ '+deferred),
          h('span',{style:{color:'var(--text3)'}},' Deferred')
        ) }),
    ),

    // ── TAB NAV ──
    h('div', { style:{display:'flex',gap:'4px',marginBottom:'20px',borderBottom:'1px solid var(--border)',paddingBottom:'0'} },
      tabs.map(tab => h('button', { key:tab.id,
        onClick:()=>setActiveTab(tab.id),
        style:{display:'flex',alignItems:'center',gap:'6px',padding:'8px 14px',background:'transparent',border:'none',
          borderBottom: activeTab===tab.id ? '2px solid var(--accent)' : '2px solid transparent',
          color: activeTab===tab.id ? 'var(--text)' : 'var(--text3)',
          fontWeight: activeTab===tab.id ? '600' : '400',
          fontSize:'13px',cursor:'pointer',transition:'all 0.15s',fontFamily:'var(--font)',marginBottom:'-1px'
        }},
        h('span',{className:'ms ms-xs',style:{color:activeTab===tab.id?'var(--accent)':'var(--text3)'}},tab.icon),
        tab.label
      ))
    ),

    // ── OVERVIEW TAB ──
    activeTab==='overview' && h('div', null,
      h('div', { style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'16px',marginBottom:'16px'} },
        // TC Status Donut + Bar
        h('div', { className:'card' },
          h('div',{className:'card-header'},
            h('div',null,
              h('h3',{className:'card-title'},'Test Case Status'),
              h('p',{style:{fontSize:'11px',color:'var(--text3)',marginTop:'2px'}},`รวม ${total} Test Cases`)
            )
          ),
          h('div',{style:{display:'flex',gap:'20px',alignItems:'center'}},
            h(DonutChart,{data:statuses,colorFn:statusColor,size:140,thickness:24}),
            h('div',{style:{flex:1}}, h(HBarChart,{data:statuses.filter(s=>s.count>0),colorFn:statusColor,showPct:true}))
          )
        ),
        // Defect Severity + Status
        h('div', { className:'card' },
          h('div',{className:'card-header'},
            h('div',null,
              h('h3',{className:'card-title'},'Defect Overview'),
              h('p',{style:{fontSize:'11px',color:'var(--text3)',marginTop:'2px'}},`รวม ${teamDefects.length} Defects`)
            )
          ),
          h('div',{style:{display:'flex',gap:'20px',alignItems:'center'}},
            h(DonutChart,{data:defectSeverities,colorFn:sevColor,size:140,thickness:24}),
            h('div',{style:{flex:1}}, h(HBarChart,{data:defectSeverities.filter(s=>s.count>0),colorFn:sevColor,showPct:true}))
          )
        )
      ),
      // Pass rate gauge + stacked progress
      h('div',{className:'card',style:{marginBottom:'16px'}},
        h('div',{className:'card-header'},h('h3',{className:'card-title'},'Quality Health Score')),
        h('div',{style:{display:'flex',gap:'32px',alignItems:'center',flexWrap:'wrap'}},
          h('div',{style:{display:'flex',flexDirection:'column',alignItems:'center'}},
            h(GaugeChart,{value:passRate,color:passRate>=80?'var(--green)':passRate>=50?'var(--amber)':'var(--red)',size:160}),
            h('div',{style:{fontSize:'12px',color:'var(--text3)',marginTop:'4px'}},`Pass Rate`)
          ),
          h('div',{style:{flex:1,minWidth:'200px'}},
            h('div',{style:{marginBottom:'12px'}},
              h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:'6px'}},
                h('span',{style:{fontSize:'12px',color:'var(--text2)',fontWeight:'600'}},'TC Execution Progress'),
                h('span',{style:{fontSize:'11px',color:'var(--text3)',fontFamily:'var(--mono)'}},`${total-notStart}/${total}`)
              ),
              h(StackedBar,{total,segments:[
                {s:'Passed',count:passed,color:'var(--green)'},
                {s:'Pass w/ Comment',count:filterTCs.filter(tc=>tc.status==='Pass with Comment').length,color:'var(--cyan)'},
                {s:'In Progress',count:inProgress,color:'var(--accent)'},
                {s:'Failed',count:failed,color:'var(--red)'},
                {s:'Deferred',count:deferred,color:'var(--amber)'},
                {s:'Not Start',count:notStart,color:'var(--bg4)'},
              ]})
            ),
            h('div',{style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'8px',marginTop:'16px'}},
              [
                {label:'Passed',count:passed,color:'var(--green)'},
                {label:'Failed',count:failed,color:'var(--red)'},
                {label:'In Progress',count:inProgress,color:'var(--accent)'},
                {label:'Not Start',count:notStart,color:'var(--text3)'},
                {label:'Deferred',count:deferred,color:'var(--amber)'},
                {label:'Pass w/ Comment',count:filterTCs.filter(tc=>tc.status==='Pass with Comment').length,color:'var(--cyan)'},
              ].map(item=>h('div',{key:item.label,style:{display:'flex',alignItems:'center',gap:'6px'}},
                h('div',{style:{width:'8px',height:'8px',borderRadius:'2px',background:item.color,flexShrink:0}}),
                h('span',{style:{fontSize:'11px',color:'var(--text2)'}},' '+item.label),
                h('span',{style:{fontSize:'11px',fontWeight:'700',color:item.color,fontFamily:'var(--mono)',marginLeft:'auto'}},''+item.count)
              ))
            )
          )
        )
      )
    ),

    // ── TEST CASES TAB ──
    activeTab==='testcases' && h('div', null,
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'16px',marginBottom:'16px'}},
        h('div',{className:'card'},
          h('div',{className:'card-header'},h('h3',{className:'card-title'},'TC Status Distribution')),
          h(HBarChart,{data:statuses,colorFn:statusColor,showPct:true})
        ),
        h('div',{className:'card'},
          h('div',{className:'card-header'},h('h3',{className:'card-title'},'Status Breakdown (Vertical)')),
          h(VBarChart,{data:statuses.filter(s=>s.count>0),colorFn:statusColor,height:140})
        )
      ),
      h('div',{style:{display:'grid',gridTemplateColumns:'2fr 1fr',gap:'16px',marginBottom:'16px'}},
        // Priority breakdown
        h('div',{className:'card'},
          h('div',{className:'card-header'},h('h3',{className:'card-title'},'TC by Priority')),
          h(HBarChart,{data:['Critical','High','Medium','Low'].map(p=>({s:p,count:filterTCs.filter(tc=>tc.priority===p).length})),colorFn:s=>({'Critical':'var(--red)','High':'#ff6b35','Medium':'var(--amber)','Low':'var(--green)'}[s]||'var(--text3)'),showPct:true})
        ),
        h('div',{className:'card'},
          h('div',{className:'card-header'},h('h3',{className:'card-title'},'Execution Summary')),
          h('div',{style:{display:'flex',flexDirection:'column',gap:'10px'}},
            [{label:'Total TCs',val:total,color:'var(--accent)'},{label:'Executed',val:total-notStart,color:'var(--cyan)'},{label:'Passed',val:passed,color:'var(--green)'},{label:'Failed',val:failed,color:'var(--red)'},{label:'Not Started',val:notStart,color:'var(--text3)'}]
            .map(row=>h('div',{key:row.label,style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0',borderBottom:'1px solid var(--border)'}},
              h('span',{style:{fontSize:'12px',color:'var(--text2)'}},''+row.label),
              h('span',{style:{fontSize:'16px',fontWeight:'700',color:row.color,fontFamily:'var(--mono)'}},''+row.val)
            ))
          )
        )
      ),
      // Top Testers
      testerStats.length > 0 && h('div',{className:'card'},
        h('div',{className:'card-header'},h('h3',{className:'card-title'},'Top Testers')),
        h('div',{style:{display:'flex',flexDirection:'column',gap:'12px'}},
          testerStats.map((t,i)=>h('div',{key:t.uid,style:{display:'flex',alignItems:'center',gap:'12px'}},
            h('div',{style:{width:'24px',height:'24px',borderRadius:'50%',background:'var(--bg4)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'11px',fontWeight:'700',color:'var(--text3)',flexShrink:0}},i+1),
            h('div',{style:{width:'28px',height:'28px',borderRadius:'4px',background:t.color+'22',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'12px',fontWeight:'700',color:t.color,flexShrink:0}},t.name[0]),
            h('div',{style:{flex:1}},
              h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:'4px'}},
                h('span',{style:{fontSize:'12px',fontWeight:'600'}},''+t.name),
                h('span',{style:{fontSize:'11px',color:'var(--text3)',fontFamily:'var(--mono)'}},`${t.total} TCs`)
              ),
              h(StackedBar,{total:t.total||1,segments:[
                {s:'Passed',count:t.passed,color:'var(--green)'},
                {s:'Failed',count:t.failed,color:'var(--red)'},
                {s:'Other',count:t.total-t.passed-t.failed,color:'var(--bg4)'},
